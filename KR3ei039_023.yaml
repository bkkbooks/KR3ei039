body:
  text: 卷二十三産後痢疾作渴方論第一産後下痢作渴者乃內亡津液或胃氣虛不能生津液但止其渴痢自差愚按前症若渴而不止喜冷飲屬胃氣虛不能生津液宜用七味白朮散夜間發熱口渴屬腎水弱而不能潤宜用六味丸並佐以益氣湯以滋化源附治驗一産婦瀉痢發熱作渴吐痰肌體消瘦飲食少思或胸膈痞滿或小腹脹墜年餘矣余以為脾腎之瀉朝用二神丸夕用六君子三月餘而痊一産婦患前症形體倦怠飲食不進與死為鄰此脾胃俱虛也用四神丸十全大補湯數劑而愈附方七味白朮散方見二十一卷第二論六味丸方見二十四卷第十一論補中益氣湯六君子湯二方見二十四卷第六論十全大補湯方見二十四卷第四論四神丸二神丸二方見八卷第八論産後大便祕澀方論第二産後大便祕因腸胃虛弱津液不足若小腹悶脹宜服麻仁丸潤之若用寒藥則促其危矣愚按前症若計其日期飲食數多即用藥通之禍在反掌之間必待腹滿覺脹欲去不能者乃結在直腸宜用豬膽汁潤之若服苦寒疏通反傷中氣通而不止或成痞症若去血過多用十全大補血虛火燥用加味四物氣血俱虛用八珍湯雖數日不通飲食如常腹中如故仍用八珍加桃仁杏仁治之若泥其日期飲食數多而通之則誤矣附治驗一産婦大便七日不通飲食如常腹中如故此腹未滿也用八珍加桃杏二仁至二十一日腹滿欲去用豬膽汁潤去而安一産婦大便不通或用通利之藥中脘脹痛飲食甚少又用蜜導之大便不禁吃逆不食余以為脾腎復傷用六君加吳茱肉果骨脂五味數劑喜其年壯而愈不然多致不起一産婦大便祕結小腹脹痛用大黃等藥致吐瀉不食腹痛胸痞余用六君子加木香炮姜治之而愈一婦人大便祕澀諸藥不應苦不可言令飲人乳而安麻仁丸大麻仁研如泥枳殼人參各四分大黃二分上為末入麻仁煉蜜丸桐子大每服二十丸空心溫酒下未通漸加不可過服阿膠枳殼丸治産後大便祕澀以阿膠枳殼二味等分為末蜜丸桐子大滑石末為衣溫水下二十丸如或未通再服附方十全大補湯八珍湯二方見二十四卷第四論加味四物湯方見二十四卷第六論産後大小便不通方論第三産後大小便不通因腸胃虛弱津液燥竭故也愚按前症當參前後論及八卷八論主治附治驗一産婦大小便不通諸藥不應將危矣令飲牛乳一日稍通三日而痊人乳尤善桃花散治膀胱積滯血澀大小便祕桃仁葵子滑石檳榔等分上為末每服二錢空心蔥白湯調下通氣散治産後大小便不通方見八卷第七論産後遺糞方論第四産後遺糞取故燕窠中草燒為末或枯礬牡蠣或白蘞芍藥各等分為末俱用酒調服或用固腸丸亦可愚按前症若脾腎虛弱用還少丹仍以補中益氣湯為主虛寒加肉豆蔻朴骨脂或四神丸若脾腎虛寒用八味丸兼四神丸仍佐以前二方附治驗小便出屎方藥附一産婦大便不實飲食少思五更或侵晨遺屎此中氣虛寒脾腎不足用補中益氣送四神丸而痊一産婦小便出糞名大小腸交乃氣血俱虛失行常道先用六君子湯二劑又用五苓散二劑而痊循常腸交亦可用附方還少丹治脾腎虛寒飲食少思發熱盜汗遺精白濁又治真氣虧損肌體瘦弱等症肉蓯蓉遠志去心茴香巴戟乾山藥枸杞子熟地黃石菖蒲山茱萸去核朱膝杜仲去皮薑製楮實子五味子白茯苓各二兩上各另為末用棗肉百枚並煉蜜丸桐子大每服五七十丸空心溫酒或鹽湯下日三服補中益氣湯六君子湯二方見二十四卷第六論四神丸方見八卷第八論八味丸方見二十四卷第十一論五苓散方見二十一卷第十論産後諸淋方論第五産後諸淋因熱客於脬虛則頻數熱則澀痛氣虛兼熱血入胞中則血隨小便出而為血淋也愚按前症若膀胱虛熱用六味丸若陰虛而陽無以化用滋陰腎氣丸蓋土生金金生水當滋化源仍參第八卷小便淋瀝頻數類附治驗一産婦小水淋瀝或時自出用分利降火之劑二年不愈余以為脾腎之氣虛用補中益氣湯六味地黃丸而痊滑石散治熱淋滑石五分通草車前子葵子各等分上為末以漿水調服治小腸有熱小便澀痛或為血淋瞿麥黃芩冬葵子各二兩通草三兩大棗十二枚上以水七升煎二升半分二服治脾氣不利小便不通橘紅為末每服二錢空心溫酒下治肺氣不利小便不通杏仁二十四枚去皮尖炒食之治脬轉小便不利滑石一錢半寒水石一錢水煎服附方六味丸方見二十四卷第十一論滋陰腎氣丸補中益氣湯二方見二十四卷第六論産後小便頻數方論第六産後小便數者乃氣虛不能制故也愚按前症若因穩婆不慎以致胞損而小便淋瀝者用八珍湯以補氣血若因膀胱氣虛而小便頻數當補脾肺若膀胱陰虛而小便淋瀝須補肺腎仍參第八卷小便頻數諸類附治驗一産婦小便頻數時忽寒戰乃屬脾肺虛弱用補中益氣加山茱山藥為主佐以桑螵蛸散而愈後患發熱晡熱盜汗自汗月水不調用加味逍遙散而安一産婦患前症吐痰發熱日晡作渴此膀胱陰虛用補中益氣湯佐以六味丸而愈又患痢後小便頻數手足俱冷屬陽氣虛寒用前湯及八味丸而瘳桑螵蛸散治陽氣虛弱小便頻數或為遺尿桑螵蛸三十個炒鹿茸酥炒黃耆各三兩牡蠣煨人參厚朴赤石脂各二兩上為末每服二錢空心粥飲調下又方用益智仁為末米飲下附方八珍湯加味逍遙散二方見二十四卷第四論補中益氣湯方見二十四卷第六論六味丸八味丸二方見二十四卷第十一論産後小便不禁方論第七廣濟治産後小便不禁用雞尾燒灰千金翼用白薇芍藥為末俱用溫酒下日三服或桑螵蛸半兩龍骨一兩為末每服二錢粥飲調下愚按前症若脾肺陽虛用補中益氣湯若肝腎陰虛用六味地黃丸若肝腎之氣虛寒用八味地黃丸附治驗一産婦小便不禁二年不愈面色或青赤或黃白此肝脾氣血虛熱用加味逍遙散為主漸愈佐以六味丸而痊後因怒小便自遺大便不實左目頓緊面色頓赤仍用前散佐以六君子湯以清肝火生肝血培脾土而瘳補脬飲治胞破小便淋瀝生絹黃色者一尺白牡丹用根並皮白及各一錢上水一碗煎至絹爛溫服服後忌言語否則無效雞內金散治氣虛溺床用雄雞䏶胵並腸燒為末溫酒調服附方補中益氣湯六君子湯二方見二十四卷第六論六味丸八味丸二方見二十四卷第十一論加味逍遙散方見二十四卷第四論産後小便出血方論第八産後小便出血者因虛熱血滲於脬也以乳發洗淨燒為末米飲調服或滑石末一錢生地黃汁調下愚按前症若膏粱積熱用加味清胃散醇酒濕毒葛根解酲湯怒動肝火加味小柴胡湯鬱結傷脾加味歸脾湯思慮傷心妙香散大腸風熱四物側柏槐花大腸血熱四物炒連槐花腸胃虛弱六君升麻柴胡元氣下陷補中益氣茯苓半夏胃氣虛弱六君升麻血虛四物升麻氣血俱虛八珍柴胡升麻大凡元氣虛弱而發熱者皆內真寒而外假熱也但用六君或補中益氣加炮姜溫補脾氣諸症悉退若四肢畏冷急加附子附治驗方藥大便下血附一産婦尿血面黃脅脹少食此肝木乘脾土也用加味逍遙補中益氣兼服而愈後為懷抱不樂食少體倦驚悸無寐尿血仍作用加味歸脾湯二十餘劑將愈惑於衆論服犀角地黃湯諸症復作仍服前湯而愈一産婦糞後下血食少體倦此脾氣虛熱用補中益氣加吳茱炒黃連五分四劑頓愈用歸脾湯而痊一婦人怒則便血寒熱口苦或胸脅脹痛或小腹痞悶此肝木乘脾土用六君柴胡山梔而愈用補中益氣加味逍遙而不復作一婦人久下血在糞前屬脾氣虛寒用補中益氣加連炒吳茱一錢數劑稍緩乃加生吳茱五分數劑而愈黃連炒吳茱萸法見七卷第五論一産婦大便後血口乾飲湯胸脅膨滿小腹悶墜內熱晡熱食少體倦日晡面赤灑淅惡寒此脾肺氣虛先用六君加乾薑木香漸愈用補中益氣將愈用歸脾湯全愈後勞役兼怒發熱血崩夜間譫語此熱入血室用加味小柴胡二劑而退用補中益氣一劑而血止用逍遙散歸脾湯調理而安葛花解酲湯治酒積上下外消其濕白豆蔻砂仁葛花各五錢木香五分青皮三錢陳皮白茯苓豬苓人參各一錢半白朮神麯澤瀉生乾薑各二錢上為末每服五錢白湯調下加味清胃散方見二十四卷首論加味小柴胡湯方見二十四卷第二論加味歸脾湯歸脾湯八珍湯逍遙散加味逍遙散五方見二十四卷第四論妙香散方見六卷第八論四物湯六君子湯補中益氣湯三方見二十四卷第六論産後陰脫玉門不閉方論第九産後陰脫玉門不閉因坐産努力舉動房勞所致或脫肛陰挺逼迫腫痛小便淋愚按玉門不閉氣血虛弱也用十全大補湯腫脹焮痛肝經虛熱也加味逍遙散若因憂怒肝脾氣血傷也加味歸脾湯若因暴怒肝火血傷也尤膽瀉肝湯仍參第八卷末諸論附治驗一産婦玉門不閉發熱惡寒用十全大補加五味子數劑而寒熱退用補中益氣加五味子數劑而玉門閉一婦人脾胃素弱兼有肝火産後玉門腫痛寒熱作渴嘔吐不食外敷大黃等藥內用驅利之劑腫及於臀諸症蜂起此真氣虛而邪氣盛也先用六君子以固腸胃次用補中益氣以補陽氣不數劑而全愈一産婦患此失治腫潰不已形體消瘦飲食少思朝寒暮熱自汗盜汗半年矣用補中益氣加茯苓半夏膿水漸少飲食漸進用歸脾湯共五十餘劑而愈一産婦玉門不閉小便淋瀝腹內一塊攻走脅下或脹或痛用加味逍遙散加車前子而愈一婦人子宮腫大二日方入損落一片殊類豬肝面黃體倦飲食無味內熱晡熱自汗盜汗用十全大補湯二十餘劑諸症悉愈仍復生育硫黃散治産後陽氣虛寒硫黃烏賊骨各半兩五味子五錢上為末搽患處日三易一方蛇床子一升炒熱帛裹尉患處亦治陰痛一方子宮脫出以萆麻子仁十四枚研塗頂心入即洗去附方十全大補湯加味逍遙散加味歸脾湯歸脾湯四方見二十四卷第四論龍膽瀉肝湯方見二十四卷第八論補中益氣湯六君子湯二方見二十四卷第六論婦人陰蝕疳方論第十婦人少陰脈數而滑者陰中有瘡名曰慝或痛或癢如蟲行狀膿水淋瀝亦有陰蝕幾盡者皆由心神煩郁脾胃虛弱氣血流滯耳內當補心養胃外以藥傅洗乃可愚按前症乃肝脾鬱結之症木旺生蟲耳宜解鬱清肝備見八卷陰中生瘡類附治驗一産婦素有肝火患此內潰癢痛食少熱渴小水淋瀝用加味逍遙散加味歸脾湯兼服間以蘆薈丸外以鶴蝨草煎洗而愈治疳蟲蝕下部用蒲黃研勻傅入內平胃散加貫衆末二錢以熟豬肝拌藥內陰中附方加味歸脾湯加味逍遙散二方見二十四卷第四論蘆薈丸方見七卷第七論産後乳少或止方論第十一婦人乳汁乃氣血所化若元氣虛弱則乳汁短少初産乳房焮脹此乳未通若怒氣乳出此肝經風熱若纍産無乳此內亡津液蓋乳汁資於衝任若婦人疾在衝任乳少而色黃者生子則怯弱而多疾愚按前症若氣血虛弱而不能化生宜壯脾胃怒動肝膽而乳腫汁出宜清肝火夫乳汁乃氣血所化在上為乳在下為經若屢産無乳或大便澀滯當滋化源附治驗一産婦因乳少服藥通之致乳房腫脹發熱作渴余謂血氣虛以玉露散補之而愈湧泉散能下乳忌食薑椒辛辣飲食王不留行瞿麥麥門冬龍骨各二錢上用豬蹄汁一碗酒一杯煎服以木梳於乳上梳下冷氣血虛鍾乳粉每服二錢煎漏蘆湯調附方玉露散治乳脈不行身體壯熱頭目昏痛大便澀滯等症人參白茯苓桔梗炒芍藥各一錢甘草炙六分上水煎服産後乳出方論第十二産後乳汁自出乃胃氣虛宜服補藥止之若乳多滿痛用溫帛尉之未産而乳自出謂之乳泣生子多不育愚按前症氣血俱虛用十全大補湯肝經血熱用加味逍遙散肝經怒火用四物參朮柴梔肝脾鬱怒用加味歸脾湯附治驗一産婦勞役忽乳汁如湧昏昧吐痰此陽氣虛而厥也灌以獨參湯而蘇更以十全大補湯數劑而安若婦人氣血方盛乳房作脹或無兒飲脹痛憎寒發熱用麥芽二三兩炒熟水煎服立消其耗散血氣如此何脾胃虛弱飲食不消方中多用之十全大補湯加味逍遙散加味歸脾湯三方見二十四卷第四論獨參湯方見三卷第十一論四物湯方見二十四卷第六論産後吹乳方論第十三産後吹乳因兒飲口氣所吹令乳汁不通壅結腫痛不急治多成癰速服瓜蔞散乃敷南星更以手揉散之愚按前症用藥切不可損其氣血治驗見二十四卷瓜蔞散乳香二錢瓜蔞一個酒煎服用南星溫湯調塗一方用陳皮一兩甘草一錢水煎服産婦妒乳方論第十四妒乳因兒未能飲余乳蓄結以致腫痛初不吮通之必致成癰若乳頭生瘡浸淫名妒乳宜赤龍皮湯天麻湯飛烏膏飛烏散傅以黃連胡粉散愚按乳盛或無子飲乳以致腫痛炒大麥芽煎服其乳即散若成瘡當從乳癰類治若皮膚浸淫成瘡當用本方治乳初腫痛內消方用瓜蔞一個粉草一寸生薑一塊半生半炒酒二碗煎服少頃去敗乳再服即愈赤龍皮湯槲皮三升水一斗煮五升溫洗之麻草湯以天麻草五升水煎洗之此草葉若麻葉冬生夏花赤如鼠尾花亦洗浸淫濕癢陰蝕等瘡飛烏散用燒硃砂作水銀上黑煙名緗粉者三兩枯礬一兩傅之諸熱浸淫丈夫陰蝕癢濕小兒頭瘡疳蝕瘡等黃連胡粉膏治症同前黃連二兩末胡粉一錢水銀一兩同研令消散上皮裹熟挼和合傅之一方乳頭裂破秋茄子裂開者陰乾燒存性水調塗之
