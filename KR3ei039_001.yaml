body:
  text: 卷一調經門凡醫婦人先須調經故以為首月經序論第一岐伯曰女子七歲腎氣盛齒更髮長二七而天癸至任脈通太衝脈盛月事以時下天謂天真之氣癸謂壬癸之水故云天癸也然沖為血海任主胞胎二脈流通經血漸盈應時而下常以三旬一見以像月盈則虧也若遇經行最宜謹慎否則與産後症相類若被驚怒勞役則血氣錯亂經脈不行多致勞瘵等疾若逆於頭面肢體之間則重痛不寧若怒氣傷肝則頭暈脅痛嘔血而瘰癧癰瘍若經血內滲則竅穴淋瀝無已凡此六淫外侵而變症百出犯時微若秋毫成患重如山嶽可不畏哉愚按血者水穀之精氣也和調五臟灑陳六腑在男子則化為精在婦人上為乳汁下為血海故雖心主血肝藏血亦皆統攝於脾補脾和胃血自生矣凡經行之際禁用苦寒辛散之藥飲食亦然詩云婦人和平則樂有子和則陰陽不乖平則氣血不爭故經云平和之氣三旬一見可不慎歟精血篇論第二齊大夫褚澄遺書飲食五味養骨髓肌肉毛髮男子為陽陽中必有陰陰中之數八故一八而陽精升二八而陽精溢女子為陰陰中必有陽陽中之數七故一七而陰血升二七而陰血溢皆飲食五味之實秀也方其升也智慮開明齒牙更始發黃者黑筋弱者強暨其溢也凡充身體手足耳目之餘雖針芥之歷無有不下凡子形肖父母者以其精血嘗於父母之身無所不歷也是以父一肢廢則子一肢不肖其父母一目虧則子一目不肖其母然雌鳥牝獸無天癸而成胎何也鳥獸精血往來尾間也精未通而御女以通其精則五體有不滿之處異日有難狀之疾陰已痿而思色以降其精則精不出而內敗小便澀而為淋精已耗而復竭之則大小便牽痛愈痛則愈便愈便則愈痛女人天癸既至逾十年無男子合則不調未逾十年思男子合亦不調不調則舊血不出新血誤行或漬而入骨或變而為腫後雖合而難子合多則瀝枯虛人産衆則血枯殺人觀其精血思過半矣愚按丹溪先生云人受天地之氣以生天之陽氣為氣地之陰氣為血故氣常有餘血常不足夫人之生也男子十六歲而精通女子十四歲而經行故古人必待三十二十而後嫁娶者可見陰氣之難成而養之必欲其固也經曰年至四十陰氣自半而起居衰矣夫陰氣之成止供給得三十年之運用況男子六十四歲而精絶女子四十九歲而斷經夫腎乃陰中之陰也主閉藏者肝乃陰中之陽也主疏泄者然而二臟皆有相火其繫上屬於心心火一動則相火翕然而從之所以丹溪先生只是教人收心養性其旨深矣天地以五行更迭衰旺而成四時人之五臟六腑亦應之而衰旺如四月屬巳五月屬午為火大旺火為肺金之夫火旺則金衰六月屬未為土大旺土為水之夫土旺則水衰況腎水嘗藉肺金為母以補其不足古人於夏月必獨宿而淡味兢兢業業保養金水二臟正嫌火土之旺爾經又曰冬藏精者春不病溫十月屬亥十一月屬子正火氣潛藏必養其本然之真陰以助來春生髮之氣則春末夏初無頭痛腳軟食少體熱注夏之病矣竊謂人之少有老態不耐寒暑不勝勞役四時迭病皆因氣血方長而勞心虧損或精血未滿而早斫喪故見其症難以名狀若左尺脈虛弱或細數是左腎之真陰不足也用六味丸右尺脈遲軟或沉細而數欲絶是命門之相火不足也用八味丸至於兩尺微弱是陰陽俱虛用十補丸此皆滋其化源也不可輕用黃柏知母之類設或六淫外侵而見諸症亦因其氣內虛而外邪湊襲尤宜用前藥附治驗男子陰痿精耗治驗見內科摘要一婦人年三十有七早孀居兩腿骨作痛晡熱體倦月經不調或發寒熱數年矣一日頸項兩側結核兩脅脹痛此係肝經鬱火而成也先用小柴胡湯合四物數劑肝症頓愈又用加味逍遙散加澤蘭乳香沒藥三十劑血症漸痊再用加味歸脾等藥年餘而安一孀婦兩腿作痛或用除濕化痰等藥遍身作痛而無定處余曰此血症也不信乃服流氣飲之類而歿一放出宮人年四十餘臀腿內股作痛晡熱口乾月經不調此係肝經血少不能養經絡而然也宜用加味逍遙散加澤蘭葉五十餘劑諸症稍緩又以歸脾湯兼服二百餘劑而痊一放出宮人臀腿腫痛內熱晡熱惡寒體倦咳嗽胸痞月經過期而少彼以為氣毒流注服清熱理氣之劑益甚余曰此乃肝經瘀血停留所致蓋肝經上貫膈布脅肋循喉嚨下循膕內臁繞陰器抵少腹主治之法但當補其所不勝而制其所勝補者脾也制者肝也經曰虛則補之實則瀉之此定法也彼不信仍服前藥遂致不起附方六味丸八味丸十補丸三方見二十四卷第十一論小柴胡湯方見二十四卷第二論四物湯方見二十四卷第六論加味逍遙散加味歸脾湯二方見二十四卷第四論産寶方序論第三大率治病先論其所主男子調其氣女子調其血氣血者人之神也然婦人以血為基本苟能謹於調護則血氣宣行其神自清月水如期血凝成孕若脾胃虛弱不能飲食榮衛不足月經不行肌膚黃燥面無光澤寒熱腹痛難於子息或帶下崩漏血不流行則成瘕症愚按前症若婦人脾胃久虛以致氣血俱衰遂而月經不行宜補其胃氣滋其化源或患中消胃熱津液不生而致血海乾涸宜清胃補脾其經自行矣經曰胃者衛之源脾者榮之本針經曰榮出中焦衛出上焦衛不足益之必以辛榮不足補之必以甘甘辛相合脾冒健而榮衛生是以氣血俱旺也或因勞心虛火妄動月經錯行宜安心補血瀉火此東垣先生治法也王子亨方論第四論曰經者常候也謂候其一身之陰陽愆伏知其安危故每月一至太過不及皆為不調陽太過則先期而至陰不及則後時而來其有乍多乍少斷絶不行崩漏不止皆由陰陽衰盛所致愚按經云脾統血肝藏血此症多因恚怒傷肝鬱結傷脾所致當從二經為主而參以前論治之月水不調方論第五婦人月水不調由風邪乘虛客於胞中而傷衝任之脈損手太陽少陰之經蓋衝任之脈皆起於胞中為經絡之海與手太陽小腸手少陰心經為表裡上為乳汁下為月水然月水乃經絡之餘苟能調攝得宜則經應以時矣愚按經曰飲食入胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行東垣先生所謂脾為生化之源心統諸經之血誠哉是言也竊謂心脾平和則經候如常苟或七情內傷六淫外侵飲食失節起居失宜脾冒虛損心火妄動則月經不調矣又丹溪先生云先期而至者血熱也後期而至者血虛也愚所謂先期而至者有因脾經血燥有因脾經鬱火有因肝經怒火有因血分有熱有因勞役火動過期而至者有因脾經血虛有因肝經血少有因氣虛血弱主治之法脾經血燥者加味逍遙散脾經鬱火者歸脾湯肝經怒火者加味小柴胡湯血分有熱者加味四物湯勞役火動者補中益氣湯脾經血虛者人參養榮湯肝經血少者六味地黃丸氣虛血弱者八珍湯蓋血生於脾土故云脾統血凡血病當用苦甘之劑以助陽氣而生陰血也附治驗一婦人發熱口乾月經不調兩腿無力或用祛風滲濕之劑腿痛體倦二膝浮腫經事不通余作足三陰經血虛火燥名鶴膝風用六味八味二丸兼服兩月形體漸健飲食漸進膝腫漸消半載而痊一婦人月事未期而至發熱自汗或用清熱止汗之劑作渴頭眩手掉身麻余曰此肝經血虛火動火為陽陽盛則生風用柴胡炒芩連山梔歸芍生地丹皮各一錢參耆苓術各一錢五分川芎七分甘草五分二劑汗止用補中益氣湯而愈一婦人經行勞役忽然昏憒面赤吐痰余曰此乃去血過多陽無所附故耳急飲童便碗許神思漸爽更用參耆各五錢芎歸各三錢玄參柴胡山梔炙草各一錢一劑又用逍遙散加五味麥門二劑如此月餘漸愈但體倦面黃又以十全大補加五味麥門治之而愈一婦人性善怒産後唇腫內熱或用清熱敗毒散唇口腫脹日晡熱甚月水不調再用降火化痰遂令食少作嘔大便不實唇出血水又用理氣消導胸膈痞滿頭目不清唇腫經閉又用清胃行血肢體倦怠發熱煩躁涎水湧出又欲用通經之劑余曰病本七情肝脾虧損又數行攻伐故元氣之益虛耳法當補陰益陽遂以濟生歸脾湯加味逍遙散補中益氣湯調治元氣漸復諸症悉愈薑黃散治瘀血凝滯肚腹刺痛或腹脹發熱口乾等症薑黃當歸酒拌各二錢蓬朮醋炒紅花桂心川芎玄胡索炒牡丹皮各五分上水酒各一半煎服醋附丸治元臟虛冷月候不調頭眩少食渾身寒熱腹中急痛赤白帶下心忡氣悶血中虛寒胎氣不固用醋煮香附半斤焙為末醋糊丸桐子大每服三四十丸米飲下愚按前症若元臟虛寒手足厥冷用八味丸手足發熱用六味丸氣血不足用八珍湯中氣不足用補中益氣湯脾氣不足用六君子湯脾氣鬱結用歸脾湯若例用香散之劑恐陽氣燥而陰血漸衰也附方加味逍遙散八珍湯歸脾湯三方見二十四卷第四論加味小柴胡湯方見二十四卷第二論加味四物湯六君子湯補中益氣湯三方見二十四卷第六論人參養榮湯方見二十四卷第三論八味丸六味丸二方見二十四卷第十一論月經不通方論第六婦人月水不通或因醉飽入房或因勞役過度或因吐血失血傷損肝脾但滋其化源其經自通若小便不利苦頭眩痛腰背作痛足寒時痛久而血結於內變為癥瘕若血水相併脾胃虛弱壅滯不通變為水腫若脾氣衰弱不能制水水漬肌肉變為腫滿當益其津液大補脾胃方可保生愚按經水陰血也屬衝任二脈上為乳汁下為月水其為患有因脾虛而不能生血者有因脾鬱而血不行者有因胃火而血消爍者有因脾胃損而血少者有因勞傷心而血少者有因怒傷肝而血少者有因腎水不能生肝而血少者有因肺氣虛不能行血者治療之法若脾虛而不行者調而補之脾鬱而不行者解而補之胃火而不行者清而補之脾胃損而不行者溫而補之勞傷心血而不行者逸而補之怒傷肝而不行者和而補之肺氣虛而不行者補脾胃腎虛而不行者補脾肺經云損其肺者益其氣損其心者調其榮衛損其脾者調其飲食適其寒暑損其肝者緩其中損其腎者益其精皆當審而治之附治驗一婦人停食飽悶發熱或用人參養胃湯益甚再用木香檳榔丸泄瀉吐痰腹中成塊飲食少思又用二陳黃連厚朴之類前症益甚腹脹不食月經不至余以為胃氣虧損用補中益氣加茯苓半夏三十餘劑脾胃健而諸症愈又二十餘劑而經自行一婦人飲食後或腹脹或吞酸彼服枳朮丸吞酸益甚飲食日少胸膈痞滿腿內痠痛畏見風寒又服養胃湯一劑腿內作痛又二劑腿膝淫腫月經不行余謂鬱結所傷脾虛濕熱下注侵晨用四君二陳芎歸午後以前湯送越鞠丸飲食漸迸諸症漸愈又用歸脾八珍二湯兼服兩月餘而經行一婦人性沉多慮月經不行胸滿少食或作脹或吞酸余以為中氣虛寒用補中益氣加砂仁香附煨姜二劑胸膈和而飲食進更以六君子加芎歸貝母桔梗生薑大棗數劑脾胃健而經自調矣一婦人素有胃火或用清胃飲而安後因勞役燥渴內熱肌肉消瘦月經不行余謂此胃火消爍陰血用逍遙散加丹皮炒梔以清胃熱用八珍湯加茯苓遠志以養脾血而經自行矣一婦人久患瘧形體怯弱內熱晡熱自汗盜汗飲食少思月事不行或用通經丸虛症悉具余曰此因虛而致瘧因瘧以閉經也用補中益氣及六味地黃丸各百餘劑瘧愈而經自行一婦人久患瘧瘧作則經不行形虛脈大頭痛懶食大便泄瀉小便淋瀝口乾唇裂內熱腹膨蓋內久瘧正氣已虛陰火獨旺用補中益氣湯治之尋愈惟不時頭痛乃加蔓荊子而痛止又兼用六味地黃丸而經行一婦人因勞耳鳴頭痛體倦此元氣不足用補中益氣加麥門五味而痊三年後得子因飲食勞倦前症益甚月經不行晡熱內熱自汗盜汗用六味地黃丸補中益氣湯頓愈一婦人胃氣素弱為哭母吐咳嗽發熱盜汗經水三月不行余以為悲則傷肺思則傷脾遂朝服補中益氣加桔梗貝母知母夕用歸脾湯送地黃丸而愈一癧婦少寐經水兩月餘一至誤服通經丸展轉無寐午前惡寒午後發熱余以為思慮虧損脾血用歸脾湯作丸午前以六君送下午後以逍遙散送下兩月餘得寐半載經行如期年餘而瘡愈余詳見各門附方補中益氣湯四君子湯六君子湯三方見二十四卷第六論二陳湯方見二十四卷第五論越鞠丸方見六卷第七論歸脾湯逍遙散八珍湯三方見二十四卷第四論清胃散方見十四卷首論六味丸方見二十四卷第十一論養生必用論病第七初虞世云女子十四天癸至任脈通月事以時於是有子天癸者物之自然月者以月至經者有常也其來過與不及皆謂之病若榮血虧損不能滋養百骸則發落面黃羸瘦燥熱燥氣盛則金受邪金受邪則為咳為嗽為肺癰為肺痿必矣但助胃壯氣則榮血生而經自行須慎飲食調七情保神氣庶可得生若暴怒氣逆經閉不行當用行氣破血之劑愚按劉宗厚先生云榮者水穀之精和調於五臟灑陳於六腑乃能入於脈也源源而來化生於脾總統於心藏受於肝宣布於肺施泄於腎灌溉一身目得之而能視耳得之而能聽手得之而能握足得之而能步髒得之而能液腑得之而能氣注之於脈少則澀充則實常以飲食滋養則陽生陰長變化而為血諸經恃此則百脈長養耗竭則百脈空虛可不慎哉若陰氣一傷變症百出妄行於上則吐衄衰涸於下則癃閉血滲腸間則為腸風陰虛陽搏則為崩中濕蒸熱瘀則為帶下熱極腐化則為膿血火極似水則血紫黑熱勝於陰發為瘍濕滯於血則為痛癢癮疹蓄之在上則善忘蓄之在下則善狂琥珀散治心膈迷悶肚腹撮痛月信不通等疾烏藥二兩當歸酒製一兩蓬朮醋製一兩上為末每服二錢溫酒調萬病丸治月經瘀閉臍腹作痛及産後癥瘕等病乾漆炒煙出青白為度牛膝酒浸焙各一兩上為末生地黃汁一升砂器慢火熬膏丸桐子大每服二十丸空心米飲下仍參前論主之紅花當歸散治經候不行腰胯重痛小腹堅硬紅花當歸尾酒拌紫威牛膝酒製甘草炙蘇木各二錢白芷桂心各一錢半赤芍藥炒一兩劉寄奴去根五錢上為末每服三錢溫酒調室女月水不通方論第八論曰夫衝任之脈起於胞內為經脈之海手太陽小腸手少陰心二經為表裡女子二七而天癸至腎氣全盛衝任流通經血既盈應時而下否則不通也愚按前症若稟陰血不足用四物參苓怒傷肝血用加味逍遙散鬱結傷脾用加味歸脾湯肝火拂鬱用加味小柴胡湯胃經積熱用加味清胃散余當參考前論附方四物湯方見二十四卷第六論加味逍遙散加味歸脾湯二方見二十四卷第四論加味小柴胡湯方見二十四卷第二論加味清胃散方見二十四卷首論室女經閉成勞方論第九寇宗奭曰夫人之生以氣血為本人之病未有不先傷其氣血者若室女童男積想在心思慮過度多致勞損男子則神色消散女子則月水先閉蓋憂愁思慮則傷心而血逆竭神色先散月水先閉且心病則不能養脾故不嗜食脾虛則金虧故發嗽腎水絶則木氣不榮而四肢干痿故多怒鬢髮焦筋骨痿若五臟傷遍則死自能改易心志用藥扶持庶可保生切不可用青蒿虻蟲等涼血行血宜用柏子仁丸澤蘭湯益陰血制虛火愚按經云五穀入於胃其糟粕津液宗氣分為三隧故宗氣積於胸中出於喉嚨以貫心肺而行呼吸榮氣者泌其津液注之於脈化為以血以榮四末內養五臟六腑若服苦寒之劑復傷胃氣必致不起附治驗一室女年十七癧久不愈天癸未通發熱咳嗽飲食少思欲用通經丸余曰此蓋因稟氣不足陰血未充故耳但養氣血益津液其經自行彼惑於速效仍用之余曰非其治也此乃剽悍之劑大助陽火陰血得之則妄行脾胃得之則愈虛後果經血妄行飲食愈少遂致不救柏子仁丸柏子仁炒別研牛膝酒製卷柏各半兩澤蘭葉一兩上為末蜜丸桐子大每服三十丸空心米飲下澤蘭湯澤蘭葉二錢當歸芍藥炒各一錢甘草炙五分上水煎服劫勞散治勞嗽發熱盜汗體瘦唾中有紅或成肺痿白芍藥炒二錢黃耆炒甘草炒人參五味子炒當歸半夏薑製白茯苓熟地黃自制阿膠炒名五分上薑棗水煎日三服鄉人楊元鼎女及笄病此甚危百藥無效偶遇名醫得此方服三十餘劑遂愈不發血枯方論第十出駱龍吉方腹中論曰有病胸脅滿妨於食病至則先聞腥臊臭出清液四肢痛目眩時時前後血病名曰血枯此年少時因大脫血或醉而入房虧損腎肝蓋肝藏血受天一之氣以為滋榮其經上貫膈布脅肋若脫血失精肝氣已傷肝血枯涸不榮而胸脅滿妨於食則肝病傳脾而聞腥臊臭出清液若以肝病而肺乘之則脫血四肢痛目眩時時前後血出皆肝病血傷之症也愚按前症若飲食起居失宜而脾胃虛損當滋化源而以烏賊丸等藥若因脾土虛寒而不能生血宜補命門火若服燥藥鬱火內作而津液消爍宜清熱養血若脾胃虧損而氣血虛宜補中益氣若胃熱消中而血液耗損宜清脾胃之火若大便祕澀小便清利而經不行宜補心養血仍參看前第三論主治附治驗一婦人久患血崩肢體消瘦飲食到口則聞腥臊口出清液每食少許腹中作脹此血枯之症肺肝脾胃虧損之患用八珍湯烏賊骨丸兼服兩月而經行百餘劑而安烏賊魚骨丸烏賊魚骨去甲四兩䕡茹一兩上為末以雀卵丸小豆大每服五丸加至十丸鮑魚煎湯下以飯壓之熟地黃湯治大脫血或醉入房月事不行以致前症熟地黃自制澤蘭葉白茯苓人參五味子杵炒附子炮禹餘糧制當歸酒製各五分上為末每服三錢水前空心服附方八珍湯方見十四卷第四論茯苓補心湯治婦人心氣虛耗不能主血又不能制乎肺金氣得以乘乎肝木肝既虧損則血不能藏漸致精血枯涸月事不調此方專補心元之虛抑其肺氣調和榮衛滋養血脈前方參蘇飲內除木香與四物湯對勻和每服四錢以薑棗煎溫服此方常進用以治宮娥多效月水不利方論第十一婦人月水不利者由勞傷氣血體虛而風寒客於胞內傷於衝任之脈故也若寸脈弦關脈沉是肝病也兼主腹痛孔竅生瘡尺脈滑血氣實經絡不利或尺脈絶不至兼主小腹引腰痛氣攻胸膈也愚按前症屬肝膽二經蓋肝膽相為表裡多因恙怒所傷若本經風熱用補肝散血虛用四物加酸棗仁若腎水不足用六味丸若患諸瘡瘍治見第八卷二十四卷牛膝散治月水不利臍腹作痛或小腹引腰氣攻胸膈牛膝酒製桂心赤芍藥炒桃仁去皮尖玄胡索炒當歸酒浸牡丹皮各一兩木香三錢上為末每服一錢溫酒調下或每服三五錢水前附方補肝散方見七卷第十七論四物湯方見二十四卷第六論六味丸方見二十四卷第十一論月水行止腹痛方論第十二婦人經來腹痛由風冷客於胞絡衝任或傷手太陽少陰經用溫經湯桂枝桃仁湯若憂思氣鬱而血滯用桂枝桃仁湯地黃通經丸若血積而成塊用萬病丸愚按前症若風寒傷脾者六君加炮姜思慮傷血者四物加參術思慮傷氣者歸脾加柴梔鬱怒傷血者歸脾逍遙兼服余參前後論治之附治驗一婦人經行腹痛食則嘔吐肢體倦怠發熱作渴此乃素稟氣血不足用八珍湯二十餘劑而愈後生子二年而經不行前症仍作服八珍湯逍遙散百餘劑方愈地黃通經丸治月經不行或産後惡露臍腹作痛熟地黃自制四兩虻蟲去頭翅炒水蛭糯米同炒黃去糯米桃仁去皮尖各十枚上為末蜜丸桐子大每服五七丸空心溫酒下萬病丸方見前溫經湯治寒氣客於血室以致血氣凝滯臍腹作痛其脈沉緊當歸川芎芍藥桂心蓬朮醋炒牡丹皮各五分人參牛膝甘草炒各一錢上水煎服桂枝桃仁湯治經脈頓然不行腹中作痛或上攻心脅欲死或因經脈不行漸成積塊臍下如覆杯桂枝芍藥生地黃各二錢桃仁七枚去皮尖甘草一錢上姜水煎若因七情鬱結血隨氣滯者宜服此湯如不效用地黃通經丸已成血塊者用萬病丸方見前愚按前症若肝經怒氣用加味逍遙散若肝經血虛用四物參朮柴胡牡丹皮若肝經血熱用四物牡丹皮若肝腎虛火用六味地黃丸若肝脾血虛用八珍加牡丹皮若肝脾鬱怒用加味歸脾湯若氣虛血弱用補中益氣湯若脾不能攝血用六君子加川芎當歸若肝虛不能藏血用補肝散附方六君子湯四物湯二方見二十四卷第六論歸脾湯逍遙散八珍湯三方見二十四卷第四論月水不斷方論第十三婦人月水不斷淋瀝腹痛或因勞損氣血而傷衝任或因經行而合陰陽以致外邪客於胞內滯於血海故也但調養元氣而病邪自愈若攻其邪則元氣反傷矣愚按前症若鬱結傷脾用歸脾湯恚怒傷肝逍遙散肝火妄動加味四物湯脾氣虛弱六君子湯元氣下陷補中益氣湯熱傷元氣前湯加五味麥門炒黑黃柏附治驗一儒者錢思習子室年三十餘無嗣月經淋瀝無期夫婦異處幾年矣思習欲為娶妾以謀諸餘余意此鬱怒傷肝脾虛火動而血不歸經乃肝不能藏脾不能攝也當清肝火補脾氣遂與加味歸脾逍遙二藥四劑送至其家仍告其姑曰服此病自愈而當受胎妾可無娶也果病愈次年生子一婦人性急每怒則太陽耳項喉齒胸乳作痛則胸滿吞酸吐瀉少食經行不止此皆肝火之症肝自病則外症見土受克則內症作余先以四物加白朮茯苓柴胡炒梔炒龍膽清肺養血次用四君加柴胡芍藥神麯吳茱萸炒黃連以培土製肺漸愈惟月經不止是血分有熱脾氣尚虛以逍遙散倍用白朮茯苓陳皮又以補中益氣加酒炒芍藥兼服而安一婦人多怒經行旬余方止後淋瀝無期肌體倦瘦口乾內熱盜汗如洗日晡熱甚皆由肝脾虧損無以生髮元氣用參耆歸朮茯神遠志棗仁麥門五味丹皮龍眼肉炙草柴胡升麻治之獲痊一婦人懷抱不舒腹脹少寐飲食素少痰涎上湧月經頻數余曰脾統血而主涎此鬱悶傷脾不能攝血歸源耳用補中益氣濟生歸脾而愈附方歸脾湯逍遙散二方見二十四卷第四論加味四物湯四君子湯六君子湯補中益氣湯四方見二十四卷第六論婦人殺血心痛方論第十四婦人血崩而心痛甚名曰殺血心痛由心脾血虛也若小産去血過多而心痛甚者亦然用烏賊魚骨炒為末醋湯調下失笑散亦效愚按前症若陰血耗散用烏賊丸收斂之若瘀血不散用失笑散行散之若心血虛弱用芎歸湯補養之若鬱結傷血用歸脾湯調補之附治驗一婦人血崩兼心痛三年矣諸藥不應每痛甚虛症悉具面色萎黃余曰心主血蓋由去血過多心無所養以致作痛宜用十全大補湯參術倍之三十餘劑稍愈百餘劑全愈附方失笑散方見二十卷第五論芎歸湯方見十七卷第四論歸脾湯十全大補湯二方見二十四卷第四論暴崩下血不止方論第十五婦人衝任二脈為經脈之海外循經絡內榮臟腑若陰陽和平經下依時若勞傷不能約制則忽然暴下甚則昏悶若寸脈微遲為寒在上焦則吐血衄血尺脈微遲為寒在下焦則崩血便血大抵數小為順洪大為逆大法當調補脾胃為主愚按經云陰虛陽搏謂之崩又云陽絡傷則血外溢陰絡傷則血內溢又云脾統血肝藏血治法前症因脾胃虧損不能攝血歸源用六君加芎歸柴胡若肝經之火而血下行用奇效四物湯或四物加柴梔苓術若肝經風熱而血妄行用加味逍遙散或小柴胡梔芍丹皮若怒動肝火而血沸騰亦用前藥若脾經鬱結而血不歸經用歸脾加柴梔丹皮若悲傷胞絡而血下崩用四君加柴梔升麻故東垣先生云凡下血症須用四君子以收功厥有旨哉若大吐血毋以脈論當急用獨參湯救之若潮熱咳嗽脈數乃元氣虛弱假熱之脈尤當用人參溫補此等症候無不由脾胃先損故脈洪大察其胃氣能受補則可救苟用寒涼止血之藥復傷脾胃反不能攝血歸源是速其危也附治驗大尹王大成之內久患崩自服四物涼血之劑或作或輟因怒發熱其血不止服前藥不應乃主降火更加脅腹大痛手足俱冷余曰此脾胃虛寒所致先用附子理中湯體熱痛止又用濟生歸脾補中益氣二湯崩血頓愈若泥痛無補法則誤矣錦衣楊永興之內患前症過服寒涼之劑其症益甚更加肚腹痞悶飲食不入發熱煩躁脈洪大而虛余曰此脾經氣血虛而發躁也當急用八珍湯加炮姜以溫補之緩則不救彼不信乃服止血降火乏劑虛症蜂起始信余言緩不及治矣一婦人面黃或赤覺腰間或臍下作痛四肢困倦煩熱不安經行即發寒熱兩肋如束血湧如崩此脾胃虧損元氣下陷與相火濕熱所致用補中益氣加防風芍藥炒黑黃柏間以歸脾湯調補而血始歸經一婦人因怒崩血久不已面青黃而或赤此肝木製脾土而血虛用小柴胡合四物清肝火生肝血又用歸脾補中二湯益脾氣生肝血而瘥此症若因肝經風熱而血不寧者防風為丸以兼症之藥煎送或肝經火動而血不寧者炒條芩為丸以兼症之藥煎送若瘀血為患用五靈脂為末燒鐵器淬酒調服無不效者奇效四物湯治肝經虛熱血沸騰而崩久不止當歸酒拌熟地黃自制白芍藥川芎阿膠炒艾葉炒黃芩炒各等分上每服四錢水煎治血崩血瘕或經行産後心腹脅痛五靈脂炒煙盡為末每服一錢溫酒調或用三錢水酒童便煎服治風熱血崩荊芥穗燈火燒焦為末每服三錢童便調獨聖散治肝經有風血崩用防風去叉蘆為末每服二錢空心食前酒煮白麵清飲調下極驗神應散治血虛內熱血不歸源而崩用桂心燒存性為末每服一二錢米飲調下又方陳槐花一兩百草霜半兩為末每服一二錢燒紅稱錘焠酒下附方四君子湯六君子湯補中益氣湯四物湯四方見二十四卷第六論歸脾湯加味逍遙散八珍湯三方見二十四卷第四論小柴胡湯方見二十四卷第二論獨參湯方見三卷第十三論附子理中湯方見二十卷第八論帶下方論第十六婦人帶下其名有五因經行産後風邪入胞門傳於臟腑而致之若傷足厥陰肝經色如青泥傷手少陰心經色如紅津傷手太陰肺經形如白涕傷足太陰脾經黃如爛瓜傷足少陰腎經黑如衃血人有帶脈橫於腰間如束帶之狀病生於此故名為帶愚按徐用誠先生云前症白屬氣而赤屬血東垣先生云崩久則亡陽故白滑之物下流未必全拘於帶脈亦有濕痰流注下焦或腎肝陰淫之濕勝或因驚恐而木乘土位濁液下流或思慕為筋痿戴人以六脈滑大有力用宣導之法此瀉其實也東垣以脈微細沉緊或洪大而虛用補陽調經乃兼責其虛也丹溪用海石南星椿根皮之類乃治其濕痰也竊謂前症皆當壯脾胃升陽氣為主佐以各經見症之藥色青者屬肝用小柴胡加山梔防風濕熱壅滯小便赤澀用龍膽瀉肝湯肝血不足或燥熱風熱用六味丸色赤者屬心用小柴胡加黃連山梔當歸思慮過傷用妙香散等藥色白者屬肺用補中益氣加山梔色黃者屬脾用六君子加山梔柴胡不應用歸脾湯色黑者屬腎用六味丸氣血俱虛八珍湯陽氣下陷補中益氣湯濕痰下注前湯加茯苓半夏蒼朮黃柏氣虛痰飲下注四七湯送六味丸不可拘肥人多痰瘦人多火而以燥濕瀉火之藥輕治之也附治驗一孀婦腹脹脅痛內熱晡熱月經不調肢體痠麻不時吐痰或用清氣化痰喉間不利帶下青黃腹脅膨脹又用行氣之劑胸膈不利肢體如麻此乃鬱怒傷損肝脾朝用歸脾湯以解脾郁生脾氣夕用加味逍遙散以生肝血清肝火百餘劑而愈一婦人久瘧兼帶發熱口乾體倦用七味白朮散加麥門五味大劑煎與恣飲再發稍可乃用補中益氣加茯苓半夏十餘劑而愈一婦人頭暈吐痰胸滿氣喘得食稍緩苦於白帶二十餘年矣諸藥不應此氣虛而痰飲也痰飲愈而帶自愈遂朝用六君子湯夕用六味地黃丸不月而驗一婦人耳鳴胸痞內熱口乾喉中若有一核吞吐不利月經不調兼之帶下余以為肝脾鬱結用歸脾湯加半夏山梔升麻柴胡間以四七湯下白丸子而愈一婦人吞酸飽滿食少便泄月經不調服清氣化痰丸兩膝漸腫寒熱往來帶下黃白面萎體倦此脾胃俱虛濕痰下注用補中益氣倍用參術加茯苓半夏炮姜而愈一婦人帶下四肢無力余曰四肢者土也此脾胃虛弱濕痰下注以補中益氣濟生歸脾二藥治之而愈一婦人帶下黃白怒則胸膈不利飲食少思或用消導利氣之藥痰喘胸滿大便下血余曰此因脾氣虧損不能攝血歸源用補中益氣加茯苓半夏炮姜四劑諸症頓減又用八珍加柴胡山梔而痊附方小柴胡湯方見二十四卷第二論龍膽瀉肝湯方見二十四卷第八論六味丸方見二十四卷第十一論妙香散方見三卷第十三論補中益氣湯六君子湯二方見二十四卷第六論歸脾湯八珍湯加味逍遙散三方見二十四卷第六論七味白朮散方見二十一卷第二論四七湯方見十二卷第七論白丸子方見三卷第四論崩中漏血生死脈方論第十七婦人崩中漏下之症已見前論按其寸口脈弦而大弦則為緊大則為芤緊則為寒芤則為虛虛寒相搏其脈為牢婦人半産漏下赤白不止脈小虛滑者生脈大緊實數者死又脈急疾者死遲者生又云尺寸脈虛者漏血脈浮者俱不治愚按前症闡內經微旨濟無窮夭札須固胃為善蓋胃為五臟之本源人身之根蒂所用治法當參前後論附治驗一婦人年將七十素有肝脾之症每作則飲食不進或胸膈不利或中脘作痛或大便作瀉或小便不利余用逍遙散加山梔茯神遠志木香而愈後憂女孀居不時吐紫血其病每作先倦怠而後發熱經曰積憂傷肺積思傷脾肺脾受傷致是令子母俱病不能攝血歸經而致前症遂以前藥加炒黑黃連三分吳茱萸二分頓愈復因怒吐赤血甚多躁渴垂死此血脫也法當補氣乃用人參一兩苓朮當歸各三錢陳皮炮黑乾薑各二錢炙草木香各一錢一劑頓止一婦人年六十有四久鬱怒頭痛寒熱春間乳內腫痛服流氣飲之類益甚不時有血如經行又因大驚恐飲食不進夜寐不寧此因高年去血過多至春無以生髮肝木血虛火燥所以至晚陰旺則發赤經云肝藏魂魂無所附故不能寐先以逍遙散加酒炒黑龍膽草一錢山梔一錢五分二劑腫痛頓退又二劑而全消再用歸脾湯加炒梔貝母諸症悉愈表弟方健甫內五十歲辛丑患血崩諸藥罔效壬寅八月身熱體痛頭暈涕出吐痰少食衆作火治展轉發熱絶粒數日余診之曰脾胃久虛過服寒藥中病未已寒病復起遂用八味丸料一服翌早遂索粥數匙再服食倍熱減痛止乃服八味丸而愈癸卯秋因勞役憂怒甲辰夏病復作胸飽發熱脊痛腰疼神氣怫鬱或作內傷或作中暑崩血便血煩渴引飲粒米不進昏憒時作脈洪大按之微弱此無根之火內虛寒而外假熱也以十全大補加附子一劑遂食粥三四匙崩血漸減日服八味丸始得全愈備見女科撮要柏葉散治元氣虛弱崩中漏血年久不愈亦治白帶柏葉炒續斷酒炒川芎當歸生地黃鱉甲炙龜甲炙禹餘糧各一兩五錢阿膠炒赤石脂煅牡蠣煅地榆艾葉炒鹿茸炙各五錢上為末每服二錢粥飲調下地黃丸治足三陰虧損經行數日不止或兼帶下無子熟地黃自制山茱萸肉蕪荑仁各一兩乾薑三錢炮白芍藥微炒代赭石各一兩白殭蠶炒厚朴薑製各三錢上為末蜜丸桐子大每服五十丸空心溫酒下日三服許學士云凡婦人有白帶多致不産育宜速治之故扁鵲過邯鄲聞婦人有此病遂自鳴帶下醫以就治之白芷散治下元虛弱赤白帶下或經行不止等症白芷一兩海螵蛸一枚燒胎髮一團煅上為末每服二錢溫酒調下附方東垣益胃升陽湯治血脫當益其氣蓋先補胃氣以助生髮之氣故曰陽生陰長諸甘藥為之先務舉世皆以為補氣殊不知甘能生血此陽生陰長之理故先理胃氣則血歸於脾矣故曰脾統血東垣升麻除濕湯二方見二十卷第九論東垣升陽益胃湯治肺脾胃虛怠惰嗜臥四肢不收身體沉重口乾食無味大便不調小便頻數食少食不消灑淅惡寒而或微熱崩帶不止方見三卷第十三論十全大補湯逍遙散歸脾湯三方見二十四卷第四論八味丸方見二十四卷第十一論婦人白濁白淫方論第十八婦人小便白濁白淫由心腎不交水火不濟用金鎖正元丹若心虛而致用平補正心丹降心丹威喜丸若思慮傷脾用四七湯吞白丸子更以烏沉湯加茯苓益智愚按前症若元氣下陷用補中氣益氣湯脾胃虧損六君加升麻柴胡脾經鬱結歸脾加黃柏山梔肝經怒火龍膽瀉肝湯虛則用加味逍遙散宜與帶下參看主治附治驗一婦人善怒或小腹痞悶或寒熱往來或小便頻數時下白淫藥久不愈面青口苦余以為積憤而不能發散所致用龍膽瀉肝湯而愈用加味逍遙散八珍湯而安鎖精丸治下元虛弱小便白濁或白帶淋漓小便頻數破故紙炒青鹽白茯苓去皮五味子炒等分上為末酒糊丸桐子大每服三十丸鹽湯或酒下固精丸治胞氣虛寒小便白濁或小便無度等症牡蠣煅菟絲子酒浸蒸炒韭子炒龍骨煅五味子炒白茯苓去皮桑螵蛸酒炙白石脂煅各等分上為末酒糊丸桐子大每服十丸空心鹽湯下附方補中益氣湯六君子湯二方見二十四卷第六論歸脾湯方見二十四卷第四論龍膽瀉肝湯方見二十四卷第八論婦人天癸過期方論第十九許學士云婦人經脈過期不及腰腹疼痛或七七數盡而月經下者宜用當歸散治之愚按前症若肝腎虛熱用當歸散肝血虛熱四物加柴梔丹皮肝火內動小柴胡加山梔丹皮肝火血燥加味逍遙散脾經鬱火加味歸脾湯肝脾鬱火歸脾逍遙兼服肝腎虧損歸脾六味兼服仍與前後月經不調治驗同用附治驗一婦人年五十內熱晡熱經水兩三月一至此血虛有熱用逍遙加山茱萸治之而愈後有痰作渴或小便不調或頭暈白帶用六味丸而安當歸散當歸酒洗川芎白芍藥黃芩白朮炒各半兩山茱萸肉一兩半上為末每服二錢酒調日三服氣虛去芩加桂心一兩附方四物湯方見二十四卷第六論小柴胡湯方見二十四卷第二論加味逍遙散加味歸脾湯二方見二十卷第四論六味丸方見二十四卷第十一論婦人血分水分腫滿方論第二十婦人經水不通則化為血血不通則復化為水故先因經水斷絶後至四肢浮腫致小便不通名曰血分宜用椒仁丸若先因小便不通後身面浮腫致經水不通名曰水分宜用葶藶丸經脈不通而化為水流走四肢悉皆腫滿亦名血分其症與水症相類實非水也用人參丸愚按前症或因飲食起居失養或因六淫七情失宜以致脾胃虛損不能生髮統攝氣血乖違行失常道若先因經水斷絶後至四肢浮腫小便不通血化為水名曰血分宜用椒仁丸治之若先小便利後至身面浮腫經水不通水化為血名曰水分宜用葶藶丸治之此屬形氣不足邪淫隧道必用此藥以宣導其邪而佐以補輔元氣之劑庶使藥力有所仗而行則邪自不能容而真氣亦不至於復傷矣大凡月水不通凝結於內久而變為血瘕血水相併亦為水腫附治驗一婦人月經不調晡熱內熱飲食少思肌體消瘦小便頻數或用濟陰丸月經不行四肢浮腫小便不通余曰此血分也朝用椒仁丸夕用歸脾湯漸愈服人參丸兩月而愈仍專用歸脾湯五十餘劑而平一婦人面目浮腫月經不通此水分也朝用葶藶丸夕用歸脾湯漸愈更用人參丸兼服而全愈一婦人素性急先因飲食難化月水不調或用理氣化痰藥反肚腹膨脹大便泄瀉又加烏藥蓬朮肚腹腫脹小便不利加豬苓澤瀉痰喘氣急手足厥冷頭面肢體腫脹指按成窟脈沉細右寸尤甚余曰此脾肺虛冷不能通調水道下輸膀胱滲泄之令不行生化之氣不運東垣云水飲留積若土在雨中則為泥矣得和氣暖日水濕去而陽化自然萬物生長喜其脈相應遂與金匱加減腎氣丸料服之小便即通數劑腫脹消半四肢漸溫自能轉側又與六君加木香肉桂炮姜治之全愈後不戒七情不調飲食頓作泄瀉仍用前藥加附子五分而安椒仁丸治血分椒仁甘遂續隨仁附子炮郁李仁黑牽牛炒五靈脂去石當歸吳茱萸玄胡索芫花酒炒石膏各二錢信砒膽礬各一錢斑蝥糯米炒芫青各三十個糯米炒黃去頭足上為末麵糊丸緑豆大每服十丸陳皮湯送下人參丸治月經不利血化為水流走四肢悉皆腫滿人參當歸大黃蒸熟切焙桂心瞿麥穗赤芍藥白茯苓各三兩葶藶炒別研一兩上為末煉蜜丸桐子大每服十五丸空心米飲下葶藶丸治水分甜葶藶炒別研五錢續隨仁五錢別研乾漆末一兩上用棗肉丸桐子大每服七丸煎扁竹湯下如大便利減續隨子葶藶各一錢加白朮半兩小調經散治經水失道流入四肢浮腫方見産後四肢浮腫附方歸脾湯方見二十四卷第四論金匱加減腎氣丸方見二十二卷第十論六君子湯方見二十四卷第六論
