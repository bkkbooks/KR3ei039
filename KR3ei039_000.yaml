body:
  text: 用藥宜禁各症詳見本門復録首卷特以示急用也一通經丸若脾胃無虧暴怒氣逆或生冷所傷陰血凝滯月經不通者宜暫用之若脾胃虛弱不能生血者宜用六君當歸若因脾胃鬱火內耗其血者宜用歸脾湯若因肝脾鬱怒氣血傷而月經不通者宜用加味歸脾湯若因肝脾虛熱血傷而月經不通者宜用加味逍遙散方見本門後仿此一艾附丸若脾胃虛寒陰血不足氣逆發熱月經不調或胎氣不成者暫宜用之若脾腎虧損陰虛發熱月經不調或崩漏帶下或便血吐衄小便淋澀或晡熱內熱寒熱往來或盜汗自汗不時倏熱宜用六味地黃丸若兼脾氣不足飲食少思者佐以六君子湯一四物湯若脾經血燥發熱或月經不調宜暫用之若因脾經虛熱肝經怒火所致宜用四君子湯佐以加味逍遙散若因脾經氣虛血弱兼晡熱內熱宜用八珍湯加柴胡丹皮若因元氣下陷而致諸症宜用補中益氣湯一人參橘皮湯若胎前氣痞痰滯作嘔不食者宜暫用之若脾胃氣虛胸膈痞脹痰停作嘔飲食少思者宜用半夏茯苓湯若因怒動肝火剋制脾土而致前症者宜用六君子加柴胡山梔枳殼脾胃虛寒者用六君子加木香砂仁肉半夏治脾胃虛寒諸症尤當用一紫蘇順氣飲若胎動不安元氣無虧者宜暫用之若因脾氣虛弱者宜用六君子加紫蘇枳殼鬱結傷脾者宜用四君子加柴胡山梔蘇梗鬱怒傷肝脾者宜用六君子加柴胡黃芩枳殼一四物膠艾湯若內熱胎痛下血不止者宜暫用之若因肝經風熱而下血者宜用防風黃芩丸若因肝火血熱宜用加味逍遙散若因脾經鬱火宜用加味歸脾湯若因脾氣虛陷宜用補中益氣湯倍加升麻柴胡若因事下血者宜用八珍湯加膠艾一黃芩白朮二味為安胎之藥若脾胃蘊熱中氣無虧者暫宜用之凡屬脾胃虛痞飲食少思或泄瀉嘔吐而色痿黃肢體倦怠者宜用六君子湯一達生散若厚味安逸者宜用若芻蕘勞役者不宜用一妊娠腹痛須驗其面赤舌青者此胎死用平胃散加朴硝三錢化下之下後隨用八珍大補等湯調補之若唇口俱青吐出痰沫者子母俱死也若面舌俱青者母死子活産下亦死一小續命湯若外中風邪腰背反張筋脈瘈瘲者宜暫用之若産後失血過多陽火熾盛虛熱生風者宜用八珍湯加鉤藤丹皮如不應當用四君子湯加當歸丹皮鉤藤若陽氣脫陷者宜用補中益氣湯如不應急加附子氣血虛敗者宜用十全大補湯如不應急加附子亦有生者一澤蘭湯若産後惡露腹痛胸滿少氣宜用之若體倦面黃食少少寐而惡露不止宜用加味歸脾湯若氣血虛損而惡露上攻先用失笑散後用八珍湯禁用黑神散奪命丹之類一産後口鼻起黑氣鼻衄者是胃氣虛敗而血滯也急用二味參蘇飲多有生者
