front:
  text: 序病一也而婦人為難醫一也而識病為難夫病多始於七情邃古之初性靜情逸精神純暢每治於未病之先治之以不治也以故藥不嘗而躋上壽者比比逮乎後世恣情縱欲精神耗而元氣索病道日多而醫效日鮮況婦人女子之性陰濁勝而陽明微喜怒哀樂發而中節者寡其為病常浮於男子什九欲診問以識所因亦誠難矣吳郡立齊薛君雅好岐黃素難之書每為人治病察色辨脈變藥立方增除橫出優遊容與俟其自然不示功不計程期在必起時精絶技醫者不能及尤旁通外科女科之術間取臨川陳良甫所著婦人良方篇帙為之補注附以治驗示余讀之見其發揮經絡揆度陰陽網羅百病凡婦人症最人所難識者彬彬可睹蓋薛君生平精力不暇妄費坐臥行住須臾不離嗚呼斯亦觀其深矣業醫者當自得之嘉靖丁未冬十月既望秀水石山沈謐撰
  hash: sha256:a3844dbfafa7798e29a24e948d39e877890811e376fd3c38b1f85c98a65548cd
