body:
  text: 卷十二妊娠疾病門胎後已明須知妊娠疾病故以次之妊娠諸病忌毒藥余當對症依法治之妊娠隨月服藥將息法第一千金云妊娠一月名始胚飲食精熟酸美受御宜食大麥毋食腥辛是謂才正是月足厥陰脈養不可針灸其經此經內屬於肝肝主筋血一月之內血行否澀不為力事寢必安靜毋令恐畏況一月陰陽新合為胎寒多為痛熱多卒驚舉重腰痛腹滿胞急卒有所下當預安之宜服烏雄雞湯烏雄雞湯方烏雄雞一隻治如食法吳茱萸一兩茯苓阿膠各二兩炒生薑甘草各一兩人參芍藥白朮各三兩麥門五合去心上以水一斗二升煮雞取汁六升下藥煮取三升內酒三升並膠等取汁三升分三服補胎湯若曾傷一月胎者當預服此藥細辛一兩防風二兩烏梅一升吳茱萸生地黃白朮各一兩大麥五合生薑四兩上以水七升煮取汁二升半分三服寒多倍細辛茱萸熱多去細辛茱萸加栝蔞根二兩有所思去大麥加柏子仁三合一方有人參一兩忌生菜蕪荑桃李雀肉等物妊娠二月足少陽脈養不可針灸其經此經內屬於膽膽主精是時兒精成於胞里當謹護勿驚動況二月始陰陽踞經有寒不成有熱即萎卒中風寒有所動搖心滿臍下懸急腰背強痛卒有所下乍寒乍熱艾葉湯主之艾葉湯方丹參三兩當歸人參麻黃去節艾葉阿膠炙各二兩甘草一面炙大棗十二枚擘生薑六兩上以酒三升水一斗內藥煮減半去滓內膠煎取三升分三服忌海藻菘菜黃連湯若曾傷二月胎者當預服此藥黃連人參各一兩吳茱萸五合生地黃五兩生薑三兩上以醋漿七升煮取三升分四服日三夜一每十日作一劑若覺不安加烏梅一升加烏梅者不用漿直用水忌豬肉冷水蕪荑一方加當歸半兩妊娠三月名始胎當此之時未有定儀見物而化欲生男者操弓矢欲生女者弄珠璣欲子美數視壁玉欲子賢良端正清虛是謂外象而內感者也是月手心主脈養不可針灸其經此經內屬於心毋悲哀思慮驚動蓋三月為定形有寒則大便清有熱則小便難不赤即黃卒驚恐憂悉瞋恚喜頓僕動於經脈腹滿繞臍苦痛腰背痛卒有所下宜服雄雞湯雄雞湯方雄雞一隻治如食法甘草炙茯苓人參阿膠各二兩炒黃芩白朮各一兩芍藥四兩大棗十二枚擘生薑一兩切麥門冬去心五合上以水一斗五升煮雞減半內藥煮取一半入清酒三升並膠再煎取三升分三服日飲盡忌海藻菘菜酢物桃李雀肉等一方有當歸川芎二兩無黃芩生薑茯神湯若曾傷三月胎者當預服此藥茯神丹參龍骨各一兩阿膠炒當歸甘草炙人參各二兩赤小豆大棗十二枚擘上酢漿一斗煮取三升分四服七日後服一劑腰痛加桑寄生二兩深師方有薤白二兩麻子一升忌同前妊娠四月以受水精始成血脈其食稻粳其羹魚雁是謂成血氣以通耳目而行經絡是月手少陽脈養不可針灸其經此經內輸三焦其時兒六腑順成當靜形體和心志節飲食蓋四月為離經有寒心下溫溫欲嘔胸滿不食小便如淋臍下苦急卒中風寒頭項強痛寒熱或驚動身軀腰背腹痛或時胎上胸煩不安卒有所下宜服菊花湯主之菊花湯方菊花如雞子大一枚麥門冬去心一升麻黃去節阿膠炙各三兩生薑五兩甘草炙當歸半夏洗各二兩人參一兩五錢大棗十二枚擘上以水八升煮減一半內清酒三升並阿膠煎取三升分三服溫臥當汗以粉撲之護風寒四五日忌食如前調中湯芍藥四兩甘草炙芎藭續斷各一兩柴胡白朮各三兩烏梅一升李根白皮當歸二兩五錢生薑四兩厚朴炙枳實炙各二兩上以水一斗煮取二升分四服日三夜一八日兩服一劑一方有半夏二兩忌海藻菘菜桃李雀肉妊娠五月始受火精以成其氣晏起沐浴浣衣居處必厚其衣裳朝吸天光以避寒殃其食稻麥其羹牛羊和茱萸調以五味是謂養氣以定五臟是月足太陰脈養不可針灸其經此經內輸於脾其時兒四肢成無大飢無甚飽無食乾燥無自炙熱無大勞倦蓋五月毛髮初生有熱苦頭眩心亂嘔吐有寒則腹滿痛小便數卒有恐怖四肢疼痛寒熱胎動無常處腹痛頓欲僕卒有所下宜服阿膠湯又名旋覆花湯主之阿膠湯方阿膠四兩炙人參一兩麥門冬去心一升生薑六兩吳茱萸七合旋覆花當歸芍藥甘草炙黃芩各三兩上以水九升煮取一半內清酒三升並阿膠微火煎取三升半分四服日三夜一先食後服便愈不差更服忌海藻菘菜安中湯若曾傷五月胎者當預服此方甘草炙芍藥各三兩當歸人參生地黃芎藭各二兩五味子五合生薑六兩麥門冬去心一升大麻仁五合大棗三十五枚擘黃芩一兩上以水七升清酒五升煮取三升半分四服日三夜一七日再服一劑忌如前安胎當歸湯若妊娠五月舉動愕胎不安小腹痛引腰絡小便下血當歸阿膠炙芎藭人參各一兩大棗十二枚艾一把上以酒水各三升煮至三升去滓內膠令煬分三服一方有甘草無參棗妊娠六月始受金精以成筋身欲微勞無得靜處出遊於野數觀走犬走馬食宜鷙鳥猛獸之肉是謂變腠理紉筋以養其力以堅背膂是月足陽明脈養不可針灸其經此經內屬於胃主其口目蓋六月之時兒口目皆成調五味食甘美母大飽六月卒有所動不安寒熱往來腹內脹滿體腫驚怖忽有所下腹痛如欲産手足煩疼宜服麥門冬湯麥門冬湯方麥門冬去心一升甘草炙人參各一兩生地黃三兩二錢黃芩三兩阿膠炒四兩生薑六兩大棗十五枚擘上以水七升煮減半清酒二升並膠煎取三升分三服如人行三四里進糜粥忌海藻菘菜蕪荑柴胡湯若曾傷六月胎者當預服之柴胡四兩芍藥一方作紫葳白朮甘草炙各二兩麥門冬三兩去心蓯蓉一兩芎藭二兩生地黃五兩生薑六兩大棗三十枚擘上以水一斗煮取三升分四服日三夜一仍進糜粥七日更服一劑忌海藻菘菜蕪荑桃李雀肉等一方有黃芩二兩旋覆花湯亦名阻病集驗療妊娠六七月胎不安常處旋覆花一兩厚朴制白朮枳殼黃芩炒茯苓各三兩半夏炒一方無芍藥生薑各二兩上以水一斗煮取二升半先食分五服日三夜二忌羊肉餳醋桃李雀肉等千金同妊娠七月始受水精以成骨勞身搖肢無使定止動作屈伸以運血氣自此後居處必燥飲食避寒常食粳稻以密腠理是謂養骨而堅齒是月手太陰脈養不可針灸其經此經內屬於肺主皮毛是時兒皮毛已成無大言無號哭無薄衣無洗浴無寒飲若忽驚恐搖動腹痛卒有所下手足厥冷脈若傷寒煩熱腹滿短氣常苦頸項腰背強宜服蔥白湯蔥白湯方蔥白十五枚半夏細切炒麥門冬去心一升人參一兩五錢生薑八兩甘草炒當歸黃耆炒各三兩阿膠炒四兩黃芩一兩旋覆花一把上以水八升煮減半內清酒三升並膠煎取四升溫服一升日三夜一溫臥當汗出無汗加麻黃二兩秋勿強汗忌羊肉餳海藻菘菜等杏仁湯若曾傷七月胎者當預服杏仁去皮尖碎甘草炙鍾乳研麥門冬去心吳茱萸各一升五味子粳米各五合紫菀一兩上以水八升煮取三升半分四服日三夜一七日服一劑忌海藻菘菜妊娠八月始受土精以成膚革和心靜息無使氣極是謂周密腠理光澤顏色是月手陽明脈養不可針灸其經此經內屬於大腸大腸主九竅是時兒九竅皆成無食燥物無輒失食無忍大氣若中風寒有所犯觸身體盡痛乍寒乍熱胎動不安苦頭眩痛繞臍下寒時時小便白如米汁或青或黃或寒栗腰背苦冷痛而目視茫茫宜服芍藥湯芍藥湯方芍藥四錢人參當歸甘草炙各二兩白朮一兩厚朴二兩制薤白切一升生薑切四兩上以水五升酒四升煮取三升分四服日三夜一忌海藻菘菜桃李雀肉等類葵子湯若曾傷八月胎者當預服甘草炙柴胡白朮各二兩厚朴薑製炒芍藥葵子二升生薑六兩大棗二十枚擘上以水九升煮取三升分四服日三夜一服一劑忌豬肉冷水蕪荑桃李雀肉酢物等類妊娠九月始受石精以成皮毛六腑百節莫不畢備飲醴食甘緩帶自持而待之是謂養毛髮多才力是月足少陰脈所養不可針灸其經此經內屬於腎腎主續縷皆成無處溫冷無著炙衣若卒下痢腹滿懸急上衝腰背痛不可轉側短氣宜服半夏湯半夏湯方半夏泡炒五合麥門冬去心五合乾薑炮一兩當歸吳茱萸阿膠炙各三兩大棗十二枚擘上以水九升煮取三升去渣內蜜八合微火溫分四服痢即止忌生血物餳豬腎湯若曾傷九月胎者當預服豬腎一具茯苓桑寄生乾薑炮生地黃芎藭各三兩白朮麥門冬一升去心附子大者一枚炮上以水一斗煮豬腎熟去之內諸藥煎三升半分四服日三夜一十日更一劑忌豬肉蕪荑桃李雀肉酢物妊娠十月五臟俱備六腑通納天地氣于丹田故使關節人事皆備但俟時而生愚按妊娠所禁之法皆傳自上古當永為遵守其方藥用須斟酌芎藭補中湯治懷孕血氣不能榮養以致半産豫嘗治一妊娠不足月而損墜服此藥遂安乾薑煨阿膠炒芎藭各五分五味子黃耆炒當歸白朮炒杜仲炒白芍藥木香人參甘草炙各五分上水煎服妊娠惡阻方論第二妊娠惡阻病産寶謂之子病巢氏病源謂之惡阻由胃氣怯弱中脘停痰脈息和順但肢體沉重頭眩擇食惟嗜酸鹹甚者寒熱嘔吐胸膈煩滿半夏茯苓丸主之愚按前症若中脘停痰用二陳湯加枳殼若飲食停滯用六君子加枳殼若脾胃虛弱用異功散若胃氣不足用人參橘皮湯兼氣惱加枳殼胸膈痞悶再加蘇梗脅痛再加柴胡若飲食少思用六君子加紫蘇枳殼頭暈體倦用六君子湯若脾胃虛弱嘔吐不食用半夏茯苓湯蓋半夏乃健脾氣化痰滯之主藥也脾胃虛弱而嘔吐或痰涎壅滯飲食少思胎不安必用茯苓半夏湯倍加白朮然半夏白朮茯苓陳皮砂仁善能安胎氣健脾胃豫常用驗矣附治驗一妊娠嘔吐惡食體倦嗜臥此胃氣虛而惡阻也用人參橘皮湯二劑漸愈又用六君加紫蘇二劑而安一妊娠吞酸噁心時欲作嘔此因脾胃虛而飲食停滯用六君加枳殼香附治之而愈一妊娠停食腹滿嘔吐吞酸作瀉不食余以為飲食停滯兼肝木傷脾土用六君子湯以健脾胃加蒼朮厚術以消飲食吳茱萸所制黃連以清肝火諸症悉愈又以六君加砂仁調理而脾土乃安白朮湯治胃虛惡阻吐水甚至十餘日粥漿不入白朮炒一錢人參五分丁香甘草炒各二分上薑水煎服人參橘皮湯治阻病嘔吐痰水飲食少思肢體倦怠人參橘紅白朮炒麥門冬去心白茯苓各一錢厚朴制甘草各五分上加竹茹薑水煎服保生湯治妊娠惡阻少食嘔吐或兼吐瀉作渴人參一錢甘草炒白朮炒香附烏梅橘紅各五分上薑水煎服安胎飲治體倦惡食或胎動腹痛或下血發熱甘草炒茯苓當歸熟地黃自制川芎白朮炒黃耆炒白芍藥炒半夏湯泡阿膠切炒地榆各五分上薑水煎服又方縮砂仁為末每服二錢薑湯或米飲調下附方二陳湯方見二十四卷第五論六君子湯方見二十四卷第六論異功散方見二十三卷第三論半夏茯苓湯方見後妊娠痰逆不食方論第三妊娠嘔逆者乃水飲停積為痰輕者妨食嘔逆甚者腹痛傷胎皆由胃氣不健或風冷外乘所致也愚按前症因食停滯用半夏茯苓湯加枳殼兼氣惱更加柴胡因痰壅滯用半夏茯苓湯加白朮因風寒外傷用參蘇飲飲食腹脹用香砂六君子湯寒熱嘔吐人參養胃湯附治驗一妊婦嘔吐脅脹或寒熱往來面色青黃此木旺而克脾土用六君子加柴胡桔梗枳殼而安一妊婦嘔吐酸水胸滿不食此脾土虛而肝木所侮用六君子加芍藥而愈又用四君子加枳殼桔梗而安一妊婦胸腹膨脹吐痰不食此脾胃虛而飲食為痰用半夏茯苓湯漸愈又用六君子加枳殼蘇梗桔梗而飲食如常後因恚怒脅脹不食吐痰噁心用半夏茯苓湯加柴胡山梔而愈