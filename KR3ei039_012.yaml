和皮炒為末每服二錢米飲下腹熱即安秦艽湯方見前安胎散治頓僕胎動腰腹痛方見前附方四七湯治七情鬱結成痰或如梅核鯁於喉間或中脘停痰氣痞或痰壅氣喘或痰飲中脘嘔逆噁心柴蘇葉厚朴薑製茯苓各一錢半夏薑製一錢五分上薑棗水煎白濁送青州白丸子極妙加味四物湯治症同前又方治寒邪所犯心腹作痛桂枝芍藥炒半夏各一錢茯苓厚朴薑製枳殼麩炒甘草炒各五分人參紫蘇各一錢上薑棗水煎服鉤藤湯方見前紫蘇飲方見後六君子湯方見二十四卷第六論歸脾湯八珍湯二方見二十四卷第四論妊娠胎上逼方論第八妊娠將養如法則血氣調和胎得其所而産亦易否則胎動氣逆臨産亦難甚至危矣愚按前症若氣逆胎上用紫蘇飲飲食不甘兼以四君子若內熱晡熱兼以逍遙散若胃火所致用四君黃芩枳殼柴梔若脾郁所致用歸脾湯加柴梔枳殼附治驗一妊婦每因恚其胎上逼左關脈弦洪乃肝火內動用小柴胡加茯苓枳殼山梔而愈但體倦不食用六君子調養脾土加柴胡枳殼調和肝氣乃瘥一妊婦胎上逼胸滿噯氣飲食少思此脾氣鬱滯用紫蘇飲頓安又用四君子加枳殼柴胡山梔而瘥紫蘇飲治子懸腹痛或臨産驚恐氣結連日不下或大小便不利當歸甘草炒大腹皮黑豆浸水泡人參川芎橘皮白芍藥炒各五分紫蘇一錢上薑蔥水煎一孕婦纍日不産催藥不驗此坐草太早心懷畏懼氣結而血不行也用前飲一服便産一婦人孕七月上衝腹痛面不赤舌不青乃子懸也亦用前飲而胎母俱安當歸湯治胎動煩躁或生理不順唇口青黑手足厥冷當歸人參阿膠炒甘草炒各一錢連根蔥白一握上水四碗煎四味至半去滓下蔥煎至一碗分二服大聖散治妊娠忪悸夢驚心腹脹滿連臍急痛白茯苓川芎麥門冬去心黃耆炒當歸各一錢人參甘草炙木香各五分上薑水煎服又方治胎上逼熱痛下血或煩悶困篤用蔥二十莖水濃煮飲胎未死即安胎已死即下未效再服若唇口青黑手足厥冷須佐以當歸湯白朮湯治遍身痛或衝心痛欲死方見後附方四君子湯六君子湯二方見二十四卷第六論逍遙散歸脾湯二方見二十四卷第四論小柴胡湯方見二十四卷第二論妊娠下如豆汁胎動腹痛方第九愚按前症肝脾濕熱用升陽除濕湯肝脾風熱用加味逍遙散肝脾鬱怒用加味歸脾湯脾胃氣虛用錢氏白朮散若脾氣下陷用補中益氣湯肝經風熱用防風黃芩丸風入腸胃用胃風湯附治驗一妊婦因怒胸膈不利飲食少思服消導順氣之劑脾胃愈弱飲食愈少大便不實且無度久而便黃水或帶白視其面色黃中隱白余曰黃色脾虛也白色肺虛也朝以補中益氣湯升補胃氣夕以六君子培補脾氣而愈治妊娠忽然下如豆汁等物或胎動腹痛糯米五升黃耆炒六兩上水煎分四服補遺用野苧根二兩好銀三五兩或金銀首飾水酒各半煎服附方胃風湯治風邪乘虛客於腸胃水穀不化泄瀉下注腹脅虛滿腸鳴作痛及腸胃虛熱下如豆汁或瘀血日夜無度方見第八卷第十論東垣升陽除濕湯治婦人女子漏下惡血月事不調或暴崩不止多下水漿之物皆由飲食失節或勞傷形體或素患心氣不足因飲食勞倦致令心火乘脾其脈緩而弦急按之洪大皆脾土受邪也柴胡羌活蒼朮黃耆炒各一錢五分防風甘草炙升麻藁本各一錢蔓荊子七分獨活當歸各五分上水煎食前服加味逍遙散加味歸脾湯二方見二十四卷第四論防風黃芩丸方見前補中益氣湯六君子湯二方見二十四卷第六論錢氏白朮散方見二十四卷第二論妊娠誤服毒藥胎動方論第十愚按前症若因毒藥用甘草黑豆淡竹葉若因頓僕用阿膠散未應煎送知母丸若因頓僕下血腹痛用佛手散未應用八珍湯送知母丸血出過多用八珍湯斤許益母草四而水煎徐徐與服若胎死以朴硝或平胃散下之守命丹治小産或毒藥唇口爪青黑其胎已死牡丹皮白茯苓桂心赤芍藥各為末桃仁去皮尖研如泥上等分蜜丸彈子大每服一丸醋湯速進兩丸立出阿膠散治妊娠跌僕或毒藥致胎不安熟地黃二錢自制白芍藥艾葉當歸甘草炒阿膠炒各一錢黃耆炒各一兩上薑棗水煎服藥毒胎動甘草烏豆淡竹葉等分用水濃煎服附方知母丸又名一母丸方見十三卷第九論佛手散方見前八珍湯方見二十四卷第四論平胃散方見八卷第十八論妊娠心痛方論第十一妊娠心痛乃風邪痰飲交結若傷心正經為真心痛朝發夕死夕發旦死若傷心支絡則乍安乍作若傷於子臟則胎動而下血愚按前症若飲食所傷用平胃散加枳殼山楂若因錯雜諸邪當審其因而治之附治驗一妊婦心痛煩熱作渴用白朮散即愈後因停食其痛仍作胸腹膨滿按之則痛此因飲食停滯用人參養胃湯按之不痛乃脾胃受傷以六君子補之而愈一妊婦心腹作痛胸脅作脹吞酸不食此肝脾氣滯用二陳山楂山梔青皮木香而愈又因怒仍痛胎動不食面色青黃肝脈弦緊脾脈弦長此肝乘其土用六君子湯加升麻柴胡木香而愈治妊娠婦卒心痛氣欲絶川芎當歸茯苓厚朴制各一錢上水煎服白朮湯治妊娠內熱心痛白朮四錢赤芍藥三錢黃芩二錢炒上水煎忌桃李雀肉雷公炮炙論云心痛欲死急覓延胡又方青竹茹一升酒二升煮一升分二服又方破雞子一枚調酒服之紫蘇飲方見前附方人參養胃湯平胃散二方見七卷第十八論二陳湯方見二十四卷第五論六君子湯方見二十四卷第六論妊娠心腹痛方論第十二妊娠心腹痛或宿有冷疾或新觸風寒或痰飲相搏若痛傷胞絡必致動胎甚則傷墜愚按前症若風寒痰飲用金沸草散胎氣鬱滯加香附川芎若飲食停滯用六君加紫蘇枳殼若怒動肝火用前藥更加柴胡山梔若鬱結傷脾用歸脾湯加枳殼山梔附治驗一妊婦心腹作痛吐痰噁心胎氣上攻飲食少思此脾虛氣滯而為痰用六君子加柴胡枳殼諸症漸退飲食漸進又用四君子加枳殼山梔桔梗而安後因怒兩脅氣脹中脘作痛惡寒嘔吐用六君加柴胡升麻木香一劑而愈當歸芍藥湯治妊娠心腹急痛或去血過多而眩暈白芍藥炒當歸茯苓白朮炒澤瀉各一錢川芎二錢上水煎服阿膠散治胎動腹痛白茯苓白朮炒川芎阿膠各一錢炒當歸陳皮各一錢上水薑棗煎服治胎動腹痛欲落上等銀一斤茅根二斤去黑皮水五碗煮取三碗入清酒一碗並茅根煎數沸徐徐服立安金銀首飾亦可附方金沸草散方見六卷第十二論紫蘇飲方見前四君子湯六君子湯二方見二十四卷第六論歸脾湯方見二十四卷第四論妊娠中惡方論第十三妊娠若忽然心痛悶絶欲死者謂之中惡蓋因氣血不足精神衰弱故邪毒得以中之也愚按前症當調補正氣為善用金銀藤一味煎湯飲之又方治前症生地黃二錢枳殼一錢木香三分上酒煎服又方苦梗一兩薑半兩水煎服又方妊娠腹痛或吐血衄血熟艾如拳大煮汁服又方用鹽一盞水調服以冷水噀之吐出即安灶心土為末每服二錢白湯調妊娠腰腹背痛方論第十四腎主腰足因勞役傷損其經以致風冷乘之腰腹相引而痛蓋婦人腎以系胞妊娠痛甚則胎墮也愚按前症若外邪所傷用獨活寄生湯勞傷元氣用八珍杜仲砂仁膠艾脾腎不足以前藥加白朮補骨脂氣血鬱滯用紫蘇飲加桔梗枳殼肝火所動用小柴胡湯加白朮枳殼山梔肝脾鬱結用歸脾湯加柴胡枳殼附治驗一妊婦頸項強直腰背作痛此膀胱經風邪所致用拔萃羌活湯一劑而愈又用獨活寄生湯及八珍湯以祛邪固本而痊通氣散治腎虛腰痛神妙破故紙炒為末空心每服二錢嚼核桃肉半個以溫酒下杜仲丸治妊娠腰背痛杜仲炒續斷酒浸等分為末煮棗肉丸桐子大每服七十丸酒下米飲亦可膠艾湯治腰腹疼痛胎動欲落即前妊娠下血補遺內安胎散附方獨活寄生湯方見四卷第七論八珍湯歸脾湯二方見二十四卷見四論紫蘇飲方見前小柴胡湯方見二十四卷第二論羌活勝濕湯方見四卷第一論妊娠小腹痛方論第十五妊娠小腹痛由胞絡虛風寒相搏痛甚亦令胎動也愚按前症若風寒所搏用紫蘇飲加生薑氣血虛用八珍湯脾氣虛用六君子湯中氣虛用補中益氣湯若腹脹痛用安胎飲加升麻白朮不應兼補中益氣湯附治驗方藥一妊婦小腹作痛其胎不安氣攻左右或時逆上小便不利用小柴胡湯加青皮山梔清肝火而愈後因怒小腹脹滿小便不利水道重墜胎仍不安此亦肝木熾盛所致用龍膽瀉肝湯一劑諸症頓愈乃以四君子加柴胡升麻以培脾土而安紫蘇飲方見前四君子湯六君子湯補中益氣湯三方見二十四卷第六論安胎飲方見前小柴胡湯方見二十四卷第二論龍膽瀉肝湯方見二十四卷第八論妊娠心腹脹滿方論第十六夫妊娠心腹脹滿者由脾胃虛寒復因冷飲相搏所致也愚按前症若外感風寒內傷飲食用藿香正氣散若食傷脾胃用六君子湯若陽氣壅滯用紫蘇飲附治驗一妊婦飲食停滯心腹脹滿或用人參養胃湯加青皮山楂枳殼其脹益甚其胎上攻噁心不食右關脈浮大按之則弦此脾土不足肝木所侮余用六君子加柴胡升麻而愈後小腹痞悶用補中益氣湯升舉脾氣乃瘥下氣湯治心腹兩脅脹悶飲食少思四肢無力羌活赤芍藥炒甘草炒檳榔青皮大腹皮陳皮赤茯苓半夏薑製桑白皮炒各五分桂心二分紫蘇莖一錢上水煎服局方枳殼散保風散紫蘇飲藿香正氣散皆良附方六君子湯補中益氣湯二方見二十四卷第六論人參養胃湯方見七卷第十八論
