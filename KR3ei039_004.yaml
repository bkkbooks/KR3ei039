body:
  text: 卷四婦人血風肢體骨節疼痛方論第一婦人血風由氣血不足腠理不密風冷乘之以致邪正相搏故骨節疼痛肢體發熱口舌咽乾愚按東垣先生云飲食失節脾胃虛弱乃血所生病故口中津液不行若火熱來乘土位故肢體發熱作謁若肝經血熱用四物羌活黃芩黃柏肝經血虛用逍遙散山梔川芎風濕兼痰用四物南星半夏羌活蒼朮風濕傷脾用羌活勝濕湯暑濕傷氣用清燥湯氣鬱肝脾用四君木香枳殼檳榔胃氣受傷用補中益氣湯瘀血流注用四物桃仁紅花骨痛筋攣用當歸沒藥倦怠無力用補中益氣羌活川芎附治驗一婦人自汗盜汗發熱晡熱體倦少食月經不調吐痰甚多二年後遍身作痛陰雨益甚此氣虛而風寒所乘用小續命湯疼痛頓止用補中益氣加味歸脾三十餘劑諸症悉愈一婦人月經不調且素有痛風過勞必作用衆手重按痛稍止此氣血俱虛用十全大補加獨活而痛痊用六味丸逍遙散而經調一婦人肢體作痛面色萎黃時或赤白發熱惡寒吐瀉食少腹痛脅脹月經不時或如崩漏或痰盛喘嗽頭目眩痛或五心煩熱口渴飲湯或健忘驚悸盜汗無寐等症臥床年許悉屬肝脾虧損氣血不足所致用十全大補加味歸脾兼服月餘諸症悉痊芎藭散川芎一錢赤茯苓赤芍藥酸棗仁炒桂心當歸酒洗木香牛膝酒洗羌活枳殼炒甘草各三分上水煎服羚羊角散治血氣身體疼痛手足無力羚羊角鎊酸棗仁炒生地黃檳榔各一兩半五加皮防風赤芍藥當歸酒洗骨碎補炒海桐皮川芎各五錢甘草三錢上為末每服二錢溫酒調下通靈丸治血風手足疼痛不可忍者白附子殭蠶各一兩炒去絲全蠍半兩炒麝香一字上為末煉蜜丸桐子大每服十丸溫酒下日三服當歸沒藥丸治血風肢體刺痛筋攣骨痹或手足麻木當歸五靈脂各一兩炒沒藥半兩上為末醋糊丸桐子大每服三十丸薑湯下虎骨散治血風走痛或打撲作痛虎骨酥炙敗龜板酥炙當歸酒洗牛膝酒洗漏蘆地龍去土威靈仙玄胡索炒自然銅制等分上為末每服二錢熱酒調下附方羌活勝濕湯治頭痛脊痛腰似折項似拔羌活獨活各一錢藁本防風甘草炙各半錢蔓荊子川芎各二分上水煎服如身重腰沉沉然是濕熱也加黃柏一錢附子半錢白朮二錢東垣清燥湯方見後四物湯補中益氣湯四君子湯三方見二十四卷第六論小續命湯方見十九卷第八論逍遙散加味歸脾湯十全大補湯三方見二十四卷第四論六味丸方見二十四卷第十一論婦人血風白虎歷節走疰方論第二婦人血風白虎歷節由體虛風邪乘之隨血而行或淫溢皮膚或卒然掣痛走疰如虎齧者加減小續命湯主之愚按東垣云若人身體沉重走疰疼痛此濕熱相搏或風熱鬱而不得伸附著於有形也是症多因飲食起居失節或因七情勞役失宜脾胃虧損腠理不密外邪所侵以致內熱晡熱自汗盜汗或經候不調飲食不甘治法濕熱腫痛者清燥湯兼痰佐以二陳湯肝火作痛者加味逍遙散脾郁作痛者加味歸脾湯血虛作痛者四物湯氣虛作痛者四君子湯氣血俱虛者八珍湯俱加羌活川芎月經先期而痛者加味逍遙散頭眩倦怠而痛者補中益氣湯大抵按之痛甚者病氣實按之痛緩者元氣虛勞役而痛者亦元氣虛也飲食失宜而痛者脾氣虛也惱怒而痛者肝火盛也若晝輕而夜重者血分病也與前兼用附治驗一婦人歷節發熱作渴飲食少思月經過期其脈舉之洪大按之微細用附子八物四劑而痛止用加味逍遙而元氣復用六味丸而月經調一婦人體肥胖素有熱月經先期患痛風下體微腫痛甚則小便頻數身重脈緩此風濕血虛而有熱用羌活勝濕湯二劑腫痛漸愈用清燥湯數劑小便漸清用加味逍遙散內熱漸愈又為飲食停滯發熱仍痛面目浮腫用六君加柴胡升麻而愈又因怒氣小腹痞悶寒熱嘔吐用前藥加山梔木香而安惟小腹下墜似欲去後此脾氣下陷用補中益氣而愈後因勞役怒氣作嘔吐痰遍身腫痛經行寒熱此肝木侮脾土用六君加柴胡山梔腫痛嘔吐悉退後用補中益氣而安一婦人飲食少思畏風寒患痛風嘔吐寒熱脈弦緊用附子八物而四肢痛愈用獨活寄生而腰痛漸痊惟兩膝腫痛用大防風湯而痛漸愈用歸脾逍遙而元氣復漏蘆散治走疰疼痛漏蘆當歸酒洗牛膝各三錢桂心地龍去土防風羌活白芷沒藥甜瓜子各半兩虎脛骨敗龜板各炙酥一兩上為末每服二錢熱酒調下四生丸治骨節作痛或渾身麻痹白殭蠶炒去絲地龍去土白附子五靈脂草烏去皮尖各等分上為末米糊丸桐子大每服二十丸茶清送下酒調服亦可麝香丸治歷節諸風走痛或如蟲行大川烏三個去皮尖生用全蠍二十一個黑豆二十一粒地龍去土五錢麝香一字上為末米糊丸緑豆大每服十丸溫酒下許學士云豫得此方凡歷節及不測疼痛一二服便瘥治一貴婦遍身走痛夜如蟲齧三服而愈附子八物湯治歷節痛如錘鍛附子炮乾薑炮芍藥炒茯苓人參甘草桂心各五分白朮一錢五分上水煎服一方去桂用熟地黃二錢獨活寄生湯方見後小續命湯方見後一婦人兩踝作痛上行膝髀肩肘痛如錘鍛至夜尤劇六脈皆緊一劑而愈又鄧安人夏月患此人迎脈虛此因暑而得用酒蒸黃連一服亦安附方東垣清燥湯治元氣虛濕熱乘之遍身痠軟或肺金受邪絶寒水生化之源腎無所養小便赤小大便不調腿腰痿軟或口乾作渴體重麻木頭目眩暈飲食少思或自汗盜汗肢體倦怠胸滿氣促黃耆一錢五分五味子九粒杵炒黃連炒神麯炒豬苓柴胡甘草炙五分蒼朮白朮炒麥門冬去皮陳皮炒生地黃澤瀉各五分白茯苓人參當歸酒洗升麻各三分黃柏酒拌一分上水煎服二陳湯方見二十四卷第五論八珍湯加味逍遙散加味歸脾湯三方見二十四卷第四論四物湯四君子湯六君子湯補中益氣湯四方見二十四卷第六論六味丸方見二十四卷第十一論羌活勝濕湯方見前大防風湯方見二十四卷第九論婦人血風癮疹瘙癢方論第三婦人瘙癢癮疹五心煩熱乃血風攻疰用人參荊芥散消風散逍遙散大抵因體虛風寒相搏赤屬血分白屬氣分也經云汗出見濕乃生痤痱凡人汗出不可露臥沐浴使人身振寒熱致生風疹也愚按前症有身發疙瘩或如丹毒癢痛不常或膿水淋漓發熱煩渴或頭目昏眩日晡益甚或寒熱發熱月經不調皆肝經風熱血燥用加味逍遙散為主佐以四君芎歸若忿怒身發疙瘩痛疼寒熱乃肝火血燥用加味小柴胡湯氣血俱虛八珍加柴胡丹皮若夜間發熱作渴譫語乃熱入血室用小柴胡加生地血虛四物合小柴胡後用加味逍遙散調理若鬱結食少體倦內熱晡熱乃脾經血燥用加味歸脾湯寒熱加出梔熟地若遊走瘙癢乃血風走注用何首烏散血虛逍遙散風熱消風散若專用風藥復傷陰血必致筋攣等症附治驗一婦人身發疙瘩或如丹毒癢痛不常搔碎成瘡膿水淋漓發熱煩渴頭目眩暈日晡益甚此血虛內熱之症以當歸飲加柴胡山梔治之而愈一婦人患前症肢體疼痛頭目不清自汗盜汗月水不調肚腹作痛食少倦怠先用人參荊芥散後用逍遙散治之而痊一婦人因忿怒身發疙瘩憎寒發熱余謂肝火用小柴胡湯加山梔黃連治之而愈後口苦脅痛小便淋漓復用前藥全愈一婦人患前症發熱夜間譫語此血分有熱以小柴胡湯加生地治之而安後用四物湯加柴胡山梔丹皮而熱退又用逍遙散全愈一室女十四歲天癸未至身發赤斑癢痛左關脈弦數此因肝火血熱以小柴胡湯加山梔生地丹皮治之而愈若因怒而致者亦宜治以前藥治驗余見二十四卷血風門何首烏散治皮膚瘙癢遊走無定何首烏防風白蒺藜炒枳殼麩炒天麻殭蠶胡麻炒茺蔚子蔓荊子各一錢茵陳五分上水煎服附方四物湯四君子湯二方見二十四卷第六論加味小柴胡湯小柴胡湯二方見二十四卷第二論八珍湯加味歸脾湯加味逍遙散逍遙散四方見二十四卷第四論當歸飲方見二十四卷第六論消風散方見二十四卷第七論人參荊芥散方見五卷第三論婦人虛風頭目眩暈方論第四婦人頭眩由氣虛風入於腦循脈引於目系目系急而然也邪甚則必癲素問云頭痛癲疾下虛上實過在足少陰巨陽甚則入腎徇蒙招搖目瞑耳聾下實上虛過在足少陽厥陰甚則在肝下虛者腎虛也故腎厥則頭痛上虛者肝虛也故肝虛則暈徇蒙者如以物蒙其首招搖不定目眩耳聾皆暈之狀故肝厥頭痛不同也愚按丹溪先生云眩者言其黑運旋轉其狀目閉眼昏身轉耳聾如立舟船之上起則欲倒蓋虛極乘寒得之亦不可一途而取軌也若風則有汗寒則掣痛暑則熱悶濕則重滯此四氣乘虛而眩運也若鬱結生痰而眩暈者此七情虛火上逆也若淫欲過度而眩暈者此腎虛氣不歸源也若吐衄漏崩而眩暈此肝虛不能攝血也有早起眩暈須臾自定者元氣虛也正元飲下黑錫丹傷濕頭運用腎著湯加川芎有痰用青州白丸子頭風風熱也久則目昏偏頭風相火也久則目緊便澀皆宜出血以開表之竊謂前症肝虛頭暈用鉤藤散腎虛頭暈六味丸頭暈吐痰養正丹不應八味丸血虛四物參苓白朮不應當歸補血湯氣虛四君歸耆不應益氣湯肝木實瀉青丸虛用地黃丸不應川芎散脾氣虛二陳參朮柴胡升麻不應益氣湯加茯苓半夏脾胃有痰半夏白朮天麻湯風痰上壅四神散發熱惡寒八物湯七情氣逆四七湯傷濕而暈除濕湯附治驗一婦人素頭暈不時而作月經遲而少此中氣虛弱不能上升而頭暈不能下化而經少用補中益氣湯而愈後因勞仆地月經如湧此勞傷火動用前湯加五味子一劑而愈前症雖雲氣無所附實因脾氣虧損耳一婦人內熱口乾勞則頭暈吐痰帶下詳見六卷第十六論養正丹治虛風頭眩吐涎不己蓋此藥升降陰陽補接真氣非止頭眩而已黑鉛水銀硫黃研硃砂各一兩研上用砂器熔鉛下水銀攪勻離火少時入硫砂再攪候冷為末飯丸緑豆大每服三十丸空心食前棗湯下鉤藤散治肝厥頭暈鉤藤鉤陳皮炒半夏薑製麥門冬去心茯苓茯神去木人參去蘆甘菊花防風各一錢甘草炙三分石膏煅二錢上姜水煎川芎散治肝腎虛風頭目眩暈或頭痛耳鳴目繫緊急小川芎山藥白茯神甘菊花野菊不用人參各半兩山茱萸肉一兩上為末每服二錢酒調日三服三五七散治八風五痹肢體不仁或風寒入腦頭痛目旋耳內蟬鳴附子炮細辛各三兩乾薑炮各五兩山茱萸防風山藥炒各七兩上為末每服二錢溫酒調四神散治血風眩暈頭痛寒熱唾痰菊花當歸酒洗旋覆花去梗葉荊芥穗各一錢上蔥白三寸茶末一錢水煎斗門方治血風頭旋或不知人事用喝起草嫩心陰乾為末酒服二錢其功甚效即前蒼耳散治頭旋如天動地轉名曰心眩膽礬一兩細研用麵餅劑一個拌勻勒如骰子大瓦上焙乾每服一骰為末燈心竹茹煎湯調下此去痰之法當審而用之附方正元飲治下元虛敗痰氣上湧頭目眩暈臟腑滑泄時或自汗手足逆冷霍亂轉筋等症紅豆炒二錢人參去蘆三兩附子炮去皮尖一兩茯苓甘草炙各一兩肉桂五錢川芎山藥薑汁炒烏藥乾葛各一兩白朮二兩乾薑炮三錢黃耆炙一兩半上每服三錢薑棗水入鹽少許煎送黑錫丹黑錫丹治真陽虛敗痰氣壅塞心火炎熾或赤白帶下等症肉桂沉香附子炮去皮臍胡蘆巴酒浸炒破故紙炒茴香炒肉豆蔻麵裹炒陽起石研水飛金鈴子蒸去皮核木香各一兩硫黃黑錫去灰各二兩上將黑錫硫黃入銚內煉結砂子傾出地上去火毒研細余藥為末和勻再研至黑光色酒糊丸桐子大陰乾入布袋擦令光潤每服四十丸腎著湯方見十五卷第八論青州白丸子方見三卷第四論六