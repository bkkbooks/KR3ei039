見二十四卷第二論加味四物湯四君子湯二方見二十四卷第六論婦人腰痛方論第七夫腎主於腰若婦人腰痛由腎氣虛弱外感六氣內傷七情皆能致之如因風邪所乘用小續命湯加桃仁杜仲如因寒濕所傷五積散腎經虛弱青娥丸如因氣血凝滯用牽牛茴香之類愚按陳無擇先生云若形體虛羸面色黧黑腿足痿軟不能行立此失志所為也腹急脅脹目視䀮䀮宗筋弛縱白淫下注此鬱結所為也肌肉不仁飲食不化腸胃脹滿閉墜腰脅此憂思所為也皆屬內因若腰冷作痛身重不渴小便自利飲食如故因勞汗出腰痿脅痛或墜墮血滯房勞精竭皆屬內外因也竊謂前症失志腎虛熱者六味丸腎虛寒者八味丸鬱怒傷肝實用龍膽瀉肝湯虛用六味丸補肝散憂慮傷脾者歸脾湯逍遙散腎著者寒則朮附湯虛則腎著湯腰膝痛者寄生湯養腎散瘀血滯者如神湯舒筋湯房勞腰痛者青娥丸十補丸附治驗一婦人腰痛三年矣每痛必面青頭暈目緊余以為肝脾氣虛用補肝散而愈三年後因勞役患頭痛兼噁心用補中益氣湯加茯苓半夏蔓荊子而愈一婦人苦腰痛數年不愈余用白朮一味大劑服不三月而痊乃胃氣虛閉之症故用白朮也如神湯治男婦腰痛延胡索當歸桂心等分上為末每服二錢溫酒調甚者不過數服獨活寄生湯治足三陰虛風濕所侵腳膝歷節作痛獨活桑寄生續斷酒炒杜仲薑汁炒細辛牛膝酒拌炒秦艽茯苓白芍藥炒桂心川芎防風人參熟地黃自制當歸粉草炙各五分上水煎舒筋散治風寒傷腎膂作痛或閃挫氣滯血瘀亦良玄胡索炒杜仲薑汁炒官桂去皮羌活芍藥等分上為末每服二錢酒調又方橘核炒木香研酒下附方濟生朮附湯治寒濕傷腎腰重冷痛小便自利或手足逆冷附子炮白朮各一兩杜仲姜炒半兩上每服四錢姜水煎三因腎著湯治腎虛為病身重腰冷如水洗狀不渴而小便自利飲食如故腰以下冷痛如帶數千錢茯苓白朮各四兩乾薑炮甘草炙各二兩上每服四錢水煎空心服青娥丸治腎虛腰痛或外邪所侵腰腿或筋骨作痛胡桃仁二十枚蒜研膏四兩破故紙酒浸炒八兩杜仲去皮薑汁浸炒一斤上為末蒜膏丸桐子大每服五十丸空心醋湯下蒜不用亦可六味丸十補丸八味丸三方見二十四卷第十一論龍膽瀉肝湯方見二十四卷第六論補肝散方見七卷第十七論養腎散方見後歸脾湯逍遙散二方見二十四卷第四論婦人腰腳疼痛方論第八腎主於腰腳女人胞絡系焉若勞傷腎氣風冷客於脈絡故腰腳作痛也治當補元氣為主佐以祛邪之劑愚按前症若真陽衰敗寒邪乘襲手足俱冷頭痛惡寒或嘔吐腹痛等症宜用本方若氣血虛弱寒邪所感惡寒發熱頭痛作渴或嘔吐腹痛等症宜用五積散若元氣虛弱濕熱所傷兩脛腫痛寒熱身疼或嘔吐不食等症宜用檳蘇敗毒散若元氣虛弱脾胃弱寒熱嘔吐發熱頭痛喘渴體倦等症宜用補中益氣湯若足三陰精血虧損陰火內動內熱晡熱作渴痰甚小便頻數等症宜用六味地黃丸若足三陰陽氣虛敗惡寒發熱手足俱冷吐痰不食二便滑數等症宜用八味地黃丸附治驗一婦人先腰胯作痛後兩腿亦痛余以為足三陰虛寒外邪所傷用小續命湯及獨活寄生湯或作或止所用飲食極熱腹中方快余曰邪氣去而元氣虛寒也診其脈果沉細用養腎散漸愈又用十補丸而痊一婦人所患同前但發熱作渴喜冷飲食脈洪數按之遲澀余以為血虛有熱用羚羊角散去檳榔加白朮茯苓數劑更用加味逍遙散而瘥一婦人患前症時或腿膝作痛脈浮數按之遲緩此元氣虛而風濕所乘用獨活寄生湯頓愈又用八珍湯而安一婦人因怒患前症寒熱往來口苦不食晡熱內熱余以為肝火血虛先用小柴胡山梔頓愈又用加味逍遙散而瘳一婦人患前症寒熱頭痛殊類傷寒此寒邪之症用檳蘇敗毒散而安又用補中益氣調補而愈骨碎補散治陽氣虛弱外寒所侵腰腳疼痛腹脅拘急骨碎補炒萆薢酒炒牛膝酒炒桃仁去皮尖海桐皮當歸酒拌桂心檳榔各五分赤芍藥炒附子炮川芎枳殼麩炒各二分薑棗水煎養腎散治腎經虛弱風寒所侵以致腰腳疼痛不能步履蒼朮一兩乾蠍三錢天麻草烏頭炮去皮尖黑附子炮去皮臍各二錢上為末每服一錢酒調服麻痹少時隨愈孕婦勿服此治風寒傷腎膀胱虛寒之良藥用之得宜殊有神效附方五積散方見後檳蘇敗毒散方見二十四卷第十論補中益氣湯方見二十四卷第六論十補丸六味丸八味丸三方見二十四卷第十一論小續命湯方見前獨活寄生湯方見前羚羊角散方見前加味逍遙散八珍湯二方見二十四卷第四論小柴胡湯方見二十四卷第二論婦人風邪腳氣方論第九婦人腳氣乃肝脾腎三經或胞絡氣虛為風毒所搏而患蓋胞絡屬於腎主於腰腳三經絡脈起於足中指若風邪客於足從下而上動於氣故名腳氣皆由六淫七情或産後或經行風毒相搏其症或頭痛身熱肢節作痛或大便祕結小便小利或腳膝緩弱足脛腫滿或腰膝枯細忪悸嘔逆或小腹不仁舉體轉筋或胸滿氣急遍體痠痛用香蘇散加檳榔生薑若寒中三陽必冷用小續命湯若暑中三陰必熱用小續命湯去附子大躁者紫雪最良無紫雪以百合薄荷煎冷水調服大便祕用脾約丸麻仁丸三和散補藥淋洗皆大禁也愚按嚴用和先生云前症初患不覺因風邪乃發先從腳起或緩弱痹痛不能行履或兩脛腫滿或足膝細小或心中怔忡或小腹不仁或舉體轉筋或見食作嘔或胸滿氣急遍體痠痛其脈浮而弦者因於風濡而弱者因於濕洪而數者因於熱遲而澀者因於寒男子由於腎氣虧損女子血海虛弱用八味丸若飲食停滯臀腿痠脹浮腫作痛此脾氣下陷用六君子少加柴胡升麻不應須用八味丸若發熱口渴月經不調兩腿無力此足三陰血虛火燥用六味八味二丸兼服前症西方之人多患之因素食乳酪脾胃壅滯脛足腫滿至於南方亦有因膏粱厚味濕熱下注而患者故古人謂之壅疾所用之方多疏通發散之劑然感於房勞過度虧損三陰治法又當以固本為主故六物附子為元氣虛弱寒邪內侵之聖藥所屬各經等方附後附治驗一婦人兩臁赤痛寒熱口苦嘔吐懶食面色青黃或赤此肝木乘脾土用小柴胡湯加山梔升麻茯苓二劑頓愈又用六君子湯加柴胡山梔全愈一婦人飲食勞役兩臁兼腿疼痛或時寒熱余以為脾虛濕熱下陷用補中益氣湯加山梔茯苓半夏治之而痊後復作用六君子湯加柴胡山梔全愈一婦人經行後寒熱晡熱兩腿作痛此肝經血虛也加味逍遙散加山梔治之而愈後因勞日晡內熱或用四物黃柏知母之類前症益甚更加食少作瀉余以為元氣下陷前藥復傷後用六君子湯加補骨脂二劑調補脾胃而瀉止食進又用補中益氣湯升舉元氣而痊大腹皮散治腳氣肢節煩疼心神壅悶或頭暈喘嗽不食大腹皮紫蘇木通桑白皮炒羌活荊芥赤芍藥炒青皮木瓜不犯鐵器獨活各五分枳殼麩炒一錢上薑蔥水煎半夏散治腳氣上攻心腹脹滿飲食不下嘔吐不止半夏薑製陳皮人參大腹皮桂心各三分檳榔一錢赤茯苓紫蘇各五分上姜水煎桑白皮飲治兩腳浮腫小便赤澀腹脅脹滿或喘嗽痰湧嘔吐不食桑白皮炒郁李仁去皮赤茯苓各一錢木香防己酒拌大腹皮紫蘇子炒木通去節檳榔青皮各五分上姜水煎附方大黃左經湯治四氣乘注足陽明經以致臁腿作痛或足脛赤腫嘔吐不食大小便祕結或惡食喘急自汗等症細辛茯苓羌活大黃煨甘草炙前胡枳殼麩炒厚朴薑製黃芩炒杏仁去皮尖等分上每服五錢薑棗水煎麻黃左經湯治風寒暑濕乘注足太陽經以致腰足攣痹肢節重痛或憎寒發熱無汗惡寒或自汗惡風頭痛麻黃乾葛細辛白朮茯苓防己酒拌桂枝羌活甘草炙防風上每服半兩薑棗煎服半夏左經湯治足少陽經為風寒暑濕乘注以致惡寒發熱腰腿疼痛或頭目眩暈嘔吐不食或熱悶心煩腿痹不隨半夏薑製乾葛細辛白朮麥門冬去心茯苓桂枝防風乾薑炮黃芩炒小草甘草炙柴胡上每服半兩薑棗水煎熱悶加竹瀝喘急加杏仁桑白皮六物附子湯治四氣乘於足太陰經以致骨節煩疼四肢拘急自汗短氣小便不利或手足浮腫附子炮桂防己各四錢甘草炙二錢白朮茯苓各二錢上每服半兩姜水煎換腿丸治足三陰經為風寒暑濕之氣所乘發為攣痹緩縱或上攻胸背下注腳膝疼痛發熱行步艱難薏苡仁南星石楠葉石斛檳榔萆薢酒拌川牛膝酒浸羌活防風木瓜各四兩黃耆炒當歸酒拌天麻續斷酒炒各一兩上為末酒糊丸如桐子大每服五十丸鹽湯下五積散治風寒所傷以致腳氣疼痛或寒熱拘急嘔吐不食等症當歸酒拌芍藥炒川芎炮姜人參茯苓陳皮桔梗炒厚朴姜炒白芷蒼朮半夏薑製肉桂麻黃甘草各五分上薑棗水煎當歸拈痛湯治濕熱為病肢節煩疼肩背沉重胸膈不利或兼遍身作疼足脛腫痛不可忍者或濕熱流注下部瘡瘍赤腫羌活人參苦參酒製升麻乾葛蒼朮各一錢甘草炙黃芩酒炒當歸茵陳酒製各五分防風知母酒炒澤瀉豬苓白朮各四分上水煎服紫蘇子湯治腳氣上攻陰陽交錯清濁不分上重下虛中滿喘急嘔吐自汗無復紀律紫蘇子微炒半夏薑製各二兩前胡厚朴薑製當歸酒拌甘草炙桂心陳皮上每四錢入薑棗煎服還少丹方見二十三卷第四論六味丸八味丸二方見二十四卷第十一論小柴胡湯方見二十四卷第二論加味逍遙散方見二十四卷第四論六君子湯補中益氣湯方見二十四卷第六論
