body:
  text: 卷十四妊娠中風方論第一論曰四時八方之氣為風也常以冬至之日候之若從其鄉來者長養萬物否則名為虛邪賊害萬物體虛中之客於皮膚則頑痹不仁入於筋脈則攣急喎僻若兼濕熱則弛縱痿軟若入臟腑氣隨所傷經絡而為諸病妊娠中之必須早治庶免墮貽之患愚按病機機要云風木為熱熱勝則風動宜以靜勝其躁是亦養血也治法須少汗亦宜少下多汗則虛其衛多下則損其榮雖有汗下之形而有中臟中腑之分中腑者多著四肢則脈浮惡寒拘急不仁中臟者多著九竅則唇緩失音耳聾鼻塞目瞀便祕中腑者宜汗之中臟者宜下之表裡已和宜治在經當以大藥養之此中見之要法妊婦患之亦當以此法治之而佐以安胎之藥仍參三卷首論主治防風散治妊娠中風卒倒口噤肢強或痰氣上升防風桑寄生葛根各五分家菊花細辛防己秦艽當歸桂心茯神甘草羚羊角鎊各三分上水煎入竹瀝半合服白朮酒治妊娠中風口噤不語白朮一兩半獨活一兩黑豆一合炒上酒煎分四服灌之得汗即愈補遺治妊娠中風排風湯續命湯參蘇湯加羌活風引湯皆可選用方見第三卷中風類妊娠風痙方論第二論曰妊娠體虛受風而傷足太陽經遇風寒相搏則口噤背強甚則腰反張名之曰痙須臾自醒良久復作又名子癇子冒當審察其因而治之愚按前症若心肝風熱用鉤藤湯肝脾血虛加味逍遙散肝脾鬱怒加味歸脾湯氣逆痰滯紫蘇飲肝火風熱鉤藤散脾虛痰滯二陳薑汁竹瀝若兼症相雜當參照子煩門附治驗一妊婦出汗口噤腰背反張時作時止此怒動肝火也用加味逍遙散漸愈又用鉤藤散而止更以四君加鉤藤山梔柴胡而安一妊婦因怒忽仆地良久而蘇吐痰發搐口噤項強用羚羊角散漸愈更用鉤藤散始痊又用歸脾湯而安羚羊角散治妊娠冒悶角弓反張名曰子癇風痙羚羊角鎊獨活酸棗仁炒五加皮薏苡仁炒防風當歸酒浸川芎茯神去木杏仁去皮尖各五分木香甘草炙各二分上薑水煎附方鉤藤湯方見十二卷第四論加味逍遙散加味歸脾湯二方見二十四卷第四論紫蘇飲方見十二卷第八論鉤藤散方見四卷第四論二陳湯方見二十四卷第五論四君子湯方見二十四卷第六論妊娠瘈瘲方論第三竊謂瘈者筋脈急而縮也瘲者筋脈緩而伸也一縮一伸手足相引搐弱不已大抵與嬰孩發搐相似謂之瘈瘲也此症多屬風蓋風主搖動駱龍吉云心主脈肝主筋心屬火肝屬木火主熱木主風風火相熾則為瘈瘲也治法若因風熱用鉤藤湯加柴胡山梔黃芩白朮以平肝木降心火養氣血若風痰上湧加竹瀝南星半夏若風邪急搐加全蠍殭蠶虧損氣血用八珍湯加鉤藤山梔為主若無力抽搐戴眼反折汗出如珠者肝氣絶也皆不治附治驗方藥一妊婦四肢不能伸服祛風燥血之劑遺屎痰甚四肢抽搐余謂肝火血燥用八珍湯加炒黑黃芩為主佐以鉤藤湯而安後因怒前症復作小便下血寒熱少寐飲食少思用鉤藤散加山梔柴胡而血止用加味逍遙散寒熱退而得寐用六君子湯加芍藥鉤藤飲食進而漸安八珍湯方見二十四卷第四論六君子湯方見二十四卷第六論妊娠鬼胎方論第四夫人臟腑調和則血氣充實精神健旺若榮衛虛損精神衰弱妖魅之精乘之亦如懷妊之狀故曰鬼胎也愚按前症因七情脾肺虧損氣血虛弱行失常道衝任乖違而致之者乃元氣不足病氣有餘也若見經候不調就行調補庶無是症治法以補元氣為主而佐以雄黃丸之類行散之若脾經鬱結氣逆者用加味歸脾湯調補之若脾虛血不足者用六君芎歸培養之肝火血耗者用加味逍遙散滋抑之肝脾鬱怒者用加味歸脾逍遙二藥兼服腎肝虛弱者用六味地黃丸附治驗一婦人經閉八月肚腹漸大面色或青或黃用胎症之藥不應余診視之曰面青脈澀寒熱往來肝經血病也面黃腹大少食體倦脾經血病也此鬱怒傷脾肝之症非胎也不信乃用治胎散之類不驗余用加味歸脾逍遙二藥各二十餘劑諸症稍愈彼欲速效別服通經丸一服下血昏憒自汗惡寒手足俱冷嘔吐不食余用人參炮薑二劑漸愈又用十全大補湯五十餘劑而安雄黃丸治鬼胎瘀血腹痛雄黃鬼臼去毛莽草丹砂細研巴豆去油皮獺肝炙黃各半兩蜥蜴一枚炙黃上為末蜜丸桐子大每服二丸空心溫酒下日二服或下如蛇蟲之類其病乃除治鬼胎及血氣痛不可忍斑蟊去頭翅足制延胡索炒各等分上為末以溫酒調下半錢以下穢物為度附方加味歸脾湯加味逍遙散十全大補湯三方見二十四卷第四論六君子湯方見二十四卷第六論六味丸方見二十四卷第十一論妊娠傷寒方論第五夫時令嚴寒體虛所傷即成傷寒輕者灑淅惡寒翕翕發熱微咳鼻塞數日而愈重者頭疼體痛寒熱交作久而不愈者多致傷胎也愚按前症為害匪輕當審經絡表裡而治之不可輕忽加減四物湯治妊婦腹痛或月事不調胎氣不安産後血塊或亡血過多或惡露不下當歸川芎白芍藥炒熟地黃各一兩上每服四五錢水煎日二三服下血加艾葉阿膠虛熱口乾加栝蔞根麥門冬惡血腹痛加當歸芍藥血崩血淋加熟地蒲黃因熱生風加川芎柴胡頭暈項強加柴胡黃芩大便祕結加大黃桃仁嘔吐噁心加白朮人參虛煩不眠加竹葉人參煩躁大渴加知母石膏水停吐逆加豬苓茯苓虛煩傷寒加人參柴胡防風阿膠散治時氣先服此以安胎卻以主藥間服阿膠炙白朮炒桑寄生人參白茯苓上為末等分每服一錢用糯米飲調下日三服前胡湯治傷寒頭痛壯熱肢節煩疼石膏一錢前胡甜竹茹梔子炒黃芩炒大青知母各五錢上用蔥白水煎服蘇木湯治傷寒時行灑淅寒振或兼噦者赤芍藥橘紅黃芩炒黃連甘草蘇木各五分上用水煎服汗出即瘥如胎不安兼服阿膠湯黃龍湯治妊婦寒熱頭痛默默不食脅痛嘔痰及産後傷風熱入胞宮寒熱如瘧或經水適來勞復熱不解散柴胡二錢黃芩炒人參甘草各一錢上水煎服柴胡石膏湯治頭痛惡寒身熱拘急口乾柴胡二錢甘草一錢石膏三錢上用薑水煎服氣虛加人參枳實散治傷寒四日至六日腹脹少食腰疼體重枳實炒三錢陳皮一錢麥門冬一錢半上用生薑蔥白水煎服旋覆花湯治傷寒頭目旋疼壯熱心躁旋覆花赤芍藥甘草各五分前胡石膏各一錢白朮人參麻黃去根節黃芩各三分上用薑水煎服麥門冬湯治傷寒壯熱嘔逆頭疼胎氣不安人參石膏各一錢半前胡黃芩各五分葛根麥門冬各一錢上薑棗竹茹一分用水煎服梔子大青湯治發斑變黑尿便血升麻梔子各一錢大青杏仁黃芩各一錢上用蔥白三寸水煎服白朮湯治傷寒煩熱頭痛胎動或時吐逆不食白朮橘紅麥門冬人參前胡赤茯苓川芎甘草半夏各五分上用生薑竹茹一分水煎服良方白朮散治傷寒白朮黃芩炒各二錢上用薑棗水煎服若四肢厥逆陰症也不可用芎蘇散治外感風寒壯熱頭疼心胸煩悶紫蘇葉川芎白朮白芍藥麥門冬去心陳皮乾葛各五分甘草炙三分上用生薑蔥白水煎參蘇飲去木香治證同前方見六卷第十二論妊娠時氣方論第六論曰四季之間非其時而有其氣謂春寒夏冷秋熱冬暖之不正也所感者不拘長少其症相類故云時氣妊娠患之重者多致傷胎愚按前症與前傷寒互相主治秦艽散治時氣五六日不得汗口乾飲水狂言嘔逆秦艽柴胡各五分石膏一錢犀角赤茯苓前胡甘草葛根升麻黃芩各四分上用淡竹茹一分水煎服葛根飲子治時氣煩熱口乾頭熱乾葛麻黃去節根各半兩石膏一兩豉一合白米半合梔子二十粒蔥白二莖上用水煎分三服汗出為效消熱飲子治時氣六七日大小便不利芒硝一兩細研葵子二兩上如前煎服以利為效芒硝即朴硝人參敗毒散方見二十四卷第十論妊娠熱病方論第七冬時觸冒嚴寒即病為傷寒藏於肌骨夏至發為暑病即熱症也妊娠患之多致墮胎熱病與中暑相似但熱病者脈實中暑者脈虛治當審察不可概施愚按此症與前後三症同治治妊娠熱病頭痛嘔吐煩悶人參一方無竹茹葛根各一兩蘆根二兩知母三兩麥門冬去心一兩半上每服四錢連根蔥白三寸水煎梔子仁飲治熱病發斑黑色小便如血氣喘急胎欲落梔子升麻石膏生地黃各二兩黃芩大青各一兩上每服半兩蔥白七寸豉四十九粒水煎大黃飲治熱病六七日大小便祕澀大黃微炒石膏各一兩知母前胡赤茯苓各三分梔子甘草黃芩各半兩上每服五錢生地黃一分煎服又方伏龍肝細研每服一錢水調下外用水調塗臍下又方葛根煮汁時服一盞補遺蘆根湯治熱病頭疼心煩嘔吐知母四兩青竹茹三兩上每服五錢生蘆根一握糯米一撮水煎梔子五物湯治妊婦傷寒壯熱頭痛梔子前胡知母黃芩一面石膏四兩上每服五錢用水煎服升麻六物湯治傷寒斑黑溺血升麻梔子各三兩大青杏仁黃芩上每服五錢蔥頭水煎妊娠傷寒熱病防損胎方論第八論曰非節之氣傷於妊娠熱毒侵損胞胎若不早治多致墮胎漏血則子母之命亦不能全矣愚按前症當分察六經為主而參於前後方論治妊娠傷寒身痛壯熱蔥白切一升前胡葛胡石膏各一分青黛六分升麻八分梔子十二個上用水煎分三服治妊娠傷寒大小便祕結前胡十分大黃石膏各二十分梔子仁十枚知母黃芩茯苓生薑各八分上用水煎分三服治妊娠傷寒發斑忽黑小便如血胎欲落梔子升麻各四兩青黛二兩生地黃二十枚石膏八兩黃芩三兩蔥白切一升上用水煎分三服忌熱物又用井中泥塗心下干則易二方出本事再録有效補遺治妊娠熱病先以白朮散安胎方見前妊娠熱病胎死腹中方論第九論曰熱病以致胎死不能出者但服黑神散胎自下矣愚按陳無擇先生曰前症當視産母若面赤舌青知其子死面青舌赤知母死子生唇青吐沫子母俱死若雙胎或一死一活用黑神散竊謂前症宜補助産母使其胎自下黑神散恐其大熱不宜輕用果一胎已死者用平胃散朴硝水銀下之最為穩當庶不錯傷生者平胃散方見後黑神散又名烏金散靈苑方名肉桂散桂心當歸芍藥甘草炙乾薑炒生地黃各一兩黑豆炒去皮二兩附子炮去皮臍半兩上為末每服二錢空心用溫酒調下補遺胎死用紅花酒煮汁飲二三碗又方伏龍肝為末溫酒調下二錢白湯亦可又方朴硝末童子小便和熱酒調下三錢立出妊娠瘧疾方論第十論曰妊娠病瘧乃夏傷於暑客於皮膚至秋而發陽盛則熱陰盛則寒陰陽相離寒熱俱作其發晏者由風邪客於風府循膂而下衛氣至一日一夜常大會於風府故發日晏與早者衛氣之行風府日下一節二十一日下至尾骶二十二日入脊內上注於俠衛之脈其行九日出缺盆其氣既止故發更早其間日發者風邪內搏五臟橫連募原其道遠其氣深其行也遲不能日作也妊娠而發多傷於胎愚按前症因脾胃虛弱飲食停滯或外邪所感或鬱怒傷脾或暑邪所伏審系飲食停滯用六君子加桔梗蒼朮藿香外邪多而飲食少用藿香正氣散外邪少而飲食多用人參養胃湯勞傷元氣用補中益氣湯若鬱怒所傷用小柴胡兼歸脾湯若木侮土久而不愈用六君子為主佐以安胎藥乃參三陰三陽經而治之附治驗一婦人因怒發瘧舉發無期久而不已胸腹不利飲食少思吞酸吐痰用六君子加柴胡山梔二十餘劑尋愈但晡熱少食又用四君子加柴胡升麻為主佐以逍遙散而痊一妊娠瘧久不已噯氣下氣胸腹膨脹食少欲嘔便血少寐此屬肝脾鬱怒用歸脾湯加柴胡山梔漸愈又用六君子湯加柴胡山梔升麻而愈一妊婦患瘧已愈但寒熱少食頭痛晡熱內熱此脾虛血弱也用補中益氣湯加蔓荊子頭痛頓止又用六君子湯加芎歸飲食頓進再用逍遙散加參術而寒熱愈七寶散治瘧疾一日一發或一日兩發或間日一發常山厚朴薑製青皮陳皮並去白甘草炒檳榔草果等上每服半兩酒水各一碗煎至一碗去渣露一宿發時面東溫服良久再服一妊婦先寒後熱六脈浮緊用前散一劑而愈人參養胃湯治妊娠瘧疾寒多熱少或但寒不熱頭痛惡心身痛面色青白脈弦遲者又有驅邪散治證亦同方見七卷第十八論清脾湯治妊婦瘧疾寒少熱多或但熱不寒口苦舌乾大便祕澀不進飲食脈弦數者青皮厚朴薑製白朮炒草果茯苓半夏炒柴胡甘草炙各五分上用薑水煎附方交加散治食瘧神效肉豆蔻二枚一生一煨草豆蔻二個一生一煨甘草二錢半炒半生厚朴二錢半炒半生生薑二兩半生半煨上用薑水煎發日五更服仲景白虎加桂枝湯治溫瘧知母六錢桂枝黃芩各一錢栝蔞根二錢甘草炙牡蠣乾薑各一錢上用水煎服汗出即愈此少陽經藥也桂枝羌活湯治瘧處暑以前頭痛脈浮惡風有汗桂枝羌活防風甘草各一錢五分上水煎發服吐加半夏曲麻黃羌活湯治症如前但惡寒無汗麻黃去節羌活防風甘草各半兩上如前服加法同二方太陽經藥也白芷湯治瘧身熱目痛熱多寒少脈長先以大柴胡下之微利為度餘熱不盡當服此湯白芷一兩知母一兩七錢石膏四兩上粗末依前服陽明經藥也桂枝芍藥湯治瘧寒熱不論先後此太陽陽明合病寒熱作則必戰經曰熱甚而動也發熱則必汗泄經曰汗出不愈知內熱也乃陽盛陰虛之證此湯主之否則久而傳於陰經矣桂五分黃耆炒知母石膏芍藥各二錢上粗末水煎此太陽陽明經藥也桂枝黃芩湯如服前藥轉甚三陽合病也宜此和之柴胡一錢五分黃芩人參甘草各八分半夏石膏知母各五分上每粗末依前服如外邪已解而內未已再服下藥從卯至午發大柴胡下之從午至酉發邪氣在內也大承氣下之從酉至子發或至寅發邪氣在血也桃仁承氣湯下之微利後更以小柴胡湯徹其邪氣按此太陽陽明少陽經藥也以上諸方並系發風寒暑熱之氣自外而入中於三陽之經者也桂枝石膏湯治瘧疾隔日先寒後熱寒少熱多桂枝五錢石膏一兩五錢知母一兩五錢黃芩一兩上分三服水煎此太陽陽明經藥也隔日發者邪氣所舍深者也麻黃黃芩湯治瘧疾如前症而夜發者麻黃一兩去節甘草炙二錢桃仁二十個去皮尖黃芩五分桂二錢上依前服桃仁味苦甘辛肝者血之海血驟則肝氣燥經所謂肝苦急急食甘以緩之故桃仁散血緩肝謂邪氣深遠而入血故夜發乃陰經有邪此湯發散血中風寒治風暑深入陰分乃血受病邪氣所舍尤深者也麻黃桂枝桃仁等乃太陽經血藥非三陰經藥也附方四君子湯六君子湯補中益氣湯三方見二十四卷第六論藿香正氣散方見二十一卷第十論人參養胃湯方見七卷第十八論小柴胡湯方見二十四卷第二論逍遙散加味歸脾湯二方見二十四卷第四論妊娠霍亂方論第十一夫飲食過度觸冒風冷陰陽不和清濁相干謂之霍亂其間或先吐或腹痛吐利是因於熱也若頭痛體疼發熱是挾風邪也若風折皮膚則氣不宣通而風熱上衝為頭痛若風入腸胃則泄利嘔吐甚則手足逆冷此陽氣暴竭謂之四逆妊娠患之多致傷胎也愚按前症若因內傷飲食外感風寒用藿香正氣散若因飲食停滯用平胃散果脾胃頓傷陽氣虛寒手足逆冷者須用溫補之劑治當詳審毋使動胎也附治驗一妊婦霍亂已止但不進飲食口內味酸泛行消導寬中余曰此胃氣傷而虛熱也當用四君子湯彼不信乃服人參養胃湯嘔吐酸水其胎不安是藥復傷也仍與四君子湯俾煎熟令息者先嗅藥氣不作嘔則呷少許恐復嘔則胎為釣動也如是旬余而愈人參散治脾胃虛寒霍亂吐瀉心煩腹痛飲食不入人參厚朴薑製橘紅各一錢當歸乾薑炮甘草炙各五分上用棗水煎服人參白朮散治脾胃虛弱吐瀉或吐瀉作渴不食白朮茯苓人參甘草炒木香藿香各五分乾葛一錢上用水煎服吐甚加生薑汁頻飲之縮脾飲解伏熱除煩渴消暑毒止吐瀉宜沉冷頻服草果仁四兩烏梅肉三兩甘草炒三兩半上每服半兩用薑十片水煎木瓜煎治吐瀉轉筋悶絶吳茱萸湯泡七次生薑切各一分木瓜木刀切兩半上每服二三錢用水煎治霍亂其效神速一方有黃連無扁豆仍與第二論通用妊婦霍亂腹痛四肢冷逆自汗脈細理中湯治之傷食加陳皮寒甚脈欲絶陰症悉具加炮附子方見二十卷竹茹湯治霍亂熱渴脈數見七卷嘔吐門附方藿香正氣散方見二十一卷第十論平胃散方見七卷第十八論四君子湯方見二十四卷第六論人參養胃湯方見七卷第十八論五苓散方見二十一卷第十論理中丸方見二十卷第八論香薷飲方見七卷第二論
