是也凡癲癇風痙破傷風三症皆能瘈瘲但癲癇則仆地不省風痙瘈瘲則角弓反張破傷風瘈瘲則有瘡口竊謂瘓者屬肝經風熱血燥或肝火妄動血傷瘲者屬肝經血氣不足或肝火汗多亡血以致手足伸縮不已抽搐不利若因風熱血燥用羚羊角散加鉤藤鉤山梔若肝火妄動用加味四物湯加鉤藤鉤山梔若肝經血氣不足用八珍湯加鉤藤鉤山梔若肝火亡血用加味逍遙散加鉤藤鉤山梔如不應須用六味丸以補腎水生肝木為主佐以前劑治之若其脈長弦者是肝之本脈也則易治其脈短澀者是肺金克肝木也則難治其面色青中見黑者是水生木也當自愈青中見白者是金剋木也必難愈附治驗方藥一婦人素口苦月經不調或寒熱妊娠五月兩臂或拘急或緩縱此肝火傷血所致也用四物加柴胡山梔丹皮鉤藤鉤治之而愈一妊婦因怒寒熱頸項動掉四肢抽搐此肝火血虛風熱用加味逍遙加鉤藤鉤數劑而痊附方羚羊角散方見十四卷第二論加味四物湯方見二十四卷第六論八珍湯加味逍遙散二方見二十四卷第四論六味丸方見二十四卷第十一論婦人顫振方論第八新附黃帝曰人之顫者何氣使然岐伯曰胃氣不實則諸脈虛諸脈虛則筋脈懈墮筋脈懈墮則行陰用力不復故為顫因其所在補分肉間醫學綱目云顫振與瘈瘲相類瘈瘲則手足牽引而或伸或屈顫振則但顫動而不伸屈也胃虛有痰用參術以補氣茯苓半夏以行痰如實熱積滯用張子和三法愚謂顫振者掉眩也易曰鼓萬物者莫疾乎風鼓之為言動也大抵掉眩乃風木之搖運也諸風掉眩皆屬於肝治法若肝木實熱用瀉青丸肝木虛熱用六味丸肺金克肝木用瀉白散肝木虛弱用逍遙散加參朮鉤藤鉤脾血虛弱用六君子加芎歸鉤藤鉤胃氣虛弱用補中益氣湯加鉤藤鉤若産後顫振乃氣血虧損虛火益盛而生風也切不可以風為論必當大補斯無誤矣附治驗方藥一婦人性善怒發熱經水非過期則不及肢體倦怠飲食少思而顫振余以為脾氣不足肝經血少而火盛也午前以調中益氣湯加茯苓貝母送六味丸午後以逍遙散送六味丸兩月餘而愈一婦人身顫振口妄言諸藥不效余以為鬱怒所致詢其故蓋為素嫌其夫而含怒久矣投以小柴胡湯稍可又用加味歸脾湯而愈附方海藏愈風湯治産後一切失血過多及汗後中風搐搦方見十九卷第十二論交加散治瘈瘲或顫振或産後不省人事口吐痰涎當歸荊芥穗等分上為細末每服三錢水一盞酒少許煎至七分灌下咽即有生理增損柴胡湯治産後或經適斷致手足牽搐咬牙昏冒異症柴胡八錢黃芩炒四錢半夏泡三錢石膏四錢知母二錢黃耆炒五錢甘草炙二錢上為粗末每服半兩姜五片棗四枚水煎溫服本事青鹽丸治肝腎虛損腰膝無力顫振軃曳茴香末三兩菟絲子末四兩乾山藥末二兩青鹽一兩上先將菟絲子洗淨無灰酒浸曬七日冬天近火煨炙乾另為細末和勻酒糊丸梧子大每服五七十丸溫酒或鹽湯下常服壯筋力進飲食一婦人素患足軃曳久服此藥履地如故本事星附散治中風能言而手足軃曳脈虛浮而數天南星半夏二味薄切片薑汁浸透黑附子白附子炮川烏炮白殭蠶炒沒藥人參白茯苓各等分上為粗末每服二錢酒水各一盞同煎至八分去滓熱進三二服汗出即瘥在桐廬有患此症用前藥三服得汗手足即能舉物三因獨活散治氣虛感風或驚恐相乘肝膽受邪使上氣不守正位致頭招搖手足顫掉漸成目昏獨活地骨皮細辛芎藭菊花甘味者防風去叉甘草炙等分上為粗末每服三錢水盞半煎至一盞去滓煎取清汁六分入竹瀝少許再煎一二沸食後溫飲日二服世傳茯苓丸治手臂抽牽或戰掉不能舉物服此藥立愈又治臂痛如神方見後並注兼治之法附方補中益氣湯方見二十四卷第六論六味丸方見二十四卷第十一論加味歸脾湯逍遙散二方見二十四卷第四論小柴胡湯方見二十四卷第二論婦人風寒臂痛方論第九婦人臂痛或筋脈攣急遇寒則劇者由肝氣虛弱風寒客於經絡故其脈緊細宜用柏子仁丸舒筋湯若臂痛而不能舉或痛無定處此脾虛邪氣相搏中脘伏痰故其脈沉細如此宜用茯苓丸控涎丹主之愚按前症若肝血虛用加味逍遙散中氣虛用補中益氣湯血氣俱虛用八珍湯風熱血燥用秦艽地黃湯脾腎虛寒用柏子仁丸脾胃實熱用茯苓丸水不能生木用六味丸逍遙散怒動肝火用小柴胡加川芎當歸眩暈晡熱用四物柴梔丹皮晡熱月經不調用加味逍遙散食少體倦無寐盜汗用加味歸脾湯附治驗先太宜人遍身作痛筋骨尤甚不能屈伸口乾目赤頭眩痰壅胸膈不利小便赤短夜間殊甚遍身作癢如蟲行此屬肝腎氣虛而熱也用六味地黃丸料加山梔柴胡而愈柏子仁丸柏子仁二兩熟地黃自制二兩茯苓枳殼去穰麩炒覆盆子炒五味子杵炒附子炮石斛酒炒鹿茸酥炙酸棗仁炒桂心沉香黃耆各一兩蜜水炙一方等分上為末煉蜜丸桐子大每服三十丸空心溫酒下舒筋湯治風寒所傷肩臂作痛及腰下作痛又名五痹湯片薑黃一錢甘草炒羌活各三分白朮海桐皮當歸赤芍藥各五分上水煎服茯苓丸治脾氣虛弱痰邪相搏停伏中脘以致臂內筋脈攣急而痛茯苓二兩半夏薑製二兩枳殼半兩制風化朴硝一兩上為末薑汁糊丸桐子大每服二十丸食後薑湯下控涎丹凡人忽胸背手足頭項腰胯牽痛不定或頭痛昏倦痰唾稠黏喉中鋸聲手腳重痹此痰涎伏於胸膈也宜此治之甘遂去心大戟去皮真白芥子各等分上為末糊丸桐子大臨臥薑湯下五七丸痰盛服十丸白芥子散治臂痛牽引背脾或輟或作由榮衛循行失度痰滯經絡或似癱瘓真白芥子木鱉子各三兩麩炒沒藥另研桂心木香各半兩上為末每服一錢溫酒下愚按前三方脾氣虛弱者必佐以六君子湯中氣虛弱者佐以補中益湯血虛者必佐以八珍湯脾氣鬱滯者必佐以歸脾湯肝經怒氣者必佐以逍遙散若專用前方治之胃氣虛弱病氣益甚不可不謹流氣飲治七情氣滯胸脅悶痞咽喉不利嘔喘面浮二便不調或氣攻肩背脅肋作痛或腳氣喘急腹脹便閉元氣充實者宜用此藥慎之紫蘇葉黃耆炒青皮去白當歸半夏薑製烏藥芍藥炒茯苓桔梗防風各五錢川芎陳皮各七錢五分枳實麩炒木香二錢五分甘草炙五分大腹子一兩薑製上每服半兩薑棗水煎服交加散方見前四物湯治血滯中風血虛手足不遂如臂痛加紅花煎方見前交加散加木瓜牛膝治冷痹肩臂作痛即人參敗毒和五積散烏藥順氣散加羌活木瓜治外邪氣滯筋骨作痛或痰氣不利附方秦艽地黃湯治肝膽經風熱血燥肩臂疼痛或筋脈引急或時牽痛其內症發熱或寒熱晡熱月經不調或肢體痠痛等症秦艽熟地黃自制當歸各一錢川芎芍藥牡丹皮白朮茯苓各一錢半鉤藤鉤一錢柴胡甘草炙各二分上水煎服逍遙散加味逍遙散加味歸脾湯八珍湯四方見二十四卷第四論六味丸方見二十四卷第十一論小柴胡湯方見二十四卷第二論四物湯補中益氣湯二方見二十四卷第六論婦人賊風偏枯方論第十論曰賊風偏枯其狀半身不遂肌肉枯瘦骨間作痛經云汗出偏沮使人偏枯如樹木一枝津液不到則枯槁被風所害古人有云醫風先醫血血行風自滅治法當用大八風湯增損茵芋酒續斷湯以養其血則風自祛矣愚按醫風先醫血此論得之大抵此症多因胎前産後失於調養以致精血乾涸肝木枯槁治法當滋其化源考之生氣通天論曰風客淫氣精乃亡邪傷肝也陰陽應象大論曰風氣通於肝風搏則熱盛熱盛則水乾水乾則氣不榮故精乃亡此風病之所由作也附治驗一婦人性善怒常自汗月經先期余以為肝火血熱不信乃泛用降火之劑反致月經過期復因勞怒口噤呻吟肢體不遂六脈洪大面目赤色用八珍麥門五味山梔丹皮數劑漸愈兼用逍遙散六味丸各三十餘劑全愈大八風湯治中風偏枯失音不語時復恍惚或昏憒發熱當歸杏仁去皮尖麩炒黃甘草炒桂心乾薑炮各二兩五味子杵炒升麻各二兩川烏炮去皮尖黃芩炒芍藥炒獨活防風川芎麻黃去節秦艽石斛去根酒浸人參茯神去木石膏黃耆炒紫菀各一兩大豆三兩去皮炒上每服五錢水煎服續斷湯當歸三兩陳皮芍藥炒細辛各一兩生地黃二兩續斷酒浸炒早每服五七錢水煎臟寒下痢加熟附子一兩全生虎骨散治半身不遂肌肉乾瘦忌用麻黃髮汗恐津液枯竭惟當潤筋養血消風當歸二兩赤芍藥續斷酒浸炒白朮藁本虎骨炙各五兩烏蛇肉炙半兩上為末每服二錢酒調骨痛加生地一兩自利加天雄半兩虎脛骨酒治中風偏枯四肢不隨一切風痹筋脈攣拳石斛石楠葉防風虎脛骨炙當歸茵芋葉杜仲炒牛膝酒浸炒續斷酒浸炒芎藭巴戟去心狗脊各一兩上以絹囊盛藥用酒一斗浸十日每服一盞溫飲附方八珍湯逍遙散二方見二十四卷第四論六味丸方見二十四卷第十一論婦人偏風口喎方論第十一論曰偏風口喎者因體虛受風而入足陽明胃經蓋足陽明之經上夾於口風乘之其筋偏急故也愚按前症當參本卷首論治之附治驗方藥與前諸治驗參看一婦人懷抱鬱結筋攣骨痛喉間似有一核服烏藥順氣等藥口眼歪斜臂難伸舉痰涎愈多內熱晡熱食少體倦余以為鬱火傷脾血燥生風用加味歸脾湯二十劑形體漸健飲食漸進又用加味逍遙散十餘劑痰熱少退喉核少消更用升陽益胃湯數劑諸症漸愈但臂不能伸此肝經血少而筋攣耳用六味地黃丸以滋腎水生肝血而愈附方升陽益胃湯治脾胃虛弱肢體怠惰或體重節痛口舌乾渴飲食無味大便不調小便頻數飲食不消兼見肺病灑淅惡寒慘淒不樂乃陽氣不和也羌活獨活防風各五錢柴胡白朮茯苓渴者不用澤瀉各二錢人參黃連炒陳皮各四錢上每服三五錢薑棗水煎早溫服如小便愈而病益加是不宜利小便也當少減茯苓澤瀉加味歸脾湯加味逍遙散二方見二十四卷第四論六味丸方見二十四卷第十一論婦人怔忡驚悸方論第十二夫心藏神為諸臟之主血氣調和則神安靜若勞傷心血外邪乘襲則心神驚悸恍惚憂懼不安用排風湯治之愚按丹溪先生云驚悸者血虛用硃砂安神丸痰迷心竅用定志丸怔忡者屬火屬痰思慮便動者屬虛時作時止者火動也假如病因驚而致驚則神出其舍痰乘而入矣蓋人之所主者心心之所養者血心血一虛神氣不守此驚悸之所由作也治當調養心血和平心氣而已金氏婦暑月赴筵因坐次失序自愧成疾言語失倫兩脈弦數余曰當補脾導痰清熱不信以數巫者噴水咒之而死或謂病既無邪以邪治之何至於死余曰暑月赴筵外受蒸熱辛辣適口內傷鬱熱而況舊有積痰加之愧悶其痰愈盛又驚以法尺益驚其神而氣血不寧噴以注水閉其肌膚而汗不得泄內燔則陰既消而陽不能獨立不死何待故滑伯仁先生云若膽氣虛寒用茯神湯膽氣實熱用酸棗仁丸心氣虛熱用定志膏茯苓補心湯心氣實熱用硃砂安神丸茯苓散附治驗文學歸云橋內月事不及期忽崩血昏憒發熱不寐或謂血熱妄行投以寒劑益甚或謂胎成受傷投以止血亦不效余曰此脾氣虛弱無以統攝故耳法當補脾而血自止用補中益氣加炮姜不數劑而效惟終夜少寐驚悸別服八物湯不效余曰雜矣乃與歸脾湯加炮姜以補心脾遂如初一婦人勞則心跳怔忡寒熱往來用歸脾湯為主佐以八珍湯諸症漸愈又用加味逍遙散寧志丸而安後復作服歸脾定志二藥即愈一婦人患驚悸怔忡日晡發熱月經過期飲食少思用八珍湯加遠志山藥酸棗仁三十餘劑漸愈佐以歸脾湯全愈後因勞發熱食少體倦用補中益氣湯又因怒適月經去血不止前症復作先以加味逍遙散熱退經止又用養心湯治之而痊一婦人驚悸怔忡無寐自汗盜汗飲食不甘怠惰嗜臥用歸脾湯而愈至年餘懷抱鬱結患前症兼衄血便血仍用前湯而愈茯神散治五臟氣血虛弱驚悸怔忡宜用此安神定志茯神去木人參龍齒另研獨活酸棗仁炒各三錢防風遠志去心桂心細辛白薇炒各三錢甘草乾薑炮各三兩上為末每服四五錢水煎服或蜜為丸服茯苓補心湯治心氣不足善悲愁怒衄血面黃五心煩熱或咽喉痛舌本作強茯苓四兩桂心甘草炒各三兩紫石英煅人參各一兩大棗二十枚麥門冬去心三兩赤小豆二十四粒上水七升煎二升半分三服茯神湯治膽氣虛冷頭痛目眩心神恐畏不能獨處胸中煩悶茯神去木酸棗仁炒黃耆炒柏子仁炒白芍藥炒五味子杵炒各一兩桂心熟地黃自制人參甘草炒各半兩上每服五錢姜水煎酸棗仁丸治膽氣實熱不得睡臥神思不安驚悸怔忡茯神去木酸棗仁炒遠志去心柏子仁炒防風各一兩枳殼麩炒半兩生地黃杵膏半兩青竹茹二錢五分上為末煉蜜丸桐子大每服七八十丸滾湯下定志丸治神虛心怯所患同前或語言鬼怪喜笑驚悸人參茯苓各一兩五錢菖蒲遠志去心各一兩上為末蜜丸如前服養心湯治心血虛驚悸怔忡不寧或盜汗無寐發熱煩躁黃耆炒白茯苓茯神去木半夏曲當歸酒拌川芎各半兩辣桂去皮柏子仁酸棗仁炒五味子杵炒人參各三錢甘草炙四錢上每服三五錢薑棗水煎硃砂安神丸治心經血虛頭暈心神驚悸等症硃砂飛過五錢黃連酒洗六錢甘草炙五分生地黃當歸各一錢五分上為末飯糊為丸每服十五丸如一二服不應當服歸脾湯補之治要茯苓散治心經實熱口乾煩渴眠臥不安或心神恍惚茯神麥門冬各一兩五錢通草升麻各一兩二錢半知母一兩大棗十二枚紫菀桂心各七錢五分赤石脂一兩七錢五分淡竹茹五錢上每服一兩水煎補中益氣湯方見二十四卷第六論歸脾湯八珍湯加味逍遙散三方見二十四卷第十論寧志丸方見後婦人失血心神不安方第十三原無論竊謂前症若脾肝鬱熱用加味逍遙散脾肝鬱結用加味歸脾湯脾胃虛弱氣血不足用八珍湯十全大補湯脾肺虛弱氣血不足用補中益氣湯六君子湯痰氣鬱滯用六君桔梗貝母如不應審系氣虛但補脾胃如不應用獨參湯如惡寒發熱屬氣血俱虛內熱晡熱屬血虛作渴面赤是血脫煩躁皆宜甘苦之劑以補陽氣而生陰血經云血脫補氣若用寒涼之降火則誤矣仍審所屬之因而治之寧志膏治失血心神不安言語失常不得安睡等症辰砂另研酸棗仁炒人參白茯苓琥珀另研各五分滴乳香一錢研上為末每服一錢煎棗湯空心調下附方妙香散治心氣不足精神恍惚甘草炒五錢遠志去心炒一兩辰砂別研三錢麝香一錢另研山藥薑汁炙一兩人參五錢木香二錢五分茯苓茯神去木黃耆各一兩桔梗五錢上為末每服二錢溫酒調茯神湯方見前溫膽湯治膽虛痰熱驚悸不眠半夏竹茹枳實麩炒各一兩陳皮生薑四兩甘草炒三兩上每服一兩水煎半夏湯治膽腑實熱精神恍惚寒熱泄瀉或寢汗憎風善太息半夏一錢五分黃芩一錢遠志一錢生地黃二錢秫米一合酸棗仁炒三錢縮砂一錢五分上長流水煎服獨參湯治元氣虛弱惡寒發熱或作渴煩躁痰喘氣促或氣虛卒中不語口噤或痰涎上湧手足逆冷或難産産後不省喘急用好人參二兩或三四兩炮姜五錢一劑水煎徐徐服蓋人參性寒故姜佐之如不應急加炮附子加味逍遙散加味歸脾湯八珍湯十全大補湯四方見二十四卷第四論補中益氣湯六君子湯二方見二十四卷第六論婦人風邪顛狂方論第十四婦人顛狂由血氣虛而風邪所乘若邪並於陰則發狂邪並於陽則發顛夫顛者卒發而意不樂直視仆地吐湧涎沫口喎目急手足撩戾無所知覺良久而蘇狂者少臥不飢自高賢自辨智自貴倨妄笑歌樂妄行不休素問云陽厥狂怒飲以鐵落狂怒出於肝肝屬木鐵落金也以金制木之意一婦人眼見鬼物言語失當循衣直視或作心病治之無效投養正丹二服煎乳香送三生飲立痊愚按前症劉宗厚先生云有在母腹中受驚者或有聞大驚而得者蓋驚則神不守舍舍空則痰涎歸之或飲食失節胃氣有傷痰停胸膈而作當尋火尋痰固元氣若頑痰膠固上膈必先用吐法若在腸胃亦須下之竊謂此症若因元氣虛弱或痰盛發熱等皆是虛象如慢驚症無風可法無痰可逐但補脾胃生氣健旺神智自清痰涎自化若誤用辛散祛逐腦麝之劑必為敗症附治驗一婦人素清苦因驚而癲或用風痰等藥愈甚余用參耆歸術濃煎佐以薑汁竹瀝三斤余方愈仍參十八十九卷狂言譫語乍見鬼神方防風茯神散治風顛啼泣歌笑或心神恐懼或語言失常防風茯神去木獨活人參遠志去心龍齒菖蒲去毛石膏牡蠣煅各一兩秦艽禹餘糧煅桂心各五錢甘草炒三分蛇蛻一條炙上每服五錢水煎服排風湯牛黃清心丸治諸風緩縱不隨言語謇澀痰涎壅盛怔忡健忘或發癲狂二方見本卷首論婦人飛尸血厥方論第十五夫飛尸者遊走皮膚穿行臟腑每發刺痛變作無常遁尸者附骨入肉攻通血脈見尸喪聞哀哭便發風尸者淫濯四肢痛而昏沉得風雪便作沉尸者纏骨結臟內腫心脅發而絞痛遇寒冷便作注尸者舉身沉重精神錯雜時覺昏憒每至節氣便作並宜蘇合香丸治之愚按丹溪云凡人忽手足逆冷肌膚起如米粒頭面青黑精神恍惚或錯言妄誤或牙關緊急或昏寐仆倒吊死問喪入廟登墓多有此病先以蘇合香丸灌之次服調氣散平胃散玉機微義云卒厥飛尸客忤鬼擊口噤用麻黃湯寒厥表熱裡寒則下利清穀食入則吐脈沉手足冷用四逆湯熱厥腹滿身重難轉面垢譫語遺溺手足厥冷自汗脈沉滑用白虎湯若人身忽然不動目閉口噤惡聞聲音眩冒頃時方寤此由出汗過多氣並於血陽獨上而不下氣壅塞而不行耳氣過血遠陰陽復通移時方寤名曰鬱冒亦名血厥宜服白薇湯倉公散附治驗錦衣楊永興舉家避眚有僕沉醉失避者既而神思昏昧遍身青傷各煎金銀藤湯灌之即愈一婦人忽昏憒發譫語自云為前謀賴某人銀兩某神責我將你起解往城隍理問兩腳踝膝臀處皆青腫痛不可忍口稱苦楚次日方蘇痛尚不止用金銀藤兩許水煎服即愈一婦人入古墓患前症以紫金錠灌之即蘇通政餘子華太常汪用之皆因往吊而卒死喪家想即是症蘇合香丸方見本卷第四論白薇湯白薇當歸各一兩人參甘草一錢上每服五錢水煎倉公散治卒中鬼擊心腹如刺下血不省及臥魘齧腳指不覺並諸毒等症皂莢藜蘆雄黃研礬石煅研各等分上每用少許吹入鼻中未嚏再吹以得嚏為度內鼻散治尸厥脈動靜而若死用石菖蒲末吹鼻中仍以桂末安於舌上蘇合香丸亦可硫黃散治尸厥不省四肢逆冷腹中如雷鳴或痰氣不降焰硝半兩硫黃一兩各另為細末上每服三分酒調灌之良久再服即蘇附方麻黃湯治寒厥或傷寒惡風發熱身疼無汗者麻黃六錢桂枝四錢甘草炙二錢杏仁二十一枚炒上作一劑水煎服調氣散治氣厥不省或痰氣上壅及治氣滯胸膈不利白豆蔻丁香檀香木香各二錢藿香甘草炙各六錢砂仁四錢上為末每服二錢入鹽少許沸湯調下四逆湯白虎湯二方見七卷第二論神仙追毒丸又名紫金錠又名太乙丹又名神仙解毒萬病丸能解一切毒或狐貍莽草毒菌河豚疫死牛馬肉毒或蛇犬惡蟲所傷及鬼怪惡瘡等毒或二廣斷腸草蛇毒化菌等毒文蛤即五倍子捶破洗焙為末三兩山茨菰去皮淨末二兩千金子一名續隨子去殼研去油一兩麝香二錢另研紅牙大戟去蘆焙為末一兩半上用糯米濃飲和作四十粒用井華水或薄荷湯磨服利一兩次用粥止之修合須端午七夕重陽或天德月德日乾淨室焚香修制效驗不能具述宜珍藏之凡人居家出入不可無此藥嶺外有婦與旅合陰以定年藥置食中且戒之曰子幾時來果從其言彼復以藥解之可無恙若過期不往必死若遇此毒及前一應諸毒服前藥一粒或吐或下即愈昔有女人勞瘵為尸蟲所噬磨服一粒吐下小蟲更服蘇合香丸遂愈若菌菌菰子砒石時行瘟疫山嵐疫氣自縊溺水打折傷死瘀血內滯心頭微溫用薑湯磨灌一粒可蘇其急喉閉纏喉風痹腫赤眼癰疽發瘡湯火所傷用東流水磨塗並服顛邪鬼氣鬼胎暖酒磨服余謂喉閉以下諸症果能灼見形病俱實乃可用之
