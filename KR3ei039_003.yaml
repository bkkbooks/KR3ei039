body:
  text: 卷三婦人中風諸症方論第一夫中風者因內虛而中之也蓋風為四時八方之氣常以冬至之日自坎而起從其鄉來者主長養萬物否則名為虛風賊害萬物從背而入或中腑或中臟或中血脈經絡其症或肢體不遂或手足偏枯或痰涎壅塞或口眼歪斜或牙關緊急或腰背反張若眼開口閉涎流失音者難治如眼閉口開鼾睡遺尿者死中風中氣皆用蘇合香丸中氣用三生飲若作風治百無一生愚按中風者即內經所謂偏枯風痱風懿風痹是也而有中腑中臟中血脈之分焉夫中腑者為在表中臟者為在裡中血脈者為在中在表者宜微汗在裡者宜微下在中者宜調榮中腑者多著四肢如手足拘急不仁惡風寒此數者病淺皆易治用加減續命湯之類中臟者多滯九竅如眼瞀者中於肝舌不能言者中於心唇緩便祕者中於脾鼻塞者中於肺耳聾者中於腎此數者病深多難治中血脈者外無六經之證內無便溺之阻肢不能舉口不能言用大秦艽湯主之中腑者多兼中臟如左關脈浮弦面目青左脅偏痛筋脈拘急目瞤頭目眩手足不收坐踞不得此中膽兼中肝也用犀角散之類如左寸脈浮洪面舌赤汗多惡風心神顛倒言語謇澀舌強口乾忪悸恍惚此中小腸兼中心也用麻黃散之類如右關脈浮緩或浮大面唇黃汗多惡風口喎語澀身重怠惰嗜臥肌膚不仁皮肉瞤動腹膨不食此中胃兼中脾也用防風散之類如右寸脈浮澀而短面色白鼻流清涕多喘胸中冒悶短氣自汗聲嘶四肢痿弱此中大腸兼中肺也用五味子湯之類如左尺脈浮滑面目黧黑腰脊痛引小腹不能俯仰兩耳虛鳴骨節疼痛足痿善恐此中膀胱兼中腎也用獨活散之類此皆言真中風也而有氣血之分焉蓋氣虛而中者由元氣虛而賊風襲之則右手足不仁用六君子湯加鉤藤薑汁竹瀝血虛而中者由陰血虛而賊風襲之則左手足不仁用四物湯加鉤藤竹瀝薑汁氣血俱虛而中者則左右手足皆不仁也用八珍湯加鉤藤薑汁竹瀝其與中風相類者則有中寒中濕中火中氣食厥勞傷房勞等症如中於寒者謂冬月卒中寒氣昏冒口噤肢攣惡寒脈浮緊用麻黃桂枝理中湯之類中於暑者謂夏月卒冒炎暑昏冒痿厥吐瀉喘滿用十味香薷飲之類中於濕者丹溪所謂東南之人多因濕土生痰痰生熱熱生風也用清燥湯之類加竹瀝薑汁中於火者河間所謂非肝木之風內中六淫之邪外侵良由五志過極火盛水衰熱氣怫鬱昏冒而卒僕也用六味丸四吞子獨參湯之類內有恙怒傷肝火動上炎者用柴胡湯之類中於氣者七情過極氣厥昏冒或牙關緊急用蘇合香丸之類誤作風治者死食厥者過於飲食胃氣自傷不能運化故昏冒也用六君子加木香勞傷者過於勞役耗損元氣脾胃虛衰不任風寒故昏冒也用補中益氣湯房勞者因腎虛精耗氣不歸源故昏冒也用六味丸此皆類中風者也夫內經主於風河間主於火東垣主於氣丹溪主於濕余之斯論僭補前人之闕也若夫地之南北人之虛實固有不同其男子女人大略相似當與後論參看通變治之附治驗靳閣老夫人先胸脅脹痛後四肢不收自汗如水小便自遺大便不實口緊目瞤飲食頗進十餘日矣或以為中臟公甚憂余曰非也若風既中臟真氣既脫惡症既見禍在反掌焉能延之乃候其色面目俱赤而面或青診其脈左三部洪數惟肝尤甚余曰胸乳脹痛肝經血虛肝氣否塞也四肢不收肝經血虛不能養筋也自汗不止肝經風熱津液妄泄也小便自遺肝經熱甚陰挺失職也大便不實肝木熾盛克脾土也遂用犀角散四劑諸症頓愈又用加味逍遙散調理而安後因鬱怒前症復作兼發熱嘔吐飲食少思月經不止此木盛剋土而脾不能攝血也用加味歸脾湯為主佐以加味逍遙散調補肝脾之氣清和肝脾之血而愈後每遇怒或睡中手足抽搐復用前藥即愈大參朱云溪母於九月內忽仆地痰昧不省人事唇口喎斜左目緊小或用痰血之劑其勢稍緩至次年四月初其病復作仍用前藥勢亦漸緩至六月終病乃大作小便自遺或謂風中於臟以為不治余診之左關弦洪而數此屬肝火血燥也遂用六味丸加五味麥門芎歸一劑而飲食頓進小便頓調隨用補中益氣加茯苓山梔鉤藤丹皮而安至十月復以傷食腹痛作瀉左目仍小兩關尺脈弦洪鼓指余以六君加木香吳茱升麻柴胡一劑而痛瀉俱緩復以六君加肉果故紙一劑諸脈頓平痛瀉俱止余謂左關弦洪由肝火血燥故左目緊小右關弦洪由肝邪乘脾故唇口喎斜腹痛作瀉二尺鼓指由元氣下陷設以目緊口喎誤作風中投以風藥以腹痛泄瀉誤作積滯投以峻劑復耗元氣為害甚矣後以陽虛惡寒圍火過熱致痰喘誤服寒劑而卒一婦人因怒仆地語言謇澀口眼喎斜四肢拘急汗出遺尿六脈洪大肝脈尤甚皆由肝火熾盛蓋肝主小便因熱甚而自遺也用加味逍遙散加鉤藤及六味丸尋愈一老婦兩臂不遂語言謇澀服祛風之藥反致筋攣骨痛余謂此肝火血虛所致用八珍湯補氣血用地黃丸補腎水佐以排風湯年餘而愈一婦人經行口眼歪斜痰涎壅盛此血虛而肝火動用加味逍遙散加牡丹皮治之尋愈後因飲食停滯口吐痰涎此脾氣虛不能攝涎歸經也用六君子二十餘劑而安一婦人因怒口眼歪斜痰涎上湧口噤發搐此脾肺氣虛而肝木旺用六君子加木香鉤藤柴胡治之漸愈又用加味歸脾湯調理而安一産婦勤於女工忽仆地牙關緊急痰喘氣粗四肢不遂此氣血虛而發痙朝用補中益氣湯加茯苓半夏夕用八珍湯加半夏各三十餘劑不應此氣血之未復藥之未及也仍用前二湯又五十餘劑尋愈一婦素有內熱月經不調經行後四肢不能伸臥床半載或用風濕痰火之劑不效其脈浮緩按之則澀名曰瘈症屬風寒所乘用加味逍遙散加肉桂防風四劑頓愈更以八珍湯調理兩月餘而瘥一婦人素經行後期因勞怒四肢不能屈名曰瘲症此血虛而風熱所乘先用八珍湯加鉤藤柴胡漸愈更佐以加味逍遙散調理而痊一婦人四肢攣屈煩痛自汗小便短少畏見風寒脈浮弦緩此氣血虛而風寒濕熱相搏先用東垣清燥湯漸愈再用加味逍遙散及八珍湯加牡丹皮而痊一婦人素有火忽然昏瞶瘈瘲抽搐善伸數缺四肢筋攣痰涎上升此肺金燥甚血液衰少而然也用清燥湯六味丸兼服尋愈一婦人肢節作痛不能轉側惡見風寒自汗盜汗小便短少雖夏亦不去衣其脈浮緊此風寒客於太陽經用甘草附子湯一劑而瘥一婦人因怒發搐嘔吐痰涎口噤昏憒氣口脈大於人迎此氣滯而食厥用平胃散加茯苓半夏木香治之而蘇更以六君子加木香漸愈乃去木香又二十餘劑而痊一婦人元氣素虛勞則體麻發熱痰氣上攻或用烏藥順氣散祛風化痰丸之類肢體痿軟痰涎自出面色萎黃形體倦怠而脾肺二脈虛甚此氣虛而類風朝用補中益氣湯夕用十全大補湯漸愈又用加味歸脾湯調理尋愈一婦人體肥胖頭目眩暈肢體麻木腿足痿軟自汗身重其脈滑數按之沉緩此濕熱乘虛也用清燥羌活二湯漸愈更佐以加味逍遙散全愈一婦人口眼歪斜四肢拘急痰涎不利而惡風寒其脈浮緊此風寒客於手足陽明二經先用省風湯二劑後用秦艽升麻湯而愈一婦人素性急患肝風之症常服搜風順氣丸秦艽湯之類後大怒吐血唇口牽緊小便頻數或時自遺余以為肝火旺而血妄行遂用小柴胡湯加山梔牡丹皮漸愈五年之後又大怒吐血誤服降火祛風化痰之劑大便頻數胸滿少食用清氣化痰之劑嘔而不食頭暈口乾不時吐痰用導痰降火之類痰出如湧四肢常冷余曰嘔而不食胃氣虛弱也頭暈口乾中氣不能上升也痰出如湧脾氣不能攝涎也四肢逆冷脾氣不能運行也用補中益氣加茯苓半夏治之諸症漸愈又用加味歸脾湯兼服而安鴻臚王繼之室人素有癇症遇勞役怒氣則發良久自省一日因飲食勞役失宜發而半日方省不能言語或以為風中於臟用祛風化痰順氣之劑及牛黃清心丸病益甚六脈浮大兩寸虛而不及本部且進飲食余曰此脾胃之氣傷也若風中於臟禍在反掌彼不信仍用風藥後果卒婦人吐痰頭暈肢體麻木見第四卷娠婦發搐似中風見第十四卷産後發痙似中風見第十九卷男子諸症見內科摘要排風湯治風邪入臟狂言妄語白鮮皮白朮白芍藥炒桂心川芎當歸防風杏仁去皮尖炒甘草各二兩白茯苓麻黃去節獨活各二兩三生飲治卒中不省口眼喎斜痰壅喉響無問外感內傷痰涎食厥氣虛眩暈但六脈沉悉有神效生南星生烏頭去皮尖生附子各半兩去皮木香一錢上每服半兩姜水煎不省人事以細辛皂角末少許吹鼻中得嚏進藥氣盛只用南星五錢生薑十四片煎飲之名星姜飲愚按三生飲乃行經絡治寒痰之良藥斬關奪旗之神劑每服必用人參兩許驅其外邪而補其真氣否則不惟無益適以取敗觀先哲用耆附朮附等湯其義可見加減小續命湯治中風半身不遂口眼喎斜手足戰掉語言舂澀神思昏亂筋攣骨痛或腳氣緩弱陰晦復作麻黃去節根防己人參黃芩炒桂心甘草炒白芍藥川芎杏仁各一兩附子炮半兩防風一兩半上每服五錢薑棗水煎精神恍惚加茯苓遠志有熱去附子加芍藥心煩加犀角半兩骨冷痛加桂附嘔逆腹脹加人參半夏一兩躁悶便澀去附子加芍藥一兩竹瀝一合臟寒下利去防己黃芩加附子白朮一兩自汗去麻黃杏仁加白朮一兩腳弱加牛膝石斛一兩身痛加秦艽一兩腰痛加桃仁杜仲半兩失音加杏仁一兩小引風湯防風獨活細辛川芎五味子杵炒白茯苓人參白芍藥炒白朮炒甘草等分上每服五錢姜三片杏仁五個水煎服加麻黃蓯蓉附子當歸羚羊角等分即大引風湯也必效竹瀝湯治中風痰涎壅盛言語謇滯四肢緩縱秦艽防風獨活附子炮各一錢上以水二盞煎半盞入生地汁淡竹瀝各半盞再煎四五沸作四服病既去以他藥調治未愈再服最效星香湯治中風痰盛服熱藥不得者南星木香等分上每服四錢姜十片水煎星附湯治中風痰涎上攻六脈沉伏不知人事附子生用南星生用各一兩木香半兩上每服四錢姜水煎寒甚加天雄川烏多灸關元丹田二穴附方三化湯治中風外有六經之形症先以加減續命湯治內有便溺之阻隔者此方主之厚朴薑汁炒大黃酒蒸枳實麩炒羌活各八兩上每服一兩水煎秦艽湯治中風外無六經之形症內無便溺之阻隔乃血弱不能養於筋手足不能運口強不能言宜養血而筋自榮也秦艽石膏各二兩甘草炒川芎當歸芍藥炒羌活獨活防風黃芩炒白芷生地黃熟地黃自制白朮各一兩白茯苓細辛半兩上每服一兩水煎陰雨加生薑七片春夏加知母一兩省風湯治中風口噤口眼喎斜筋脈攣急抽掣疼痛風熱痰實防風南星生用各四兩半夏水浸洗生用黃芩炒甘草生用各二兩上每服五錢水煎大八風湯方見後燒竹瀝法用新竹截尺許作兩片用兩磚對立竹仰磚上中以火燒之兩頭瀝自出取荊瀝亦然烏藥順氣散治風氣骨節疼痛遍身頑麻手足癱瘓言語謇澀宜先疏氣道後隨證投藥麻黃去節烏藥陳皮去白川芎白芷桔梗枳殼去穰麩炒甘草炒各一兩乾薑炮半兩殭蠶炒一兩上每服五錢姜水煎頭痛加蔥白有汗加薄荷八味順氣散白朮白茯苓青皮白芷陳皮炒烏藥人參各一兩甘草炙半兩上每服五錢水煎導痰湯半夏南星茯苓陳皮炒枳實炒甘草炒上姜水煎服參蘇飲治痰積中脘暈眩嘈雜怔忡噦逆或痰停關節手中嚲曳口眼喎斜半身不遂嘔吐噁心頭疼發熱人參紫蘇葉半夏茯苓乾葛前胡各二錢甘草炙木香陳皮炒枳殼制桔梗各半兩上每服一兩姜水煎腹痛加芍藥附子理中湯治中寒不語四肢強直昔有武士守邊大雪出帳觀瞻忽然暈倒又馬觀文之內厥逆惡寒腹痛服此悉愈方見十二卷第八論牛黃清心丸方見後秦艽升麻湯治風寒客於手足陽明經口眼喎斜惡見風寒四肢拘急其脈浮緊秦艽二錢升麻乾葛甘草芍藥炒人參各半兩防風桂枝各三錢上每劑一兩連須蔥白二莖水煎服犀角散治肝臟中風筋脈拘攣手足不收坐踞不得胸背強直脅肋脹滿面赤心煩言語舂澀或風邪流注四肢上攻頭面作痛口眼喎斜腳膝痛乏犀角屑二錢石膏羚羊角羌活各一錢人參甘菊花獨活黃芩炒天麻枳殼去穰麩炒當歸黃耆芎藭白朮酸棗仁炒防風白芷各五分甘草五分上水姜煎薏苡仁散治肝臟中風薏苡仁麻黃去節各一錢半防風附子炮去皮臍川芎柏子仁桂心枳殼麩炒石膏細辛獨活羚羊角各一錢上姜水煎服射干湯治肝經受病多汗惡風善悲嗌乾目下青黃可治急灸肝俞百壯一黃一白不可治射干芍藥各二錢半薏苡仁三錢桂心五分牡蠣石膏各二錢上作一劑水煎服前滾水下黃耆丸治骨蒸熱肢羸作痛口乾心躁睡臥不寧等症黃耆炒麥門冬去心茯神柴胡甘草炒生地黃各一兩酸棗仁郁李仁去皮尖杏仁去皮尖麩炒枸杞子人參黃芩炒各三錢鱉甲二錢制上為末蜜丸桐子大每服三十丸食遠清粥飲下煞鬼丸治骨蒸傳尸鬼氣伏連麝香三分犀角木香白朮各一兩鬼箭羽辰砂另研虎頭骨酥炙桃仁去皮尖雙仁麩炒黃雄黃各一兩半上為末蜜丸桐子大溫水下二十丸此藥能闢瘟疾可佩之地仙散治骨蒸肌熱煩躁勞熱口乾能生津液而清肺火地骨皮防風麥門冬各五分甘草炒三分上水姜煎加味牛黃散治症同前或恍惚恐亂睡臥不得志意不定牛黃麝香犀角鎊羚羊角龍齒各另研防風天麻獨活人參茯神去木升麻甘草炙白鮮皮遠志去心各二錢半天竺黃三錢另研硃砂另研水飛鐵粉另研麥門冬去心各半兩上為末每服二錢煎麥門冬湯調遠志湯治症同前或偃臥不側悶亂冒絶若唇色正赤可治急灸心腧百壯若青黃不定面色芻芻戰栗動者不可治遠志去心二錢半人參石菖蒲羌活細辛麻黃去根各半兩赤芍藥白朮各一兩上為末每服二錢煎小麥湯調日二服防風散治脾臟中風多汗惡風身體怠惰四肢不能動色微黃不嗜食舌強語澀口喎斜僻肌膚不仁腹膨心煩翕翕發熱神思如醉其脈浮緩胸滿痰涎志意昏濁獨活一錢半防風茯神去木人參附子炮去皮臍前胡沙參半夏湯洗七次黃耆炒旋覆花羚羊角鎊末甘草炙各一錢上水姜煎白朮湯治症同前或腹滿身黃嘔吐酸味急灸脾俞百壯目下及手足青者不可治口角兩邊黃者可治白朮厚朴薑製防風各二錢附子炮去皮臍橘紅白鮮皮五加各一錢上水姜煎細辛散治症同前或肉熱肌膚淫淫如蟲行或汗大泄皮膚不澤唇鼻黃色細辛白朮獨活附子炮去皮臍肉桂防風各一錢厚朴薑製麻黃枳實麩炒甘草炒各一錢五分上水煎防風麻黃散治症同前或志意恍惚肢體沉重防風麻黃去節人參川芎附子炮去皮臍桂心黃耆炒赤茯苓酸棗仁炒白朮獨活桑白皮炒羚羊角鎊末各一錢甘草炒五分上水煎服五味子湯治肺臟中風胸滿短氣冒悶汗出噓吸顫掉聲嘶體重四肢痿弱其脈浮晝瘥夜甚偃臥冒悶其鼻兩邊下至口上至眉其色白者急灸肺腧百壯若色黃其肺傷而為血矣撮空拈衣摸床者必死五味子杵炒杏仁炒去皮尖桂心各一錢防風去蘆甘草炙赤芍藥川芎各二錢川烏三分上水煎服獨活細辛散治症同前或頭痛項強背痛鼻乾心悶語蹇胸中少氣四肢疼痛獨活細辛附子炮去皮臍甘菊花麻黃去節白芷五味子杵炒紫菀茸赤茯苓肉桂白朮川芎桑白皮甘草炙半錢杏仁麩炒去皮防風各一錢上水煎服獨活散治腎臟中風腰疼不得俯仰或偏枯耳鳴語聲渾濁面色浮腫骨節痠疼精神昏憒善恐好忘而肌色黧黑身體沉重發汗惡風隱曲不利或兩腳冷痹頭昏耳聾語音渾濁獨活附子炮去皮臍當歸酒洗防風天麻桂心各一錢川芎甘菊花枳殼麩炒山茱萸取肉黃耆炒丹參牛膝酒浸萆薢酒浸甘草炙細辛菖蒲白朮各五分上水煎服萆薢散治症同前或脊骨促痛不能行立肌膚黑色兩脅赤黃如餅者可治急灸腎腧百壯齒黃髮槁面如土色者不可治萆薢酒浸狗脊杜仲炒去絲白茯苓去皮各一兩何首烏天雄去皮臍炮澤瀉各半兩上為末每服二錢米飲調下吳茱萸丸治症同前或惡風多汗面色浮腫腰膝疼痛形色憔悴吳茱萸細辛白茯苓獨活山茱萸取肉木香牛膝酒浸石斛萆薢酒浸各半兩附子炮去皮臍川芎各二錢上為末酒糊丸桐子大每服二十丸空心鹽湯下日二服黃耆丸治症同前或麻痹腫痛少氣肢體乏力黃耆炒川椒炒茴香炒川烏頭去皮臍狼毒防風川楝子肉白蒺藜炒地龍去土炒黑附子炮去皮臍赤小豆各等分上為末酒糊丸桐子大每服二三十丸溫酒下日二服四君子湯六君子湯補中益氣湯四物湯四方見二十四卷第六論十全大補湯八珍湯加味歸脾湯加味逍遙散四方見二十四卷第四論理中湯方見二十卷第八論清暑益氣湯十味香薷飲二方見本卷第三論東垣清燥湯方見四卷第二論六味丸方見二十四卷第十一論獨參湯方見本卷第十三論小柴胡湯方見二十四卷第二論蘇合香丸方見後羌活湯方見後甘草附子湯方見後平胃散方見十一卷第十八論婦人中風角弓反張方論第二論曰婦人氣虛風人諸陽之經或産後血虛汗出中風體強口噤腰背反長名為發痙因太陽經先傷風復感寒而致如發癇狀但脈沉遲弦細無汗惡寒名剛痙有汗不惡寒名柔痙無汗者葛根湯小續命湯有汗者去麻黃加葛根愚按仲景先生云太陽病發汗太多致痙風病下之則痙三因方云氣血內虛風寒濕熱所中則痙以風能散氣故有汗而不惡寒曰柔痙寒能澀血故無汗而惡寒曰剛痙非專於風濕因內虛發汗亡血筋無所榮而然乃虛象也竊謂傷寒汗下過度與産婦潰瘍等病及因克伐之劑傷損氣血而變若金衰木旺先用瀉青丸後用異功散腎水虛用六味丸肝火旺先用加味小柴胡湯次用加味四物湯發熱用加味逍遙散若木侮脾土用補中益氣加芍藥山梔脾經鬱結用加味歸脾湯脾土濕熱用大承氣湯大凡病後氣血虛弱用參朮濃煎佐以薑汁竹瀝時時用之如不應用十全大補湯更不應急加附子或用參附湯緩則不救仍與後治驗參看附治驗一婦人脾胃虛弱忽痰壅塞氣喘頭搖目札手揚足擲難以候脈視其面黃中見青此肝木乘脾土用六君加柴胡升麻治之而蘇更以補中益氣加半夏茯苓而痊葛根湯治剛痙無汗惡風葛根一錢麻黃去根節殭蠶炒各三分桂枝粉草炒芍藥各五分大棗三個上水煎出汗為度凡産後麻黃宜斟酌用附術湯治手足逆冷筋脈拘急汗出項強口噤痰湧附子炮白朮獨活各五分川芎肉桂各三分上棗水煎服桂心白朮湯治陰痙手足厥冷筋脈拘急汗出不止白朮桂心附子炮防風川芎甘草各等分上每服五錢薑棗水煎服八物白朮散治陰痙手足厥冷筋急脈拘而無汗者白朮麻黃去根節茯苓五味子杵炒羌活各半兩附子炮桂心各三錢良薑一錢上每服四錢姜水煎凡用麻黃宜斟酌不可過多附方通關散治卒然牙關緊急腰背反張藥不得咽細辛薄荷葉牙皂角各等分上為末每用少許吹鼻內候得噴嚏隨進湯藥瀉青丸方見二十四卷第三論異功散方見二十三卷第三論六味丸方見二十四卷第十六論加味小柴胡湯方見二十四卷第二論補中益氣湯加味四物湯二方見二十四卷第六論加味逍遙散十全大補湯加味歸脾湯三方見二十四卷第四論大承氣湯方見後參附湯方見十卷第三論婦人中風口噤方論第三夫中風口噤乃體虛受風入於頷頰蓋手三陽之經結於頷頰上夾於口風邪乘之則筋攣故牙關急而口噤也愚按前症若風邪客於手足陽明經口眼喎斜用秦艽升麻湯若風熱傷氣用省風湯當與後方同用附治驗一婦人因怒經事淋瀝半月方竭遇怒其經即至甚則口噤筋攣鼻衄頭痛痰痙搐搦瞳子上視此肝火熾甚以小柴胡湯加熟地黃山梔鉤藤治之後不復發一婦人素陰虛患遍身瘙癢誤服祛風之藥口噤抽搐肝脈洪數余曰肝血為陰為水肝氣為陽為火此乃肝經血虛火盛耳宜助陰血抑肝火用四物麥門五味柴胡山梔生草熱搐頓止又以八珍黃耆麥門五味鉤藤炙草調理而痊天南星散治中風口噤四肢拘急或痰氣上壅天南星薑汁炒黃白附子炮黑附子炮烏蛇肉酒炙全蠍炒等分上為末每服半錢薑汁溫酒調灌走馬散治中風口噤四肢強直黑附子炮天麻各半兩桂心石膏麻黃去根節蠍梢炒川烏炮去皮尖南星炮各一錢麝香二分另研上為末每服三分豆淋酒調灌附方秦艽升麻湯省風湯二方見本卷第一論小柴胡湯方見二十四卷第二論四物湯方見二十四卷第六論八珍湯方見二十四卷第四論婦人中風不語方論第四巢氏云脾脈絡胃夾咽連舌本散舌下心之別脈系舌本若心脾受邪則舌強不能言然喉嚨者氣之上下也會厭者聲之戶舌者聲之機唇者聲之扇若風寒客於會厭故卒然而喑經云醉臥當風使人發喑愚按前症若因痰迷心竅當清心火若因濕痰舌強當清脾熱若因風熱牙關緊急當清肝火若因風痰塞喉當導痰涎若因虛火上炎當壯水之主若因氣虛厥逆當益火之源若因腎虛舌喑而不語當補腎氣附治驗一婦人因怒仆地痰湧不語灌牛黃清心丸稍蘇用神仙解語丹加山梔柴胡桔梗漸愈又用六君柴胡山梔枳殼而痊一婦人忽然不語半年矣諸藥不應兩尺浮數先用六味丸料加肉桂數劑稍愈乃以地黃飲子三十餘劑而痊男子多有此症亦用此藥治之神仙解語丹治心脾受風言語謇澀痰唾益盛白附子炮石菖蒲去毛天麻遠志去心甘草水煮十沸全蠍羌活南星牛膽釀如無只炮各一兩木香半兩上為末麵糊丸桐子大每服二三十丸薄荷湯下防風湯治中風內虛腳軟語謇石斛一兩半酒炒生地黃杜仲去皮切薑汁炒丹參各一兩一錢防風川芎麥門冬去心桂心獨活上每服五錢棗水煎竹瀝湯治風中肝脾四肢不遂舌強語滯或痰涎上湧威靈仙附子炮苦梗蔓荊子防風枳殼去穰麩炒川芎當歸各等分上每服四錢姜水煎入竹瀝半盞日四服忌飲茶三黃獨活湯治中風手足拘攣半身不遂失音不語麻黃去根節黃耆半兩黃芩七錢獨活一兩上每服四錢水煎取汗為效小省風湯治中風癱瘓口眼喎斜口噤不語手足頑麻防風南星湯泡各三兩甘草炙一兩上每服四錢姜十片水煎秦艽升麻湯方見本卷第一論愈風湯治諸風肢體麻木手足不遂不能動履等症天麻牛膝同酒浸焙乾萆薢另研細玄參各六兩杜仲七兩羌活十四兩當歸熟地黃自制生地黃各一斤獨活五兩肉桂三兩上為末煉蜜丸桐子大常服五七十丸病甚至百丸空心食前溫酒或白湯下地黃飲子治腎虛弱舌喑不能言足廢不能行熟地黃自制巴戟去心山茱萸去核石斛肉蓯蓉酒浸焙附子炮五味子杵炒白茯苓石菖蒲遠志甘草湯炮桂心麥門冬去心各等分上每服三錢入薄荷少許薑棗水煎服牛黃清心丸治諸風瘈瘲語言謇澀健忘恍惚頭目眩暈胸中煩郁痰塞喘嗽精神昏憒或尋常風痰咳嗽或傷寒陽症汗下不解發熱煩渴其效如神牛黃一兩二錢麝香龍腦三味分研羚羊角鎊末各一兩當歸酒洗防風黃芩白朮麥門冬去心白芍藥各一兩半柴胡桔梗白茯苓杏仁去皮尖芎藭肉桂大豆黃卷阿膠各一兩七錢蒲黃人參去蘆神麯各二兩半雄黃另研八錢甘草五兩白蘞七錢半乾