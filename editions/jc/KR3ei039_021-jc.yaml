body:
  text: 卷二十一產後口乾痞悶方論第一論曰產後口乾痞悶因食米麵乾飯太早脾胃不能消化熱鬱所致慎不可下但服見睍丸則愈無擇云若內積憂煩外傷燥熱宜四物湯去地黃加人參烏梅可愈愚按前症若宿食停滯用六君枳實神麯若因肉食所致更加山楂若因魚鱠之類再加陳皮其物既消而仍痞或反作痛作嘔此脾胃受傷用六君子湯或咽酸噯腐加炮姜作瀉更加升麻如不應佐以四神丸或間用補中益氣湯附治驗一婦人食角黍煩渴痞悶腹痛大便欲去不去服消導等藥不應飲食日減肌體日瘦半年矣余謂此食積為患用大酒麴炒為末溫酒調服二錢俄間腹鳴良久仍下粽而愈一婦人食魚鮓腹痛患痢諸藥不應用陳皮白朮等分為末以陳皮湯送下數服而愈見睍丸薑黃炒三稜醋炒蓽澄茄陳皮良薑人參莪朮酒炒各等分上為末用蘿蔔汁糊丸桐子大每服三十丸白湯下產後心煩發渴宜清心蓮子飲方見六卷首論附方六君子湯補中益氣湯二方見二十卷第六論四神丸方見八卷第八論產後血渴方論第二竊謂前症若出血過多虛火上炎用童子小便或四物白朮麥門丹皮若胃氣虛而有熱用竹葉歸耆湯若血虛發熱用八珍加麥門五味若血脫髮熱煩躁用當歸補血湯若胃氣虛弱用補中益氣湯或七味白朮散附治驗一產婦患前症朝寒暮熱肚腹作痛以手按之不痛余以為血氣俱虛用八珍之類治之彼反行逐血更加發熱煩躁余用當歸補血湯熱躁漸止用八珍麥門五味氣血漸復附方七味白朮散治中氣虛弱津液短少口乾作渴或因吐瀉所致人參白朮炒木香白茯苓甘草炒藿香乾葛各一錢上水煎服竹葉歸耆湯治胃氣虛熱口乾作渴惡冷飲食者竹葉一錢五分當歸一錢黃耆二錢白朮人參各一錢麥門冬去心七分甘草炒五分上水煎服四物湯補中益氣湯二方見二十四卷第六論八珍湯方見二十四卷第四論當歸補血湯方見二十四卷第十一論產後乍寒乍熱方論第三產後乍寒乍熱由血氣虛損陰陽不和若陰勝則乍寒陽勝則乍熱宜用增損四物湯若因敗血不散腹內作痛宜用奪命丹後用增損四物湯隨病加減無擇云敗血流閉諸陰則寒流閉諸陽則熱用大調經散五積散愚按前症若因陽氣不足陰氣上入於陽中而惡寒者用補中益氣湯若因陰氣不足陽氣下陷於陰中而發熱者用六味地黃丸若氣血不足而惡寒發熱者用八珍湯若病後寒熱倦怠者用補中益氣湯若肌熱大渴目赤面紅者用當歸補血湯附治驗一產婦惡寒發熱余以為血氣虛寒用十全大補加炮姜而寒熱愈用補中益氣而肢體安又食後犯怒惡寒發熱抽搐咬牙面色青中隱黃此肝木侮脾土飲食停滯用六君子加木香一劑而安一產婦惡寒發熱余以為氣血俱虛不信反用小柴胡湯致汗出譫語煩熱作渴肢體抽搐余用十全大補二劑益甚脈洪大重按如無此藥力不能及乃加附子四劑稍緩數劑而安增損四物湯人參當歸芍藥炒川芎乾薑炒各一兩甘草四錢上每服四錢水姜煎大調經散治產後惡露未消寒熱自汗或肚腹作痛大豆一兩半炒去皮茯神一兩真琥珀一錢上為末每服二錢空心濃煎烏豆紫蘇湯調下附方六君子湯補中益氣湯二方見二十四卷第六論當歸補血湯方見二十卷第十一論八珍湯十全大補湯二方見二十四卷第四論六味地黃丸方見二十四卷第十一論產後瘧疾方論第四郭稽中雲產後乍寒乍熱者多是敗血為害或陰陽不和若概作瘧疾治之誤矣陳無擇曰產後寒熱或一二日或二三日一發或先寒後熱或先熱後寒或寒多熱少或熱多寒少或純寒純熱者皆是瘧疾最難治療可用草果飲生熟飲四獸飲選用之愚按前症當與第十四卷第九論參看用藥以補胃氣為主佐以草果飲之類若胃氣稍充以草果飲為主佐以補胃之劑大抵產後瘧疾因脾胃虛弱飲食停滯或外邪所感或鬱怒傷脾或暑邪所伏審系飲食用六君加桔梗蒼朮藿香如外邪多而飲食少用藿香正氣散如外邪少飲食多用人參養胃湯勞役所傷用補中益氣湯氣血虛弱用十全大補加炮姜中氣虛寒用六君加薑桂元氣脫陷急加附子蓋氣虛則寒血虛則熱胃虛則惡寒胃氣下陷則寒熱交作或吐瀉不食腹痛煩渴發熱譫語或手足逆冷寒戰如慄雖見百症但溫補脾胃其病自退若誤用清脾飲則中氣傷而變症多矣草果飲治產後瘧疾寒熱相半者或多熱者半夏泡赤茯苓甘草炙草果炮去皮川芎陳皮白芷各一錢青皮去白良薑紫蘇三錢乾葛四錢上㕮咀三錢水一鍾姜三片棗二枚煎至七分當發日侵晨連服三服無有不安者生熟飲子治產後瘧疾多寒者肉豆蔻草果仁厚朴生用去皮半夏陳皮甘草大棗去核生薑上八味等分半用生半用濕紙裹煨令香熟去紙與生者和勻每服五錢水二盞煎七分食前一服食後一服清脾飲治產後瘧疾熱多寒少養胃湯治產後瘧疾寒多熱少七寶飲久不已者用截之三方見十四卷第九論附方六君子湯補中益氣湯二方見二十四卷第六論十全大補湯方見二十四卷第四論產後蓐勞方論第五夫產後蓐勞者此由生產日淺血氣虛弱飲食未平復不滿日月氣血虛羸致將養失所而風冷客之風冷搏於氣血則不能溫於肌膚使人虛乏勞倦乍臥乍起顏容憔悴食飲不消風冷邪氣而感於肺肺受微寒故咳嗽口乾遂覺頭昏百節疼痛榮衛受於風邪流注臟腑須臾頻發時有盜汗寒熱如瘧背膊煩悶四肢不舉沉重著床此則蓐勞之候也又論曰婦人因產理不順疲極筋力憂勞心慮致令虛羸喘乏寒熱如瘧頭痛自汗肢體倦怠咳嗽痰逆腹中絞刺名曰蓐勞愚按前症當扶養正氣為主用六君子湯加當歸若脾肺氣虛而咳嗽口乾用補中益氣加麥門五味若因中氣虛而口乾頭暈用補中益氣加蔓荊子苦肝經血虛而肢體作痛用四物參術若因肝腎虛弱而自汗盜汗寒熱往來者用六味丸加五味子若因脾虛血弱肚腹作痛月經不調用八珍湯倍加白朮若因脾虛血燥皮膚瘙癢用加味逍遙散大抵此症多因脾胃虛弱飲食減少以致諸經疲憊而作當補脾胃飲食一進精氣生化諸臟有所倚賴其病自愈矣仍照虛煩發熱方論主治增損柴胡湯治產後虛弱寒熱如瘧食少腹脹柴胡人參甘草炒陳皮川芎白芍藥炒各等分上每服五錢水薑棗煎日二服白茯苓散治產後蓐勞頭目四肢疼痛寒熱如瘧白茯苓一兩當歸川芎桂心白芍藥炒黃耆炒人參各半兩熟地黃半兩自制上先以水三盞入豬腎一雙薑棗各三事煎二盞去之入前藥半兩煎一盞服豬腰子粥治產後蓐勞發熱用豬腰子一枚去膜切片用鹽酒拌先用粳米一合入蔥椒煮粥鹽醋和將腰子鋪碗底以熱粥蓋之如作盦生狀空心服黃耆建中湯治產後諸虛不足發熱或惡寒腹痛黃耆炒肉桂各一兩白芍藥炒二兩甘草炒七錢上每服五錢用薑棗水煎日三二服虛甚須加附子附方六君子湯補中益氣湯四物湯三方見二十四卷第六論六味丸方見二十四卷第十一論八珍湯加味逍遙散二方見二十卷第四論產後虛羸方論第六產寶云產後虛羸者皆系產後虧損血氣所致須當慎起居節飲食六淫七情調養百日庶保無疾若中年及難產者毋論日期必須調養平復方可治事否則氣血復傷虛羸之症作矣愚按前症產傷氣血者用八珍湯飲食傷胃者用四君子湯停食傷脾者用六君子湯勞傷元氣者用補中益氣湯若噯氣覺有藥味者此藥復傷胃也但用四君子湯徐徐少飲以調脾胃若胃氣一健血氣自生諸症自愈矣黃雌雞湯治產後虛羸腹痛小黃雌雞一隻去頭足翅羽腸肚細切當歸白朮炒熟地黃自制桂心黃耆炒各半兩上先以水七鍾煮雞至三鍾每用汁一鍾藥四錢煎日二服十全大補湯治產後氣血未復形體虛弱發熱惡寒等症方見二十四卷第四論產後風虛冷勞方論第七產後氣血勞傷臟腑虛弱若風冷乘之血氣愈虛形氣羸損風冷入臟令人無子謂之風虛冷勞也愚按前症若血氣虛弱用八珍湯血氣虛寒用十全大補湯胃氣虛弱用補中益氣湯脾氣虛弱用六君子湯命門火衰用八味丸肝脾血虛用加味逍遙散肝脾鬱怒用加味歸脾湯產寶方治產後虛羸不生肌肉黃耆炒當歸芍藥炒人參各三錢桂心甘草炒川芎生薑各四錢大棗十二枚上水煎分三服又方豬腎一雙煮入蔥豉作臛如常食之產後腹脹嘔吐方論第八產後腹脹滿悶嘔吐者因敗血散於脾胃不能運化而致宜用抵聖湯治之愚按前症若敗血散於腸胃宜用前方若飲食停於脾宜用六君厚朴若飲食傷於胃宜用六君子湯大凡損其脾者當節其飲食為善附治驗一產婦患前症或用抵當湯敗血已下前症益甚小腹重墜似欲去後余謂此脾氣虛而下陷用補中益氣湯加炮姜溫補脾氣重墜如失又用六君子湯而安抵聖湯赤芍藥半夏澤蘭葉人參陳皮甘草炒各一錢上用生薑焙乾半兩水煎愚按前方最宜用之附方六君子湯補中益氣湯二方見二十四卷第六論產後嘔逆不食方論第九經云胃為水穀之海以養臟腑因產後胃氣虛弱飲食所傷必致嘔逆故不食也愚按前症若因飲食過時用四君子湯飲食過多用六君子湯飲食過時而兼勞役用補中益氣若因飲食停滯用人參養胃湯脾胃氣虛用六君子湯胃氣虛寒加炮薑木香寒水侮土用益黃散肝木侮脾土用六君升麻柴胡命門火衰不能生土用八味丸嘔吐泄瀉手足俱冷或肚腹作痛乃陽氣虛寒急用附子理中湯多有生者附治驗一產婦朝吐痰夜發熱晝夜無寐或用清痰降火肌體日瘦飲食日少前症愈甚余曰早間吐痰脾氣虛也夜間發熱肝血虛也晝夜無寐脾血耗也遂用六君子湯加味逍遙散加味歸脾湯以次調補而痊開胃散治產後胃虛嘔吐胸滿不食訶子肉兩半人參一兩甘草炒半兩上每服五錢薑水煎治產後胃虛嘔逆橘紅一兩半夏甘草炒各半兩藿香二兩上服五錢薑水煎治產後嘔逆不食白朮五錢姜六錢水煎徐徐溫服石蓮散治產後胃寒咳逆嘔吐不食或腹作脹石蓮肉兩半白茯苓一兩丁香五錢上為末每服二錢不拘時用薑湯或米飲調下日三服附方錢氏益黃散治脾土虛寒水反來侮以致嘔吐不食或肚腹作痛或大便不實手足逆冷等症陳皮青皮訶子肉甘草炙丁香二錢上為粗末每服四錢水煎服人參養胃湯治外感風寒內傷飲食寒熱頭疼或作瘧疾半夏厚朴制橘紅八分藿香葉草果茯苓人參五分甘草炙三分蒼朮一錢上姜七片烏梅一個水煎服四君子湯補中益氣湯二方見二十四卷第六論八味丸方見二十四卷第十一論附子理中湯方見二十卷第八論加味逍遙散加味歸脾湯二方見二十四卷第四論產後霍亂方論第十產後霍亂因臟腑虛損飲食不消觸冒風冷所致若熱而飲水者四苓散寒而不飲水者理中丸虛冷者加附子來復丹尤妙愚按此症當與後卷第十一論互相主治附治驗一產婦停食霍亂用藿香正氣散之類已愈後胸腹膨脹飲食稍過即嘔吐或作泄瀉余謂此脾胃俱虛用六君子湯加木香治之漸愈後因飲食失調兼恚怒患霍亂胸腹大痛手足逆冷用附子散又用八味丸以補土母而康設泥痛無補法而用辛散或用平補之劑必致不起一產婦吐瀉咽酸面目浮腫此脾氣虛寒先用六君加炮姜為主佐以越鞠丸而咽酸愈又用補中益氣加茯苓半夏而脾胃康白朮散治脾胃傷吐瀉腹痛煩渴手足逆冷或大便不實白朮橘紅麥門冬去心人參乾薑炮各一兩甘草半兩上每服四錢薑水煎附子散治脾胃虛寒吐瀉腹痛手足逆冷或自汗口噤附子炮白朮炒當歸吳茱萸丁香橘紅甘草炒各半兩上為末每服二錢粥飲調若脾胃虛用參苓白朮散附方藿香正氣散治外感風寒內停飲食頭疼寒熱或霍亂泄瀉或作瘧疾藿香一錢五分桔梗炒大腹皮紫蘇茯苓白芷半夏曲陳皮白朮炒厚朴制各一錢甘草炙五分上薑棗水煎熱服五苓散白朮炒豬苓各一錢桂三分澤瀉二錢五分茯苓一錢上水煎服理中丸治脾胃虛寒嘔吐泄瀉飲食少思肚腹膨脹人參白朮炒乾薑炮甘草炙各一錢上為末米糊丸彈子大每服一丸嚼細白湯下來復丹治伏暑泄瀉身熱脈弱其效如神倉卒間須用此藥硝石一兩同硫黃火上微炒用柳條攪結砂子不可火大太陰玄精石研舶上硫黃各一兩五靈脂去砂石青皮陳皮各二兩上為末醋糊丸小豆大每服三十丸空心米飲下易簡方云硝石性寒佐以陳皮其性疏快硫黃性寒味澀若作暖藥以止瀉誤矣蓋由啖食生冷或冒暑熱之氣中脘閉結揮霍變亂非此藥不能通利三焦分理陰陽其功甚速六君子湯方見二十四卷第六論八味丸方見二十四卷第十一論
