body:
  text: 卷五婦人勞瘵各疰方論第一夫骨蒸殗殢復連屍疰勞疰蟲疰毒疰熱疰冷疰食疰鬼疰疰者注也自上注下與前人相似故曰疰其變有二十二種或三十六種或九十九種令人沉沉默默寒熱盜汗夢與鬼交遺泄白濁或腹中有塊或腦後兩邊有結核咳嗽膿血下利羸瘦死而傳疰甚至滅門更有蜚屍遁屍寒屍喪屍屍注謂之五屍人為其疰者不自知所苦雖有貍骨獺肝天靈蓋等方未嘗見效唯崔氏灸法早用有濟若寒熱自汗面白目干口苦神昏善恐不能獨臥傳在肝也若寒熱面黑鼻燥善忘大便秘瀉口舌生瘡傳在心也若寒熱面青唇黃舌本硬強言語不出飲食無味羸瘦吐涎傳在脾也若寒熱面赤鼻白乾燥毛折咯嗽喘急吐涎膿血傳在肺也若寒熱面黃耳焦腳胻痠痛小便白濁遺瀝腹痛傳在腎也愚按前症誠然有之故葛仙翁用獺肝一具陰乾杵末水下方寸匕日三服未愈再作宋宣和間一法師善考訊鬼怪時一婦以疾投狀既而如有鬼祟所附曰非我為患乃病人命自衰爾渠今己成蟲食肺故令吐血聲嘶又屢掠問彼所畏何物云以獺爪為末酒服之則去矣患家如其言得愈獺爪即獺肝之類歟玄珠云蟲瘵多有兄弟互相傳染甚至絕戶此乃冤牽相纏及風水所致雖有符文法水下蟲之方然蟲去而人亦亡若能平素保養亦可免矣竊究養生微旨云益氣補肺益精滋腎皆資其化源也蓋人之精血常不足加之數奪其真資化失常則胃氣不固精氣滑脫不能上接陽氣故頭重或痛氣弱而食少元氣下陷脈即微弱外散欲絕而虛洪或見損脈此實元氣不足之所致非有外感賊邪之病也附治驗一婦人素勤苦因喪子飲食少思忽吐血甚多而自止此後每勞則吐數口瘵症已具形體甚倦午前以補中益氣午後以歸脾湯送地黃丸而愈一婦子患前症反其唇視有白點此蟲蝕肺也余云急尋獺肝治之不信果咳膿而歿後聞其兄弟三人皆夭於此症大凡久嗽當視其兩唇若上唇有點蟲蝕上部下唇有點蟲蝕下部二十四種蒸病論新附所謂勞蒸者毛折發焦肌膚甲錯其蒸在皮外熱內寒身振肉瞤其蒸在肉發焦鼻衄或復尿血其蒸在血身熱煩躁痛如針刺其蒸在脈爪甲焦枯眼昏脅痛其蒸在髓頭眩熱悶涎濁眵淚其蒸在腦男子失精女子白淫其蒸在玉房乍寒乍熱中脘煩悶其蒸在三焦小便赤黃凝濁如膏其蒸在膀胱大便秘泄腹中雷鳴其蒸在小腸大腹隱痛口舌乾疼其蒸在大腸口鼻乾燥腹脹自汗睡臥不安其蒸在胃口舌耳聾兩脅下痛其蒸在膽裡急後重肛門秘澀其蒸在廣腸小腹㽲痛筋脈縱緩陽器自強其蒸在宗筋眩暈下淚躁怒不常其蒸在肝舌黑氣短煩悶灑淅其蒸在心唇乾口瘡胸腹脹悶畏寒不食其蒸在脾咳嗽喘滿咯痰吐血聲嘶音啞其蒸在肺耳輪焦枯腳氣痠痛其蒸在腎情想不寧精物時下其蒸在右腎心膈噎塞攻擊疼痛俯仰煩冤其蒸在膈此症蟲多齧心肺治當絕其根也愚按醫林集要云前症若蒸肺用天麥門冬桔梗紫菀烏梅肉若蒸皮石膏桑白皮若蒸氣喘促鼻乾身熱不安人參黃芩梔子若蒸大腸大黃芒硝若蒸心黃連生地黃當歸若蒸脈蒸血皆用生地黃當歸童子小便若蒸小腸赤茯苓木通生地黃若蒸脾芍藥木瓜苦參若蒸肉芍藥若蒸胃石膏粳米大黃芒硝乾葛若蒸膽柴胡瓜蔞若蒸三焦石膏竹葉若蒸肝川芎當歸前胡若蒸筋川芎當歸若蒸腎生地黃石膏知母寒水石藁本若蒸腦生地黃防風若蒸髓天門冬當歸生地黃若蒸骨鱉甲地骨皮當歸牡丹皮生地黃若蒸玉房知母黃柏當歸芍藥若蒸脬澤瀉茯苓生地黃沉香滑石若蒸膀胱澤瀉滑石凡此諸蒸虛勞熱病食肉與油膩房勞飲酒而成者久蒸不除變為疳症即死亦有瘧病久而不愈以致咳嗽失治漸成骨蒸勞瘵之症當推標本而治之崔氏灸骨蒸勞瘵用細繩一條男左女右從足大拇指頭齊量起從腳板底當腳跟中心向後引繩循腳肚貼肉直上至曲臂中橫紋截斷又令患人解發分兩邊見頭縫自囟門平分至腦後乃平身正坐取前所截繩一頭從鼻端齊引繩向上直循頭縫至腦後貼肉頭垂下循脊骨引繩向下至繩盡處當脊骨以黑點記此黑點不是灸穴別取一繩令患人合口將繩按於口上兩頭至吻卻鉤起繩中心至鼻端根下如人字樣齊兩吻截斷將此繩展直於前在脊骨上黑點處取中橫量勿令高下於繩兩頭以白圈記之此是灸穴初灸七壯累灸至百壯此名患門穴初灸此訖次令其人半身正坐稍縮臂膊取一繩繞項向前雙垂與鳩尾齊鳩尾是心歧骨無是歧骨者胸前兩歧骨間量取一寸即是鳩尾也即截斷卻背翻繩頭向項後以繩中停取心正令當喉嚨結骨上於第二次墨點處折中橫量繩兩頭以白圈記之此是灸穴初灸七壯累灸至百壯又將第二次量口繩折中當脊直上下豎停中心在第二次墨記上下繩頭盡處以白圈記之此是灸穴初灸七壯累灸百壯此縱橫四方凡四穴是名曰四花穴初灸各七壯若瘡愈其疾未效依法復灸故云累灸至百壯凡灸時可用灸足三里以瀉其火為好若婦人纏足短小難為量只取膏盲俞灸之在第四椎下兩傍各三寸是穴次灸四花穴道軒用此法灸之無有不效者神仙秘法取勞蟲須先擇良日焚香禱祝令病人面向福德方服神效青桑枝楊柳枝梅枝桃枝俱向東者各七莖蔥白七莖青蒿一握如無以子代阿魏一錢真安息香一錢上用童便一升半煎一升入阿魏再煮數沸入硃砂半兩小檳榔半兩麝香半錢五更並天明各進一服下白蟲尚可治以淡粥補之用藥調理三五月再服以除病根如蟲黑已入腎不可救矣治心胸痛引兩脅昏悶聲濁熱壅鼻衄或痰喘發熱桑白皮炒枳殼麩炒木通子芩炒生地黃白芍藥甘草各五分上水煎服溫金散治肺嗽惡寒發熱唾痰皮毛焦燥甘草炒黃芩炒桑白皮炒防風各一兩杏仁二十七粒制人參茯苓各半兩麥門冬三錢上前五味用米泔浸一宿曬乾入人參等三味每服三錢入蠟一豆大水煎桔梗飲子治心氣不足解倦益血或喘嗽痰甚桔梗炒甘草炒黃耆炒人參麥門冬各一錢青皮三分上水煎服治咽喉痛百藥煎去黑皮硼砂甘草生白礬等分上為末每服一二錢食後用米飲調細呷咽之含化丸治肺間邪氣胸中積血作痛失音痰喘蛤蚧一隻去足炙訶子去核阿膠粉炒麥門冬去心細辛甘草炒生地黃各半兩上為末蜜丸芡實大食後含化一丸河車丸治一切勞瘵虛損骨蒸等疾紫河車一具初生男胎者尤良洗淨杵煨本草云人肉治瘵病胞衣主勞損面䵟皮黑諸疾瘦悴白茯苓半兩人參一兩乾山藥二兩上為末麵糊和入河車加三末丸梧子大每服三五十丸空心米飲下嗽甚五味子湯下補肺湯治勞嗽五臟虧損晡熱發熱盜汗自汗唾痰喘嗽桑白皮炒熟地黃各一錢人參紫菀黃耆炒五味子炒各五分用水煎入蜜少許食後服養正膏治傳屍出汗取蟲辟邪鱉甲一兩醋炒青蒿一握淡豆豉三七粒蔥白兩莖安息香一分研桃柳桑枝各七莖天靈蓋用匕豆大一片酥炙桃仁四十九個去皮尖雙仁上隔夜以水一升浸至五更煎至半升入童便半升煎取四合調檳榔麝香末各一分日高時頓服以衣覆十指汗出如藕絲瀉下如蟲狀甚者旬日再服阿膠丸治勞嗽出血咯血發熱晡熱口渴盜汗阿膠炒生地黃卷柏葉山藥炒大薊根五味子杵炒雞蘇各一兩柏子仁炒人參防風麥門冬去心各半兩上為末煉蜜丸彈子大每服一丸細嚼麥門冬煎湯下四君子湯加秦艽黃蠟水煎服尤炒治勞嗽咯血神授散治傳屍蟲用川椒二斤去核併合口者炒為末每服一錢麵糊丸空心米飲下服盡見效蘇合香丸治傳屍骨蒸勞瘵疰𤵍鬼氣心痛方見三卷第四論附方四君子湯方見二十四卷第五論補中益勻湯方見二十四卷第六論歸脾湯方見二十四卷第四論六味地黃丸方見二十四卷第十一論婦人骨蒸勞方論第二夫骨蒸勞由積熱附於骨而名也亦曰傳屍殗殢復連無辜其名不一此病皆由脾胃虧損所致其形羸瘦腹脹泄瀉肢體無力傳於心腎則盜汗不止腰膝冷痛夢鬼交侵小便赤黃傳於心則心神忪悸喜怒不時頰唇赤色乍寒乍熱傳於肺則胸滿短氣咳嗽吐痰皮膚甲錯傳於肝則兩目昏暗脅下妨痛閉戶忿怒五臟既病則難治療愚按前症多因經行胎產或飲食起居七情而傷肝脾之所致又或失於調攝或過於攻伐而成東垣先生云發熱之症肺熱者輕手乃得微按全無日西猶甚乃皮毛之熱其症喘嗽寒熱輕者用瀉白散重者涼膈散白虎湯地骨皮散心熱者微按之皮膚之下肌肉之上輕手乃得微按至皮毛則熱少加力按之則全不熱是熱在血脈也日中太甚其症煩心心痛掌中熱而噦用黃連瀉心湯導赤散硃砂安神丸脾熱者輕手捫之不熱重手按至筋骨又不熱不輕不重在輕重之間此熱在肌肉遇夜猶甚其症怠惰嗜臥四肢不收無氣以動用瀉黃散肝熱者按之肌肉之下至骨之上寅卯時猶甚四肢滿悶便難轉筋多怒多驚筋痿不能起於床用瀉青丸柴胡飲腎熱者輕手重按俱不熱加重手按至骨分其熱蒸手如火其症骨蘇如蟲蝕困熱不能起於床用滋腎丸此治實熱之法也竊謂肺經虛熱者用人參補肺湯脾氣虛而不能生肺者用六君子湯脾熱遺於肺者用三黃丸心經虛熱者用補心湯命門火衰不能生土者丸心經虛熱者用補心湯命門火衰不能生土者用八味丸肝虛不能生心者用補肝散腎克心者用附子理中湯脾經虛熱者用人參黃耆散土剋水者用承氣湯脾不能培肝者用六君子湯元氣下陷及金不能生水者俱用補中益氣湯肺克肝及腎經虛熱與腎不能生肝者俱用六味丸附治驗一婦人發熱晡熱盜汗自汗殊畏風寒飲食少思或腹脹吞酸或大便不實此脾胃不足諸經虧損朝用補中益氣夕用八珍湯倍用參苓白朮各二十餘劑諸症漸愈因喪母哀傷患盜汗便血用加味歸脾湯數劑而止仍用前二藥又五十餘劑尋愈月經兩月而至適因怒去血過多發熱作渴肢體酸倦頭目暈痛用逍遙散加味歸脾湯二藥調補而痊一婦人盜汗自汗遍身痠疼五心發熱夜間益甚或咳嗽咽乾或盜汗自汗月經兩三月一至用加味逍遙散六味地黃丸兼服臨臥又服陳術丸三月餘諸症悉愈其經乃兩月一至又服兩月而痊陳術丸即陳皮白朮為丸一婦人患前症食少倦怠肌肉消瘦日晡發熱至夜益甚月水過期漸至不通時發渴躁誤用通經之劑熱倦愈重飲食愈少余用八珍湯加升麻丹皮山梔柴胡治之熱漸退又用八珍丹皮軟柴胡調理而愈一婦人飲食少思胸膈不利或胸中作痛或大便作瀉或小便不利用逍遙散加山梔茯神遠志木香而愈後因怒寒熱往來倦怠煩熱以前藥加炒黑黃連三分頓愈用八珍湯調理而愈後因怒吐血躁渴用人參五錢苓朮當歸各三錢陳皮甘草各一錢治之而愈一婦人胸脅作痛內熱晡熱月經不調余謂鬱怒傷損肝脾朝用歸脾湯以解鬱結生脾氣夕用加味逍遙散以生肝血清肝火半載而愈後因飲食失調兼有怒氣月經如注脈浮洪而數用六君子加芎歸炮姜一劑而血止用補中益氣加炮薑茯苓半夏治之而元氣復又用歸脾湯逍遙散調理而康一婦人內熱口乾頭暈吐痰帶下體倦飲食少思余謂脾氣虛弱而不能生肺金用補中益氣湯加茯苓半夏脾氣漸復飲食漸進諸症漸退再用加味逍遙散治之尋愈一婦人腹脹脅痛內熱晡熱月經不調不時吐痰或用化痰行氣之劑胸膈不利余謂脾氣鬱結肝經血虛朝用歸脾湯夕用加味逍遙散百餘劑而諸症漸愈又因飲食停滯或用峻補之劑口乾體倦余用七味白朮散補中益氣加茯苓半夏中氣漸愈又以補中益氣及八珍湯兼服而痊一婦人患前症將愈因怒胸膈不利飲食少思服消導利氣之藥大便下血余曰此脾氣復損不能攝血歸源用補中益氣加茯苓半夏炮姜血止用八珍加柴胡炒梔熱退用八珍湯逍遙散而痊一婦人肌體倦瘦口乾內熱盜汗如洗日晡熱甚用參耆歸朮茯神遠志棗仁麥門五味丹皮龍眼肉炙草柴胡升麻治之獲痊後因喪子懷抱不舒腹脹少寢飲食少思痰涎上湧月經頻數余謂怒悶傷脾不能攝血制涎歸源耳用補中益氣濟生歸脾漸愈又用八珍湯調理而痊一婦人發熱口乾月經不調肢體無力腿痛體倦二膝浮腫余作足三陰經血虛用六味丸逍遙散兼服兩月形體漸健飲食漸進肢體漸消而痊一婦人日晡熱甚月水不調飲食少思大便不實胸膈痞滿頭目不清肢體倦怠發熱煩躁余謂七情肝脾虧損之症用濟生歸脾湯加味逍遙散補中益氣湯調治元氣漸復而愈一婦人月經不調晡熱內熱飲食少思肌體消瘦小便頻數或用清熱生血之劑月經不行四肢浮腫小便淋瀝余朝用金匱加減腎氣丸夕用歸脾湯漸愈又用八珍湯兩月而愈一婦人胸脅膨滿小腹悶墜內熱晡熱飲食不甘體倦面黃日晡則赤灑淅惡寒此脾肺氣虛先用六君子加川芎當歸諸症漸愈又用補中益氣加茯苓半夏諸症全愈後飲食失節勞怒惡寒發熱不食用加味小柴胡一劑而熱退用逍遙散歸脾湯調理而康天靈蓋散治骨蒸四肢無力晡熱頰赤食少心煩天靈蓋酥炙安息香地骨皮當歸山梔仁人參貝母去心黃耆桃仁去皮尖雙仁麩炒黃檳榔各一兩鱉甲醋炙柴胡生地黃赤茯苓麥門冬阿魏上每服五錢桃柳枝各七寸姜五片蔥白五寸童便煎愚按醫學綱目云柴胡本經並無一字治勞熱今治勞方鮮有不用者誤世多矣凡此症乃真臟虧損而虛熱王海藏先生云苟無實熱而用柴胡不死何待蓋柴胡乃肝膽之藥雖能升胃氣下陷每劑不過分許而可多用哉產後氣血虛熱尤宜禁忌獺肝丸治骨蒸勞熱或潮熱發熱體瘦煩疼不欲飲食獺肝一具鱉甲醋炙柴胡各一兩半硃砂另研升麻天靈蓋酥炙犀角鎊桃仁去皮尖雙仁麩炒黃梔子仁炒地骨皮知母各一兩黃耆炒甘草炒各五錢麝香一錢研上為末煉蜜丸桐子大每服三十丸空心食治肝臟中風心神煩熱言語舂澀不得安臥竹瀝荊瀝葛根生薑汁白蜜各一合上和勻頻服之麻黃散治心臟中風多汗惡風善怒心神顛倒言語謇澀舌強口乾面赤頭痛翕翕發熱胸背拘急手心熱甚偃臥不側忪悸恍惚或寒顫心驚悸口喎冒昧好笑麻黃去節白朮防風川芎甘草炙漢防己不歸人參各一錢羌活遠志去心茯神去木各一錢半升麻八分桂心半錢上水姜煎入竹瀝半盞再煎一二沸茯神散治同前或四肢沉重精神不安或痰氣不利茯神去木羌活麻黃去節龍齒另研赤芍藥甘草炙各二錢蔓荊子薏苡仁麥門冬去心人參去蘆防風去蘆犀角屑各七分半上姜水煎服十全大補湯治氣血虛熱加柴胡地骨皮秦艽秦艽散治五心煩熱頰赤逍遙散治血虛五心煩熱肢體疼痛頭目昏重心忪頰赤口燥咽乾發熱盜汗減食嗜臥月水不調臍腹脹痛寒熱如瘧痰嗽潮熱肌體羸瘦漸成骨蒸方見二十四卷第四論枳殼散治婦人手足煩熱盜汗肌瘁經候不調煩倦心胸滿悶狀如勞氣枳殼去穰麩炒一兩半夏曲赤芍藥各一兩柴胡黃芩炒各一兩半上為末每服三錢薑棗水煎服華陀解勞生肌進食活血養心石膏每服水和錢許甚驗青蒿散治體倦虛疼勞熱九月採青蒿去梗用童子小便浸三日曬為末每服二錢烏梅一個煎湯調服清心蓮子飲參蘇飲加黃芩麥門冬並治五心煩熱手足熱甚附方加味小柴胡湯方見二十四卷第二論柴胡飲治肌熱積熱或汗後餘熱脈洪實弦數柴胡人參黃芩芍藥甘草當歸大黃煨各二錢半上姜水煎服瀉白散治肺臟氣實心胸壅悶咳嗽煩喘大便不利桔梗炒地骨皮甘草炙瓜蔞仁升麻半夏薑製桑白皮炒杏仁去皮尖等分上每服四錢姜水煎導赤散治心虛蘊熱小便赤澀或成淋瀝口舌生瘡等症生地黃木通甘草等分上每服三錢竹葉水煎瀉黃散治脾熱口臭咽乾或口舌生瘡發熱作渴石膏防風藿香等分甘草山梔子炒上每服三錢水煎涼膈散治上焦積熱煩躁作渴頭目昏瞶咽喉腫痛便溺赤澀語言譫妄等症朴硝大黃甘草各二兩連翹四兩梔子仁炒黃芩炒薄荷葉各一兩上為末每服二三錢竹葉七片水煎溫服白虎湯治胃熱作渴暑熱尤效又治熱厥腹滿身難轉側面垢譫語遺溺手足厥冷自汗脈沉滑大便泄瀉清水無度知母石膏各二錢粳米半合上水煎服附子理中湯治脾胃虛寒手足厥冷飲食不入或腹鳴切痛嘔逆吐瀉方見二十卷第八論硃砂安神丸方見三卷第十論地骨皮散方見六卷第三論黃連瀉心湯單用黃連為末每服二錢白湯調下瀉青丸方見二十四卷第三論承氣湯方見七卷第十論滋腎丸方見八卷第一論人參補肺湯方見二十四卷第十二論補中益氣湯六君子湯二方見二十四卷第六論三黃湯方見八卷第八論補心湯方見三卷第十二論六味丸八味丸方見二十四卷第十六論補肝散方見七卷第十七論人參黃耆湯方見十三卷第十論加味歸脾湯八珍湯加味逍遙散逍遙散歸脾湯五方見二十四卷第十四論七味白朮散方見二十卷第十論金匱加減腎氣丸方見二十卷第十論婦人血風勞氣方論第三婦人血風勞症因氣血素虛或產後勞傷外邪所乘或內有宿冷以致腹中疼痛四肢酸倦發熱自汗月水不調面黃肌瘦當調補肝脾氣血為主愚按東垣云喜怒不節起居不時有所勞傷皆損其氣氣衰則火旺火旺則乘其脾土脾主四肢故困熱懶言動作喘乏表熱自汗心煩不安當病之時宜安心靜坐存養其氣以甘寒瀉其熱氣以酸味收其散氣以甘溫補其中氣經言勞者溫之損者溫之要略云平人脈大為勞以黃耆建中湯治之附治驗一婦人勞則足跟熱痛余以為足三陰血虛用聖愈湯而痊後遍身瘙癢誤服風藥發熱抽搐肝脈洪數此肝家血虛火盛而生風以天竺膽星為丸用四物麥門五味芩連炙草山梔柴胡煎送而愈一婦人素清苦勤於女工因感風邪自用表散之劑反朝寒暮熱自汗盜汗形氣虛甚其脈或浮洪或微細其面或青白或萎黃此邪去而氣血愈虛也用十全大補湯三十餘劑漸愈又用加味逍遙散兼治半載而痊人參荊芥散治遍身疼痛頭昏目澀心忪煩倦寒熱盜汗頰赤口乾痰嗽胸滿月水不調腹痛癖塊荊芥人參生地黃柴胡鱉甲醋炙酸棗仁炒枳殼麩炒羚羊角鎊白朮各七分川芎當歸酒拌桂心防風甘草各五分上姜水煎日二服地黃煎治血虛心忪發熱生地黃熟地黃自制等分上用薑汁和水拌杵丸桐子大每服五十丸空心白湯下日三服若臟腑虛寒早間先服八味丸一服愚按前方肝脾血虛發熱內熱晡熱盜汗作渴體倦筋骨疼痛筋脈拘攣血虛發躁虛熱生痰咳嗽之良劑若因肝脾腎精血躁熱生痰胸膈痞滿喘咳作渴及一切虛火症必用六味丸為主乞力伽散治血虛肌熱或脾虛蒸熱或內熱寒熱白朮白茯苓白芍藥炒各一錢甘草炒五分上薑棗水煎附方黃耆建中湯方見二十卷第四論聖愈湯方見二十四卷第九論四物湯方見二十四卷第六論六味丸加味逍遙散二方見二十四卷第四論六君子湯補中蓋氣湯二方見二十四卷第六論歸脾湯十全大補湯二方見二十四卷第四論人參養榮湯方見二十四卷第三論八味丸方見二十四卷第十一論婦人冷勞方論第四婦人冷勞屬血氣不足臟腑虛寒以致臍下冷痛手足時寒月經失常飲食不消或時嘔吐惡寒發熱骨節痠疼肌膚羸瘦面色萎黃也愚按前症有內外真寒然有內外真熱亦有內真熱而外假寒者又有內真寒而外假熱者若飲食難化大便不實腸鳴腹痛飲食畏寒手足逆冷面黃嘔吐畏見風寒此內外真寒之症也宜用附子理中湯以回陽八味地黃丸以壯火若飲食如常大便堅實胸腹痞脹飲食喜冷手足煩熱面赤嘔吐不畏風寒此內外真熱之症也宜用黃連解毒湯以消陰六味丸以壯水若飲食如常大便堅實胸腹痞脹飲食喜寒手足逆冷面黃嘔吐畏見風寒此內真熱而外假寒也亦用解毒湯六味丸若飲食少思大便不實吞酸噯氣胸腹痞滿手足逆冷面赤嘔吐畏見風寒此內真寒而外假熱也亦用附子理中湯與八味丸當求其屬而治之經曰益火之源以消陰翳壯水之主以制陽光使不知真水火之不足泛以寒熱藥治之則舊疾不去新病復生矣夫所謂屬者猶主也謂心腎也求其屬也者言水火不足而求之於心腎也火之源者陽氣之根即心是也水之主者陰氣之根即腎是也非謂火為心源為肝水為腎主為肺也大抵寒亦抑心熱亦強腎在治者審之附治驗方藥一婦人食少作嘔口吐痰涎面黃腹痛月經不調手足逆冷余謂此內外俱寒之症遂以六君加附子木香治之而愈先太宜人忽嘔吐酸水內熱作渴飲食不進惟喜冷水面色青赤投之以藥入口即吐此內外真熱之症積十餘日以黃連一味煎湯飲之徐加白朮茯苓仍加陳皮當歸炙草至月餘始進米飲稀粥調理而愈一婦人內熱作渴大便秘結畏惡風寒手足逆冷余以為內真熱而外假寒先用黃連解毒湯後用六味丸而愈一大方室趙氏初患痰喘熱渴醫以降火散氣治之肌日削而氣日索延至甲辰木旺痰盛身熱口腐腹脹神昏絕食幾死先生診之云此乃虛熱無火投以壯水生土之劑隨服隨效得以不死竊喜久安忽值戊申夏初坐則頭墜不能起視臥則背冷黨風透體煩熱暈眩咳嘔痰湧手足麻冷病勢危殆自分必死得先生診之曰此內真寒外假熱之症也逐以大補姜附之劑飲之不三四服而勢已平仍以前藥加減而愈則其他以有餘之火治之無怪乎其展轉增劇也微先生則山妻死於甲辰之春難免於戊申之夏矣大方感慨不已援筆備述求附卷末庶幾醫者之不昧病者之得全先生之惠垂諸無窮豈一世一人之幸哉長洲沈大方頓首拜書八味丸六味丸二方見二十四卷第十一論附子理中湯方見二十四卷第八論黃連解毒湯方見六卷第十一論六君子湯方見二十四卷第六論
