body:
  text: 卷十胎教門求嗣已明須知胎教故以次之妊娠總論第一巢氏病源論妊娠一月名胎胚足厥陰脈養之二月名始膏足少陽脈養之三月名始胎手心主脈養之當此之時血不流行形象始化未有定儀因感而變欲子端正莊嚴常口談正言身行正事欲生男宜佩弦執弓矢欲生女宜佩韋施環佩欲子美好宜佩白玉欲子賢能宜看詩書是謂外象而內感者也四月始受水精以成其血脈手少陽脈養之五月始受火精以成其氣足太陰脈養之六月始受金精以成其筋足陽明脈養之七月始受木精以成其骨手太陰脈養之八月始受土精以成膚革手陽明脈養之九月始受石精以成毛髮足少陰脈養之十月五臟六腑關節人神皆備此其大略也又五臟論有稱耆婆者論一月如珠露二月如桃花三月男女分四月形象具五月筋骨成六月毛髮生七月遊其魂兒能動左手八月遊其魄兒能動右手九月三轉身十月受氣足更有顱囟經云一月為胎胞精血凝也二月為胎形成胚也三月陽神為三魂四月陰靈為七魄五月五行分五腑也六月六律定六腑也七月精開竅通光明也八月元神具降真靈也九月宮室羅布以定生人也十月受氣足萬象成也今推究數說如五臟論者類皆淺鄙妄托其名至於三藏佛書且涉怪涎漫不可考今按顱囟經三卷雲中古巫方所撰其巢氏論妊娠至三月始胎之時欲談正言行正事佩弦韋執弓矢施環佩佩白玉讀詩書之類豈非胎教之理乎嘗試推巢氏所論云妊娠脈養之理足厥陰肝脈也足少陽膽脈也為一臟腑之經余皆如此且四時之令必始於春木故十二經之養始於肝所以養胎在一月二月手心主心胞絡脈也手少陽三焦脈也屬火而夏旺所以養胎在三月四月手少陰乃心脈也以君主之官無為而尊也足太陰脾脈也足陽明胃脈也屬土而旺長夏所以養胎在五月六月手太陰肺脈也手陽明大腸脈也屬金而旺秋所以養胎在七月八月足少陰腎脈也屬水而旺冬所以養胎在九月又況母之腎臟繫於胎是母之真氣子之所賴也至十月兒於母腹之中受足諸臟氣脈所養然後待時而生此論奧微而有至理世更有明之者亦未有過於巢氏之論矣余因述其說受形論第二娠子即妊娠也故以後受形各篇並附其論巢氏論曰陽施陰化精氣有餘兩胎有俱男俱女者道藏經云婦人月信止後一日三日五日值男女旺相日陽日陽時交合有孕多男若男女稟受皆壯則男子一或怯弱則少子顱囟經云陽盛發陰當孕成男六脈諸經皆舉其陰又云三陽所會則生男三陰所會則生女葛仙翁肘後方云男從父氣女從母氣聖濟經云天之德地之氣陰陽之至和流薄於一體因氣而左動則屬陽陽資之則成男因氣而右動則屬陰陰資之則成女易稱乾道成男坤道成女此男女之別也凡妊娠有疾投以湯藥衰其大半而已使病去母安胎亦無損矣愚按東垣丹溪云經水斷後一二日血海始淨精勝其血感者成男四五日後血脈已旺精不勝血感者成女蓋父精母血因感而會精之施也血能攝精故成子此萬物資始於乾元也血之行也精不能攝故成女此萬物資生於坤元也陰陽交媾胚胎始凝所藏之處名曰子宮一系在下上有兩岐一達於左一達於右精勝其血則陽為之主受氣於左子宮而男形成精不勝血則陰為之主受氣於右子宮而女形成此二先生之確論也若夫妊娠藥餌宜禁當參本門考之受形篇第三褚氏云男子之合二精交暢陰血先至陽精後沖血開裹精精入為骨而男形成矣陽精先入陰血後參精開裹血血入為本而女形成矣陽氣聚面故男子面重溺死者必伏陰氣聚背故女子背重溺死者必仰走獸溺死仰伏皆然陰陽均至非男非女之身精血散分駢胎品胎之兆父少母老產女必羸母壯父衰生男必弱古之良工首察乎此氣受偏瘁與之補之補羸女則養血壯脾補弱男則壯脾節色羸女宜及時而嫁弱男宜待壯而婚此疾外所務之本不可不察論胎教第四馬益卿先生論曰胎教產圖之書不可謂之迂而不加信然亦不可押犯之方今俚俗之家與不正之屬將息避忌略不如儀或藥毒不消或產於風露無產厄而子母均安者亦幸有之若保胎之法須多方豫養方無後患如鄰家有所興修亦或犯其胎氣令兒破形殞命如刀犯者形必傷泥犯者竅必塞打擊者色青黯繫縛者相拘攣如此等驗有如指掌不可不慎也孕元立本章第五有泰初有泰始混沌一判既見氣矣故曰泰初既立形矣故曰泰始氣初形始天地相因生生化化品物彰矣故曰大哉乾元萬物資始至哉坤元萬物資生吳禔注云混沌未判則氣形俱泯混沌既判則氣形已分既見氣矣是為太初既立形矣是為太始太初者凡有氣之所本故天得之以統元氣太始者凡有形之所本故地得之以統元形天地交泰相因為氣形生生者得所以生化化者得所以化品物流行而形色名聲彰矣大哉乾元太初之所寓也故以萬物之資始為言至哉坤元太始之所寓也故以萬物資生為言惟萬物資始資生於乾坤故乾元而兆象至坤元然後形無不成有生之初雖陽予之正育而充之必陰為之主薛左丞注陰陽離合論曰天覆地載萬物方生未出地者命曰陰處名曰陰中之陰出地者命曰陰中之陽陽予之正陰為之主王冰謂陽施正氣萬物方生陰為之主群形乃立字說始而生之者天地也育而充之者人也因形移易日改月化坤道之代終也列子周穆篇尹文先生曰因形移易謂之化莊子曰予方篇混元曰消息盈虛一晦一明日改月化曰有所為而莫見其功易坤卦文言曰地道無成而代有終也地之承天其無成而有終也豈迫於不得己耶蓋道之所在萬物失之則死得之則生有生之類聽命於此故無成而代有終者以道言之也謂之妊陽既受始陰壬之也壬子謂之妊字說壬一陽也二陰也陽既受始陰壬之而謂之妊解曰壬陽水之子也位在亥子之間陰至亥極矣陽復受胎而謂之妊於壬至子然後生謂之胞巳為正陽陰包之也巳正陽也而陰能包之陰與陽更用事故也巳者孟夏之月於卦為乾純陽用事故詩謂之正月正月者正陽之月也陰方用事而為物之主則雖正陽亦在所包而退聽焉謂之胚未成為器猶云坯也說文瓦未燒者謂之坯胚婦孕一月也字說坯未成為器猶坯也謂之胎既食於母為口以也說文胎婦孕二月也字說元胎既食於母為口以焉若娠則以時動也字說女娠以時動若懷則以身依之也字說心所懷則身依焉目隸焉天之德地之氣陰陽之至和相與流薄於一體靈樞經曰天之在我者德地之在我者氣德流氣薄而生者也唯能順時數謹人事勿動而傷則育之道得矣自一月積之至於十月所謂時數也保衛輔翼防閒忌嗔適其宜所謂人事也觀四序之運生長收藏代出萬物儀則咸備而天地之氣未始或虧者蓋陰陽相養以相濟也陰陽離合論曰天覆地載萬物方生陽予之正陰為之主故因春生因夏長因秋收因冬藏失常則天地四塞莊子天地篇曰流動而生物物生成理謂之形形體保神各有儀則謂之生昧者曾不知此乃欲拂自然之理謬為求息之術方且推生死於五行蘄補養於藥石以偽勝真以人助天雖或有子孕而不育育而不壽者眾矣昔人論年老有子者男不過盡八八女不過盡七七則知氣血在人固自有量夫豈能逃陰陽之至數哉天真論帝曰有其年已有老而有子者何也岐伯曰此其天壽過度氣脈常通而腎氣有餘也此雖有子男不過盡八八女不過盡七七而天地之精氣皆竭矣注雖老而生子子壽亦不能過天癸之數凝形殊稟章第六天地者形之大也陰陽者氣之大也惟形與氣相資而立未始偏廢莊子則陽篇太公調曰天地者形之大者也陰陽者氣之大者也氣以形載形以氣充惟氣與形兩者相待故曰相資而立未始偏廢男女構精萬物化生天地陰陽之形氣寓焉繫辭曰天地絪縕萬物化醇男女構精萬物化生語七八之數七少陽也八少陰也相感而流通故女子二七天癸至男子二八而精通則以陰陽交合而兆始故也岐伯曰女子二七而天癸至任脈通衝脈盛月事以時下故能有子男子二八腎氣盛精氣溢瀉陰陽和故能有子傳曰女子十四有為人母之道四十九絕生育之理男子十六有為人父之道六十四絕陽化之理語九十之數九老陽也十老陰也相包而賦形故陰窮於十男能圍之陽窮於九女能方之則以陰陽相生而成終故也字說陰窮於十圍之者男陽窮於九方之者女九有變也女足以方之十無變也男足以圍之解曰男有室所以圍陰於外女有家所以方陽於內易曰婦人之吉從一而終也夫子制義從婦凶也圍圓也君道也夫道也圓則可以制義而行方仁也臣道也婦道也方則從一而已男從圍與規從夫同意女從仁與臣從仁同意元氣孕毓皆始於子自子推之男左旋積歲三十而至巳女右旋積歲二十而至巳巳為正陽陰實從之自巳懷壬男左旋十月而生於寅女右旋十月而生於申申為三陰寅為三陽而生育之時著矣其稟賦也體有剛柔脈有強弱氣有多寡血有盛衰皆一定而不易也十九難曰男生於寅寅為木陽也女子生於申申為金陰也楊氏注云元氣起於子人之所生也男從子左行三十女從子右行二十俱至於巳為夫婦懷妊也古者男子三十女年二十然後行嫁娶十月而生者男從巳左行至寅為十月故男行年起於丙寅女從巳右行至申為十月故女行年起於壬申以至分野異域則所產有多寡之宜吉事有祥則所夢各應其類是故荊楊薄壤多女雍冀厚壤多男熊羆為國子之祥蛇虺為女子之祥是皆理之可推也周官職方氏揚州其民三男五女荊州其民一男二女雍州其民三男二女冀州其民五男三女詩斯干篇名吉夢維何維熊維羆維虺維蛇大人占之維熊維羆男子之樣維虺維蛇女子之祥胎化之法有所謂轉女為男者亦皆理之自然如食牝雞取陽精之全於大產者帶雄黃取陽精之全於地產者千金方轉女為男丹參丸用東門上雄雞頭又方取雄黃一兩縫囊盛帶之本草丹雄雞補虛溫中通神殺毒其肝補腎其冠血益陽雄黃人佩之鬼神不能近毒物不能傷操弓矢藉斧斤取剛物之見於人事者氣類潛通造化密移必於三月兆形之先蓋方儀則未具陽可以勝陰變女為男理固然也巢氏論云妊娠三月始胎形象始化未有定儀見物而變欲得男者操弓矢食雄雞氣質生成章第七具天地之性集萬物之靈陰陽平均氣質完備咸其自爾然而奇偶異數有衍有耗剛柔異用或強或羸血榮氣衛不能逃於消息盈虛之理則稟氣之初詎可一概論耶是以附贅垂疣駢拇枝指侏儒跛蹩形氣所賦者有如此者瘡瘍癰腫聾盲喑啞瘦瘠疲瘵氣形之病有如此者然則胚胎造化之始精移氣變之後保衛輔翼固有道矣孝經云天地之性人為貴書秦誓曰惟人萬物之靈天有五氣各有所湊地有五味各有所入所湊有節適所入有度量凡所畏忌悉知戒慎資物為養者理固然也故寢興以時出處以節六節藏象論曰天食人以五氣地食人以五味王冰云天以五氣食人者臊氣湊肝焦氣湊心香心湊脾腥氣湊肺腐氣湊腎地以五味食人者酸味入肝苦味入心甘味入脾辛味入肺鹹味入腎也可以高明可以周密使霧露風邪不得投間而入因時為養者理宜然也故必調喜怒寡嗜欲禮記月令仲夏之月可以居高明可以處臺榭脈要精微論云冬日在骨蟄蟲周密君子居室夏則順陽在上故可以高明冬則順陽氣之伏藏故可以周密作勞不妄而氣血從之皆所以保攝妊娠使諸邪不得干焉天真論岐伯曰上古之人其知道者不妄作勞故能形與神俱而盡終其天年通天論曰聖人陳陰陽筋脈和同骨體堅固氣血皆從苟為不然方授受之時一失調養則內不足以為中之守外不足以為身之強氣形弗克而疾疚因之脈要曰五臟者中之守也得守者生失守者死又曰五臟者身之強也得強則生失強則死若食兔唇缺食犬無聲食雜魚而生瘡癬之屬皆以食物不戒之過也孫真人養胎法云妊娠食兔肉令子缺唇食犬肉令子無音聲食干鯉魚令子患瘡癬異法方論云食之使人熱中注云魚發瘡心氣大驚而癲疾奇病論帝曰人生而病癲疾者何岐伯曰名為胎病此得之在腹中時其母有所大驚氣上不下精氣並居故令子發為癲疾也腎氣不足而解顱巢氏云解顱者言小兒年雖長而囟門不合頭縫開解是皆由腎氣不成故也腎主骨髓而腦為髓海腎氣不成則腦髓不足不能成故頭顱開解脾胃不和而羸瘦巢氏曰夫羸瘦不生肌膚皆為脾胃不和不能飲食故血氣衰微不能榮於肌膚也凡小兒在胎而遇寒或生而伏熱皆令兒不能食故羸瘦也心氣虛乏而神不足皆由氣血不調之故也誠能推而達之使邪氣無所乘茲乃生育相待而成者病源云肺主氣心主脈而血氣通矣臟腑循行經絡產則血氣傷損臟腑不足而心統領諸臟使其勞傷不足則令驚悸恍惚是心氣虛也故曰大不人不因法言云天不人不因人不天不成轉女為男法第八一婦人懷娠未滿三月男女未定形象未成故藥餌方術可以轉令生男者理或有之其法以斧置妊婦床下系刃向下勿令人知恐勿信試令雞抱卵時依此置窠下一窠盡出雄者又自初覺有娠取弓弩弦縛婦人腰下滿百日去之此紫宮玉女秘法也又妊娠三月已前以雄雞尾尖上長毛三莖潛安婦人臥席下又取夫發及手足甲潛安臥席下俱勿令知之又妊娠才滿三月要男者以雄黃半兩衣中帶之要女者以雌黃帶之以上諸法試之良有驗也
