body:
  text: 卷十三妊娠數墮胎方論第一夫胎乃陽施陰化榮衛調和經養完全十月而產若血氣虛損不能養胎所以數墮也凡妊婦腰痛多墮胎愚按丹溪先生曰陽施陰化胎孕乃成血氣虛乏不能榮養其胎則墜譬如枝枯則果落藤萎則花墜嘗治賈氏婦每有孕至三月前後必墜診其脈左右大而無力重則澀知其血虛也補其中氣使血自榮時正初夏教以濃煎白朮湯下黃芩末二錢與數十帖得保而生因而思之墮於內熱而虛者於理為多曰熱曰虛蓋孕至三月上屬相火所以易墮不然何以黃芩熟艾阿膠等為安胎之妙如此也大抵治法須審某月屬某經育養而藥之附治驗一妊婦五月服剪紅丸而胎墮及腹脹痛乃服破血之劑痛益甚手不敢近予曰此峻藥重傷脾胃也用八珍倍加參耆半夏乳香沒藥二劑而痛止數劑而安吳江庠史萬湖仲子室年二十餘疫疾墮胎時咳服清肺解表之藥喘急不寐予以為脾土虛而不能生肺金藥復損而益甚也先與補中益氣加茯苓半夏五味炮姜四劑漸愈後往視之用八珍加五味及十全大補湯而愈一方鯉魚二斤者一尾粳米一升用鹽醬煮食甚善月食三次芎藭補中湯杜仲丸治氣虛而胎墜附方十全大補湯八珍湯二方見二十卷第四論補中益氣湯方見二十四卷第六論妊娠胎不長方論第二夫妊娠胎不長者因有宿疾或因失調以致臟腑衰損氣血虛弱而胎不長也當治其疾疚益其氣血則胎自長矣愚按前症更當察其經絡審其所因而治之附治驗一妊婦胎六月體倦懶食面黃晡熱而胎不長因勞欲墜此脾氣不足也用八珍湯倍加參朮茯苓三十餘劑脾胃漸健而長矣一妊婦因怒寒熱往來內熱晡熱脅痛嘔吐胎至八月而不長此因肝脾鬱怒所致用六君加柴胡山梔枳殼紫蘇桔梗病愈而胎亦長矣黃耆湯治妊娠不長更安胎和氣黃耆炒白朮炒陳皮麥門冬去心白茯苓前胡人參各五分川芎甘草炒三分上薑棗水煎服集驗用鯉魚長尺許如食法飲其汁其胎漸大而長矣附方六君子湯方見二十四卷第六論八珍湯方見二十四卷第四論妊娠胎動不安當下方論第三夫人以胃壯實衝任榮和則胎得所如魚處淵若氣血虛弱無以滋養其胎終不能成也宜下之以免其禍愚按前症宜用第十二卷方論主之其胎果不能安者方可議下慎之慎之附治驗鴻臚張淑人痢疾後胎動心神不安肢體殊倦用八珍散二十餘劑漸愈因勞加煩熱頭痛以大劑補中益氣湯加蔓荊子治之熱痛頓止仍用前散又五十餘劑而安其後生產甚易桂心散治妊娠因病胎不能安者可下之桂心瓜蔞牛膝瞿麥各五分當歸一錢上水煎又方牛膝一兩酒一鍾煎七分作二服小品方用麥糵一升擂碎水二升煮一升服之神效觀麥糵能損氣破血如此脾胃虛弱飲食不化者不宜用明矣文仲取雞子一枚鹽三錢服之立下佛手散服之胎死者即下生者亦安方見十二卷第七論附方八珍散方見二十四卷第四論補中益氣湯方見二十四卷第六論妊娠墮胎後血下方論第四墮胎後復損經脈而下血不止甚則煩悶至死皆以調補胃氣為主愚按前症若肝經血熱用四物參朮山梔肝經風熱用防風黃芩丸肝經怒火用加味逍遙散脾經氣虛用四君歸地脾經鬱滯用加味歸脾湯氣滯不和用紫蘇飲胃氣下陷用補中益氣湯附治驗一妊婦墮胎昏憒不時吐痰自用養血化痰之劑昏憒不省自汗發搐痰涎湧出彼以為中風欲用祛風化痰予曰此屬脾氣虛寒所致用十全大補湯加炮姜二十餘劑尋愈治妊娠損動下血腹痛阿膠一兩炒艾葉半兩水一大盞煎治墮胎下血煩滿寒熱狂悶鎊鹿角炒為末每服三錢水調下日三服或家鴿翎燒為末每服二錢溫酒下良久再服以效為度附方四物湯補中益氣湯二方見二十四卷第六論紫蘇飲方見十二卷第八論防風黃芩丸方見十二卷第六論加味逍遙散加味歸脾湯十全大補湯三方見二十四卷第四論妊娠未足月欲產方論第五妊娠未足月而痛如欲產或應產而難或為子煩用知母一味蜜丸桐子大粥飲服之或槐子蒲黃等分為丸酒服或蒲黃水調錢許並效愚按小產重於大產蓋大產如瓜熟自脫小產如生採斷其根蒂豈不重哉而人輕忽死於是者多矣大抵治法宜補形氣生新血去瘀血為主若未足月痛而欲產用芎歸補中湯倍加知母止之產而血不止人參黃耆湯補之產而心腹痛當歸川芎湯主之元氣弱而欲產八珍湯固之出血過多而發熱聖愈湯治之若汗不止或昏憒喘咳急用獨參湯若發熱煩躁或肉瞤筋惕用八珍湯大渴面赤脈洪而虛者用當歸補血湯身熱面赤脈沉而微者用四君姜附以回其陽可也附治驗方藥一妊娠八月胎欲墜如產臥久少安日晡益甚此氣血虛弱朝用補中益氣湯加茯苓半夏隨愈更以八珍湯調理而安當歸川芎湯治小產後瘀血心腹疼痛或發熱惡寒當歸川芎熟地黃自制白芍藥炒玄胡索炒紅花香附青皮炒澤蘭牡丹皮桃仁上水煎入童便酒各小半盞服若以手按腹愈痛此瘀血為患宜用此藥或失笑散消之若按之不痛此是血虛宜用四物參苓白朮若痛而作嘔此是胃虛宜用六君子若痛而作瀉此是脾虛宜六君子送二神丸芎歸補中湯治氣血虛而欲產艾葉代姜阿膠炒川芎五味子杵炒黃耆炙當歸白朮炒人參杜仲炒各一錢甘草炙五分上每服五錢水煎服若脾氣虛弱須補中益氣湯若氣虛而有火宜用安胎飲人參黃耆湯治小產氣虛血下不止人參黃耆炒當歸炒白朮炒白芍藥炒艾葉各一錢阿膠炒二錢上作一劑水煎服當歸散治產後氣虛弱惡露內停憎寒發熱宜服此藥當歸白芍藥炒川芎黃芩炒各一兩白朮五錢上為細末溫童便調下二錢聖愈湯方見二十四卷第九論獨參湯方見三卷第十三論當歸補血湯八珍湯二方見二十四卷第四論補中益氣湯方見二十四卷第六論斷產方論第六易曰天地之大德曰生然婦人有臨產艱難或生育不已而欲斷之故錄驗方以備所用若服水銀虻蟲水蛭之類不惟孕不復懷且禍在反掌愚按前症用蠶故紙尺許燒灰為末產後酒服之血虛者終不復孕大抵斷產之劑多用峻厲往往有不起者是則產之害未若斷產之害也吾聞閣老張羅峰太常李恆齋俱因服斷產之劑自謂形體俱怯遇勞必病有由然矣千金斷產用油煎水銀一日方息空心服棗大一丸永斷其孕且不損人千金去胎大麴五升清酒一斗煮二沸去滓分五服隔宿勿食旦再服其胎如糜母無所苦千金不傳四物湯每服五錢加蕓薹子二撮於經行後空心溫服妊娠咳嗽方論第七夫肺內主氣外司皮毛皮毛不密寒邪乘之則咳嗽秋則肺受之冬則腎受之春則肝受之夏則心受之其嗽不已乃傳於腑妊娠病久不已則傷胎也愚按前症若秋間風邪傷肺用金沸草散夏間火邪剋金用人參平肺散冬間寒邪傷肺用人參敗毒散春間風邪傷肺用參蘇飲若肺脾氣虛用六君芎歸桔梗若血虛四物桑皮杏仁桔梗腎火上炎用六味丸加五味子煎服脾胃氣虛風寒所傷則補中益氣加桑皮杏仁桔梗蓋肺屬辛金生於己土嗽久不愈者多因脾土虛而不能生肺氣而腠理不密以致外邪復感或因肺氣虛不能生水以致陰火上炎所致治法當壯土金生腎水為善諸臟腑嗽見六卷第十一等論附治驗一妊娠氣喘痰甚諸藥不效素有帶下始於目下浮兩月餘其面亦然此氣虛而有痰飲也用六味丸料數劑而愈一妊婦嗽則便自出此肺氣不足腎氣虧損不能司攝用補中益氣湯以培土金六味丸加五味以生腎氣而愈一妊婦咳嗽其痰上湧日五六碗許諸藥不應予以為此水泛為痰用六味丸料及四君子湯各一劑稍愈數劑而安一妊婦因怒咳嗽吐痰兩脅作痛此肝火傷肺金以小柴胡湯加山梔枳殼白朮茯苓治之而愈但欲作嘔此肝侮脾也用六君子加柴胡升麻而痊桔梗散治風寒咳嗽喘急不食天門冬去心桑白皮桔梗炒紫蘇各五分赤茯苓一錢麻黃去節二分貝母人參甘草炒上姜水煎馬兜鈴散治咳嗽氣喘馬兜鈴苦梗人參甘草貝母各五分陳皮去白大腹皮黑豆浸洗紫蘇桑白皮各一錢五味子五分上姜水煎百合散治咳嗽胸膈煩悶川百合紫菀麥門冬苦梗桑白皮各五分甘草三分竹茹二分上姜水煎治妊娠傷寒涎多咳嗽知母杏仁天門冬桑白皮各五分上姜水煎服旋覆花湯治感冒喘嗽胸滿痰盛方見二十二卷第四論華蓋散治症同上或項背拘急鼻塞頭眩時發寒熱方見六卷第十二論參蘇飲加杏仁五味子治症同上附方金沸草散方見六卷第十二論人參平肺散方見二十四卷第十二論人參敗毒散方見二十四卷第十論補中益氣湯四君子湯六君子湯三方見二十四卷第六論六味丸方見二十四卷第十一論小柴胡湯方見二十四卷第二論妊娠吐血衄血方論第八妊娠吐血由七情臟腑所傷氣逆於上致血不溢不止心悶甚者多死或墜胎也宜用局方必勝散愚按前症若肝經怒火先用小柴胡山梔生地次用前藥合四物後用加味逍遙散肝經風熱防風子芩丸心經有熱硃砂安神丸心氣不足補心湯思慮傷心妙香散胃經有火犀角地黃湯膏粱積熱加味清胃散鬱結傷脾加味歸脾湯肺經有火黃芩清肺飲因氣鬱滯紫蘇飲子氣不攝血用補中益氣湯腎經虛火加味六味丸仍以七卷第五論互用附治驗方藥一妊娠因怒吐血兩脅脹痛小便淋澀此怒而血蓄於上隨火出也用小柴胡合四物四劑血止用六君子安胎飲調理而安紫蘇飲治妊娠失調胎氣不安上攻作痛或逆氣失血方見十二卷第八論若肝脾氣血虛而有火不安宜兼逍遙散若脾氣虛弱而不安宜四君芎歸小柴胡湯方見二十四卷第二論四物湯補中益氣湯六君子湯三方見二十四卷第六論加味逍遙散加味歸脾湯二方見二十四卷第四論防風子芩丸方見十二卷第六論硃砂安神丸方見三卷第十論養心湯方見三卷第十論妙香散方見三卷第十一論安胎飲方見十二卷第一論犀角地黃湯方見七卷第六論加味清胃散方見二十四卷第一論加味六味丸方見二十四卷第十一論妊娠子煩方論第九論曰妊娠苦煩悶者以四月受少陰君火以養精六月受少陽相火以養氣若母心驚膽寒多有是症產寶云是心肺虛熱或痰積於胸若三月而煩者但熱而已若痰飲而煩者吐涎惡食大凡停痰積飲寒熱相搏吐甚則胎動不安愚按前症若因內熱用竹葉湯氣滯用紫蘇飲痰滯用二陳白朮黃芩枳殼氣鬱用分氣飲加川芎脾胃虛弱用六君紫蘇山梔附治驗一妊婦煩熱吐痰惡食噁心頭暈此乃脾虛風寒為患用半夏白朮天麻湯以補元氣祛風邪數劑漸愈惟頭暈未痊乃用補中益氣湯加蔓荊子以升補陽氣而愈竹葉湯治子煩防風黃芩炒麥門冬各一錢白茯苓二錢上竹葉數片水煎服人參散治熱乘心脾煩熱乾渴人參麥門冬赤茯苓地骨皮乾葛黃芩炒犀角鎊各一錢甘草五分上水煎竹茹湯治妊娠煩躁或胎不安淡竹茹一兩水煎服之益母丸知母炒為末棗肉丸彈子大每服一丸人參煎湯下附方分氣飲治脾胃虛弱氣血不和胸膈不利或痰氣喘嗽飲食少思陳皮茯苓半夏炒桔梗大腹皮紫蘇梗枳殼麩炒白朮炒山梔炒各一錢甘草炙五分上姜水煎服紫蘇飲方見二十四卷第八論二陳湯方見二十四卷第五論六君子湯補中益氣湯二方見二十四卷第六論妊娠煩躁口乾方論第十足太陰脾之經其氣通於口手少陰心之經其氣通於舌若臟腑不調氣血不和以致內熱乘於心脾津液消爍放心煩口乾也與子煩大同小異宜用益母丸愚按前症若胃經實火用竹葉石膏湯若胃經虛熱用人參黃耆散若胃經氣虛用補中益氣湯若肺經虛熱用紫蘇飲若肝經火動用加味逍遙散若脾氣鬱結用加味歸脾湯若腎經火動加味地黃丸附治驗一妊婦煩熱兼咽間作痛用知母散加山梔以清肺經而愈後內熱咳嗽小便自遺用補中益氣加麥門山梔以補肺氣滋腎水而痊知母散治煩躁悶亂口乾知母麥門冬黃耆炒子芩炒赤茯苓各一錢甘草上水煎入竹瀝一合更煎二沸而服人參黃耆散治身熱煩躁口乾人參黃耆炒葛根秦艽赤茯苓麥門冬各一錢知母甘草五分上姜三片竹葉二七片水煎補遺人參白朮散黃耆六一湯皆良附方竹葉石膏湯石膏一錢半夏一錢五分甘草人參各一錢麥門冬竹葉各五分上姜水煎服補中益氣湯方見二十四卷第六論紫蘇飲方見十二卷第八論加味逍遙散加味歸脾湯二方見二十四卷第四論加味地黃丸方見二十四卷第十一論
