body:
  text: 卷六婦人熱勞方論第一婦人熱勞由心肺壅熱傷於氣血以致心神煩躁頰赤頭疼眼澀唇乾口舌生瘡神思昏倦四肢壯熱食飲無味肢體痠疼心怔盜汗肌膚日瘦或寒熱往來當審其所因調補氣血其病自愈矣愚按前症乃壯火食氣虛火煎熬真陰之所致也王太僕云如大寒而甚熱之不熱是無火也熱來復去晝見夜伏夜發晝止是無火也當治其心如大熱而甚寒之不寒是無水也熱動復止倏忽往來時動時止是無水也當助其腎心盛則生熱腎盛則生寒腎虛則寒動於中心虛則熱收於內竊謂前症若肝脾血虛用四物參術肝脾鬱怒小柴胡合四物湯脾胃氣虛補中益氣湯肝脾血虛加味逍遙散肝經風熱加味小柴胡湯心經血虛天王補心丹肺經氣虛人參補肺湯肝經血虛加味四物湯大抵午前熱屬氣分用清心蓮子飲午後熱屬血分用四物參朮丹皮熱從左邊起肝火也實則四物龍膽山梔虛則四物參朮黃耆熱從臍下起陰火也四物參朮黃柏知母酒拌炒黑五味麥門肉桂如不應急用加減八味丸不時而熱或無定處或從腳心起此無根虛火也用加減八味丸及十全大補湯加麥門五味主之附治驗一婦人經行不調飲食少思日晡熱甚余以為肝脾氣血俱虛用十全大補加山茱山藥丹皮麥門五味而愈次年秋寒熱如瘧仍用前藥而愈一婦人生育多胎月經不調兩足發熱年餘其身亦熱勞則足痠痛又年許唇腫裂痛又半年唇裂見血形體瘦倦飲食無味月水不行此氣血俱衰之症彼誤用通經丸等藥復傷氣血遂致不起惜哉黃耆散治發熱羸瘦心躁口乾不欲飲食或盜汗晡熱人參黃芩炒焦當歸各三錢柴胡五分黃耆炒地骨皮白茯苓麥門冬去心生地黃白芍藥炒各一錢甘草炒三分上水姜煎豬肚丸治熱勞羸瘦柴胡赤茯苓人參黃耆各一兩黃連炒三兩地骨皮木香各半兩桃仁去皮尖鱉甲各一兩上為末用嫩豬肚一枚入藥縫合蒸熟研爛丸桐子大每服三五十丸食前米飲下日二服附方清心蓮子飲治熱在氣分口乾小便白濁夜間安靜晝則發熱又治口舌生瘡或口苦咽乾煩躁作渴小便赤澀下淋下止或莖中作痛黃芩炒麥門冬去心地骨皮車前子炒甘草各一錢半石蓮肉茯苓黃耆炒柴胡去苗人參各一錢上每服五錢水煎補中益氣湯加味四物散四物湯三方見二十四卷第六論加味小柴胡湯小柴胡湯二方見二十四卷第二論十全大補湯加味逍遙散二方見二十四卷第四論天王補心丹寧心保神益血固精壯力強志令人不忘清三焦化痰涎祛煩熱除驚悸療咽乾育養心神人參去蘆茯苓玄參丹參桔梗遠志各五錢當歸酒浸五味麥門冬去心天門冬柏子仁酸棗仁炒各一兩生地黃四兩上為末煉蜜丸桐子大用硃砂為衣每服二三十丸臨臥竹葉煎湯送下一方多石菖蒲熟地黃杜仲百部茯神甘草此方內天麥門冬玄參生地雖能降火生血化痰然其性沉寒損傷脾胃克伐生氣若人飲食少思大便不實者不宜用人參補肺湯方見二十四卷第十二論加減八味丸方見二十四卷第十一論婦人客熱方論第二婦人客熱由元氣虛而外熱乘之以致口燥心煩四肢壯熱肌肉消瘦治法當審其因而調補之愚按前症若客邪所侵用補中益氣加川芎防風肝虛血少六味地黃丸胃火飲冷錢氏瀉黃散胃虛飲湯七味白朮散潮熱時熱八珍湯晡熱內熱逍遙散發熱體倦補中益氣湯恚怒發熱小柴胡湯鬱怒發熱加味歸脾湯寅卯酉戌時熱升陽益胃湯附治驗一婦人素有胃火服清胃散而安後因勞役燥渴內熱肌肉消瘦月經不行此胃火消爍陰血用逍遙散加丹皮炒梔以清胃熱用八珍湯加茯神遠志以養脾血元氣充足而經自行矣麥門冬散治四肢倦痛煩悶不食或寒熱往來麥門冬去心柴胡赤茯苓羚羊角鎊赤芍藥桑白皮炒黃耆炒各四分生地黃甘草炒各三分上姜水煎附方補中益氣湯方見二十四卷第六論六味丸方見二十四卷第十一論瀉黃散方見五卷第三論七味白朮散方見二十卷第二論加味歸脾湯逍遙散二方見二十四卷第四論小柴胡湯方見二十四卷第二論升陽益胃湯方見三卷第九論清胃散方見二十四卷首論婦人寒熱方論第三經曰陽不足則先寒後熱陰不足則先熱後寒皆由勞傷氣血陰陽不調寒熱如瘧也當分氣血虛實而治之愚按前症若寸口脈微名曰陽不足則陰氣上入於陽中用補中益氣湯若尺部脈弱名曰陰不足則陽氣下陷入陰中用益陰腎氣丸若因氣血俱虛用八珍湯若因怒動肝火用小柴胡湯若陰陽俱不足則氣血不歸其本部以致寒熱交爭也附治驗一婦人年六十有四久鬱怒頭痛寒熱春間乳內時痛服流氣飲之類益甚時有血如經行又大驚恐飲食不進夜寐不寧兩乳腫脹兩脅焮痛午後色赤余以為肝脾鬱怒火燥先以逍散加酒炒黑龍膽一錢山梔一錢五分服二劑腫痛頓愈又二劑全愈再用歸脾湯加炒梔貝母諸症悉愈地骨皮散治血風氣虛時作寒熱或晡熱內熱柴胡地骨皮各一兩桑白皮炒枳殼麩炒前胡黃耆炒各五分白茯苓五加皮人參甘草桂心白芍藥各三分用姜水煎服柴胡散治寒熱體痛口乾心煩飲食少思肌體消瘦柴胡黃耆炒赤茯苓炒白朮各一錢人參地骨皮枳殼麩炒生地黃苦梗桑白皮炒赤芍藥各三分鱉甲炙二錢麥門冬去心一錢甘草三分上用姜水煎服益陰腎氣丸治諸臟虧損發熱晡熱潮熱盜汗或寒熱往來五心煩熱或口乾作渴月經不調或筋骨疲倦飲食少思或頭目不清痰氣上壅咳嗽晡甚胸膈痞悶或小便赤數兩足熱痛或腳足痿軟肢體作痛等症此壯水之主以制陽光之劑也澤瀉茯苓牡丹皮生地酒拌杵膏山藥茱萸肉當歸五味子炒杵熟地自制杵膏上為末入二膏加煉蜜丸桐子大硃砂為衣每服五十丸空心淡鹽湯下補中益氣湯方見二十四卷第六論六味丸方見二十四卷第十一論小柴胡湯方見二十四卷第二論八珍湯逍遙散歸脾湯三方見二十四卷第四論寡婦寒熱如瘧方論第四倉公傳與褚氏論皆雲師尼寡婦獨陰無陽欲心萌而不遂是以懨懨成病以致乍寒乍熱而類瘧狀久則為勞又有經閉白淫痰逆頭風膈氣痞悶面䵟瘦瘠等證皆寡婦之病診其脈獨肝脈弦出寸口而上魚際皆血盛而致經云男子精盛則思室女人血盛則懷胎觀其精血思過半矣愚按前症若肝脈弦出魚際用生地黃丸血虛佐以四物湯若兼怒動肝火而寒熱佐以加味逍遙散若虧損肝經而寒熱佐以八珍湯若虧損元氣而寒熱佐以補中益氣湯若郁傷脾氣而寒熱佐以濟生歸脾湯附治驗一寡婦不時寒熱脈上魚際此血盛之症用小柴胡湯加生地黃治之而愈但畏風寒此脾胃氣虛用加味歸脾補中益氣湯兼服而止一婦人因夫久出經商發寒熱月經旬日方止服降火涼血藥內熱益甚自汗盜汗月經頻數余曰內熱自汗乃脾氣虛弱也月經頻數乃血不歸脾也用歸脾湯六味丸而愈一室女寒熱肝脈弦長而出寸口用小柴胡湯加生地烏梅治之而愈既嫁而諸症悉痊一室女久患寒熱月經失期以小柴胡湯加生地治之少愈更以生地黃丸而病痊生地黃丸許學士云有一師尼惡風體倦乍寒乍熱面赤心煩大小柴胡湯雜進其病益劇豫診視之曰三部脈無寒邪但肝脈弦長而上魚際服此丸而愈柴胡秦艽黃芩各半兩生地黃一兩酒濕杵膏赤芍藥一兩上為末煉蜜丸桐子大每服三十丸烏梅湯下日三服附方補中益氣湯四物湯二方見二十四卷第六論加味逍遙散八珍湯加味歸脾湯歸脾湯四方見二十四卷第四論小柴胡湯方見二十四卷第二論六味丸方見二十四卷第十一論婦人惡寒方論第五婦人惡寒有陰陽二證發熱而惡寒者發於陽也無熱而惡寒者發於陰也發於陽者脈浮數宜解表發於陰者脈沉細宜溫里凡惡寒不可過覆衣被及近火熱若寒熱相搏令人寒甚若寒氣入腹血氣結聚最難治療愚按前症若怠惰嗜臥灑淅惡寒乃陽不能伸發用升陽益胃湯若勞傷形氣而惡寒乃無陽以護衛用補中益氣湯若飲食傷脾胃而惡寒乃元氣虛損用六君子湯若加煩躁妄言或欲飲水仍進前劑但加薑桂若體倦煩渴頭痛自汗用補中益氣加五味麥門東垣云晝則發熱惡寒是陰氣上溢於陽分也夜中惡寒是陰血自旺於陰分也海藏云六月大熱之氣反得大寒之症當舍時從症治以薑桂之類丹溪云久病惡寒乃痰鬱於脾抑遏陽氣不得外泄治當解鬱附方升陽益胃湯方見三卷第九論補中益氣湯六君子湯二方見二十四卷第六論婦人血風煩悶方論第六婦人血風煩悶由勞傷氣虛而風邪乘之血氣不和以致肢節熱疼口乾不臥而煩悶也當調補元氣為主愚按前症多屬肝脾血虛發熱當參照前寒熱方論主治赤芍藥散治煩悶不食體倦頭眩身體疼痛等症赤芍藥酒炒白茯苓各一錢甘草炒柴胡各五分上薑棗水煎婦人血風攻脾不食方論第七夫脾為中州意智之臟也諸經皆賴其養與胃為表裡胃主司納脾主腐化若勞傷真氣外邪乘之諸症生焉愚按經云胃乃脾之剛脾乃胃之柔傷胃則脾無所稟受傷脾則不能為胃運化是以脾胃為之表裡藉飲食以滋養百脈者也竊謂前症若飲食所傷六君子湯勞役所傷補中益氣湯風寒所傷用人參理中湯木旺乘土六君加柴胡嘔吐腹痛或大便不實前湯加木香胸膈虛痞或肚腹不利六君子湯鬱怒傷損肝脾歸脾湯命門火衰八味丸仍審諸經錯雜之症而治之假如不能食而肌肉削乃脾胃經本病右關脈緩而弱乃脾胃之本脈若見弦緊或四肢滿悶淋溲便難轉筋此肝之脾胃病也若兼洪大或肌熱煩熱面赤此心之脾胃病也若兼浮澀或氣短而喘急咳嗽痰盛此肺之脾胃病也若兼沉細或善恐善缺此腎之脾胃病也各當於本經藥中加兼症之藥此東垣先生之治法也附治驗方藥一婦人停食飽悶或用人參養胃湯木香檳榔丸而泄瀉吐痰腹中成塊又與二陳黃連厚朴反加腹脹不食余以為脾胃氣虛不能消磨用補中益氣加茯苓半夏五十餘劑脾胃健而諸症痊一婦人飲食每用碗許若稍加非大便不實必吞酸噯腐或用二陳黃連枳實反加內熱作嘔余曰此本虛寒中不信仍作火治虛症悉至月經不止余用六君加炮薑木香數劑諸症漸退又以補中益氣加炮薑木香茯苓半夏數劑全愈後因飲食勞倦兼以怒氣飲食頓少元氣頓怯仍用前藥更加發熱脈洪大按之而虛兩尺如無此命門火衰用補中益氣加薑桂及八味丸兼服兩月餘諸症尋愈此症若因中氣虛弱用人參理中湯或六君子加木香炮姜不應用左金丸或越鞠丸虛寒加附子理中湯無有不愈一婦人飲食後或腹脹或吞酸自服枳朮丸飲食日少胸膈痞滿腿內痠痛畏見風寒或用養胃湯腿痛浮腫益甚月經不行余以為鬱結所傷脾寒濕熱下注侵晨用四君芎歸二陳午後以前湯送越鞠丸諸症漸愈又用歸脾八珍二湯兼服兩月餘而經行一婦人胸滿少食或腹脹吞酸或經候不調此中氣虛而不能施化也用補中益氣加砂仁香附煨姜而飲食進更以六君芎歸貝母桔梗而經自調一婦人年三十餘忽不進食日飲清茶水果三年餘矣余謂脾氣鬱結用歸脾湯加吳茱萸四劑遂飲食如常若人脾腎虛而不飲食當以四神丸治之一婦人不進飲食二年矣日飲清茶果品之類肝脾二脈弦浮按之微而結滯余謂肝脾氣鬱用六君木香吳茱下痰積甚多飲食頓進形體始瘦臥床月餘仍服六君之類而康越鞠丸治郁傷氣滯以致胸膈痞悶或肚腹膨脹或咽喉不清或痰氣不爽或飲食少思或吞酸噯腐宜用此藥清之若人脾胃虛弱用六君子湯為主大凡中氣虛弱變症百出難以名狀但用四君補其脾胃元氣漸復諸症自退若用治病之藥則誤矣香附蒼朮炒川芎梔子炒神麯炒山楂各等分上為末用神麯糊丸緑豆大每服六七十丸食遠白湯送下四君子湯六君子湯補中益氣湯三方見二十四卷第六論八味丸方見二十四卷第十一論人參養胃湯方見七卷第六論二陳湯方見二十四卷第五論左金丸方見七卷第十七論人參理中湯附子理中湯二方見二十卷第六論歸脾湯八珍湯二方見二十四卷第四論二神丸四神丸二方見八卷第八論婦人夢與鬼交方論第八人稟五行秀氣而生承五臟神氣而養若調理失節血氣虛甚則鬼邪干其正隱避而不欲見人時獨言笑或時悲泣是其候也脈息遲伏或如鳥啄或綿綿而來不知度數面顏不變亦其候也愚按前症多由七情虧損心血神無所護而然也宜用安神定志等藥則正氣復而神自安若脈來乍大乍小乍短乍長亦為鬼祟也宜灸鬼哭穴以患人兩手拇指相併用線緊扎當合縫處半肉半甲間灼艾灸七壯若果是邪祟病者即乞求免灸云我自去矣茯神散治妄有所見言語雜亂時或昏昧痰熱茯神一兩半炒茯苓人參石菖蒲各一錢赤小豆五分上水煎服桃仁丸治與鬼魅交通辰砂另研檳榔當歸桃仁各三錢水銀一錢棗肉一個研令星盡麝香阿魏麵裹煨沉香各半兩上為末煉蜜丸桐子大每服十丸空心桃仁湯下闢瘟丹虎頭骨二兩硃砂雄黃雌黃鬼臼皂莢蕪荑仁鬼箭羽黎蘆各一兩上為末煉蜜丸彈子大囊盛一丸男左女右係臂上及用一丸當病人戶前燒之一切邪鬼不敢近妙香散治心氣不足精神恍惚夢與鬼交語言錯亂先服此補氣血鎮心安神然後以前方治之方見三卷第十三論婦人傷寒傷風方論第九傷寒之症若氣口脈緊盛即下之人迎緊盛即汗之左關浮緊亦當發其汗若犯胃熱譫語喜忘小腹滿小便自利用抵當湯胃實譫語用承氣湯脈緊無汗名傷寒脈緩有汗為傷風熱病脈洪大為中暑用香薷飲脈細弱為中暍用白虎湯胃實用承氣湯傷寒先服黃龍湯不分男女但妊娠用藥宜清涼不可輕用桂枝半夏桃仁朴硝等類凡用藥病稍退則止不可盡劑此為大法愚按前症當宗仲景先生治法但胎前産後須以安胎補益為主須臨症審之黃龍湯即小柴胡湯去半夏桂枝紅花湯治傷寒發熱口燥舌乾經脈不來桂枝芍藥甘草炒各一錢紅花二錢上薑棗水煎服良久再進汗出可解黃芩芍藥湯治婦人內熱口燥咽乾腹滿不食黃芩炒芍藥酒炒白朮熟地黃自制各一錢上水煎寒加生薑當歸湯治傷寒喘急煩躁或戰而作寒此陰陽俱虛不可下宜服此藥柴胡一錢白朮炒七分人參甘草炒赤芍藥當歸各五分五味子杵炒木通各三分上用水薑棗煎瀉心三黃湯治傷寒六七日內有燥屎大便祕結譫語目赤毒氣閉塞大黃煨黃芩炒黃連炒各一錢上水煎服取微利如目赤睛疼加赤茯苓竹葉燒裩散治女子病新瘥與男子交者名曰陰易其證則裡急胯痛頭重不舉目中生花或頭面烘熱耳中蟬鳴胸中煩悶甚者百節解散用男子舊裩襠著左腹者剪取一塊燒灰每日三服白湯下男子病則以女人者如不應用參附湯婦人熱入血室方論第十婦人傷寒傷風發熱經水適來晝則安靜暮則譫語有如瘧狀此為熱入血室治者無犯胃氣及上二焦宜服小柴胡湯若脈遲身涼當刺期門穴下針病人五吸停針良久徐徐出針凡針期門穴必瀉勿補肥人二寸瘦人寸半也愚按前症若因勞役或怒氣發熱適遇經行而患前症者亦用小柴胡加生地黃治之血虛用四物加柴胡若病既愈而熱未已或元氣素弱並用補中益氣湯脾氣素郁用濟生歸脾湯血氣素虛用十全大補湯附治驗一婦人經行感冒風邪晝則安靜夜則譫語此熱入血室也用小柴胡加生地黃治之頓安但內熱頭暈用補中益氣加蔓荊子而愈後因怒惱寒熱譫語胸腹脹痛小便頻數月經先期此肝火血熱妄行用加味逍遙加生地黃而愈一婦人因怒寒熱頭痛譫言妄語至夜益甚月經暴至此怒動肝火用加味逍遙散加生地黃治之神思頓清又用補中益氣湯而痊一婦人經行感冒譫語或用發散寒涼之劑前症益甚月經不止肚腹作痛嘔吐不食痰涎自出此熱入血室而寒復傷胃也用香砂六君及歸脾而痊乾薑柴胡湯治婦人傷寒經脈方來熱入血室寒熱如瘧或狂言見鬼柴胡一錢桂枝三分栝蔞根五分牡蠣煅乾薑炮甘草炒各三分上水煎汗出而愈海蛤散治婦人傷寒血結胸膈宜服此藥及針期門穴海蛤滑石煅水飛甘草各二分芒硝一兩上為末每服二錢用雞子清調下小腸通利其結血自散更用桂枝紅花湯發其汗則愈方見前附方小柴胡湯方見二十四卷第二論四物湯香砂六君子湯補中益氣湯三方見二十四卷第六論歸脾湯十全大補湯加味逍遙散三方見二十四卷第四論婦人咳嗽方論第十一夫肺為四臟之華蓋內統諸經之氣外司腠理皮毛若外邪入於肺中故令咳嗽當以脈息辨之浮而弦者起於風濡而弱者起於濕洪而數者起於熱遲而澀者起於寒風者散之濕者燥之熱者涼之寒者溫之虛者補之愚按丹溪云春是木氣上升夏是火氣炎上秋是濕熱傷肺冬是風寒外來當發散行痰開腠理用二陳湯加麻黃桔梗杏仁痰飲隨症加藥勞嗽宜四物加竹瀝薑汁乾咳嗽難治此症乃痰鬱火邪也用苦梗開之夏用補陰降火不已則成勞上半日多嗽者胃火也用貝母石膏午後嗽者火氣浮於肺也用五味子五倍子五更嗽者飲食之火流於肺也以貝母軟石膏肺脹而嗽或左或右不得眠此痰挾瘀血氣滯而病宜養血疏肝清痰用四物加桃仁訶子青皮竹瀝之類嗽而脅下痛宜疏肝氣以青皮挾痰實者白芥子之類血礙氣作嗽者桃仁大黃薑汁丸服治嗽多用生薑以其辛散故也痰因火動逆上作嗽者先治火次治痰以知母止嗽清肺滋陰降火夜嗽用清陰分之劑若嗽多用粟殼不必疑但要去病根此乃收斂藥也竊謂前症午前嗽屬胃火盛用竹葉石膏湯胃氣虛用補中益氣加炒山梔午後嗽屬陰血虛用四物黃柏知母二味酒拌炒黑腎水虛用六味地黃丸黃昏嗽用四物五味麥門並前丸五更嗽用六君子不得眠及兩脅下痛用六味地黃補中益氣若因氣虛腠理不密六淫所侵當祛外邪而實脾土若因心火太過當伐肝木而滋肺金若因肺金氣虛當補脾土而生肺氣若因腎水虧損虛火炎上當補肺腎以滋化源大抵風邪胃火此實熱為患易治惟肺腎虧損此真臟為患最難調治附治驗一婦人素勤苦冬初咳嗽發熱吐血盜汗遍身作痛或寒熱往來用化痰降火之藥口噤筋攣此血本虛而藥復損之耳余用八味丸為主佐以補中益氣麥門五味山藥年餘而愈一婦人咳嗽發熱嘔吐痰涎日夜約五六碗喘咳胸痞燥渴不食崩血如湧此脾土虛寒用八味丸及附子理中湯而愈全見女科撮要一婦人不得於姑患嗽胸膈不利飲食無味此脾肺俱傷痰鬱於中也先用歸脾湯加山梔撫芎貝母桔梗諸症漸愈後以六君加芎歸桔梗間服全愈一婦人咳嗽早間吐痰甚多夜間喘急不寐余謂早間多痰乃脾虛飲食所化夜間喘急乃肺虛陰火上衝用補中益氣加麥門五味而愈一婦人患咳嗽脅痛發熱日晡益甚余曰此肝脾虛熱而傷肺也用加味逍遙散加熟地治之而愈後因怒氣勞役前症仍作兼太陽痛或寒熱往來或咳嗽遺尿此肺氣虛而尿脬失制也仍用前散及地黃丸而瘥一婦人久咳嗽面色萎黃或時㿠白肢體倦怠飲食少思稍多則瀉此脾土虛而不能生肺金朝用補中益氣湯夕用六君子湯為主間佐以八珍湯三月餘漸愈後感寒邪喘嗽胸腹作脹飲食不入四肢逆冷此中氣尚虛不能充皮毛肥腠理司開闔之所致也遂用六君加生薑桔梗而愈附方法制清氣化痰丸順氣快脾化痰消食半夏南星去皮尖白礬皂角乾薑各四兩先將白礬等三味用水五碗煎取水三碗卻入半夏二味浸二日再煮至半夏南星無白點為度曬乾陳皮青皮紫蘇子炒蘿蔔子炒另研杏仁去皮尖炒研葛根神麯炒麥糵炒山楂子香附子上為末蒸餅丸桐子大每服五七十丸臨臥茶湯任下茯苓湯治胸中有痰飲吐水心胸虛滿不能進食茯苓人參白朮炒各三兩枳實炒一兩橘皮二兩半生薑四兩上用水六升煮取二升分三服加減小柴胡湯治咳嗽寒熱往來柴胡半夏黃芩炒各一錢甘草炒乾薑炮各五分五味子炒杵三分上水煎服黃連解毒湯治一切實火喘咳脈洪大或狂言煩躁口乾飲冷喘急鄭聲目睛赤痛黃連黃芩梔子黃柏各二錢上水煎服梔子仁湯治喘咳發熱潮熱發狂煩躁面赤咽痛梔子仁赤芍藥大青知母各一錢升麻黃芩石膏甘草杏仁各二錢柴胡二錢半豆豉百粒上水煎服麥門冬湯治火熱乘肺咳嗽有血胸脅脹滿五心煩熱麥門冬去心桑白皮炒生地黃各一錢半夏紫菀桔梗淡竹葉麻黃各十分五味子杵甘草各五分上姜水煎服二陳湯方見二十四卷第六論竹葉石膏湯方見十三卷第十論補中益氣湯四物湯六君子湯三方見二十四卷第六論六味丸八味丸二方見二十四卷第十一論附子理中湯方見二十卷第八論歸脾湯加味逍遙散八珍湯三方見十卷第四論咳嗽用溫藥方論第十二初虞世經曰微寒為嗽寒甚為腸澼古人立方多用乾薑桂心細辛之屬若熱在上焦而嗽虛則為肺痿實則為肺癰或因氣血不足或因酒色厚味或因重亡津液燥氣焚金故脈數發熱咳嗽膿血宜辛溫建中之屬若用柴胡鱉甲門冬葶藶等藥則誤矣愚按丹溪云陰分嗽者多屬陰虛肺脹不得眠者難治肺痿專主補氣養血清金肺氣有餘者宜瀉之以桑白皮為主半夏茯苓佐之瀉其有餘補其不足肺燥者當潤之屬熱者桔梗大力子知母雞子清聲啞者屬寒細辛半夏生薑肺虛者人參阿膠為主陰不足者六味地黃為要藥或知母茯苓湯陰虛氣喘四物加陳皮甘草以降其氣補其陰竊謂前症嗽而鼻塞聲重風邪傷肺也用參蘇飲面赤喘嗽火克肺也人參平肺散寒熱交作肝氣不和也四君加知母柴胡桔梗咳喘短氣肺虛也人參補肺湯體倦少食脾虛也參朮補脾湯口乾咽燥虛火上炎也六味丸大凡發熱喘嗽或咳唾膿血飲食不入急補脾肺滋腎水多有得生者脈浮大而面色赤者皆難治脈浮短澀者可療參蘇散治外感風寒咳嗽氣逆血蘊上焦發熱氣促或咳血衄血或痰嗽不止加黃芩山梔名加味參蘇飲人參紫蘇葉去梗半夏薑汁拌炒茯苓陳皮桔梗葛根前胡枳殼麩炒各一錢甘草炙五分上姜水煎服金沸草散治肺經受風頭目昏疼咳嗽聲重涕唾稠黏荊芥穗一錢前胡麻黃旋覆花各七分甘草炙赤芍藥半夏各五分上薑棗水煎定喘湯治痰喘胸滿坐臥不安聲重鼻塞頭昏半夏曲明阿膠炒甘草炒各五分罌粟殼一錢制五味子杵炒桑白皮炒麻黃去節人參各三分上姜三片烏梅半個水煎臨臥服金不換正氣散治肺胃虛弱咳嗽不已喘滿涎盛罌粟殼一錢制杏仁制甘草枳殼各五分上生薑烏梅水煎録驗橘皮湯治肺傷冷濕咳嗽喉中作聲上氣頭痛陳皮紫菀麻黃去根杏仁制當歸各一錢桂心甘草炒黃芩各五分炒上水煎服華蓋散治肺感寒邪咳嗽聲重胸膈煩滿頭目昏眩蘇子炒陳皮赤茯苓桑白皮炒麻黃各一錢甘草五分上姜水煎服千全五味子湯治咳嗽皮膚乾燥唾中有血胸脅疼痛五味子杵炒桔梗炒紫菀甘草炒續斷各一錢竹茹三錢赤小豆一撮生地黃桑白皮各半兩上水煎服知母茯苓湯治咳嗽不已往來寒熱自汗喘促或肺痿知母茯苓各一兩五味子杵人參薄荷半夏柴胡白朮款花桔梗麥門冬去心黃芩炒各半兩川芎阿膠甘草炙各三錢上每服一兩姜水煎小青龍湯治肺感寒咳嗽喘息加杏仁煎有汗去麻黃細辛發熱頭疼脈沉細或嘔或咳或利或噎或小便不利小腹滿脹喘嗽之聖藥瀉白湯桔梗湯人參平肺散人參補肺散參朮補肺湯五方見二十四卷十二論六味丸方見二十四卷第十一論四物湯四君子湯二方見二十四卷第六論勞嗽方論第十三經曰感於寒微則為咳甚則為泄蓋肺主氣合於皮毛邪傷皮毛則咳為肺病傳於各臟以時受邪肺為嫩臟邪易傷而難治其嗽有肺心脾腎肝風寒支飲膽之十種亦有勞嗽者華陀謂之邪嗽孫真人謂之注嗽此因酒色過度勞傷肺經重者咯唾膿血輕者時發時瘥或先嘔血而後嗽或先咳嗽而吐血此又挾邪傳疰孫真人用通氣丸夢與鬼交用四滿丸蛤蚧天靈蓋桃柳枝安息香之類若肺中有蟲入喉癢嗽須以藥含化其蟲即死嗽即止愚按仲景先生云咳而兩脅痛不能轉側兩胠滿屬於肝臟用小柴胡湯咳而嘔苦水屬膽腑黃芩半夏生薑湯咳而喉中如梗狀甚則咽腫喉閉屬心臟桔梗湯咳而大便失氣屬小腸腑芍藥甘草湯咳而右胠痛陰引肩背甚則不可動動則咳劇屬脾臟升麻湯咳而嘔嘔甚則出長蟲屬胃腑烏梅丸咳而喘息有聲甚則唾血屬肺臟升麻湯咳而失屎屬大腸腑麻黃附子細辛湯咳而遺溺屬膀胱茯苓半夏湯咳而不止三焦受之其狀腹滿不食涕唾面目浮腫氣逆異功散用之對證其效如神仍參五卷看附治驗一婦人患前證晡熱內熱寒熱往來作渴盜汗小便頻數其經兩三月一行此肝脾氣血虛損用八珍湯六味丸各六十餘劑諸症漸愈其經兩月一行仍用前二藥間以加味逍遙散各三十餘劑後恚怒適經行去血過多諸症悉至飲食少思腹脹氣促用十全大補湯數劑漸愈仍用前藥調補漸愈復因喪子胸腹不利食少內熱盜汗便血無寐用加味歸脾湯仍兼前藥而愈一婦人患前症不時發熱或時寒熱或用清熱之劑其熱益甚盜汗口乾兩足如炙遍身皆熱昏憒如醉良久熱止方蘇或晡熱至旦方止此陰血虛而陽氣弱也余朝用六味丸料夕用十全大補湯月餘諸症稍愈更兼以補中益氣湯兩月餘而愈孫師四滿丸治上氣嗽飲嗽燥嗽冷嗽邪嗽謂之五嗽乾薑炮桂心躑躅花芎藭紫菀各二兩芫花根皮二分蜈蚣一條去頭足炙細辛甘草炙鬼督郵人參半夏泡各一兩上為末煉蜜丸大豆許每服五丸米飲下日三服未應加至七八丸溫金散治勞嗽喘悶咯痰中有血方見前勞瘵類阿膠丸治勞嗽並嗽血咯血方見前勞瘵類下補遺團魚丸治骨蒸勞嗽纍效貝母前胡知母杏仁柴胡各等分生團魚二個上藥與魚同煮熟取肉連汁食之將藥焙乾為末用骨更煮汁一盞和藥丸梧子大每服二十丸煎黃耆六一湯空心送下病既安仍黃耆六一湯調理附方地骨皮散知母炒柴胡甘草炒人參地骨皮茯苓半夏薑製各一錢上姜水煎服海藏紫菀散治咳中有血虛勞肺痿人參紫菀知母炒貝母桔梗炒茯苓阿膠炒各一錢五味子杵三分甘草炙五分上姜水煎服參朮調中湯瀉熱補氣止嗽定喘和脾胃進飲食黃耆四分桑白皮五分人參炙甘草青皮白茯苓各三分五味子杵五分白朮三分地骨皮麥門冬陳皮各五分上水煎服二陳湯治脾胃虛弱中脘停痰或嘔吐噁心或頭目不清飲食少思方見二十四卷第五論異功散方見二十四卷第五論六味丸方見二十四卷第十一論八珍湯加味逍遙散十全大補湯加味歸脾散四方見二十四卷第四論補中益氣湯方見二十四卷第六論喘滿方論第十四岐伯曰夜行則喘出於腎淫氣病肺有所墮恐喘出於肝淫氣害脾有所驚恐喘出於肺淫氣傷心度水跌僕喘出於腎與骨皆因外邪所感而致太陽病則脈浮無汗而喘用麻黃湯陽明病則汗出腹滿喘而潮熱承氣湯表邪未解喘促汗出葛根黃芩湯微喘桂枝厚朴杏仁湯汗出而喘麻黃杏子甘草石膏湯表邪未解小青龍湯去麻黃加杏仁感寒伏熱而喘九寶湯氣鬱痰盛喘促四七湯涎多而喘千緡湯不得臥而喘神祕湯寒熱喘咳棗膏丸上氣喘促神授湯上盛下弱吞黑錫丹若四肢逆冷脈息沉細或寸大尺小胸脹冷汗大便頻數上氣喘促此虛極挾寒之陰症急用返陰丹愚按東垣云肺金受邪由脾胃虛弱不能生肺乃所生受病故咳嗽氣短氣上皮毛不能禦寒精神少而渴情慘不藥皆陽氣不足陰氣有餘也治法若肺氣虛弱用四君枳殼半夏脾虛不能生肺補中益氣湯七情氣結四七湯脾經鬱結歸脾湯脾氣虛弱人參補肺散肺經火盛人參平肺散腎水敗濁六味丸真陽虛損八味丸或兼水便不利為害尤速非二丸不能救仍與前十一十二論互用附治驗一婦人傷風寒作喘或用表散愈而復患仍用前藥其症益甚飲食少思胸腹不利此因脾肺氣虛也豫先用六君子湯加桔梗漸愈又用補中益氣湯全愈一婦人患前症屬命門火虛不能生脾土用補中益氣湯八味地黃丸而痊後復患其喘益甚用前藥不應遂用黑錫丹二服喘止仍用前二藥而諸症痊凡屬邪氣有餘者其症易識治效亦速其屬元氣不足者變症不一效非可以旦夕期也神祕湯治水氣乘肺作喘或支飲喘滿痰嗽不食陳皮去白紫蘇葉人參桑白皮生薑各一錢上水煎服千緡湯半夏七枚炮製皂角去皮尖甘草炙一寸生薑如指大上姜水煎服棗膏丸治息賁在右脅下大如杯令人灑淅寒熱喘咳甜藶葶陳皮苦梗各等分上為末煮棗肉丸桐子大每服數丸白湯下許學士云余常停飲水積食已必嚏漸喘覺肺系急服此良驗神授湯治上氣喘急不得臥橘紅苦梗紫蘇人參各一錢五味子杵炒三分上姜水煎服九寶湯治伏熱咳嗽喘急虛勞自汗者不可服薄荷紫蘇大腹皮洗甘草炒杏仁去皮尖陳皮各一錢上姜十片烏梅一個水煎四磨湯治七情鬱結上氣喘急滿悶痰涎上湧人參檳榔沉香烏藥上四味各濃磨白沸湯少許溫服五味子湯治咳嗽皮膚乾燥唾中有血胸脅疼痛五味子杵炒桔梗炒紫菀甘草炒續斷各五錢竹茹一錢赤小豆一撮生地黃二錢桑白皮二錢上水煎服附方六君子湯四君子湯補中益氣湯三方見二十四卷第六論四七湯方見十一卷第七論歸脾湯方見二十四卷第四論人參補脾散人參平肺散二方見二十四卷第十二論六味丸八味丸二方見二十四卷第十一論黑錫丹方見四卷第四論婦人風痰積飲咳嗽方論第十五婦人脾胃虛弱風邪外侵以致痰滯咳嗽眼昏頭眩經云九竅不利腸胃之所生也無擇云凡屬風熱三生飲化痰丸屬寒冷金沸草散屬暑熱消暑丸屬氣鬱四七湯在上瓜蒂散吐之在下控涎丹利之仍觀人之勇怯脈之虛實愚按前症若肝經恚怒用小柴胡湯肝經風熱用鉤藤散肝腎氣虛用川芎散脾經鬱結用濟生歸脾湯鬱怒傷肝脾用加味逍遙散脾虛痰逆用白朮半夏天麻湯脾氣虛弱用六君子益氣湯肺氣鬱滯用二陳貝母桔梗陰虧水泛六味地黃腎虛陰火加減八味丸腎虛火不歸源八味地黃丸仍與前按互相用之附治驗一婦人內熱口乾勞則頭暈吐痰帶下或用化痰理氣藥前症益盛肢體或麻又用祛風化痰藥肢體常麻手足或冷或熱此脾土不能生肺金也余用補中益氣加茯苓半夏炮姜二十餘劑漸愈又用加味逍遙散三十餘劑全愈後因怒吐痰胸痞或用清氣化痰丸食少痰甚胸脅脹滿脈或浮大或微細余以六君倍用參術少加木香而康一婦人咳嗽脅痛或用清肺化痰降火等劑久不愈更加內熱晡熱若兩脅或小腹內熱其咳益甚小便自遺余曰此屬肝經血虛火動用六味丸加五味子滋腎水以生肝血用補中益氣生脾土以滋肺金而尋愈旋覆花湯治風痰嘔逆飲食不下頭目昏悶等症旋覆花枇杷葉川芎細辛赤茯苓各一錢前胡一錢五分上水薑棗煎大半夏湯治痰飲脾胃不和咳嗽嘔吐飲食不入半夏白茯苓生薑各一錢上姜水煎服胃痞加陳皮如不應四七湯亦善導痰湯治痰涎壅盛胸膈痞塞或咳嗽噁心飲食少思半夏二錢南星枳實麩炒茯苓橘紅各一錢甘草五分上姜十片水煎附方川芎散治肝腎氣虛頭風眩運小川芎山藥白茯苓甘菊花人參各五錢山茱萸肉一兩上每服一兩食前空心水煎服或為末酒調日三服小柴胡湯方見二十四卷第二論鉤藤散方見四卷第四論歸脾湯加味逍遙散二方見二十四卷第五論白朮半夏天麻湯方見四卷第五論六君子湯補中益氣湯二方見二十四卷第六論二陳湯方見二十四卷第五論六味丸加減八味丸八味丸三方見二十四卷第十一論婦人心胸嘈雜方論第十六婦人嘈雜此脾胃鬱火痰滯血液淚汗而成用豬血炒食之乃以血導血而使之歸源爾旋覆花湯尤善愚按前症若因食鬱用六君山楂山梔若因胃熱用二陳湯炒芩連若因六郁用越鞠丸若因氣滯用四七湯桔梗枳殼大抵此症屬病氣元氣俱不足須用六君為主少佐以治痰之藥若以火治之必變吞酸中滿附治驗一婦人飲食少思胸中嘈雜頭暈吐痰此中氣虛而有熱用六君子湯加炒黑山梔桔梗而愈後因勞碌頭暈發熱吐痰不食用補中益氣加半夏茯苓天麻而痊一婦人中脘嘈雜口中辛辣或咳嗽吐痰發喘面色或白或赤此脾氣虛而肺中伏火也用六君子加山梔桔梗柴胡及炒黑片芩治之尋愈一婦人嘈雜吞酸飲食少思大便不實此脾氣虛寒而下陷用補中益氣湯加茯苓半夏炮姜漸愈又常服人參理中丸則安一婦人飲食後嘈雜吞酸此食鬱為痰用六君子湯送越鞠丸漸愈又用加味歸脾湯而痊後因怒兩脅脹痛中脘作酸用四君湯送左金丸漸安仍用六君子湯送越鞠丸而瘥旋覆花湯治脾胃虛寒中脘停痰汪洋嘈雜腸鳴多睡嘔吐不食脅肋脹痛脈沉遲弦細旋覆花細辛橘紅桂心人參甘草炒苦梗白芍藥半夏五分赤茯苓各三分上姜水煎服余治婦人心胸嘈雜用茯苓補心湯治之而愈方見前附方補中益氣湯四君子湯六君子湯三方見二十四卷第六論二陳湯方見二十四卷第五論越鞠丸方見前第七論四七湯方見十卷第七論歸脾湯方見二十四卷第四論人參理中湯方見二十卷第八論
