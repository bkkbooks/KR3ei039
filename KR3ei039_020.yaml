body:
  text: 卷二十産後遍身疼痛方論第一産後遍身疼痛者由氣虛百節開張血流骨節以致肢體沉重不利筋脈引急發熱頭痛宜用趁痛散治之陳無擇云若兼感寒傷食宜用五積散若誤作傷寒發汗則筋脈抽搐手足厥冷則變為痙當大補氣血為主愚按前症若以手按而痛益甚是血瘀滯也用四物炮薑紅花桃仁澤蘭補而散之若按而痛稍緩此是血虛也用四物炮薑人參白朮補而養之附治驗一産婦身腹作痛發熱不食煩躁不寐盜汗脅痛服解散祛血之藥不時昏憒六脈洪大如無用補中益氣加炮薑半夏一劑頓退二三四劑寢食甘美但背強而痛用八珍散大補湯調理而安一産婦遍身頭項作痛惡寒拘急脈浮緊此風寒之症也用五積散一劑汗出而愈但倦怠發熱此邪氣去而真氣虛也用八珍湯調補而痊趁痛散治産後骨節疼痛發熱頭重四肢不舉牛膝酒炒甘草炒甘草炒薤白各一兩當歸桂心白朮炒黃耆炒獨活生薑各半兩上每服半兩水煎五積散方見四卷第九論附方四物湯補中益氣湯二方見二十四卷第六論八珍湯十全大補湯二方見二十四卷第四論産後腰痛方論第二腎主腰腳産後腰痛者蓋腎為胎胞所繫此因産勞傷腎氣以致風冷客之若連背脊痛久未已後遇有娠必至損動愚按前症真氣虛邪乘之者用當歸黃耆湯或十全大補為主佐以寄生湯如不應須十全大補加附子附治驗一産婦腰痛腹脹善噫諸藥皆嘔余以為脾虛血弱用白朮一味炒黃每劑一兩米泔煎時飲匙許四劑後漸安服百餘劑而愈治産後風邪頭眩腰痛不可轉側四肢沉重行步艱難獨活川芎芍藥炒黃桂心續斷生薑桑寄生各六分當歸防風各八分上水煎服如神湯即生料五積散加桃仁逐敗血去風濕産後惡露不盡腰重痛或兩股痛如錐刺宜服桃仁湯若作疽用五香連翹湯桃仁湯治産後惡露不盡腹中作痛或流注腿股作痛急用此湯治之如未應多變作疽須用五香連翹湯桃仁去皮尖蘇木生地黃各半兩虻蟲去足翅炒水蛭炒各三十個上每服五錢薑水煎空心熱服以惡露下為度五香連翹湯木香丁香沉香乳香麝香升麻獨活桑寄生連翹木通各二兩上每服五錢水煎入竹瀝少許服當歸黃耆湯治腰痛不可轉側或汗出壯熱氣短黃耆炒芍藥炒各二兩當歸三兩上每服四錢水煎附方十全大補湯治症同前又治自汗盜汗或內熱晡熱潮熱發熱或口乾作渴喉痛舌裂或胸乳膨脹脅肋作痛或臍腹陰冷二便不調或頭頸時痛眩暈目花或心神不寧恍惚不寐或形容不充肢體作痛或鼻吸氣冷急趨氣促或因飲食勞役起居失宜或更有一切虛熱之症但服此藥補其根本諸症悉退方見二十四卷第四論獨活寄生湯方見四卷第七論産後惡露不絶方論第三産後惡露不絶因傷經血或內有冷氣而臟腑不調故也愚按前症若肝氣熱而不能主血用六味地黃丸若肝氣虛而不能藏血用逍遙散若脾氣虛而不能攝血用六君子湯胃氣下陷而不能統血用補中益氣湯若脾經鬱熱而血不歸源用加味歸脾湯若肝經怒火而血妄行用加味四物湯若氣血俱虛用十全大補湯若肝經風邪而血沸騰用一味防風丸附治驗一産婦惡露淋瀝體倦面黃食少惡寒晝夜不寐驚悸汗出此脾經虛熱用加味歸脾湯而痊後因怒脅脹作嘔少食用六君加柴胡治之而痊一方用蒲黃二兩水煎頓服一方貫衆醋蘸炙乾為末每服二錢米飲調下返魂丹一名益母草丸治産後惡露不絶及胎前産後諸症益母草四五月採取陰乾用葉及子子名茺蔚子不許犯鐵器為末煉蜜丸彈子大每服一丸細嚼米飲下臨産腹痛或胎動不安或漏血當歸湯化下死胎或胎衣不下或牙關緊急或血暈血熱煩悶如見鬼神並童子小便入酒少許化下惡露腹痛或淋瀝或月水不調當歸酒化下附方六味丸方見二十四卷第十一論加味逍遙散加味歸脾湯十全大補湯三方見二十四卷第四論補中益氣湯六君子湯加味四物湯三方見二十四卷第六論一味防風丸方見十二卷第六論産後惡露不下方論第四産後惡露不下因臟腑勞傷氣血虛損或風冷相搏所致愚按前症若惡露不下用失笑散若氣滯血凝用花蕊石散若因去血過多而煩熱不止宜參第七論主治附治驗方藥一産婦患前症服峻厲之劑惡露隨下久而昏憒以手護其腹余曰此脾氣復傷作痛故用手護也以人參理中湯加肉桂二劑補之而愈失笑散方見後人參理中湯方見後花蕊石散方見十八卷第四論返魂丹方見前産後惡露上攻心痛方論第五産後心痛為陰血虧損隨火上衝心絡名曰心胞絡痛宜大岩蜜湯治之若寒傷心經名曰真心痛朝發夕死夕發朝死無藥可救愚按前症若陽氣虛寒用岩蜜湯溫之瘀血上衝用失笑散散之血既散而痛仍作用八珍湯補之大凡肚腹作痛以手按之卻不痛此血虛也須用補養之劑附治驗一産婦患前症昏憒口噤冷汗不止手足厥逆用六君子加附子一錢以回其陽二劑頓蘇又以十全大補湯養其血氣而安一産婦患前症手不敢近腹用失笑散一服下瘀血而愈次日復痛亦用前藥而安一産婦患前症用大黃等藥其血雖下復患頭痛發熱惡寒次日昏憒自以兩手堅護其腹不得診脈視其面色青白余為脾氣虛寒而痛也用六君子湯加薑桂而痛止又用八珍湯加薑桂調理而安大岩蜜湯治産後陽氣虛寒心腹作痛不食嘔吐四肢厥逆生地黃當歸獨活吳茱萸芍藥炒乾薑炒甘草炒桂心小草各一兩細辛半兩上每服半兩水煎失笑散治産後惡血上攻心腹作痛或牙關緊急一服可愈五靈脂蒲黃各一錢用醋水煎一味五靈脂尤妙六君子湯方見二十四卷第六論十全大補湯八珍湯二方見二十四卷第四論産後惡露腹痛方論第六産後腹痛或因外感五邪內傷六淫或瘀血壅滯所致當審其因而治之愚按前症若瘀血內停用失笑散風寒外感用五積散附治驗一婦産後小腹痛甚牙關緊急此瘀血內停灌以失笑散下血而蘇又用四物加炮薑白朮陳皮而愈一婦人經水來比常度過多不止遂服澀藥止之致腹作痛此乃氣血凝滯也用失笑散二服而愈隱居澤蘭湯治産後惡露腹痛或胸滿少氣澤蘭生地黃當歸芍藥炒生薑各一錢甘草炒五分大棗四個上水煎服四物湯方見二十四卷第六論五積散方見第四卷第九論失笑散方見前産後兒枕腹痛方論第七産後兒枕者乃母胎中宿血也或因風冷凝滯於小腹而作痛愚按前症若宿血作痛失笑散行之既散而仍痛四神散調之若噁心作嘔此屬氣虛用六君子健其胃氣若發熱頭痛或腹痛按而不痛此屬血虛用四物炮薑參術補其脾氣附治驗一産婦患前症或用驅逐之劑昏憒口噤手足發搐此血氣虛極之變症也用八珍湯加炮薑二錢四劑未應又以十全大補湯加炮薑一錢二劑而蘇一方用山楂濃煎汁入砂糖少許再煎熱服失笑散方見前四神散方見第四卷第四論六君子湯四物湯二方見二十四卷第六論八珍湯十全大補湯二方見二十四卷第四論産後小腹痛方論第八産後小腹作痛由惡露凝結或外寒相搏若久而不散必成血瘕而月水不調愚按前症若因氣滯用延胡索散若因外寒用五積散若因怒氣用四物加木香柴胡若因血虛用四物參朮炮薑若因陽氣虛弱用四君當歸炮薑若因脾虛血弱用六君當歸炮薑治之附治驗一産婦患前症或作嘔或昏憒此脾氣虛寒用人參理中湯漸愈又以補中益氣湯加茯苓半夏全愈後復作痛而兼喘仍用補中益氣湯培補脾肺而瘥延胡索散治産後惡血凝滯臍下作痛或作寒熱延胡索桂心各半兩當歸一兩上為末每服二錢食前用熱酒調下失笑散尤效當歸養血丸治産後瘀血心腹脹痛或腰腳疼痛當歸赤芍藥牡丹皮延胡索炒各二兩桂心一兩上為末煉蜜丸桐子大每服三四十丸溫酒下附方人參理中湯治陽氣虛弱小腹作痛或脾胃虛弱飲食少思或去後無度或嘔吐腹痛或飲食難化胸膈不利加附子名附子理中湯人參白朮乾薑炮甘草炙各等分上每服五七錢或一兩水煎服五積散方見四卷第九論四物湯四君子湯補中益氣湯三方見二十四卷第六論産後寒疝腹痛方論第九産後臍腹作痛乃冷氣乘虛也用當歸建中湯治之陳無擇云若産當寒月人門臍下脹痛手不可近者用羊肉湯治之愚按前症若脾胃虛弱寒邪所侵用蟠蔥散若肝經濕熱小便不利用龍膽瀉肝湯仍參前論恐有瘀血為患附治驗一産婦小腹作痛小便不利內熱晡熱形體倦怠余用加味逍遙散以清肝火生肝血用補中益氣湯補脾胃升陽氣而痊羊肉湯治産婦脾虛寒邪所乘以致腹痛或頭眩脅臍急痛精羊肉四兩當歸川芎各半兩生薑一兩上以水十盞煎至四盞分四次空心服蟠蔥散龍膽瀉肝湯二方見二十四卷第八論加味逍遙散補中益氣湯二方見二十四卷第四論産後兩脅脹痛方論第十産後兩脅脹痛因惡露不盡或肝經血虛或肝經氣滯當分而治之愚按前症若肝經血瘀用玄胡索散若肝經氣滯用四君青皮柴胡若肝經血虛用四物參朮柴胡氣血俱虛用八珍柴胡若腎水不足不能生肝用六味丸若肺金勢盛剋制肝木用瀉白散仍參照前各論主之附治驗一産婦因怒兩脅脹痛吐血甚多發熱惡寒胸腹脹痛余以為氣血俱虛用八珍加柴胡丹皮炮薑而血頓止又用十全大補湯而寒熱漸退此症苟非用薑桂辛溫助脾肺以行藥勢不惟無以施其功而反助其脹耳經效方治産後肝經氣滯不平脅肋腹痛或寒熱往來內熱晡熱當歸一錢五分芍藥炒苦梗炒檳榔枳殼麩炒各八分桂心青木香柴胡各六分上水煎服當歸散治産後陰血虛弱或氣滯血凝以致發熱腹痛或腹脅脹滿以當歸乾薑等分每服三錢水煎抵聖湯治血滯腹痛或腹悶滿嘔吐不食方見後卷第八論四君子湯四物湯二方見二十四卷第六論八珍湯方見二十四卷第四論六味丸方見二十四卷第十一論瀉白散方見五卷第一論玄胡索散方見前産後積聚癥塊方論第十一夫積者陰氣也五臟所生聚者陽氣也六腑所成然積為陰陰性沉伏故痛不離其部聚為陽陽性浮動故痛無常處皆由飲食不節起居失宜産後血氣虛弱風冷所乘搏於臟腑耳愚按前症乃真氣虧損邪氣乘之況産後得之尤當固元氣為主若求旦夕之效而攻其邪則速其危矣當參前六七論及七卷痃癖諸論治之附治驗方藥一産婦腹中似有一塊或時作痛而轉動按之不痛面色萎黃痛則皎白脈浮而澀余謂此肝氣虛而血弱也不信乃行破血行氣痛益甚轉動無常又認以為血鱉專用破血祛逐之藥痛攻兩脅肚腹尤甚益信為鱉確服下蟲等藥去血甚多形氣愈虛肢節間各結小核隱於肉裡以為鱉子畏藥而走於外余云肝藏血而養諸筋此因肝血復損筋涸而攣結耳蓋肢節胸項皆屬肝膽部分養其脾土補金水以滋肝血則筋自舒遂用八珍湯逍遙散歸脾湯加減調治而愈一婦月經不調兩拗腫脹小便澀滯腹中一塊作痛或上攻脅腹或下攻小腹發熱晡熱惡寒肌膚消瘦飲食無味殊類瘵症久而不愈余謂肝脾血氣虧損用八珍湯逍遙散歸脾湯隨症互服而愈逍遙散八珍湯歸脾湯三方見二十四卷第四論産後血瘕方論第十二産後瘀血與氣相搏名曰瘕謂其痛而無定處此因夙有風冷而成輕則否澀重則不通愚按前症乃寒邪乘客氣血壅結此因氣病而血病也常補養胃氣調和月經寬緩靜養為善難經云任脈之病男子為七疝女子為瘕聚當參前後各論治之治血瘕作痛臍下脹滿或月經不行發熱體倦當歸八分桂心芍藥炒血竭蒲黃炒各六分延胡索炒四分上為末每服二錢空心酒調下葛氏方治症同前用桂心為末每服一錢空心酒調下産後余血奔心煩悶方論第十三産後余血奔心蓋因分娩後不飲童便以致虛火上炎所致宜用後方主之愚按前症當與前第五論同治金黃散治惡血上衝肚腹作痛或發熱作渴延胡索蒲黃各一錢桂心二分上為末酒調服一方用炒蒲黃每服三錢水煎服失笑散亦佳産後虛煩發熱方論第十四原無論竊謂前症乃陽隨陰散氣血俱虛若惡寒發熱煩躁作渴急用十全大補湯若熱愈甚急加桂附若作渴面赤宜用當歸補血湯若誤認為火症投以涼劑禍在反掌王太僕先生云如大寒而甚熱之不熱是無火也熱來復去晝見夜伏夜發晝止不時而熱是無火也當治其心如大熱而甚寒之不寒是無水也熱動復止倏忽往來時動時止是無水也當助其腎故心盛則生熱腎盛則生寒腎虛則寒動於中心虛則熱收於內又熱不勝寒是無火也寒不勝熱是無水也治法前症無水者六味丸無火者八味丸氣血俱虛者八珍湯與十全大補湯附治驗大尹俞君之內産後發熱哺熱吐血便血兼盜汗小便頻數胸脅脹痛肚腹痞悶余曰此諸臟虛損也症當固本為善自恃知醫用降火之劑更加瀉利腸鳴嘔吐不食腹痛足冷始信余言診其脈或浮洪或沉細或如無其面或青黃或赤白此虛寒假熱之狀時雖仲夏當舍時從症先用六君子加炮薑肉桂數劑胃氣漸復諸症漸退更佐以十全大補湯半載全愈儒者楊敬之內人所患同前但唾痰涎或用溫補化痰之劑不應面色黧黑兩尺浮大按之微細此因命門火虛不能生脾土脾土不能生諸臟而為患也用八味丸補土之母而痊人參當歸湯治産後虛煩短氣煩悶人參當歸麥門冬桂心生地黃各二錢大棗四枚粳米一合淡竹葉二錢芍藥炒黃一錢上水煎服蒲黃散治症同上方見前兒枕病四物湯加茯神遠志治産後虛煩十全大補湯尤效六味丸八味丸二方見二十四卷第十一論八珍湯十全大補湯二方見二十四卷第四論六君子湯方見二十四卷第六論
