body:
  text: 卷九求嗣門疾病既無須知求嗣故以次之陳無擇求子論第一有夫婦必有父子婚姻之後必求嗣續故古人有不孝有三無後為大者言嗣續之至重也凡欲求子當先察夫婦有無勞傷痼疾而依方調治使內外和平則有子矣愚按丹溪先生云人之育胎者陽精之施也陰血能攝之精成其子血成其胞胎孕乃成今婦人無子者率由血少不足以攝精也血之少也因非一端然欲得子者必須補其精血使無虧缺乃可以成胎孕若泛用秦桂丸之劑熏戕臟腑血氣沸騰禍不旋踵矣竊謂婦人之不孕亦有因六淫七情之邪有傷衝任或宿疾淹留傳遺臟腑或子宮虛冷或氣旺血衰或血中伏熱又有脾胃虛損不能營養衝任審此更當察其男子之形氣虛實何如有腎虛精弱不能融育成胎者有稟賦微弱氣血虛損者有嗜欲無度陰精衰備者各當求其源而治之至於大要則當審男女之尺脈若左尺微細或虛大無力者用八味丸左尺洪大按之無力者用六味丸兩尺俱微細或浮大者用十補丸又巢氏謂夫妻年命剋制墳墓不利者理或有之若誤用辛熱燥血不惟無益反受其害今以素不生育病愈後而得子者附於下附治驗余見醫學綱目求嗣部一婦人月經淋瀝愈而生子見一卷月水不斷一人患陽氣虛寒愈而生子見五卷冷勞第四症一婦人患結核愈而生子見二十四卷結核類第三症一婦人稟弱經行腹痛愈而生子見十一卷經行腹痛一婦人素虛弱患鶴膝風愈而生子見二十四卷鶴膝風一婦人患瘰癧愈而生子見二十四卷瘰癧第一症一婦人患繭唇愈而生子見二十四卷瘰癧第一症褚尚書求男論第二建平孝王妃姬皆麗無子擇民家未笄女子入御又無子問曰求男有道乎澄對曰合男女必當其年男雖十六而精通必三十而娶女雖十四而天癸至必二十而嫁皆欲陰陽完實然後交而孕孕而育育而子堅壯強壽今未笄之女天癸始至已近男色陰氣早泄未完而傷未實而動是以交而不孕孕而不育而子脆不壽此王之所以無子也然婦人有所産皆女者有所産皆男者大王誠能訪求多男婦人至宮府有男之道也王曰善未再期生六男夫老陽遇少陰老陰遇少陽亦有子之道也無子論第三夫無子者其因有三一墳墓風水不利二夫婦年命相剋三夫婦疾病墳墓不利年命相剋此非藥力可致若夫婦疾病必須藥餌然婦人無子或勞傷血氣或月經閉澀或崩漏帶下右尺浮則為陽絶或尺微澀或少陰脈浮緊或尺寸俱微弱緒皆致絶産若調攝失宜飲食失節乘風襲冷結於子臟亦令無子也千金翼求子方論第四論曰婦人之居幽閫類多血氣不調胎妊生産崩傷之異比之男子十倍難療其或七情失宜或飲食無度或胎瘡未逾而遽合或登廁風入陰戶便成痼疾若欲求子交感之時必天日晴明神思清爽氣血諧和與天德福德相合夫婦本命五行相生並本命帝旺而生者則壽而賢否則不可得也交會禁忌第五凡求子宜吉良日交會當避丙丁及弦望晦朔大風雨霧寒暑雷電霹靂天地昏冥日月無光虹霓地動日月薄蝕及日月火光星辰神廟井灶圊廁冢墓尸柩之傍若交會受胎多損父母生子殘疾夭枉愚頑不孝若交會如法則生子福德智慧驗如影響可不慎哉男子受胎時日法第六凡男女受胎皆以婦人經絶一日三日五日為男仍遇月宿在貴宿日若以經絶後二日四日六日瀉精者皆女過六日皆不成胎又遇旺相日尤吉半夜入房生子者賢明貴壽余時皆凶推支幹旺相日法第七春甲乙夏丙丁秋庚辛冬壬癸春寅卯夏巳午秋申酉冬亥子推每月宿日法第八正月初一初六初九初十十一十二十四二十一二十四二十九日二月初四初七初八初九初十十二十四十九二十二二十七日三月初一初六初七初八初十十七二十二十五日四月初三初四初五初六初八初十十五十八二十二二十八日五月初一初二初三初四初五初六初十十二十三十五十六二十二十五二十八二十九三十日六月初一初三初十十三十八二十三二十六二十七二十八二十九日七月初一十一十六二十一二十四二十五二十六二十七二十九日八月初五初八十三十八二十一二十二二十三二十四二十五二十六日九月初三初六十一十六十九二十二十一二十二二十四日十月初一初四初九十四十七十八十九二十二十二二十九日十一月初一初六十一十四十五十六十七十九二十六二十九日十二月初四初九十二十三十四十五十七二十四二十七日若春合甲寅乙卯夏合丙午丁巳秋合庚申辛酉冬合壬子癸亥與上件月宿日合者佳求子服藥須知第九論曰夫人求子服藥須知次第男服七子散女服蕩胞湯紫石英門冬丸及坐導藥則無不效矣七子散主丈夫氣虛精氣衰少無子牡荊子五味子菟絲子車前子菥蓂子山藥石斛熟地黃杜仲鹿茸遠志各八分附子炮蛇床子川芎各六分山茱萸天雄各五分桂心十分白茯苓牛膝人參黃耆各五分巴戟十二分蓯蓉七分鍾乳粉八分上為末每服錢許日二服酒調一方加覆盆子二錢慶雲散主丈夫陽氣不足不能施化覆盆子五味子各二升菟絲子一升白朮炒石斛各三兩麥門冬天雄各九兩紫石英二兩桑寄生四兩上為末食後酒服錢許日三服或米飲調冷去桑寄生加細辛四兩陽事少去石斛加檳榔十五個蕩胞湯治婦人全不産育朴硝牡丹皮當歸大黃蒸一飯久桃仁各三兩細辛厚朴苦梗赤芍藥人參茯苓桂心甘草牛膝陳皮各二兩附子炮一兩半虻蟲炒焦去翹足水蛭炒各十枚上每服六錢酒水合盞半煎日三服夜一服少頃下血膿力弱者用一二服惡物不盡方用坐導藥坐導藥治婦人全不産及斷續更服蕩胞湯皂角去皮一兩吳茱萸當歸大黃晉礬枯戎鹽川椒各二兩五味子細辛乾薑各三兩一方無茱萸有葶藶苦匏各三分上為末以絹袋盛如指狀入陰中如欲小便去之一日仍易之如子宮有冷水天陰則痛須候下盡而止藥每日早晚用苦菜煎湯黛洗著藥後一日服紫石英丸紫石英丸紫石英天門冬各三兩紫葳牡蒙各二兩粉草一兩半桂心川芎卷柏烏頭炮熟地黃干辛夷仁禹餘糧煅醋淬當歸石斛各三兩烏賊骨牛膝薯蕷各六分桑寄生人參牡丹皮乾薑厚朴續斷食茱萸細辛各五分柏子仁一兩上為末蜜丸桐子大每服二十丸溫酒下續嗣降生丹治婦人五臟虛損子宮冷憊不能成孕當歸桂心龍齒烏藥益智杜仲石菖蒲吳茱萸各一兩半茯神牛膝秦艽細辛桔梗半夏防風白芍藥各三錢乾薑二兩半生半炒附子重一兩者作一竅入硃砂一錢濕麵裹煨為末川椒二兩焙牡蠣二兩童便浸四十九日卻用硫黃末一兩醋調塗用紙裹之米醋浸濕鹽泥固濟用炭煅赤上為末用糯米糊丸桐子大每服三十丸至百丸空心淡醋溫酒鹽湯任下日二服又治男子精寒不固陽事衰弱白濁夢泄婦人帶下寒熱諸虛百損盜汗氣短預服此藥者無不感應愚按前五方多剽悍之味治當審察所因不可輕用秦桂養真白薇茱萸地黃紫石英陽起石暖宮濟陰丹湯藥數方尤為剽悍不可輕服未敢悉録竇禹鈞夜夢其亡祖父謂之曰汝緣無子又且不壽宜修善行自是佩服乃訓復夢祖父謂曰汝名掛天曹以有陰德特延算三紀胤錫五子悉皆榮顯張慶司獄惟務方便年五十始生子時有一道人丐於門謂慶曰汝本無嗣今聞嬰兒非若子乎慶曰偶得一子道人曰信乎陰德未易量爾之積纍善事非一朝一夕今不但有嗣又喜子孫文學之貴宜善保之後果如其言馮商其妻每勸置妾商娶一女已成聞其父因官綱運缺折鬻女以償之商惻然不忍犯更益以資裝送還其父明年生馮京後登狀元馬默未有嗣知登州日奏活沙門島罪人不致狂死一日夢中見符使挾一男女乘空來其前呼曰爾本無嗣以活人數多上帝特賜男女各一言訖不見果如其言時邦美之父老而無子置一妾對暗室悲泣問之乃曰父卒於官鬻妾欲辦喪耳時遂攜金偕往其家殯葬而歸未幾生邦美後舉進士官至吏部袁韶父為郡吏年五旬置一妾乃宦家女也父歿家貧鬻而歸葬袁知其故即送還更以囊資益之明年生韶既長為參知政事馮涓之父無子置一妾聞其父喪官所無力歸葬故鬻此女即日訪其母而歸之且厚資助夜夢一羽衣曰天賜爾子慶流涓涓明年生一子因名曰涓既長及第人之無嗣或因丈夫陽氣之不足不能施化或因婦人陰血衰憊百疾攻之以致然也故先賢立方垂訓以啓後人或者用計百端妾媵無數及皓首終身不能如其意者是皆心行有虧非命也苟能革心之非所行向善積德纍功施恩布惠則上天之報施自然慶流後裔此溫隱居求嗣篇所由作也豫嘗讀聖朝為善陰騭書因覽竇禹鈞等數人所履皆言此事歷歷可鑑謹録附贅於此以為求嗣者勸戒之一助云爾溫隱居求嗣保生篇第十昔東京焦公三世無嫡嗣為商旅遊玩名山尋訪至人間其因至京都遇一老僧聲清而神朗談論甚異焦怪而問之曰貧家三世無嫡嗣奈何僧曰無嗣者有三一祖宗無德自身無行二夫妻年命恐犯禁忌三精神不守妻妾血寒焦公曰血寒有何法術願聞一言僧曰先修德後修身三年之後到台山當授異方說畢忽不見焦一遵其言後赴五臺見一行童手持一書言曰老師傳語大夫功成行滿賜方藥名續嗣降生丹依方服之當生富貴之子焦員外子生子不肖亦赴五臺見行童曰老師昨日見員外何必來問我但依爾父所行愚者自賢焦曰愚豈能賢乎行童曰昔竇氏五子皆不全形後行恩布德悉登科第焦氏拜謝而歸奉行雕板印施方書不及二十年子孫數人皆貴顯後人收得此行狀及方受持行用求藥者獲其子孫皆有德行余躬受此方不敢緘默並録篇論以告諸賢庶不致異方湮沒耳正統間合肥人羅誠年六十無子因連坐謫保安州為民將至居庸解者逃回羅赴關自告或者曰放流絶域人所不堪今解者既去君可無往也羅曰吾罪本為人所纍使余歸復以此纍人吾不忍心且國皇法不可輕逭遂至州夜有二盜疑其有所攜乃穿穴以取之其妻覺預置沸湯俟其入則沃之既穴二人將入羅起諭之乃去次日羅至市忽有二人俯伏道旁羅問之乃夜穿穴者也二人曰吾輩相戲幾被傷殞賴公曉諭二命得生公所賜也後羅凡出外二人必為之守護未幾羅妻卒妾生一子任延安守一女適隆慶衛指揮使王欽禮部尚書沈立齊云有二老一有子而富一無子而貧居址相鄰因居高岡其上有塋墓二老欲掘墓開窯以取利貧者以告其妻妻曰岡後有墓開以為窯不惟燒損地脈壞人風水且近墳穴不可為也遂已之富者開岡見尸則焚之後見骸骨甚多悉棄於水因致巨富乃起岑樓以蓄財物每夜翁之眷屬皆居於上去其梯以示賊不能犯不意賊有劉六者卒然晝至家屬不及登樓者則投井而死其登樓者被焚而死人以為焚尸於火棄尸於水之報也其貧者後致巨富生一子益其家業云弘治間京師有黃剛者因無子每歲夏秋修合痢疾藥施之忽鄰里於靜夜間人言黃公積善久矣送以一嗣後果有子弘治間有張某自太醫院恩生仕至縣尹老而無子在縣篤於惜民已而升為郡守民深感其惠在郡生子亦德政之所致也正德間夏誠字純夫吳江縣人錦衣衛籍中順天府鄉試任武城縣尹愛民甚篤因忤上司遂歸老於家舊民到京者懷其德惠憐其清苦莫不以財帛助之垂老得子後有繼其政者甚豐斂縣民於中途劫之子女皆被其害黃善貧而無子傭工為業富民倪五命其開窯取土因鋤土見尸棺以舊土掩之乃從遠地擔土而歸後倪貧而黃富亦開窯倪亦傭工於黃家黃甚惜之與之共食倪因患時瘡為人憎遂投水而死黃聞之遂收其尸而殯之遂有子且繼其富作善降祥信不誣矣竊聞之書曰惠迪吉從逆凶惟影響又曰作善降祥作惡降殃子之有無自王公至於庶民亦在乎陰德而已豈可專泥於藥哉
