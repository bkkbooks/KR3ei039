body:
  text: 卷七婦人嘔吐方論第一婦人嘔吐良由脾胃不調外邪乘之或胃中虛冷或胃口有熱或中脘停痰或胃經血弱治法胃冷者丁香散理中丸胃熱者小柴胡湯竹茹湯胃虛者藿香正氣散停痰者半夏茯苓湯二陳湯血虛者十全大補湯加陳皮半夏藿香愚按東垣先生云前症內有故寒與新谷俱入於胃新故真邪相攻氣並相逆復出於胃故為噦補手太陰瀉足少陰又云胃因氣逆為噦夫嘔吐噦者俱屬於胃以其氣血多少為異耳如嘔者陽明也陽明多血多氣故有聲有物血氣俱病也仲景云嘔多雖有陽明症慎不可下孫真人云嘔家多服生薑為嘔家之聖藥也氣逆者必散之故以生薑為主吐者太陽也太陽多血少氣故有物無聲為血病也有食入則吐以橘皮去白主之噦者少陽也多氣少血故有聲無物乃氣病也以薑製半夏為主若脾胃虛弱寒邪所客飲食所傷也用六君子丁香藿香生薑之類若胃中有熱膈上有痰用二陳山梔黃連生薑若久病胃虛嘔而不納穀者用生薑參朮黃耆香附之類亦有痰膈中焦食不得下者有氣逆而嘔者有氣鬱於胃口有食滯於心肺之分而復出者有胃口有火與痰而嘔者若注船大吐渴飲水者沖童便飲之最妙前論云血不歸源而嘔用十全大補湯誠發前人之未發愚常用屢效此論與王安道先生溯洄集所論少異仍宜參看之附治驗太守陽山之內素善怒胸膈不利吐痰甚多吞酸噯腐飲食少思手足發熱數年矣所服非芩連枳實必檳蘇厚朴左關弦洪右關弦數此肝火血燥木乘土位朝用六味地黃丸以滋養肝木夕用六君歸芍以調補脾土而愈乙巳夏因大怒吞酸噯腐胸腹脹滿或用二陳石膏治之吐涎如湧外熱如灼脈洪大按之如無余曰此脾胃虧損虛陽發越於外脾敗而涎泛出也用六君加薑桂一鍾即睡覺而諸症如失又數劑而康先太宜人飲食後聞外言忤意嘔吐酸水內熱作渴惟飲冷水氣口脈大而無倫面色青赤此肝脾鬱火投之以藥入口即吐第三日吐宿食第七日吐酸黃水十一日吐苦水脈亦洪大仍喜飲冷以黃連煎湯冷飲少許至二十日加白朮茯苓二十五日加陳皮二十七日加當歸炙草至六十日始進米飲半盞漸進薄粥調理即痊一婦人食後因怒患瘧嘔吐用藿香正氣散而愈後復怒吐痰狂言熱熾胸脅脹痛手按少得脈大無倫按之微細此屬肝脾二經血虛以加味逍遙散加熟地川芎二劑脈症頓退再用十全大補湯而安矣府庠沈姬文母患脾虛中滿痰嗽發熱又食濕面冷茶吞酸嘔吐絶食誤服芩連青皮等藥益加寒熱口乾流涎不收聞食則嘔數日矣迎治余曰脾主涎此脾虛不能約制也欲用人參安胃散惑於衆論以為胃經實火宿食治之病日增劇忽思冬瓜食如指甲一塊頓發嘔吐酸水不止乃服前藥愈劇復邀視之則神脫脈絶瀕死矣惟目睛尚動余曰寒淫於內治以辛熱然藥不能下矣急用鹽艾附子炒熱尉臍腹以散寒回陽又以口氣補接母口之氣又以附子作餅熱貼臍間時許神氣少生以參朮附子為末仍以是藥加陳皮煎膏為丸如粟米大入五七粒於口隨津液咽下即不嘔二日後加至十粒諸病少退其涎不止五日後漸服前劑一二匙胃氣少復乃思粥飲後投以參術等藥溫補脾胃五十餘劑而愈丁香散治脾胃氣弱嘔吐水穀不入丁香白朮縮砂草果各三錢人參一兩當歸白豆蔻藿香甘草各半兩炒橘皮三分神麯炒訶子各半兩上為末每服二錢薑棗湯調竹茹湯治胃熱嘔吐乾葛二錢半夏薑製三錢甘草五分竹茹一彈子大上薑棗水煎服許學士先生云胃熱者手足心熱也政和中一宗人病傷寒得汗身涼數日忽嘔吐藥食不下用丁香藿香滑石等藥下咽即吐余曰此正汗後餘熱留胃脘正宜竹茹湯用之即愈許仁則半夏丸治胃冷嘔逆不食半夏洗去滑一斤小麥面一斤上水和丸如彈子大水煮熟初服三四丸二服加至十四五丸旋煮間服七味人參丸服前丸不應可服此藥人參白朮各五兩厚朴薑製細辛各四兩生薑橘皮三兩桂心一兩上為末煉蜜丸桐子大米飲下十丸漸加至二十丸清金丸治嘔吐不已硫黃二錢水銀一錢上入銚內慢火化以木片撥炒成砂研至黑不見白星薑汁糊丸緑豆大每服二三十丸米飲下附方人參安胃散治脾胃虛熱嘔吐泄瀉或飲食不入人參一錢黃耆炒二錢生甘草炙甘草各五分白芍藥七分白茯苓四分陳皮三分黃連炒二分上水煎服六君子湯方見二十四卷第六論加味逍遙散十全大補湯二方見二十四卷第四論六味丸方見二十四卷第十一論藿香正氣散方見二十四卷第九論婦人霍亂方論第二論曰嘔吐而利者名霍亂也因腸胃虛弱飲食過度觸冒風冷清濁相干所致或先腹痛而吐或先吐而痛或吐利並作當分寒熱而治之飲冷者五苓散飲湯者理中丸四肢逆冷脈微細者用通脈四逆湯加豬膽汁中暑霍亂煩渴飲冷轉筋者用香薷散脈浮洪者易治微遲者難治愚按賈元良先生云暑者相火行令也夏月人感之自口齒而入傷心胞絡之經其症頭疼口乾面垢自汗倦怠少氣或背寒惡熱甚者迷悶不省或霍亂吐利嘔痰腹痛或下血發黃生斑等症治法清心火利小便為主若自汗熱甚用白虎湯若頭疼惡寒用十味香薷散泄瀉煩渴飲水吐逆用五苓散熱甚煩渴用益元散清之若表解裡熱甚者用黃連解毒湯脈微下利作渴喜溫或厥冷不省人事宜竹葉石膏湯加熟附半枚冷飲次以來復丹五苓散治之故東垣云脾胃虛弱遇夏月淫雨身重短氣甚則四肢痿軟腳欹眼黑當滋肺氣以補水之源是以五月常服五味子人參麥門冬之劑為熱傷元氣故耳丹溪所謂夏月伏陰在內也蓋人之腹屬地已月六陽盡出於地之上矣是人之陽氣亦浮於肌表散於皮毛而腹中之陽虛矣又加以涼臺水館大扇風車寒泉水果冰涼之物自內及外不用溫熱病所由生陳無擇云凡中暍切不得用冷藥惟用溫養得冷即死道途無湯即以熱土尉臍中溺以熱尿即蘇概可見矣內經曰脈虛身熱得之傷暑難經云傷暑得之為正邪火自病也當惡臭其病身熱而煩心痛其脈浮大而散傷寒論曰太陽中暍者身熱疼痛而脈微弱或發熱惡寒而脈微細芤遲大抵寒傷形熱傷氣蓋傷氣而不傷形則氣消而脈虛弱故先哲立法夏月宜補良有以也前症若內有所積外有所感用二陳湯加減治之或蘿蔔子搗碎服而吐之若飲米湯即死云云同前論若轉筋不住男子以手挽陰女子以手牽乳近兩邊此千金妙法也乾霍亂不得升降死在須臾當以鹽湯吐之後以二陳湯加川芎蒼朮防風白芷薑煎服若登圊而不通加枳殼若食瓜果飲冷乘風霍亂用六和湯倍加藿香凡中暑而亡者皆因元氣虛弱而暑熱乘之以致泄瀉陽氣暴脫實為陰寒之症宜急補其陽庶得保生緩則不救其他執為暑熱投以寒藥鮮不誤事愚皆以回陽固本之方繼之於後附治驗進士李通甫之內冬間開衣箱其內衣裳乃夏月所曬者開時覺暑氣所侵良久患霍亂足指足跟俱轉筋甚惡自分必死用香薷飲一劑急煎下咽即愈加減理中丸治肚腹疼痛手足逆冷飲食不入等症人參白朮乾薑甘草各等分上為末煉蜜杵勻每兩作五丸每服一丸白湯化下嘔吐加枳殼泄瀉加乾薑吐瀉乾嘔加半夏體冷微汗腹寒加炮附子水煎服四順附子湯治霍亂吐利腹痛手足厥冷脈微絶方見八卷十一論四逆湯加豬膽汁名四逆豬膽汁湯甘草三兩乾薑三兩附子一枚生上每服五錢水煎入豬膽汁半合作二服香薷散治吐利腹疼發熱頭痛或霍亂轉筋拘急香薷二錢白扁豆厚朴薑製茯苓各三錢上水煎冷服連進二三劑加黃連名黃連香薷飲附方十味香薷散治伏暑身體倦怠頭痛惡寒或吐瀉等症香薷一兩人參陳皮白朮炒茯苓黃耆炒木瓜不犯鐵器厚朴薑製扁豆甘草炒各三兩上每服一兩水煎清暑益氣湯治長夏濕熱所蒸四肢困倦精神短少懶於動作胸滿氣促支節作疼或氣高而喘身熱而煩心下膨悶小便黃數大便溏頻或瀉利作渴不思飲食自汗體重黃耆炒蒼朮升麻各一錢人參白朮神麯炒陳皮各五分甘草炙黃柏炒麥門冬去心當歸各三錢葛根二分五味子九粒炒杵澤瀉五分青皮二分上水煎服白虎湯治胃熱作渴暑熱尤效又治熱厥腹滿身難轉側面垢譫語不時遺溺手足厥冷自汗脈沉滑知母石膏各二錢粳米半合上水煎服人參白虎湯治暑熱發渴脈虛等症人參一錢五分知母二錢石膏五錢甘草一錢上入粳米一合水煎服人參益氣湯治暑熱傷氣四肢困倦嗜臥少食兩手指麻木黃耆炒八錢甘草七錢內炙二錢人參半兩升麻二錢白芍藥炒三錢五味百四十個杵炒柴胡二錢半上㕮咀分作四服大順散治冒暑伏熱引飲過多脾胃受濕水穀不分清濁相干陰陽氣逆霍亂嘔吐臟腑不調甘草炒乾薑炮杏仁去皮尖炒桂去皮上為末每服二三錢湯點服消暑丸治傷暑發熱頭疼或嘔吐泄瀉二便不分半夏甘草炒茯苓各半斤上為末生薑汁和丸桐子大每五十丸水下易簡方薑汁好醋煮半夏末作糊丸服薑附湯治霍亂轉筋手足厥冷汗出嘔逆腹痛脈欲絶者乾薑炮一兩附子一個生用上為末每服五錢水煎服通脈四逆湯治霍亂惡寒腹痛身冷自汗脈沉微如欲絶吳茱萸二兩炒附子炮一兩桂心通草細辛白芍藥炒甘草炙各半兩當歸三錢上每服四錢水酒生薑煎如不應更加倍服之以效為度半夏解毒湯治一切暑熱毒五心煩躁口舌咽乾黃柏炒黃芩炒山梔子炒半夏等分上每服五錢水煎六和湯治冒暑伏熱煩悶霍亂轉筋吐瀉寒熱交作頭目昏痛嗜臥倦怠小便赤澀不問胎産並服之縮砂半夏湯泡七次杏仁去皮尖人參甘草炙各一兩赤茯苓藿香木瓜各二兩白扁豆薑汁略炒香薷厚朴薑製各四兩上每服一兩薑棗水煎服益元散治中暑身熱小便不利或發熱體痛口乾作渴滑石六兩甘草微炒一兩上為末每服三錢加蜜少許湯水任下二陳湯方見二十四卷第五論來復丹五苓散二方見二十一卷第十論竹葉石膏湯方見十三卷第十論婦人翻胃吐食方論第三論新增愚按病機云前症有三曰氣積寒也皆從三焦論之上焦吐者從於氣氣者天之陽也其脈浮而洪食已暴吐渴欲飲水大便燥結氣上衝胸發痛其治法當降氣和中中焦吐者從於積有陰有陽食與氣相假為積而痛其脈浮而匿其症或先痛而後吐或吐而後作痛治法當以小毒藥去其積檳榔木香行其氣下焦吐者從於寒地之道也其脈沉而遲其症朝食暮吐暮食朝吐小便清大便祕而不通治法當以毒藥通其閉塞溫其寒氣大便漸通復以中焦藥和之不令大便祕結而自愈也王太僕曰食不得入是有火也食入反出是無火也又發明曰噎者六腑之所主陽也氣也塞者五臟之所主陰也血也二者皆由陰中伏火而作也劉宗厚先生曰若三焦傳化失常所致主於氣也若血虧胃脘乾稿所致因於血也塞猶填塞不通之義故發明有治幽門不通噎塞不便通幽湯例蓋陽無陰不能通化陰之失位而陽伏其中傳化不變而反上行矣故前症或由飲食起居七情虧損脾胃痰飲停滯中氣不運當以補中益氣湯為主若鬱結傷脾用歸脾湯加枳殼桔梗若恚怒傷肝用小柴胡加梔苓參術脾氣虛弱用六君加山梔枳殼氣血俱虛用八珍湯加山梔半夏若用行氣之藥胸膈痞悶用六君芎歸之類若過用香燥之劑而大便結燥用四物參術之類若飲食不能入用六君山梔吳茱萸制黃連若食入而反出用六君炮薑白豆蔻黃連制吳茱萸若痰滯而食反出用六君枳殼桔梗若飲食少思大便不實胸膈痞悶吞酸噯腐食反不化是為脾胃虛寒用東垣固真丸或八味丸若發熱煩熱身惡風寒腹畏熱食或手足俱冷胸滿腹脹是內真寒外假熱用神效附子丸或八味丸大凡嘔吐善食喜飲冷水是為有火嘔吐少食喜飲熱湯是為無火當審其因而治之附治驗一婦人患前症胸腹痞悶得去後或泄氣稍寬余曰此屬脾氣鬱結而虛弱也當調補為善不信乃別用二陳枳實黃連之類不應又用香燥破氣前症益甚形氣愈虛余用加味歸脾湯調治半載而痊一婦人患前症胸腹脹悶或小腹不利或時作痛小便澀滯余曰此肝火血虛也清肝火生肝血養脾土生肺金以余言為迂別服利氣化痰等劑前症益劇虛症蜂起余用加味逍遙散加味歸脾湯兼服尋愈一婦人患吐痰甚多手足常冷飲食少思余曰此肝脾鬱怒兼命門火衰不信另服化痰利氣之劑胸腹愈脹又服峻利疏導之劑余曰非其治也必變脾虛發腫之症急服金匱加減腎氣丸庶有可救仍不信反服沉香化氣等丸果發腫而歿白堊散治虛熱翻胃用白堊土一斤米醋一斤煅土赤入醋內再煅再入以醋乾為度取土一兩入炮薑一錢為末每服一錢米飲下甚者二錢須服四兩有效治實熱翻胃用黃連五錢生薑汁浸炒山楂三錢保和丸三錢同為末糊丸麻子大胭脂為衣每服六十丸煎人參湯入竹瀝下之太倉丸治胃弱翻胃肉豆蔻砂仁各二兩丁香一兩陳倉米一升土炒上為末薑汁糊丸桐子大每服六七十丸薑湯下青金丹每服三十丸生薑陳皮煎湯送下方見前嘔吐類附方東垣補真丸肉蓯蓉酒浸焙胡蘆巴炒附子炮去皮陽起石煅肉豆蔻面煮煨菟絲子淨洗酒浸蒸川烏炮去皮沉香五味子各五錢鹿茸酒浸炒巴戟去心鍾乳粉各一兩上為末用羊腰子兩對治如食法蔥椒酒煮搗爛入酒糊丸如桐子大每服七十丸空心米飲鹽湯任下神效附子丸治脾腎虛寒嘔吐或翻胃膈噎用黑附子重一兩四五錢端正底平尖圓一枚灰火炮皮裂入生薑自然汁內浸潤曬乾再炮再入汁浸潤仍曬再炮用盡薑汁半碗為度卻去皮臍為末以人參煎膏丸黍米大每服數丸津唾咽下胃氣稍復飲食稍進投以溫補之劑六君子湯補中益氣湯四物湯三方見二十四卷第六論歸脾湯加味歸脾湯八珍湯加味逍遙散四方見二十四卷第四論八味丸方見二十四卷第十一論二陳湯方見二十四卷第五論金匱加減腎氣丸方見二十二卷第十論婦人血膈方論第四愚按前症若氣逆而血滯用流氣飲若恚怒而血逆用小柴胡山梔丹皮血虛用四物參朮柴胡山梔丹皮若鬱結而血傷用加味歸脾兼加味逍遙散脾虛不能生血用六君歸芎胃虛不能吐血用益氣湯若肝虛而不能藏血用補肝散如不應兼以六味丸若因脾肺虛用補中益氣湯如不應用六君加芎歸附治驗一婦人患前症胸膈痞悶余曰此屬脾經血虛遂用四君芎歸調補脾氣尋愈又園怒兼兩脅痞悶頭目不清月經旬余未竭用加味逍遙散加鉤藤治之復瘥一婦人患前症胸膈作痛面清目札小便頻數或時寒熱此肝氣滯而血凝先用失笑散二服痛止又用加味逍遙散而愈一婦人所患同前泛用行氣破血之劑以致不起神功散治血滯胸腹作痛五靈脂炒一兩莪朮桂心蕓薹子炒各半兩上每服二錢酒水煎附方流氣飲方見三卷第七論小柴胡湯方見二十四卷第二論加味歸脾湯加味逍遙散二方見二十四卷第四論四物湯補中益氣湯四君子湯六君子湯四方見二十四卷第六論補肝湯方見本卷第七論六味丸方見二十四卷第十一論失笑散方見二十卷第五論制吳茱萸黃連法用二味等分用熱湯拌濕和勻重湯頓煮使氣相通同炒焦各揀出聽用婦人鼻血方論第五婦人氣血調和則循環經絡若勞傷元氣陰虛火動氣逆於肺則血隨鼻而衄産後尤不可治陳無擇曰亦有因怒氣而得者趙恭人鼻衄先用蘇合香丸四粒次用五苓散濃煎白茅花湯調服即止又用芎歸湯調理而安一富男鼻血六脈洪數訊之云曾服丹藥遂用芩連大黃為末水調服之而愈愚按前症若熱鬱於胃經用犀角地黃湯若伏暑於內用黃連香薷飲若大怒血蓄於上用小柴胡湯若脾損不能攝血歸源用歸脾湯大凡雜症見血多因陰分鬱熱或內有所傷皆屬五志所動經曰諸見血身熱脈大者難治是火邪勝也身涼脈靜者易治是正氣復也仍與後症同用附治驗一婦人經素不調因怒衄血此肝火熾盛用加味小柴胡加紅花二劑血止又用加味逍遙散八珍湯兼服三十餘劑經行如期一婦人鬱結而患前症用加味歸脾湯其血漸止飲食漸進用加味逍遙散元氣漸復寒熱漸止後因怒乃衄寒熱往來用小柴胡湯加芎歸丹皮而愈一婦人因勞衄血服涼血之劑更致便血或以血下為順仍用治血余曰此因脾氣下陷而血從之當升補脾氣庶使血歸其經不信果血益甚余朝用補中益氣湯夕用加味歸脾湯而愈此症用寒涼止血不補脾肺而死者多矣刺薊散治血熱鼻衄刺薊生地黃各二錢桑耳乳發灰艾葉炒各一錢蒲黃五分上水煎服犀角地黃湯方見後又方用白茅根汁一合飲之即止又方用生蔥心塞鼻中血即止若刀斧所傷用之血亦止四物湯加側柏生地黃治虛熱吐血甚效若脾經血虛須用四君加芎歸若脾經氣鬱須用歸脾湯若肝腎虧損須用六味丸若氣血俱虛須用十全大補湯附方濟生犀角地黃湯治熱鬱不解泛行經絡或流腸胃隨氣湧泄以致衄血吐血或為便血並皆治之犀角鎊如無升麻代生地黃白芍藥牡丹皮各一錢上每服四五錢水煎若實熱熾甚加炒黃芩若去血過多或脾肺之氣虧損不能攝血歸源者急用四君子湯懷抱鬱結者用歸脾湯枇杷葉湯治暑毒攻心衄血嘔血或吐瀉作渴香薷二錢厚朴薑製一錢半甘草炙麥門冬去心木瓜不見鐵器白茅根各一錢枇杷葉陳皮丁香各半錢上每服三五錢薑水煎黃連香薷飲治伏暑衄血便血不拘四時方見本卷第一論小柴胡湯加味小柴胡湯二方見二十四卷第二論歸脾湯加味逍遙散八珍湯加味歸脾湯四方見二十四卷第四論補中益氣湯方見二十四卷第六論婦人吐血方論第六婦人吐血者因臟腑傷損所致夫氣血外行於經絡內榮於臟腑若六淫七情飲食起居有所損傷行失常道逆則吐血也愚按前症若脾經鬱熱用犀角地黃湯脾胃伏暑用黃連香薷飲心脾鬱熱用生地黃湯心氣耗損用茯苓補心湯脾氣勞傷用雞蘇散思慮傷脾用歸脾湯暴怒肝火用加味小柴胡湯久怒肝傷六味地黃丸脾肺虛熱用麥門冬飲肝腎虛熱用六味地黃丸氣血俱虛用十全大補湯經云肺朝百脈之氣肝統諸經之血必用甘溫之劑補其陽氣使血各歸其經如大吐血病毋論其脈急用獨參湯救之若潮熱咳嗽而脈數者元氣虛而假熱之脈也皆由脾胃先損須用人參之類本草云人參治脾胃不足補中溫中瀉脾肺中火東垣先生云脾胃虛者心血亢甚而乘土位肺氣受邪須用黃耆最多人參甘草次之脾胃一虛肺氣先絶故用黃耆以益皮毛而閉腠理當治氣血虛弱用十全大補最善若用寒涼止血胃氣反傷無不致禍附治驗一老婦每作先飲食不進或胸膈不利或中脘作痛或大便作瀉或小便不利余以為肝脾之症用逍遙散加山梔茯神遠志木香而愈後鬱結吐紫血每作先倦怠煩熱以前藥加炒黑黃連三分吳茱萸二分頓愈後因怒吐赤血甚多燥渴垂死此血脫也法當補氣乃用人參一兩蒼朮當歸各三錢陳皮炮黑乾薑各一錢炙甘草木香各一錢一劑頓止又用加味歸脾湯調理而痊一女子懷抱素郁胸滿食少吐血面赤用六味丸及歸脾加山梔貝母芍藥而愈一婦人為哭母吐血咳嗽發熱盜汗經水不行此悲傷肺思傷脾朝服補中益氣加桔梗貝母知母夕用歸脾湯送六味丸而愈柔脾湯治虛熱吐血衄血汗出甘草炒白芍藥炒黃耆各半兩熟地黃自制一兩五錢上每服五錢水酒煎一婦人月經不利忽妄行嘔血察其形脈如常用四生丸即安一女子飽食負重而吐血用前湯及青餅子而愈世治吐血並用竹茹地黃藕汁亦不可拘泥如陽乘於陰血得熱則流散經水沸溢理宜涼解大黃犀角之類如陰乘於陽所謂天寒地凍水凝成冰須用溫散乾薑肉桂之類四生丸治陽乘於陰以致吐血衄血生荷葉生艾葉生柏葉生地黃各一錢上研丸雞子大每服一丸水煎服陳日華云先公嘗遊靈石寺主僧留飯設桌一僧見桌不穩急俯穩之舉首即嘔血明年到寺問舊嘔血者何如主僧言服得四生丸遂愈自得此方屢次有效愚意前症乃內熱暴患用之即效若人病久本元不足須補脾以滋化源否則虛火上炎金反受克獲生鮮矣犀角地黃湯方見前薑草湯治陰乘於陽寒而嘔血甘草炒乾薑各一錢上水煎服理中湯亦效花蕊石散治瘀血積於內以致大小便不通或血畜於上而吐不止一婦人苦吐血百藥不效童便酒調不數服而愈方見胞衣不下如聖散治吐血不已每服二錢米飲下方見十七卷催生附方濟生雞蘇散治勞傷肺經唾中有血咽喉不利雞蘇葉黃耆炒生地黃阿膠炒貝母白茅根各一錢桔梗炒麥門冬去心蒲黃炒甘草炒各五分上薑水煎服生地黃散治鬱熱衄血咯血吐血陰虛而不能愈者枸杞子柴胡黃連炒地骨皮天門冬甘草炒白芍藥炒炒黃芩黃耆炒生地黃熟地黃自制各五分上水煎下血加地榆三因茯苓補心湯治面色黃瘁五心煩熱咳嗽吐血半夏前胡紫蘇茯苓人參枳殼麩炒桔梗炒甘草炒乾葛各五分當歸一錢川芎陳皮白芍藥各一錢熟地黃自制一錢五分上薑棗水煎服麥門冬飲子治氣虛吐血或氣虛不能攝血者五味子杵十粒麥門冬去心黃耆炒各一錢當歸身人參生地黃各錢半上水煎服十全大補湯治胃氣虛弱吐血衄血便血不止以致外症惡寒發熱自汗盜汗食少體倦或寒熱作渴頭疼眩暈面似中風或氣血俱虛胸腹脅痛或骨節作痛經候不調或寒熱往來發熱晡熱或五心發熱咽乾舌燥或痰嗽喘促胸膈虛痞或嘔吐泄瀉手足冷熱等症歸脾湯加味逍遙散二方見二十四卷第四論加味小柴胡湯方見二十四卷第二論六味丸八味丸二方見二十四卷第十一論獨參湯方見三卷第十一論補中益氣湯方見二十四卷第六論黃連香薷飲枇杷葉散二方見本卷前婦人痃癖諸氣方論第七婦人痃癖因元氣虛弱而邪氣積聚蓋痃者在腹內近臍左右有筋脈急痛如臂如指如弦之狀癖者僻在兩脅之間有時而痛皆陰陽不和經絡痞膈飲食停滯冷氣固結而成也愚按前症因飲食起居七情失宜虧損臟腑氣血並違陰絡受傷循行失度所致羅謙甫先生曰養正邪自除必先調養使榮衛充實若不消散方可議下但除之不以漸則必有顛覆之害若不守禁忌縱嗜欲其有不喪身者鮮矣附治驗一婦人內熱作渴飲食少思腹內初如雞卵漸大四寸許經水三月一至肢體消瘦齒頰似瘡脈洪數而虛左關尤甚此肝脾鬱結之症外貼阿魏膏午前用補中益氣湯午後用加味歸脾湯兩月許肝火少退脾土少健午前以補中益氣下六味丸午後以逍遙散下歸脾丸又月餘日用蘆薈丸二服空心以逍遙散下日晡以歸脾湯下喜其謹疾調理年餘而愈一婦人腹內一塊不時上攻或作痛有聲或吞酸痞悶月經不調小便不利二年餘矣面色青黃余以為肝脾氣滯以六君加芎歸柴胡炒連木香吳茱各少許二劑卻與歸脾湯下蘆薈丸三月餘肝脾和而諸症退又與調中益氣加茯苓丹皮中氣健而經自調一婦人性多郁善怒勤於女工小腹內結一塊或作痛或痞悶月經不調常服伐肝之劑內熱寒熱胸膈不利飲食不甘形體日瘦牙齦蝕爛此脾土不能生肺金肺金不能生腎水腎水不能生肝木當滋化源用補中益氣六味地黃至仲春而愈松江太守何恭人性善怒腹結一塊年餘上齶蝕透血氣虛極時季冬肝脈洪數按之弦緊或用伐肝木清胃火之藥余曰真氣虛而邪氣實也恐伐肝木至春不能發生耳用八珍湯以生氣血用地黃丸以滋腎水肝脈頓退因大怒耳內出血肝脈仍大煩熱作渴此無根之火也仍以前藥加肉桂二劑脈斂熱退復因大怒果卒於季冬辛巳日乃金剋木故也一婦人經候過期發熱倦怠或用四物黃連之類反兩月一度且少而成塊又用峻藥通之兩目如帛所蔽余曰脾為諸陰之首目為血脈之宗此脾傷五臟皆為失所不能歸於目也遂用補中益氣濟生歸脾二湯專主脾胃年餘而愈麝香丸治痃癖冷氣心腹作痛麝香二錢另研五靈脂炒阿魏五錢麵裹煨令面熟桃仁三稜各二兩醋製芫花醋炒檳榔各一兩莪朮醋製桂心沒藥木香當歸各五錢上為末飯丸桐子大每服十丸淡醋湯下治痃癖神效以獖豬肝一具重十餘兩用巴豆仁五十枚入肝內用釅醋三碗慢火熬干研爛量入三稜末丸桐子大每服五丸食前酒下羅安人每經行臍腹痛甚以桃仁桂枝湯一劑而瘥方見第一卷第十二論治經來腹先痛用局方七氣湯送來復丹局方積氣丸痃癖癥瘕諸氣亦效附方蘆薈丸治痃癖肌肉消瘦發熱潮熱飲食少思口乾作渴或肝疳食積口鼻生瘡牙齦蝕爛等症蘆薈胡黃連黃連炒焦木香白蕪荑炒青皮各五錢當歸茯苓陳皮各一兩五錢甘草炒七錢上為末米糊丸桐子大每服七八十丸米湯下阿魏膏治一切痞塊更服胡連丸羌活獨活玄參官桂赤芍藥穿山甲生地黃五錢兩頭尖大黃白芷天麻各五錢槐柳桃枝各三錢紅花四錢木鱉十枚去殼亂髮如雞子一團上用香油二斤四兩煎黑去渣入發煎發化仍去渣徐下黃丹煎軟硬得中入芒硝阿魏蘇合油乳香沒藥各五錢麝香三錢調勻即成膏矣攤貼患處內服丸藥黃丹須用真正者效凡貼膏藥先用朴硝隨患處鋪半指厚以紙蓋用熱尉斗尉良久如硝耗再加尉之二時許方貼膏藥若是肝積加蘆薈末同尉六君子湯補中益氣湯二方見二十四卷第六論八珍湯加味歸脾湯歸脾湯逍遙散四方見二十四卷第四論六味丸方見二十四卷第十一論調中益氣湯方見四卷第五論婦人疝瘕方論第八婦人疝瘕之病由飲食不調血氣勞傷或胎産經行風冷相搏所致蓋疝者痛也瘕者假也脈弦急者生虛弱者死尺脈澀浮牢為血實氣虛腹痛逆氣上行此為胞中有惡血久則結成瘕也愚按子和先生云遺溺閉癃陰痿脬痹精滑白淫皆男子之疝也若血涸月事不行行後小腹有塊或時動移前陰突出後陰痔核皆女子之疝也但女子不謂之疝而謂之瘕附治驗一婦人小腹痞脹小便時下白帶小水淋瀝此肝經濕熱下注用龍膽瀉肝湯而愈一婦人小腹脹痛小水不利或胸乳作痛或脅肋作脹或氣逆心動余以為肝火而血傷脾用四物柴胡青皮玄胡索木香而愈一婦人小腹痞悶小便不利內熱體倦懶食用八珍湯加柴胡山梔龍膽草治之而安乾漆散治疝瘕脅肋疼痛乾漆炒令煙盡木香芫花醋炒赤芍藥桂心當歸川芎琥珀各半兩大黃二兩炒牛膝一兩桃仁去皮尖一兩另研麝香一錢上為末每服一錢溫灑調下燔蔥散治前症屬寒氣不散疼痛甚效方見二十四卷第八論附方寶鑑蒺藜湯治陰疝小腹作痛小便不利手足逆冷或脅腹悶痛蒺藜去刺附子炮梔子去皮各半兩上為末每三錢水煎食前溫服丹溪定痛散治寒疝疼痛速效枳殼十五個山梔子炒唐毬子吳茱萸炒荔枝核炮各等分上為末用長流水調水下一二錢空心服三因失笑散治小腸疝氣痛或血疝肚腹作痛方見二十卷第五論龍膽瀉肝湯方見二十四卷第八論四物湯方見二十四卷第六論八珍湯方見二十四卷第四論婦人八瘕方論第九婦人臟腑調和經脈循環則月水以時故能生子而無病若乘外邪而合陰陽則小腹胸脅腰背相引而痛月事不調陰中腫脹小便淋瀝面色黃黑則瘕生矣八瘕者黃青燥血脂狐蛇鱉是也千金外臺言之詳矣愚按經曰氣主煦之血主濡之若血不流則凝而為瘕也瘕者中雖硬而忽聚忽散多因六淫七情飲食起居動傷臟腑而成當與痃癖諸症治同慎不可復傷元氣桃仁煎治血瘕桃仁大黃炒各一兩虻蟲半兩炒黑朴硝二兩上為末以醇醋一鍾石器中煮三分下煎三味不住手攪煎至可丸下朴硝丸桐子大不吃晚食五更初溫酒下五丸日午下穢物如未見再服仍以調氣血藥補之向在毗陵一婦人小便不通臍腹脹甚豫診之曰此血瘕也用前藥一服腹痛下血塊血水即愈此藥猛烈太峻氣血虛者斟酌與之大硝石丸治七癥八瘕當用此藥去之不令人困硝石三兩大黃四兩人參一錢甘草八分上為末苦酒一升石器中先入大黃煎膏入余藥丸梧子大每服三十丸米飲下三日一服宜下赤物婦人腹中瘀血方論第十婦人腹中瘀血者由月經閉積或産後余血未盡或風寒滯瘀久而不消則為積聚癥瘕矣愚按前症若鬱結傷脾用加味歸脾湯若恚怒傷肝用加味逍遙散若産後惡露用失笑散若肝脾虧損用六君柴胡以補元氣為主胃氣虛弱用益氣湯加茯苓半夏為主大凡腹中作痛畏手按者此內有瘀血若形體如常屬病氣元氣俱實用桃仁承氣湯直下之若痛而肢體倦怠飲食少思此脾胃受傷屬病氣有餘元氣不足用當歸散調和之若痛而喜手按腹形氣倦怠飲食少思此元氣病氣氣俱不足用六君炮薑芎歸純補之若痛而大便不實飲食難化此脾胃虛寒用六君炮薑肉果溫補之若痛而作嘔少食此脾胃虛弱用六君炮薑藿香若痛而嘔吐不食泄瀉用六君加薑桂若兼手足逆冷自汗更加附子此症多有因攻伐而致者附治驗一婦人耳下腫赤寒熱口苦月經不調小腹內一塊此肝火氣滯而血凝也用小柴胡加山梔川芎丹皮治之諸症悉退一婦人久患腹痛去瘀血方止而復大痛諸藥不納豫以為脾胃之氣虛寒用參朮炮薑丸如黍每用數粒津咽下後以二味濃煎漸呷而愈桃仁丸治瘀血不利月水不調發熱作渴心腹滿急或肚腹中作痛桃仁大黃炒各三兩虻蟲炒去翅足水蛭炒焦各四十枚上為末煉蜜丸桐子大每服五六丸空心熱酒下附方桃仁承氣湯治瘀血小腹急痛大便不利或譫語口乾漱水不咽遍身黃色小便自利或血結胸中手不敢近腹或寒熱昏迷其人如狂桃仁半兩大黃炒二兩甘草二錢肉桂一錢上薑水煎每日五更服附方加味歸脾湯治瘀血已去或脾經失血小腹作痛無寐發熱盜汗或脾傷不能攝血或心脾傷痛嗜臥少食或憂思傷脾血虛發熱或肢體腫痛大便不調或經候不準晡熱內熱加味逍遙散方見二十四卷第四論失笑散方見二十卷第五論六君子湯補中益氣湯二方見二十四卷第六論當歸散方見後卷第五論小柴胡湯方見二十四卷第二論婦人癥痞方論第十一婦人癥痞由飲食失節脾胃虧損邪正相搏積於腹中牢固不動故名曰癥得冷則作痛冷入子臟則不孕入胞絡則月水不通愚按前症若脾胃虛弱用六君子加芎歸若肝脾虛弱用補中益氣及歸脾湯若肝火鬱滯佐以蘆薈地黃二丸外貼阿魏膏患者須慎七情六淫飲食起居治者不時審察病機而藥之庶幾有效附方山甲散治癥痞瘀血心腹作痛穿山甲灰炒燥鱉甲醋炙赤芍藥大黃炒乾漆炒令煙盡桂心各一兩川芎芫花醋炙當歸尾各半兩麝香一錢上為末每服一錢酒調下六君子湯補中益氣湯二方見二十四卷第六論歸脾湯方見二十四卷第四論六味地黃丸方見二十四卷第十二論蘆薈丸阿魏膏二方見本卷第七論婦人食癥方論第十二婦人食癥由臟腑虛弱經行不忌生冷飲食或勞傷元氣所致陳無擇云經不行者宜先導之然後固元氣為主愚按前症若形氣虛弱須先調補脾胃為主而佐以消導若形氣充實當先疏導為主而佐以補脾胃若氣壅血滯而不行者宜用烏藥散散而行之若脾氣虛而血不行者宜用四君芎歸補而行之若脾氣鬱而血不行者宜用歸脾湯解而行之若肝脾血燥而不行者宜用加味逍遙散清而行之大抵食積痞塊之症為有形蓋邪氣勝則實真氣奪則虛當養正辟邪而積自除矣雖然堅者削之客者除之胃氣未虛或可少用若病久虛乏者不宜輕用烏藥散方見後婦人積年血癥方論第十三婦人積年血癥由寒溫失節脾胃虛弱月經不通相結盤牢久則腹脅苦痛宜用三稜煎主之愚按前症多兼七情虧損五臟氣血乖違而致蓋氣主煦之血主濡之脾統血肝藏血故鬱結傷脾恚怒傷肝者多患之腹脅作痛正屬肝脾二經症也竊謂羅謙甫先生云養正積自除東垣先生云人以胃氣為本治法宜固元氣為主而佐以攻伐之劑當以歲月求之若欲速效投以峻劑反致有誤上七症方藥當互相參用附方三稜煎治血燥血瘕食積痰滯莪朮醋浸炒三稜各三兩青皮去白半夏麥芽炒各一兩上用好醋一鍾煮乾焙為末醋糊丸桐子大每服三四十丸淡醋湯下痰積薑湯下婦人血氣心痛方論第十四婦人血氣心痛由臟腑虛弱風冷所乘蓋心為諸臟之主若心受傷名真心痛朝發夕死夕發旦死若心絡傷故痛發乍輕乍甚而成斯症也愚按前症若寒邪所傷溫散之飲食停滯消導之肝火妄動辛平之脾氣鬱結和解之仍與後六症方藥同用附治驗一婦人久患心痛飲食少思諸藥到口即吐豫以為脾土虛弱用白朮一味同黃土炒去土每服一兩以米泔煎濃徐服少許數日後自能大飲用三斤余而安上舍孫履學長子室素怯弱産後患疥瘡年餘不愈因執喪旬月每欲眩僕一日感氣忽患心脾高腫作疼手不可按而嘔吐不止六脈微細或見其形實誤認諸痛不可補氣乃用青皮木香五味吳茱萸等藥而愈繼復患瘧且墮胎又投理氣行血之藥病雖去元氣轉脫再投參耆補劑不應矣六脈如絲欲絶迎豫至診之曰形雖實而脈虛極反用理氣之劑損其真氣故也連投參耆歸朮附子薑桂二劑間用八味丸五日寢食漸安六脈全復此症若心脾疼痛時即服此等藥痛亦不作矣附方烏藥散治血氣壅滯心腹作痛烏藥莪朮醋浸炒桂心當歸桃仁青皮木香各三分上為末每服二錢熱酒調下靈苑方用生五靈脂為末每服一錢沸湯下日三服八味丸方見二十四卷第十一論婦人血氣心腹疼痛方論第十五婦人血氣心腹疼痛由臟腑虛弱風邪乘之真邪相搏隨氣上下故心腹作痛也愚按前症若氣滯血瘀用沒藥散勞傷元氣用益氣湯肝脾鬱結用四七湯怒動肝火用小柴胡湯肝脾血虛用四物湯脾肺氣虛用四君子湯中氣虛弱用補中益氣湯氣血俱虛用八珍湯附治驗一婦人每怒心腹作痛久而不愈此肝火傷脾氣也用炒山梔一兩生薑五片煎服而痛止更以二陳加山梔桔梗乃不發一婦人懷抱鬱結不時心腹作痛諸藥不應用歸脾湯倍加炒山梔而愈陳湖陸小村母久患心腹疼痛每作必胸滿嘔吐手足俱冷面赤唇麻咽乾舌燥寒熱不時月餘竟夕不安其脈洪大衆以痰火治之屢止屢作逮乙巳春發頻而甚仍用前藥反劇此寒涼損真之故內真寒而外假熱也且脈息洪弦而有怪狀乃脾氣虧損肝木乘之而然當溫補胃氣遂用補中益氣湯加半夏茯苓吳茱萸木香一服熟寐徹曉洪脈頓斂怪脈頓除諸症釋然附方琥珀散治氣滯心腹撮痛或月經行小便疼痛烏藥莪朮醋浸炒各二兩當歸一兩上為末每服二錢溫酒調下蠲痛散治血氣刺痛荔枝核燒存性半兩香附子一兩上為末每服二錢鹽酒送下菖蒲丸治血積心脾作痛男六德續添九節菖蒲六兩吳茱萸炒香附子各四兩上為末醋調神麯糊丸桐子大每四五十丸淡薑湯調下沒藥散治血氣不行心腹作痛或行注疼痛或月經不調發熱晡熱並宜用之紅花沒藥當歸玄胡索炒各等分上為末每服二錢童便酒調下木香枳朮丸破滯氣消飲食開胃進食消化痰涎木香枳實炒各一兩白朮炒二兩上為末每服五錢薑棗水煎服木香化滯湯治脾胃虛弱飲食停滯腹脹作痛或心下痞滿不思飲食若憂怒飲食而致者尤宜用之木香紅花各三錢橘皮當歸梢各二錢柴胡四錢草豆蔻甘草各五錢半夏一兩枳實炒二錢上每服三五錢薑水煎服補中益氣湯四君子湯四物湯三方見二十四卷第六論四七湯方見十一卷第七論小柴胡湯方見二十四卷第二論八珍湯歸脾湯二方見二十四卷第四論二陳湯方見二十四卷第五論婦人血氣小腹疼痛方論第十六婦人小腹疼痛由胞絡受冷搏於血氣結於小腹因虛發動故痛也愚按前症若氣寒血結用威靈仙散氣滯血凝用當歸散肝經血虛用四物湯加參朮柴胡肝經濕熱用龍膽瀉肝湯肝脾氣虛用六君子湯加柴胡芍藥肝脾虛寒用六君子湯加柴胡肉桂若兼嘔吐加木香四肢逆冷再加炮薑附治驗通府張孟威云其妹小腹痛用附子理中湯附子服過八十餘枚此乃沉寒痼冷之甚不多有者附方威靈仙散凡冷氣滯血小腹疼痛或經行遇怒腹脹痛宜用之威靈仙一兩當歸沒藥木香桂心各半兩上為末每服一錢熱酒調下當歸散凡血積小腹疼痛或因氣逆月經不行肚腹作痛當歸炒赤芍藥劉寄奴沒藥枳殼麩炒玄胡索炒各等分上為末每服一錢熱酒調下四物湯六君子湯二方見二十四卷第六論龍膽瀉肝湯方見二十四卷第八論附子理中湯方見二十一卷第九論婦人兩脅脹痛方論第十七婦人兩脅脹痛因臟腑虛弱氣血不調風冷客於胞絡相搏壅塞痛也愚按東垣先生云胸腹作痛口苦舌乾寒熱往來發嘔發吐四肢滿悶淋溲便難腹中急痛此肝木之妄行也竊謂前症若暴怒傷血用小柴胡芎歸山梔氣虛用四物參朮柴梔若久怒傷氣用六君芎歸山梔若氣血俱虛用六味地黃丸若經行腹痛寒熱晡熱或月經不調發熱痰咳少食嗜臥體痛用八珍柴胡丹皮若脅脹發熱口渴唾痰或小便淋瀝頸項結核或盜汗便血諸血失音用六味丸若兩脅作脹視物不明或筋脈拘急面色青小腹痛或小便不調用補肝散若概用香燥之劑反傷清和之氣則血無所生諸症作焉丹溪先生云右脅痛用推氣散小龍薈丸當歸龍薈丸控涎丹抑青丸十棗湯皆病氣元氣俱實之劑用者審之附治驗一婦人性急吐血發熱兩腹脹痛日晡益甚此怒氣傷肝氣血俱虛也朝用逍遙散倍加炒黑山梔黃柏貝母桔梗麥門冬夕以歸脾湯送地黃丸而愈一孀婦內熱晡熱肢體痠麻不時吐痰或用清氣化痰藥喉間不利白帶腹脹用行氣散血藥胸膈不利肢體時麻此鬱怒傷肝脾而藥益甚也豫則朝用歸脾湯以解脾郁生脾氣夕用加味逍遙散以清肝火生肝血百餘劑而愈後因怒飲食日少肢體時麻此乃肝火侮土用補中益氣加山梔茯苓半夏而痊又飲食失調兼有怒氣肢體麻甚月經如注脈浮洪而數此脾受肝傷不能統血而致崩肝氣虧損陰血而脈大繼用六君加芎歸炮薑而血崩止又用補中益氣加炮薑茯苓半夏而元氣復更用歸脾湯逍遙散調理而康附方威靈仙散治冷氣血滯兩脅作痛方見前人參紫荊皮散治心腹刺痛胸膈飽滿不進飲食紫荊皮蒼朮石菖蒲各一兩香附子二兩人參五錢木香三錢上為末米糊丸桐子大每服三十丸食後薑湯下左金丸一名四金丸治肝火胸腹脹痛或發寒熱或頭目作痛或大便不實或小便淋祕或小腹疼痛及一切肝火之症黃連炒六兩吳茱萸一兩湯煮片時用上為末粥丸白朮陳皮湯下當歸龍薈丸治肝經實火胸脅脹痛或大便祕結小便澀滯凡屬肝經實火者宜用之當歸龍膽草炒焦梔子仁炒黃連炒黃芩炒各一兩大黃炒蘆薈青黛各五錢木香二錢五分麝香另研五分上為末用神麯糊丸桐子大每服二十丸薑湯下補肝散治肝脾二經氣血虧損脅脹作痛或脅脹頭暈寒熱發熱或遍身作痛經候不調山茱萸肉當歸五味子炒杵山藥黃耆炒川芎木瓜各五錢熟地黃自制白朮炒各一錢獨活酸棗仁炒各四兩上為末每服五錢棗水煎服小柴胡湯方見二十四卷第二論四物湯補中益氣湯六君子湯三方見二十四卷第六論六味丸方見二十四卷第十一論八珍湯逍遙散歸脾湯加味逍遙散四方見二十四卷第四論婦人心腹脹滿方論第十八婦人心腹脹滿由心脾虛損邪氣乘之此足少陰腎經之脈起於足小指貫腎絡膀胱入肝肺出絡於心若邪搏三經並結於脾脾虛則心腹脹滿矣愚按前症脾胃虛痞用六君子湯脾胃虛寒者用人參理中湯鬱結氣滯者用歸脾湯肝侮脾土用六君加柴芍脾氣壅滯用平胃散肺氣壅滯用柴蘇飲宿食壅滯用養胃湯脾血虛痞用四物加參術上六症當互相參用仍與六卷第七論同用附治驗嘔吐心腹痛見七卷第一論一婦人胸膈不利飲食少思腹脹吞酸或用疏利之藥反致中滿不食豫以為脾土虛而肝木勝用補中益氣湯加砂仁香附煨薑又以六君子加芎歸桔梗而愈吳江史玄年母久病之後遇事拂意忽胸腹脹滿面目微腫兩腿重滯氣逆上升言語喘促所服皆清氣之劑不效豫曰此脾肺虛寒也先用六君子湯一劑病熱頓減後用補中益氣加茯苓半夏乾薑二劑形體頓安後以七情失調夜間腹脹乃以十全大補加木香治之而痊附方白朮散治脾胃氣滯心腹脹滿不欲飲食白朮炒草果訶子茯苓檳榔桂心各五分陳皮厚朴薑炒人參各一錢甘草炒三分上薑棗水煎服愚按前方治胸膈氣滯飲食內停之良劑若脾血虛痞須用四物參術脾氣虛痞須用四君芎歸補遺治心腹脹滿豫嘗獨用厚朴薑汁炒每服五錢薑七片水煎溫服不拘時候間服沉香降氣湯得效此病氣元氣壅實之治法也附方平胃散治脾氣壅滯胸腹不利或飲食不進停滯嘔吐蒼朮厚朴薑製陳皮各一錢五分甘草炙五分上薑棗水煎服人參養胃湯治脾氣壅滯胸膈不利或飲食壅滯胸腹脹悶或兼外感風寒頭痛嘔吐等症方見二十一卷第九論四物湯六君子湯補中益氣湯三方見二十四卷第六論人參理中湯方見二十卷第八論十全大補湯歸脾湯二方見二十四卷第四論紫蘇飲方見十二卷第八論調中益氣湯方見四卷第九論
