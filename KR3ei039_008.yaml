body:
  text: 卷八婦人小便淋瀝不通方論第一婦人淋瀝由腎虛而膀胱熱也蓋膀胱與腎為表裡主於水行於脬者為小便也著腎虛則小便頻數膀胱熱則小便淋瀝甚則不通腹脹喘急當速治之愚按前症若膀胱熱結用五淋散若脾肺虛熱用補中益氣湯加山藥五味麥冬若脾經鬱熱用加味歸脾湯若肺經鬱火用黃芩清肺飲若肝經濕熱用龍膽瀉肝湯血虛用加味逍遙散陰虛用六味丸加柴胡山梔大抵不渴而不利者熱在下焦血分也用滋腎丸渴而不利者熱在氣分也用清肺飲尺脈數而無力者陰火盛而陽不能化也用六味丸滋腎丸為主尺脈浮而無力者陽氣虛而陰不能生也用加減八味丸滋腎丸為主附治驗一婦人素有前患內熱體倦余以為肝火血少脾氣虛弱用八珍逍遙二散兼服月餘而小便利又用八珍湯而氣血復一婦人患前症面青脅脹諸藥不應豫以為肝經氣滯而血傷用山梔川芎煎服而愈一婦人小便不利小腹並水道祕悶或時腹脅脹痛余以為肝火用加味逍遙散加龍膽草四劑稍愈乃去膽草佐以八珍散加炒黑山梔兼服而瘥石韋湯治小便實熱氣滯淋瀝石韋黃芩炒木通榆白皮葵子瞿麥甘草各五分上薑水煎服雞蘇散治血熱淋瀝雞蘇葉木通各二兩生地黃滑石各三兩刺薊根一兩上每服半兩淡竹葉三七片水煎桃仁煎治血瘕小便如淋臍腹脹痛方見血瘕門第七卷第九論火府丹治心經積熱小便澀及五淋加甘草名導赤散生地黃二兩杵膏木通為末黃芩炒各一兩上加蜜丸桐子大每服三十丸木通煎湯下許學士云一卒病渴日飲水斗許不食者三月心中煩悶時已十月余謂心經有伏熱與火府丹數服越二日來謝云當日三服渴止又三服飲食如故此本治淋用治渴可謂通變也一方牛膝一合水煎入麝香少許服之鄞縣耿武尉夢得其內患淋下砂石剝剝有聲甚為苦楚一服而愈附方滋腎丸治熱在血分不渴而小便不利或腎虛足熱腿膝無力不能履地又下焦陰虛小便不利肚腹腫脹或皮膚脹裂眼睛突出此神劑也知母酒炒黃柏酒炒各二兩肉桂二錢上各另為末水丸桐子大每服二百丸空心白湯下黃芩分清飲治肺熱小便不利宜用此藥清之黃芩炒山梔炒各一錢上水煎服不利加鹽鼓二十粒五淋散治膀胱有熱水道不通淋瀝不出或尿血如豆汁或成砂石或如膏汁或熱怫便血赤茯苓一錢五分赤芍藥山梔各一錢當歸甘草各一錢五分上入燈心水煎服補中益氣湯方見二十四卷第六論八珍湯加味歸脾湯加味逍遙散三方見二十四卷第四論龍膽瀉肝湯方見二十四卷第八論加減八味丸六味丸二方見二十四卷第十一論婦人轉脬小便不利方論第二婦人轉脬或內熱傳搏於胞或忍小便氣逆於內以致小腹急痛不得小便甚者至死愚按前症不問男女孕婦轉脬小便不利命在反掌非八味丸不能救余參前後論主治附治驗余見第十五卷一婦人小便淋瀝小腹脹悶胸滿喘急諸藥不應余視為轉脬之症用八味丸一服小便如湧而出一婦人因鬱怒小便滴澀漸至小腹腫脹痰咳喘促余用八味丸料煎服小便即利而痊一婦人素善怒小便淋瀝不利月經不調半載矣或兩脅脹悶或小腹作痛或寒熱往來或胸乳作痛或咽喉噎塞或兩腳筋攣或肢節結核面色青黃不澤形氣日瘦左關弦洪右關弦數此鬱怒傷肝脾血虛氣滯為患朝用加味歸脾湯以補脾氣解脾郁祛肝火夕用滋腎丸生肝散滋腎水以生肝血抑肝火舒筋膜兼服月餘而愈滋腎生肝飲山藥山茱萸肉各一錢熟地黃自制二錢澤瀉茯苓牡丹皮各七分五味子杵炒五分柴胡三分白朮當歸甘草三分上水煎服蔥白湯治氣滯小便不通腹脹欲死橘皮三兩葵子一兩蔥白一莖上水煎分三服八味丸治脬轉小便不通殊有神效但世所不用以致誤人多矣方見二十四卷第十一論滑石散治脬轉小便數日不通滑石一兩寒水石二兩葵子一合上為末以水一斗煮至五升時服一升即利又方亂髮燒灰葵子車前子各等分上為末每服二錢酒調服石韋湯治轉脬小便不通方見前治強忍小便致脬轉尿不利困篤欲死滑石二兩亂髮灰一兩上為末每服三錢桃白皮一斤細切熟杵入水三盞絞取汁調服千金翼用杏仁二十粒去尖皮麩炒共嚼細水送下立通一方皂角為末吹鼻內取嚏婦人小便數方論第三小便乃腎與膀胱主之蓋腎氣通於陰若二經虛而熱乘之則小便澀滯虛則頻數也愚按前症若肝經火動用逍遙散加龍膽草車前子膀胱火動六味丸加麥門五味肝腎濕熱龍膽瀉肝湯郁傷肝脾加味逍遙散加味歸脾湯肝脾肺氣虛補中益氣加麥門五味肝經血虛加味逍遙散腎氣虛敗鹿茸散如不應用八味丸附治驗一婦人患前症小便頻數日晡熱甚此肝脾血虛氣滯而兼濕熱也用加味逍遙散加車前子而愈一婦人患前症發熱煩躁面目赤色脈洪大而虛余謂此血虛發燥用當歸補血湯數劑而痊一婦人久患前症泥屬於火雜用寒涼止血之劑虛症悉具余曰此脾胃虧損而諸經病也當補中氣為主遂以六君子補中二湯兼服兩月餘尋愈桑螵蛸散治腎氣虛寒小便數少或時頻數或夜間尤數桑螵蛸三十枚炒鹿茸炙牡蠣煅甘草炒二兩黃耆炒上為末每服二三錢食前空心用薑湯調下日二服縮泉丸治脬氣虛寒小便頻數或遺尿不止小兒尤效烏梅益智仁等分上為末酒煎山藥末為糊丸桐子大每服七十丸鹽酒或米飲下鹿茸散治腎氣虛寒便溺數甚或夜間頻數遺溺鹿茸炙烏賊魚骨桑寄生當歸龍骨煅各二兩白芍藥炒附子炮各三錢桑螵蛸炙各五錢上為末每服二錢空心並食前用溫酒調下作丸服亦可凡用附子重一兩二四錢底平頂圓周圍有瓣者方是附方當歸補血湯八味丸六味丸加減八味丸四方見二十四卷第十一論逍遙散加味逍遙散加味歸脾湯三方見二十四卷第四論六君子湯補中益氣湯二方見二十四卷第六論婦人遺尿失禁方論第四經云膀胱不利為癃不約為遺溺乃心腎之氣失其常度也故有便道澀而遺者有失禁而不知自遺者亦有生産傷膀胱不時而遺者有脬寒臟冷遺而不知者愚按內經曰胞移熱於膀胱則癃溺血膀胱不利為癃不約為遺溺注曰膀胱為津液之府水注由之然足三焦脈實約下焦而不通則不得小便足三焦脈虛不約下焦則遺溺也靈樞經曰足三焦者太陽之別也並太陽之正入絡膀胱約下焦實則閉癃虛則遺溺竊謂前症若肝腎虛熱挺孔痿痹用六味丸如不應用加減八味丸陽氣虛憊膀胱積冷用鹿茸丸如不應用八味丸若脾氣虛弱不能禁止用補中益氣湯加山藥山茱五味若肺氣虛寒前湯加桂附此症屬虛熱者多真寒者少治宜審察附治驗附小便遺溺一婦人小便自遺或時不利日晡益甚此肝熱陰挺不能約制用六味丸料加白朮酒炒黑黃柏七分知母五分數劑諸症悉愈若誤用分利之劑愈損真陰必致不起一老婦患前症惡寒體倦四肢逆冷余以為陽氣虛先用補中益氣加附子三劑不應遂以參附湯四劑稍應仍以前藥而安附子計用四枚人參三斤許一婦人病愈後小便出屎此陰陽失於傳送名大小腸交也先用五苓散二劑而愈又用補中益氣而安鹿茸丸治陽氣虛寒小便白濁滑數不禁或臍腹陰冷大便不實鹿茸炙椒紅桂心附子炮牡蠣煅補骨脂炒石斛肉蓯蓉酒浸雞䏶胵炙沉香各一兩桑螵蛸炙二錢上為末酒糊丸桐子大每服三十九空心溫酒下祕元丹治陽氣虛小便不禁或夜多小便頻數白龍骨煅三兩訶子十個去核縮砂去皮一兩上為末糯米粥丸桐子大每服五十丸空心鹽酒下又方鹿角鎊炒為末每服三五錢空心熱酒調下又方雞䏶胵炙為末每服二三錢空心酒調下日二三服又方桑螵蛸酒炒為末每服二錢空心薑湯調下附方六君子湯補中益氣湯二方見二十四卷第六論六味丸加減八味丸八味丸三方見二十四卷第十一論參附湯方見十九卷第六論五苓散方見二十卷第九論婦人小便出血方論第五心主於血通行經絡循環臟腑若得寒則凝澀得熱則妄行失其常道則溢滲於脬則小便出血也愚按前症肝經血熱者加味逍遙散怒氣血傷者加味逍遙散調送發灰若肝經風熱者加味逍遙散送子芩丸氣血俱虛者八珍湯送發灰膏粱積熱者清胃散加槐花甘草風熱傷胃者四君子加防風枳殼胃氣不能攝血者補中益氣湯鬱結傷脾不能攝血者濟生歸脾湯附治驗一婦人尿血因怒寒熱或頭疼或脅脹此脾血虛而肝火盛用加味逍遙散而血脹止補中益氣加蔓荊子而頭痛痊後鬱怒腹痛尿血仍用前散加龍膽草並歸脾湯治之將愈又因飲食所傷復作心忡不寧徹夜不寐仍用前湯而痊一婦人尿血面黃體倦飲食不甘晡熱作渴此脾胃氣虛不能攝血歸經用補中益氣以補胃氣用歸脾湯以解鬱結更用加味逍遙散以調養肝血而痊一婦人小便出血服四物蒲黃之類更加發熱吐痰加芩連之類又飲食少思虛症蜂起肝脈弦而數脾脈弦而緩此因肝經風熱為沉陰之劑脾傷不能統攝其血發生諸臟而然也豫用補中益氣湯六味地黃丸而痊鹿茸散治勞損尿血發熱內熱或寒熱往來口乾作渴鹿茸炙當歸熟地黃自制葵子炒蒲黃炒續斷酒炒各等分上為末每服二錢酒調日三服發灰散治起居所傷小便尿血或忍尿脬轉臍下急痛小便不通又治肺疽心衄內崩吐血舌上出血用亂髮燒灰本草云能療瘀血通關隔利水道破癥瘕癰腫狐疝刺痛疰雜瘡療脬轉通大小便止咳嗽鼻衄上每服二錢以米醋湯調服生地黃散治血熱小便出血生地黃二錢黃芩炒五錢阿膠炒柏葉炒各一錢水煎服當歸散治血分有熱小便出血或時尿血當歸羚羊角鎊赤芍藥各半錢生地黃刺薊葉各一錢上水煎服又方治血分有熱用生地黃杵取汁每用一小盞日三服又方治血分有熱小便尿血用炒蒲黃末每服二錢溫酒調下滾湯亦下又方腎虛鹿角膠二兩炙黃為末作二服長流水調附方八珍散加味逍遙散歸脾湯三方見二十四卷第四論子芩丸方見十二卷第六論清胃散方見二十四卷第一論四君子湯補中益氣湯二方見二十四卷第六論婦人大便不通方論第六夫大便不通者由臟腑不調寒熱之氣結於腸胃或經水過多內亡津液宜用三脘散或四物加青皮或七宣丸麻仁丸選而用之愚按前症或大腸津液乾涸或血虛火爍不可計其日期飲食數多必待腹滿脹自欲去而不能者乃用豬膽汁潤之若妄服苦寒辛散之劑元氣愈傷或通而不止或成中痞之症大抵血虛火燥用加味逍遙散氣血俱虛用八珍湯燥藥傷血用四物連翹甘草克伐傷氣用四君川芎當歸內熱作渴飲湯脈實用竹葉黃耆湯內熱作渴飲冷脈澀用四物送潤腸丸肝膽克脾土而不能輸送用小柴胡加山梔郁李仁腸胃氣虛而不能傳送用補中益氣加芍藥厚朴積熱而祕結用清胃散加芍藥其有熱燥風燥陽結陰結皆不宜損中氣治者審之附治驗一婦人痰喘內熱大便不通兩月不寐脈洪大重按微細此屬肝肺腎虧損朝用六味丸夕用逍遙散各三十餘劑計所進飲食百餘碗腹始痞悶正前所謂血虛火爍也以豬膽汁導而通之用十全大補湯調理而安附方通神散治大便實熱不通其證心腹脹痛手不得近心胸悶而欲飲食者大黃炒芒硝檳榔桃仁杵郁李仁湯浸去皮酒炒各一兩上為末每服二錢粥飲調大麻仁丸治腸胃風結大便常祕而欲飲食者大麻仁別研如膏大黃炒各二兩檳榔木香枳殼麩炒各一兩上為末入麻仁煉蜜丸桐子大每服二十丸溫水下皂角丸治大腸經有風大便祕結而不堅實者皂角炙去子枳殼麩炒等分上為末煉蜜丸桐子大每服七十丸空心米飲下蘇麻粥順氣滑腸用紫蘇子麻子仁水研取汁煮粥食之潤腸丸治伏火風熱大腸乾燥若因失血或因腎虛當滋腎水最忌此丸麻子仁桃仁去皮尖另研各一兩羌活當歸尾大黃煨皂角仁秦艽各五錢上另研為末煉蜜丸每服五十丸空心白湯送下如直腸乾澀用豬膽汁導之亦忌前藥附方加味逍遙散八珍湯二方見二十四卷第四論補中益氣湯四物湯四君子湯三方見二十四卷第六論竹葉石膏湯方見二十四卷第三論小柴胡湯方見二十四卷第三論清胃散方見二十四卷第二論瘡科竹葉黃耆湯方見二十四卷第四論婦人老弱風人便祕戒用利藥方論第七初虞世云肺主氣肺氣不降則大腸不能傳送宜用杏仁枳殼訶子等藥若老弱風人津液短少大便祕澀用胡麻杏仁麻仁阿膠皂角之類每見用駃利之藥大便雖通精血復傷反致他病一男子病風淫未疾或用駃藥利之患肺痿咯膿血至大便不通而死惜哉愚按前症若胃強脾弱津液不得四布但輸膀胱小便數而大便難者用脾約丸若陰血枯稿內火燔灼脾肺失傳大便祕而小便數者用潤腸丸此丸若用之於熱甚氣實與西北稟厚者無有不效若用於東南及虛熱而氣血不足者則脾愈弱而腸愈燥反致虛痞矣此東垣先生之治法也其搜風順氣丸中貴及西北人用之多效東南人用之無不致害附治驗一老婦大便欲去而難去又不堅實腹內或如故或作脹兩關尺脈浮大余以為腸胃氣血虛弱每服十全大補湯加肉蓯蓉去後始快若間二三日不服腹內仍脹大便仍難搜風順氣丸治痔漏腸風風熱閉結元氣充實者車前子一兩五錢大麻子微炒大黃五錢半生半熟牛膝酒浸郁李仁湯泡枳殼麩炒菟絲子酒浸蒸曬為末山藥二錢上為末煉蜜丸桐子大每服二十丸空心白湯送下子和脾約丸麻仁一兩二錢半枳殼麩炒厚朴薑製芍藥各一兩大黃四兩蒸杏仁去皮尖炒一兩二錢上為末入杏仁膏煉蜜丸桐子大每服二三十丸空心用滾湯送下內杏仁研爛婦人泄痢祕結方論第八經云春傷於風夏必飧泄蓋木刑土也土不能滲泄則木氣勝故津液燥而祕不可專以風治張氏母年七十患痢頻數腰腳拘攣百方不愈用蒺藜酸棗仁治之即愈黃魯直苦祕結亦用前藥而愈故受症有不同也愚按前症若因足三陰虧損發熱作渴胸膈不利飲食善消面帶陽色脈洪而虛肢體倦怠者用補中益氣湯六味地黃丸脾肺氣虛補中益氣湯脾經鬱結用加味歸脾湯氣血俱虛者八珍加肉蓯蓉腎經津液不足者六味地黃丸胃火消鑠津液竹葉黃耆湯肝木侮脾土小柴胡加山梔郁李仁枳殼膏粱積熱清胃散加山梔郁李仁枳殼若燥在直腸用豬膽導之附治驗一老婦人大便月餘不通痰喘內熱不得就枕脈洪大重按細微朝用六味丸夕用逍遙散各五十餘劑計進飲食百餘碗小腹始悶此火燥而消鑠也以豬膽汁潤之用十全大補而安後仍不通用八珍倍加肉蓯蓉常服而通治風人大便或祕皂莢子三百粒破作兩片慢火炒燥入酥棗大又炒燥又入酥至焦黑為度上為末蜜丸桐子大每服三十丸煎蒺藜酸棗仁湯空心下良久未利再服漸加至百丸以通為度蒺藜湯用蒺藜炒杵去刺三兩酸棗仁炒香一兩每用五錢水一盞煎七分去滓送下前丸大五柔丸治臟氣不調大便難利或為祕結堅硬大黃飯上蒸焙末枳殼去穰麩炒白芍藥炒為末葶藶炒為末牛脂熬油蓯蓉酒浸焙各一兩桃仁去皮尖研百枚杏仁去皮尖四十枚研炒黃別杵上和勻煉蜜丸桐子大米飲下三十丸日三服以和為度二仁丸安康郡太守苦風祕豫處此方用之甚效杏仁去皮尖麵炒黃麻仁別研枳殼去穰麩炒為末訶子炒去皮為末上用煉蜜丸桐子大每服二三十丸溫水下未利增之蜜導法用好蜜四五兩石器中微火熬不住手攪候可丸以蛤粉塗手捏如指長三寸許入大孔內以手掩良久即通未通再作文潞公泄利求速效用石脂龍骨等藥便祕纍日甚苦余告曰此燥糞在直腸藥所不及請以蜜導之下結糞四五十枚而愈通氣散治虛人憂怒以致傷肺與大腸不能傳送陳皮蘇葉枳殼麩炒木通各一錢上水煎服皂角丸蘇麻粥亦佳見前附方補中益氣丸方見二十四卷第六論六味丸方見二十四卷第十一論加味歸脾湯八珍湯逍遙散加味逍遙散十全大補湯五方見二十四卷第四論竹葉黃耆湯方見二十四卷第二論小柴胡湯方見二十四卷第二論清胃散方見二十四卷首論婦人泄瀉方論第九論曰泄瀉之症因腸胃虛冷而邪氣乘之經云春傷於風夏必飧泄蓋風傷肝肝木旺而克脾土屬外因也若七情不平臟氣受傷屬內因也若飲食生冷傷脾屬不內外因也大法寒者溫之熱者涼之滑者澀之溫者燥之愚按前症若生冷所傷用六君木香砂仁辛熱所傷用二陳炒連山梔麵食所傷用六君神麯米食所傷用六君谷糵飲食不時而傷用四君子湯飲食過多而傷用六君子湯飲食停滯人參養胃湯脾氣虛弱者六君升麻柴胡脾氣虛寒六君木香炮薑肝木乘脾者六君柴胡芍藥肝火克脾者六君芍藥山梔中氣虛而下陷者補中益氣湯鬱結傷脾者濟生歸脾湯腎氣虛者五味子散脾氣虛者二神丸脾腎虛者四神丸命門火衰者八味丸真陽虛敗者固真丸仍與滯下方參用附治驗侍御沈東江之內停食腹痛作瀉以六君加木香炮薑而愈後復作傳為腎泄用四神丸而安待御徐南湖子室瀉屬腎經不信余言專主滲泄以致不起一婦人年逾五十不食夜飯五更作瀉二十年矣後患痢午前用香連丸午後用二神丸各二服而痢止又用二神丸數服而食夜飯不月而形體如故吳江史玄年母素有血疾殆將二紀平居泄瀉飲食少思面黃中滿夏月尤甚治血之藥無慮數百劑未嘗少減余以為脾腎虛損用補中益氣湯送二神丸復用十全大補湯煎送前丸食進便實病勢頓退若泥中滿忌參術痰痞忌熟地便泄忌當歸皆致誤事桂香丸治虛寒滑泄腹痛或嘔吐不食手足逆冷附子炮肉豆蔻炮丁香桂心白茯苓各一兩木香炮白乾薑炮各兩半上為末米糊丸桐子大每服五十丸空心米飲下胃苓散治脾胃所傷吐瀉不止水穀不分即五苓散合平胃散上每服五七錢用薑棗水煎空心服仍節飲食木香散治臟腑虛寒下泄米穀口舌生瘡或嘔吐不食木香煨破故紙炒各一兩良薑縮砂炒厚朴制各三錢赤芍藥炒橘紅桂心白朮各半兩胡椒吳茱萸炮各一錢肉豆蔻煨檳榔一錢上為末每服三錢用豬肝四兩批薄以藥摻拌量入水醋鹽蔥薑煮乾空心頓食或丸桐子大每服百丸粥飲下日三服府傅趙宜人患泄瀉諸藥無效診之曰此肝腎虛也服前散而愈經曰泄痢前後不止腎虛也又曰諸厥固泄皆屬於下下謂下焦肝腎之氣也門戶束要肝之氣也肝氣厥而上行故下焦不能禁固而泄痢腎為胃關門戶不安故倉廩不藏也香連丸治痢疾並水瀉暑瀉腹痛不問赤白神效黃連淨二十兩吳茱萸去枝梗十兩上先將二味用熱水拌和入磁器內置熱湯燉一日同炒至黃連紫黃色去茱用連為末每末四兩入木香末一兩淡醋米飲為丸桐子大每服二三十丸滾湯下久痢中氣下陷者用補中益氣湯下中氣虛者用四君子下中氣虛寒者加薑桂三黃丸治熱痢腹痛或口舌生瘡咽喉齒痛及一切虛火之症黃芩黃連黃柏各炒等分上各另為末米糊丸桐子大每服七八十丸白湯下芍藥湯治熱痢便血後重經曰溲而便膿血此氣行而血止也行血則便膿自愈調氣則後重自除芍藥炒一兩當歸黃連各半兩檳榔木香甘草炒各二錢桂二錢五分黃芩炒五錢上每服半兩水煎如不減加大黃此症多有因中氣虛弱脾氣鬱結者治當審察二神丸加五味二兩吳茱萸四兩名四神丸治脾腎虛弱侵晨五更作瀉或全不思食或食而不化大便不實神效破故紙四兩炒肉豆蔻二兩生用上為末用大紅棗四十九枚生薑四兩切碎同棗用水煮熟去薑棗和藥丸桐子大每服五十丸空心鹽湯下五味子散治腎經虛弱大便不實或夜間或五更泄瀉五味子炒二兩吳茱萸半兩上為末每服二錢空心米飲調下其效如神米糊為丸亦可白朮芍藥湯治脾經受濕水泄注下體重腹滿形體倦怠不欲飲食或暴泄無數水穀不化白朮炒芍藥炒各二錢甘草炒一錢上水煎服茯苓湯治濕熱泄瀉或飲食傷瀉白朮炒茯苓各五錢上用水煎食前服一方有芍藥等分名白朮散滲濕湯治寒濕所傷身腰冷如坐水中或小便祕澀大便溏此症多因坐臥濕地或陰雨所襲而致蒼朮炒白朮甘草炒各一兩乾薑茯苓各二兩陳皮一兩丁香各二錢半上每服四五錢棗水煎防風芍藥湯治飧泄身熱脈弦腹痛及頭痛防風芍藥炒黃芩炒各二錢上水煎服六君子湯四君子湯補中益氣湯三方見二十四卷第六論人參養胃湯方見七卷第十論十全大補湯濟生歸脾湯二方見二十四卷第四論八味丸方見二十四卷第十一論東垣補真丸方見七卷第三論婦人協熱下痢方論第十論曰下痢赤黃米穀不化作渴嘔逆小使不利心胸煩躁脈虛大而數此胃經虛熱津液不分並於大腸所致先用五苓散次用玉粉丹四味阿膠丸主之愚按前症若胃氣氣虛弱用補中益氣湯肝木侮脾土用六君子湯鬱結傷脾土用歸脾湯命門火衰用八味地黃丸余參各論主之附治驗一婦人五月間患痢日夜無度小腹墜痛發熱惡寒余以為脾氣虛弱用六君子湯送香連丸二服漸愈仍以前湯送四神丸四服全愈至七月終怠惰嗜臥四肢不收體重節痛口舌乾燥飲食無味大便不實小便頻數灑淅惡寒悽慘不樂此肺脾腎虛而陽氣不伸也用升陽益胃湯而痊玉粉丹蛤粉硫黃等分上為末米糊丸桐子大每服五十丸用米飲下四味阿膠丸黃連炒赤茯苓二兩芍藥炒三兩阿膠炒燥一兩上為末以醋丸桐子大每服三十丸食前米飲下附方補中益氣湯六君子湯二方見十十四卷第六論歸脾湯方見二十四卷第四論八味丸方見二十四卷第十一論婦人滯下方論第十一經云春傷於風夏生飧泄蓋風喜傷肝然春時肝木反克脾土以致滯下赤白裡急後重先服神朮散次用五苓散之類煩渴腹痛小便赤澀脈洪數為熱用白頭翁湯之類脈虛弱為伏暑用香薷散之類如風邪下血用胃風湯腹痛嘔逆手足俱冷六脈微細為臟腑虛寒急服四順附子湯灸氣海丹田二穴久痢腸滑用理中湯加肉果訶子或十全大補湯加木香肉果之屬若一方一郡所患相類者乃屬疫症愚按東垣云太陰經受濕水瀉變膿血脾傳於腎者謂之賊邪難愈先痢而後瀉者謂之微邪易痊若厥陰經下痢脈沉微手足厥逆用麻黃小續命湯汗之若身冷自汗小便自利脈微嘔吐用漿水散溫之若脈疾身動下迫聲響用白朮芍藥湯脈沉身靜飲食不入用薑附湯身體沉重四肢不舉用朮附湯竊謂前症若飲食停滯用六君子湯以補脾胃消飲食若胃氣下流用補中益氣湯以補脾腎升元氣若風傷腸胃宜用神朮散以補脾胃解外邪若痰積中焦宜用六神丸以補脾胃化痰滯大凡脾胃虛宜補中氣調飲食附治驗一老婦食後因怒患痢裡急後重肛門脫下此脾氣下陷用大劑六君加附子肉蔻煨木香各一錢吳茱五分骨脂五味各一錢五分二劑諸症悉退惟小腹脹悶此肝氣滯於脾也與調中益氣加附子木香五分四劑而愈後口內覺咸此腎虛水泛與六味地黃丸二劑頓愈又以飲食失宜大便不實四肢逆冷此脾胃復傷與六君加附子五分及八味丸而愈先太宜人仲夏患痢腹痛去後無度煩渴飲湯手按腹痛稍止脈鼓指而有力此真氣虛而邪氣實也急用人參五錢白朮茯苓各三錢陳皮炙草附子升麻各一錢服之即睡覺而索食脈症頓退再劑而安此取症不取脈也其時同患是症服痢藥者俱致不起惜哉神朮散治春傷於風夏生飧泄或傷風頭痛項背拘急鼻流清涕蒼朮炒二錢藁本川芎各一錢羌活粉草炒一錢五分細辛五分上用薑水煎服欲發汗加蔥頭四順附子湯生附子去皮臍白乾薑炒甘草炒人參各一兩上每服四五錢水煎吐瀉腹痛加肉桂半兩小便不利加茯苓半兩若體寒自汗手足逆冷六脈虛弱背寒面垢或面如塗油齒乾煩悶躁渴引飲此為伏暑宜用小柴胡湯五苓散酒蒸黃連丸加減參附湯治寒痢陽氣脫陷嘔吐不食手足俱冷大附子炮大人參各一錢丁香十五粒上用薑十片米一撮水一鍾煎服如不應再加之治噤口痢甚妙石蓮肉為末每服二錢陳米飲調下又方乾山藥半生半炒黃為末不拘時用米飲調下附方胃風湯治風冷乘虛客於腸胃以致水穀不化泄瀉注下或腸胃濕毒下如豆汁或下瘀血人參白茯苓芎藭肉桂當歸白芍藥炒白朮炒各等分上每服三二錢入粟米數粒水煎空心食前熱服水煮木香丸治久痢裡急後重日夜無度其效如神罌粟殼去穰三兩青皮去白二兩四錢甘草炒二兩四錢訶子炮去核八兩當歸木香各六兩上為末煉蜜丸彈子大每服一丸水煎化空心服戊己丸治胃經受熱泄痢不止或飲食不入腹痛不止黃連炒吳茱萸去梗炒白芍藥各五兩上為末麵糊丸桐子大每服三十丸米飲食前下真人養臟腸治下痢赤白裡急後重腹痛脫肛粟殼蜜炙三兩六錢人參六錢白朮六錢肉桂八錢當歸六錢訶子皮一兩二錢木香煨二兩四錢肉豆蔻麵煨半兩白芍藥炒一兩甘草炒一兩八錢上每服四錢用水煎臟寒加附子一兩升陽除濕防風湯如大便閉塞或裡急後重數至圊而不能便或有白膿或兼下血此鬱結而不通也以此湯舉其陽則陰氣自降矣慎勿利之蒼朮米泔浸四錢防風二錢白朮炒白茯苓白芍藥炒各一錢先將蒼朮用水一鍾半煎至一鍾內諸藥同煎至八分食前熱服夫飲食入胃其氣上升輸精心肺然後下降若脾胃有傷不能上升下流腎肝而成泄利法宜升補中氣不可疏下此東垣發前人所未論也調中益氣湯夫脈弦洪緩而沉按之中下不得一澀其證四肢滿閉肢節煩疼難以屈伸身體沉重煩心不安忽肥忽瘦四肢懶倦口失滋味大小便清利而數或上飲下便或大便澀滯夏月飧泄或便後見血或下白膿胸滿短氣咽膈不通嗜睡無力飲食少思方見四卷第五論麻黃續命湯防風杏仁去皮尖各二兩麻黃去節二兩人參黃芩炒芍藥防己肉桂各一兩附子炮去皮臍五錢上每服半兩用薑水煎白朮芍藥湯治太陰脾經受濕水泄注下體重微滿困弱無力不欲飲食或暴泄無數水穀不化宜此湯和之白朮芍藥炒各一兩甘草炒五錢每服一兩水煎漿水散治暴利如水周身汗出一身盡冷脈微而弱氣短難言甚者吐血此為惡病急用此藥緩則不救半夏一兩泡洗附子半兩炮乾薑一作乾生薑肉桂甘草炙各五錢良薑二錢半上為末每服三五錢漿水煎和滓熱服不應加之薑附湯治霍亂轉筋手足厥冷或吐逆身冷脈微急用此藥救之乾薑一兩附子一兩生用每服半兩水煎朮附湯治下痢脾氣脫陷肢體不動汗出身冷氣短喘急或嘔吐不食等症須急用之白朮生附子須用好者上為末每服五錢薑棗水煎和滓服如不應倍用之六神丸治食積赤白痢疾或腹痛不食或久而不止神麯為糊麥芽麩炒茯苓枳殼麩炒木香煨黃連炒赤各等分上為末用神麯糊丸桐子大每服五十丸白湯送下香連丸方見前六君子湯補中益氣湯二方見二十四卷第六論五苓散方見二十一卷第十論六味丸八味丸二方見二十四卷第十一論婦人痢後嘔噦方論第十二滯下咳逆嘔逆古人謂之噦此胃氣虛寒之危症也用橘皮乾薑湯半夏生薑湯丁香柿蒂湯熱證咳逆用小柴胡湯橘皮竹茹湯嘗治一痢咳逆脈沉弱投退陰散兩服而愈又一痢後咳逆灸期門穴三壯而愈其穴在第六卷愚按東垣云如泄痢而嘔者胃氣不和也上焦不和用生薑橘皮湯中焦不如用芎歸桂苓下焦不和而寒治以輕劑熱甚而治以重劑亦有胃火上衝而嘔者有積滯而嘔者有陰虛而嘔者丹溪云下痢吃逆自下衝上屬火之象古方悉以胃弱言之殊不知胃弱者脾陰弱也故久病變之乃胃弱脾寒之危症用半夏一兩生薑半兩或理中湯加枳殼茯苓半夏不效更加丁香柿蒂各十枚胃熱咳逆用橘皮竹茹湯別病忽然而致半夏茯苓湯加枳實半夏木香調氣散最佳附治驗一婦人痢後嘔噦服降火化痰劑愈甚脈洪大按之虛細作渴飲湯諸藥到口即嘔余以為脾胃虛寒不能司納以參朮炮薑末各一錢以飯作丸米飲不時過三五粒至三兩許聞藥不嘔乃以六君加炮薑三十餘劑而安一婦人患前症飲食少思胸腹膨脹大便不實所見之症悉屬虛寒假熱遂朝用補中益氣湯加炮薑木香夕用六君子送四神丸漸愈又用八味丸料煎送四神丸而痊一婦人因怒嘔噦時或昏憒口噤或時舉體肉動其面色或青或赤余以為肝火熾盛脾土受侮用小柴胡湯加山梔鉤藤治之漸愈又用加味歸脾逍遙二藥調理而痊橘皮乾薑湯治胃寒嘔噦不食或吐痰腹痛兼瀉橘皮通草乾薑桂心甘草炒一錢人參各一錢上水煎服橘皮竹茹湯治噦逆橘皮二錢竹茹甘草炒人參半夏各一錢上薑棗水煎豬苓湯治咳而嘔渴心煩不得眠豬苓赤茯苓澤瀉阿膠炒滑石各一錢上水煎服半夏湯治噦欲死半夏一兩生薑切二兩上水煎為二服丁香柿蒂湯治咳逆丁香十粒柿蒂十五個上水煎熱服生薑橘皮湯治嘔噦手足厥冷橘皮一錢生薑四錢上水煎服退陰散治陰毒傷寒手足逆冷或咳逆不止脈沉細頭痛腰重急進三服若傷冷每服一字入正元散內同煎入鹽一捻乾薑炮川烏炒黃等分上每服一錢鹽一捻水煎倉廩湯治痢疾心煩手足溫頭痛此熱毒上衝宜用此湯即敗毒散每服四五錢入陳倉米百粒薑五片棗一枚煎若脈微弱或胸腹虛脹手足厥冷或因服罌粟烏梅過多以致作嘔者宜用山藥半生半炒為末米飲調下日二三服附方木香調氣散治氣滯嘔吐或胸膈不利心腹刺痛飲食不思木香白豆蔻丁香檀香各二兩藿香甘草炒各六兩砂仁四兩上為末每服一錢白湯調服半夏茯苓湯方見十二卷第三論補中益氣湯竹葉石膏湯六君子湯三方見二十四卷第六論八味丸方見二十四卷第十一論婦人大便下血方論第十三婦人臟腑損傷風邪所入以致大便下血或如豆汁或腹中作痛若糞後下血其來遠糞前下血其來近遠近者言病在上下也若面無血色時寒時熱脈浮弱按之如絲者是前症也愚按前症或飲食起居或六淫七情失宜以致元氣虧損陽絡外傷若膏粱積熱加味清胃散怒氣傷肝六君柴芍芎歸鬱結傷脾加味歸脾湯脾氣虛弱六君子湯思慮傷心妙香散大腸風熱四物側柏荊防枳殼大腸血熱四物丹皮柴胡中氣下陷補中益氣茯苓半夏心脾不能攝血必補脾肺之源舉下陷之氣附治驗一婦人下血不已面色萎黃四肢畏冷此中氣下陷用補中益氣湯送四神丸數服而愈光祿張淑人下血煩躁作渴大便重墜後去稍緩用三黃湯加大黃至四兩方應後用三黃湯又二十餘劑而愈此等元氣百中一二韓地官之內脾胃素弱因飲食停滯服克伐之劑自汗身冷氣短喘急腹痛便血或用諸補劑皆不應余用人參炮附子各五錢二劑稍應卻用六君子每劑加炮附子三錢四劑漸安又用前湯每加附子一錢數劑乃瘥一婦人因怒胸痞飲食少思服消導利氣之藥痰喘胸滿大便下血余用補中益氣加茯苓半夏炮薑四劑諸症頓愈又用八珍加柴胡炒梔全愈一婦人瘀血腹痛便血見前加減四物湯治腸風下血側柏葉炒荊芥槐花炒甘草炒各五分枳殼麩炒生地黃當歸川芎各一分上薑水煎腸風黑神散治腸風下血腹痛後重或肛門脫出敗棕燒木饅頭燒烏梅去核粉草炙各一錢上水煎服愚按前二症若病久中氣虛弱者必用培補脾胃為主地榆湯陰結便血駱龍吉方地榆四兩甘草炒一兩半縮砂仁四十七粒上每服三錢水煎防風如神散治風熱氣滯糞後下血防風枳殼麩炒各等分上每服三錢水煎愚按前二症若胃氣虛不能統血而下用四君中氣下陷用補中益氣湯脾氣鬱結用歸脾湯氣血虛弱用八珍湯氣血虛寒用十全大補湯治久下血成片頭髮燒灰每服一二錢水調下妙香散治心氣下血溫酒調下附方加味清胃散方見二十四卷第六論四君子湯六君子湯四物湯補中益氣湯四方見二十四卷第六論八珍湯加味歸脾湯二方見二十四卷第四論二神丸四神丸三黃丸三方前第八論婦人痔瘻方論第十四婦人痔瘻因鬱怒風熱厚味膏粱所致其名有五肛邊如乳出膿者為牝痔腫脹出血者為牡痔癢痛者為脈痔腫核者為腸痔登廁出血者為血痔治宜審之愚按前症婦人多因胎産經行飲食起居六淫七情失調所致男子多因醉飽入房筋脈橫解精氣脫泄熱毒乘虛而患或入房強固其精木乘火勢而侮金或炙煿厚味陰虛濕熱宜涼血潤燥疏風潰後當養元氣補陰精不愈即成痔漏有串臀串陰穿腸者其腸頭腫塊者濕熱也作痛者風也便燥者火也潰膿者熱勝血也大便作痛者潤燥除濕肛門墜痛者瀉火導濕小便澀滯者清肝導濕經云因而飽食筋脈橫解腸澼為痔症屬肝腎不足故用加味地黃及六味丸有效慎勿敷毒藥及服寒涼之劑鱉甲散治五種痔漏膿血淋漓或腫痛堅硬下墜鱉甲露蜂房蛇蛻蝟皮豬後懸蹄五味燒存性各二錢麝香一分上為末每服一錢空心生地黃煎湯調下更敷之又方熱痛用寒水石朴硝為末以津調搽附方六味丸方見二十四卷第十一論加味地黃丸方見二十四卷第六論婦人脫肛方論第十五夫脫肛者大腸之候也大腸虛寒其氣下陷則肛門翻出或因産努力其肛亦然也愚按前症若大腸濕熱用升陽除濕湯若血熱用四物條芩槐花血虛用四物白朮茯苓兼痔痛用四物槐花黃連升麻中風虛弱用補中益氣芍藥白朮中氣虛寒加半夏炮薑五味腎虛用六味丸虛寒用八味丸夫肺與大腸為表裡肛者大腸之門肺實熱則祕結肺虛寒則脫出腎主大便故肺腎虛者多有此症附治驗一婦人脫肛用補中益氣加味歸脾各百餘劑而愈後因分娩復脫仍以前藥各二百餘劑始愈姚和衆以鐵粉傅之良聖惠方亦治陰脫陰腫集驗方以生鐵三斤水一斗煮至五升取水洗日二次孫真人用蝦蟆皮瓶中燒煙燻功效玄微一方用五倍子煎湯洗以赤石脂末摻上托上或脫長者以兩床相併中空尺許以磁瓶盛湯令病人仰臥浸瓶中逐日易之收盡為度附方升陽除濕湯自下而上者引而竭之升麻柴胡防風神麯炒澤瀉豬苓各半兩蒼朮一兩陳皮甘草大麥糵各三錢上每服五錢水煎空心服胃寒腸鳴加益智仁半夏各半錢薑棗同煎四物湯補中益氣湯二方見二十四卷第六論六味丸八味丸二方見二十四卷第十一論婦人陰腫方論第十六婦人陰腫因胞胳素虛風邪客之乘於陰部血氣相搏故也愚按前症若氣血虛弱用補中益氣湯舉而補之肝經濕熱用龍膽瀉肝湯滲而清之若陰腫陰癢陰冷陰挺當與後論互相參看附治驗一婦人陰中腫悶小便澀滯兩脅作腫內熱晡熱月經不調時或寒熱此因肝脾鬱怒元氣下陷濕熱壅滯朝用歸脾湯加柴胡升麻解鬱結補脾氣升元氣夕用加味逍遙散清肝火生肝血除濕熱各數劑諸症悉愈又用四君芎歸丹皮調補肝脾而經水如期菖蒲散治月水澀滯陰間腫痛菖蒲當歸各一兩秦艽二兩上每服五錢入蔥白水煎白礬散治陰腫堅痛白礬半兩甘草半錢大黃二兩上為末水和用棗大綿裹內陰中日兩換以愈為度附方補中益氣湯方見二十四卷第六論龍膽瀉肝湯方見二十四卷第八論婦人陰癢方論第十七婦人陰癢為三蟲在腸胃之間因臟虛而蝕陰中微則為癢甚則為痛也愚按前症屬肝經所化當用龍膽瀉肝湯逍遙散以主其內外在桃仁研膏和雄黃末或雞肝納陰中以制其蟲附治驗一婦人胸膈不利內熱作渴飲食不甘肢體倦怠陰中悶癢小便赤澀此鬱怒傷肝脾所致用歸脾湯加山梔而愈復因怒患處並小腹脹痛用小柴胡加山梔芎歸芍藥痛止用逍遙散加山梔而愈又因勞役患處腫脹小便仍澀用補中益氣加山梔茯苓丹皮而痊一婦人陰內痛癢不時出水食少體倦此肝脾氣虛濕熱下注用歸脾湯加丹皮山梔芍藥柴胡甘草主之而安一婦人陰內痛癢內熱倦怠飲食少思此肝脾鬱怒元氣虧損濕熱所致用參耆歸朮陳皮柴胡炒梔車前升麻芍藥丹皮茯苓而瘥若陰中有蟲癢痛亦屬肝木以桃仁雄黃研納陰中以殺之仍用清脾解鬱之藥有以雞肝納之者乃取蟲之法也一方搗新桃葉綿裹納陰中日三兩易龍膽瀉肝湯方見二十四卷第八論逍遙散方見二十四卷第四論婦人陰冷方論第十八婦人陰冷因勞傷子臟風冷客之用五加皮乾薑丹參蛇床子熟地黃杜仲各三兩鍾乳粉四兩天門冬一兩地骨皮二兩酒十五升漬二宿每服一盞空心食前飲之愚按前症屬肝經內有濕熱外乘風冷所致若小便澀滯或小腹痞痛用龍膽瀉肝湯若內熱寒熱或經候不調用加味逍遙散若寒熱體倦飲食少思用加味四君子若鬱怒發熱少寐懶食用加味歸脾湯附治驗一婦人陰中寒冷小便黃澀內熱寒熱口苦脅脹此因肝經濕熱用龍膽湯祛利濕熱用加味逍遙散調血氣而安一婦人所患同前更寒熱嘔吐兩股腫痛先用小柴胡加山梔一劑寒熱嘔吐頓止次用龍膽瀉肝湯一劑腫痛頓消一婦人陰中寒冷小便澄清腹中亦冷飲食少思大便不實下元虛寒治以八味丸月餘飲食漸加大便漸實又月餘諸症悉愈八味丸治血弱不能榮養臟腑津液枯澀風寒客於子臟以致陰冷愚按此丸果系肝脾腎虛殊有神效附方小柴胡湯方見二十四卷第二論龍膽瀉肝湯方見二十四卷第八論加味逍遙散加味歸脾湯二方見二十四卷第四論加味四君子湯方見二十四卷第六論婦人陰挺下脫方論第十九婦人陰挺下脫或因胞絡傷損或因子臟虛冷或因分娩用力所致愚按前症當升補元氣為主若肝脾鬱結氣虛下陷用補中益氣湯若肝火濕熱小便澀滯用龍膽瀉肝湯附治驗一婦人陰中突出如菌四圍腫痛小便頻數內熱晡熱似癢似痛小便重墜此肝脾鬱結蓋肝火濕熱而腫痛脾虛下陷而重墜也先以補中益氣加山梔茯苓車前子青皮以清肝火升脾氣更以加味歸脾湯調理脾郁外以生豬脂和藜蘆末塗之而收一婦人陰中挺出五寸許悶痛重墜水出淋漓小便澀滯夕與龍膽瀉肝湯分利濕熱朝與補中益氣湯升補脾氣諸症漸愈再與歸脾湯加山梔茯苓川芎黃柏間服調理而愈後因勞役或怒氣下部濕癢小水不利仍用前藥即愈又方治前症用麻子仁研塗頂中自吸入即洗去附方補中益氣湯方見二十四卷第六論龍膽瀉肝湯方見二十四卷第八論歸脾湯加味歸脾湯二方見二十四卷第四論婦人陰中生瘡方論第二十竊謂前症乃七情鬱火傷損肝脾濕熱下注其外症陰中出如蛇如菌或如雞冠狀或生蟲濕癢或潰爛出水或腫悶墜痛其內症體倦內熱經候不調或飲食無味晡熱發熱或胸脅不利小便痞脹或赤白帶下小水淋澀其治法腫痛者四物湯加柴梔丹皮膽草濕癢者歸脾湯加柴梔丹皮淋澀者龍膽瀉肝湯白朮丹皮潰腐者逍遙散山梔川芎腫悶墜痛者補中益氣湯山梔丹皮佐以外治之法一婦人潰腐膿水淋漓腫痛寒熱小便赤澀內熱作渴肢體倦怠胸脅不利飲食少思余以為肝脾虧損用補中益氣內柴胡升麻各用一錢加茯苓一錢山梔二錢數劑少愈又與歸脾湯加山梔川芎茯苓三十餘劑諸症悉退惟內熱尚在再與逍遙散倍用山梔而愈一婦人素性急陰內痛小便赤澀怒而益甚或發熱或寒熱此肝經濕熱所致用芎歸炒梔柴胡苓朮丹皮澤瀉炒芍車前炒連生草數劑漸愈又去黃連澤瀉又數劑全愈附方四物湯補中益氣湯二方見二十四卷第六論逍遙散歸脾湯二方見二十四卷第四論龍膽瀉肝湯方見二十四卷第八論小柴胡湯方見二十四卷第二論婦人交接傷丈夫頭痛方第二十一愚按前症當用補中益氣六味地黃以滋化源為主來復丹交接相傷四肢沉重頭痛昏暈米飲下上每服五十丸方見二十五卷第十論附方補中益氣湯方見二十四卷第六論六味丸方見二十四卷第十一論女人交接輒血出痛方第二十二一婦人每交接出血作痛此肝火動脾而不能攝血用補中益氣濟生歸脾二湯而愈若出血過多而見他症但用前藥調補肝脾千金方療交接血出桂心伏龍肝各等分上為末酒服錢許附方補中益氣湯方見二十四卷第六論濟生歸脾湯方見二十四卷第四論婦人交接他物所傷方第二十三一婦人交接出血作痛發熱口渴欲嘔或用寒涼之藥前症益甚不時作嘔飲食少思形體日瘦余曰症屬肝火而藥復傷脾所致先用六君加山梔柴胡脾胃健而諸症愈又用加味逍遙散而形氣復一婦人陰腫下墜悶痛出水胸腹不利小便頻數內熱晡熱口苦耳鳴此肝脾火症用小柴胡加車前膽草苓朮升麻一劑稍愈又用加味逍遙加升麻數劑漸愈乃以加味歸脾加升嘛柴胡並補中益氣加山梔數劑頓愈仍用加味逍遙加味歸脾二藥調理全愈一婦人患前症熱痛或用寒涼敗毒藥飲食不入時欲作嘔小腹重墜余謂此脾胃復損元氣下陷先用補中益氣加炮薑二劑重墜漸愈又加茯苓半夏二十餘劑而愈乃以歸脾湯少加柴胡升麻並六味地黃丸而康又方割雞冠血塗之以赤石脂末摻之五倍子末亦良附方六君子湯補中益氣湯二方見二十四卷第六論加味逍遙散加味歸脾湯歸脾湯三方二十四卷第四論六味丸方見二十四卷第十一論婦人小戶嫁痛方第二十四愚按前症當從二十一論互相主治千金方療小戶嫁痛甘草生薑各五分白芍藥四分桂心二分上以酒二升煎三四沸服又方海螵蛸燒為末酒服方寸匕日三服又方小麥甘草等分煎湯洗甚效
