body:
  text: 卷二十二産後寒熱方論第一産後發熱頭痛身疼雖如傷寒時氣雖當用麻黃亦不可輕易如早起勞動為寒所傷則淅淅惡寒翕翕發熱頭項肩背骨節皆痛至七八日乃差若大便堅作嘔不能食用小柴胡湯加生薑地黃主之愚按病機要云治胎産之病從厥陰經論之無犯胃氣及上中二焦為之三禁不可汗不可下不可利小便發汗者同傷寒下之早證利大便則脈數而已動於脾利小便則內亡津液胃中枯燥製藥之法能不犯三禁則榮衛自和而寒熱止矣人參當歸散治去血過多內熱短氣頭痛悶亂骨節作痛或虛煩咽燥人參當歸生地黃桂心麥門冬去心各一兩白芍藥上粳米一合竹葉十片水二鍾煎一鍾去之入藥五錢棗二枚煎服虛甚用熟地黃小柴胡湯治傷風四肢煩熱頭疼若頭不疼而作煩二物黃芩湯方見二十四卷第二論二物黃芩湯黃芩半兩苦參半兩生地黃二兩上每服四錢水煎增損柴胡湯治虛弱寒熱少食腹脹等症方見勞蓐竹葉防風湯治産後傷風發熱面赤氣喘頭痛淡竹葉半把防風人參桂枝苦梗甘草各半兩葛根一兩半上每服五錢薑棗水煎汗出項強加附子嘔加半夏治惡露不盡晝則明瞭暮則譫語寒熱如見鬼此熱入血室用柴胡地黃湯或四物加柴胡方見六卷第十一論産後頭痛方論第二夫頭者諸陽之會也産後胃氣虛弱飲食少思陽氣微弱不能上升故頭痛若因敗血黑龍丹言之甚詳愚按前症若中氣虛用補中益氣湯加蔓荊子若血虛用四物加參術血氣俱虛用八珍湯若因風寒所傷用補中益氣湯加川芎附治驗一産婦患頭痛日用補中益氣湯不缺已三年矣稍勞則惡寒內熱為陽氣虛以前湯加附子一錢數劑不發一婦人産後頭痛面青二年矣日服四物等藥余謂腎水不能生肝木而血虛用六味丸加五味子兩月而痊芎附散治氣虛頭痛用大附子一枚去皮臍切四片拌釅醋一碗炙附蘸盡同川芎一兩為末每服二錢清茶調服治血虛頭疼當歸川芎每服五錢水煎産後頭痛都梁丸亦可治方見四卷第六論附方補中益氣湯四物湯二方見二十四卷第六論八珍湯方見二十四卷第四論六味丸方見二十四卷第十一論産後咳嗽方論第三夫肺主於氣産後氣虛故外邪感而咳嗽所由作也若食鹽醯之類而致者難治若因面積滯而致者服黑神散五積散可愈愚按前症若陰血虛四物湯加參朮陳皮桔梗肺氣虛四君加芎歸桔梗陰火上炎六味地黃丸加參術風寒所感補中益氣湯加桔梗柴蘇若瘀血入肺發喘兼口鼻起黑或鼻出血急用二味參蘇飲亦有得生者然而所患悉因胃氣不足蓋胃為五臟之根本胃氣一虛五臟失所百病生焉經云肺屬辛金生於己土脾土既虛不能生金則腠理不密外邪易感矣治當壯土金生腎水以制火為善附治驗一産婦朝吐痰夜發熱無寐泥用清痰降火之藥肌體日瘦飲食日少余曰早間吐痰脾氣虛也夜間發熱肝血虛也晝夜無寐脾血耗也遂用六君子湯加味逍遙散加味歸脾湯以次調補不月而痊一産婦咳嗽見風則喘急惡寒頭痛自汗口噤痰盛余為脾肺氣虛腠理不密用補中益氣加肉桂數劑而安一産婦咳嗽聲重鼻塞流涕此風寒所感余用參蘇飲一鍾頓愈與補中益氣加桔梗茯苓半夏一劑將痊又與六君黃耆以實腠理全愈一産婦咳嗽痰盛面赤口乾內熱晡熱徹作無時此陰火上炎余用補中益氣湯六味地黃丸而愈一産婦咳而胸滿不食涕唾面腫氣逆此病在胃而關於肺用異功散而愈知母散治惡露上攻咳嗽不己知母貝母白茯苓人參各半兩桃仁杏仁並生去皮尖各一兩上每服五錢水煎治風寒咳嗽甘草桔梗各六分款冬花四分麥門冬生地黃各一錢二分蔥白一握上水煎服旋覆花湯治咳嗽最良方見下有汗者去麻黃附方異功散治脾胃虛弱飲食少思或久患咳嗽或腹滿不食面浮氣逆等症人參白朮炒甘草炒茯苓陳皮各一錢上薑棗水煎六君子湯四物湯四君子湯補中益氣湯四方見二十四卷第十論六味丸方見二十四卷第十一論二味參蘇飲方見後參蘇飲方見六卷第十一論産後喉中氣急喘促方論第四産後喉中氣急喘促因榮血暴竭衛氣無主獨聚於肺名曰孤陽最為難治若因敗血停凝服奪命丹若因榮血暴絶服芎藭湯若因風寒所傷服旋覆花湯若因氣鬱結服小調經散若因傷飲食服見睍丸愚按前症若脾肺氣虛弱用六君桔梗若兼外邪更加紫蘇若中氣虛寒用補中益氣加炮薑肉桂若陽氣虛脫更加附子若瘀血入肺急用二味參蘇飲附治驗一産婦喘促自汗手足俱冷常以手護臍腹此陽氣虛脫用參附湯四劑而愈二味參蘇飲治産後血入於肺面黑髮喘欲死者人參一兩蘇木二兩上水煎頓服旋覆花湯治傷風寒暑濕喘嗽太盛坐臥不寧旋覆花赤芍藥前胡半夏曲荊芥穗甘草茯苓五味子杏仁麻黃各等分上每服四錢薑棗水煎有汗者莫服五味子湯治産後喘促脈伏而厥五味子杵炒人參杏仁各二錢麥門冬去心陳皮各一錢上姜三片棗二枚水煎服芎藭湯方見後附方六君子湯補中益氣湯二方見二十四卷第六論參附湯方見十八卷第六論産後口鼻黑鼻衄方論第五産後口鼻起黑氣及鼻衄者蓋陽明經脈之海起於鼻交頞中還出頰口交人中左之右右之左此産後氣虛榮血散亂胃絶肺敗之症也急取緋線一條併産婦頂心發兩條緊繫中指節更無藥可療愚按胃脈頰口繞承漿蓋鼻準屬脾土鼻孔屬肺金誠胃虛肺損氣脫血死之症急用二味參蘇飲加附子五錢亦有得生者方見前産後咳噫方論第六夫肺主於氣而稟於胃蓋産後脾胃傷損風冷所搏故咳噫也急灸期門三壯必愈此穴乃胃之大絡穴見六卷第十五論愚按前症屬胃氣虛寒之惡候如用後方未應急投參附湯亦有復生者方見十八卷第六論丁香散治心煩咳噫丁香白豆蔻各半兩伏龍肝一兩上為末煎桃仁吳茱萸湯每服一錢調下羌活散治咳逆羌活附子炮茴香炒各半錢木香白姜炮各一錢上為末每服二錢水一盞鹽一捻煎服一方用桂心五錢薑汁三合水煎服産後血崩方論第七産後血崩因經脈未復而勞傷或食酸鹹之味若小腹滿痛肝經已傷最為難治急服固經丸主之愚按前症若血滯小腹脹滿用失笑散血少小腹虛痞芎藭湯肝火血妄行加味逍遙散脾郁不統血加味歸脾湯脾氣虛不攝血補中益氣湯厚味積熱傷血清胃散加槐花風熱相搏傷血四君子防風枳殼附治驗一産婦血崩小腹脹痛用破氣行血之劑其崩如湧四肢不收惡寒嘔吐大便頻瀉余用六君加炮黑姜四劑稍愈又十全大補三十餘劑而痊一産婦血崩因怒其血如湧仆地口噤目斜手足抽搐此肝經血耗生風余用六味丸料一劑諸症悉退但食少晡熱佐以四君柴胡牡丹皮而愈固經丸艾葉赤石脂煅補骨脂炒木賊各半兩附子一個炮上為末飯丸桐子大每服二十丸溫酒或米飲下芎藭湯芎藭當歸芍藥各等分上每服五錢水煎附方失笑散方見二十卷第五論十全大補湯加味逍遙散加味歸脾湯三方見二十四卷第四論補中益氣湯六君子湯四君子湯三方見二十四卷第六論清胃散方見二十四卷首論六味丸方見二十四卷第十一論産後月水不調方論第八産後月水不調由血氣虛損風邪所客邪正相搏以致經候失期或多或少而不得其平也愚按前症或過期而作痛者氣血俱虛也八珍加柴胡丹皮不及期而來血熱也四物山梔柴胡將來而作痛血實也四物加桃仁紅花過期而來者血虛也四物加參術紫黑成塊者血熱也四物加炒梔炒連丹皮作痛而色淡者痰多也四物合二陳治當臨症制宜附治驗一産婦月經不調內熱燥渴服寒涼之劑其血如崩腹脹寒熱作嘔少食用六君子二十餘劑諸病悉愈以加味逍遙散調理而安琥珀散治經脈不調飲食少思日漸消瘦琥珀牛膝生地黃當歸各半兩桃仁赤芍藥各半兩上每服五錢水姜煎附方八珍湯加味逍遙散二方見二十四卷第四論四物湯六君子湯二方見二十四卷第六論二陳湯方見二十四卷第五論産後月水不通方論第九産後乳子周歲而經不行是其常也若半歲而經行此血有餘也若一二歲不行而無疾不必服藥若肢體倦怠食少內熱是血少也宜健脾胃若以藥通之則誤矣愚按前症脾胃虛弱用六君子湯若兼鬱火傷脾用歸脾湯加丹皮山梔若怒火傷血宜用四物合小柴胡氣血俱虛用八珍牡丹皮仍參前論主之附治驗方藥一産婦月經年餘不通內熱晡熱服分氣丸經行不止惡寒作渴食少倦怠胸滿氣壅朝用加味逍遙散夕用四君子湯月許諸症稍愈佐以八珍湯兼服兩月而愈六君子湯四物湯四君子湯三方見二十四卷第六論歸脾湯加味逍遙散八珍湯三方見二十四卷第四論小柴胡湯方見二十四卷第二論産後四肢浮腫方論第十産後四肢浮腫者乃敗血乘虛流注宜用小調經散陳無擇云若風邪所乘於氣分皮膚腫而浮虛乃氣也若皮膚腫如熟李乃水也蓋氣腫者宜發汗水腫者宜利小便愚按前症若寒水侮土宜養脾肺若氣虛浮腫宜益脾胃若水氣浮腫宜補中氣當參第一卷水分血分主治附治驗一産婦飲食少思服消導之劑四肢浮腫余謂中氣不足朝用補中益氣湯夕用六君子湯而愈後因怒腹脹誤服沉香化氣丸吐瀉不止飲食不進小便不利肚腹四肢浮腫用金匱加減腎氣丸而愈一産婦泄瀉四肢面目浮腫喘促惡寒余謂脾肺虛寒用六君子薑桂而泄瀉愈又補中益氣而脾胃健小調經散沒藥琥珀桂心芍藥當歸各一錢上為末每服半錢薑汁溫酒調大調經散最治腫滿喘急煩渴小便不利方見二十一卷第三論漢防己散治水腫漢防己豬苓枳殼麩炒桑白皮各一兩商陸甘草各三錢上每服四錢水煎治血虛氣腫水腫澤蘭葉防己等分上為末每服二錢溫酒調下醋湯亦可金匱加減腎氣丸治脾腎虛寒腰重腳腫濕飲留積小便不利或肚腹腫脹四肢浮腫氣喘痰甚或已成水症其效如神白茯苓三兩附子半兩川牛膝肉桂澤瀉車前子山茱萸山藥牡丹各一兩熟地黃四兩搗碎酒拌杵膏上為末和地黃膏煉蜜丸桐子大每服七八十丸空心米飲下附方補中益氣湯六君子湯二方見二十四卷第六論産後腹痛瀉利方論第十一産後腹痛瀉利因腸胃虛怯寒邪乘襲或水穀不化洞泄腸鳴兼手足逆冷用調中湯治之陳無擇云若六淫七情而致者當因所感而治之愚按前症若胸膈飽脹或惡食吞酸此飲食停滯用六君枳實山楂以消導若食既消而仍痛更或頭痛熱渴惡寒欲嘔此中氣被傷用補中益氣半夏茯苓以健脾胃附治驗一産婦腹痛發熱惡食余以為飲食傷脾彼反服破血之劑加寒熱頭痛嘔吐涎沫用化痰理氣四肢逆冷泄瀉下墜余用六君加炮薑肉桂木香再用補中益氣湯而愈一産婦腹痛後重去痢無度形體倦怠飲食不甘唇腫盜汗竟夜不寐此脾經虛熱之症用當歸六黃湯內黃芩連柏炒黑一劑汗止乃用歸脾八珍兼服而愈調中湯良薑當歸桂心芍藥附子炮川芎各一兩甘草炒五錢上每服三錢水煎服附方六君子湯補中益氣湯二方見二十四卷第六論當歸六黃丸方見十九卷第六論歸脾湯八珍湯二方見二十四卷第四論産後赤白痢方論第十二産後痢疾因飲食六淫七情傷於脾胃或血滲大腸皆為難治若飲食不進謂之虛痢氣宇不順謂之氣痢治法熱則涼之冷則溫之冷熱相搏則溫涼調之滑者澀之虛者補之水穀不分者分利之性情執滯者和順之未有不安者也愚按前症白屬氣分而赤屬血分也若米食所傷用六君加谷糵若麵食所傷用六君加麥糵若肉食所傷用六君加山楂神麯凡兼嘔吐俱加藿香若兼咽酸或嘔吐用前藥送越鞠丸若肝木克脾土用六君加柴胡炮姜若寒水反來侮土用錢氏益黃散若久瀉或元氣下陷兼補中益氣湯以升發陽氣若瀉痢色黃乃脾土真氣宜加木香肉豆蔻若屬脾土虛寒用六君加木香薑桂若脾腎虛寒用補中益氣及四神丸若屬命門火衰而脾土虛寒用八味丸以補土母若小便澀滯肢體漸腫或兼喘咳用金匱腎氣丸以補脾腎利水道若胃氣虛弱而四肢浮腫須補胃為主若久而不愈是腎氣虧損也必用四神六味八味三藥以補足三陰若用分利導水之劑是虛其虛也一産婦泄痢腹痛年餘形體骨立內熱晡熱自汗盜汗口舌糜爛日吐痰三碗許脈洪大重按全無此命門火衰脾土虛寒而不能攝痰歸源用八味丸補火以生土用補中益氣湯兼補肺金而痊一産婦食雞子腹中作痛面色青黃服平胃二陳更下痢腹脹用流氣飲子又小腹一塊不時上攻飲食愈少此脾胃虛寒肝木克侮所致用補中益氣加木香吳茱漸愈又用八珍大補兼服調理尋愈五味子散治産後泄瀉或腎泄在侵晨五更作瀉飲食不進或大便不實不時去後為丸尤效五味子炒三兩吳茱萸炒五錢上為末每服二錢白湯調四神丸治脾胃虛弱大便不實飲食不思二神丸六君子湯三方見八卷第二論補中益氣湯方見二十四卷第六論香連丸方見八卷第八論六味丸八味丸二方見二十四卷第十一論金匱腎氣丸方見前八珍湯方見二十四卷第四論
