body:
  text: 卷十一候胎門脈例第一王子亨云若妊娠其脈三部俱滑大而疾在左則男在右則女經云陰搏陽別謂之有子搏者近也陰脈逼近於下陽脈則出於上陽中見陽乃知陽施陰化法當有子又少陰脈動甚者妊子也手少陰屬心足少陰屬腎心主血腎主精精血交會投識於其間則有娠又三部脈浮沉正等無病者有妊也余病如脈經說左手尺脈浮洪者為男胎也右手尺部浮洪者為女胎也兩手尺部俱洪者為兩男俱沉實者為兩女又云中指一跳一止者一月胎二跳二止者二月胎也診婦人有妊歌第二肝為血兮肺為氣血為榮兮氣為衛陰陽配偶不參差兩臟通和皆類例血衰氣旺定無妊血旺氣衰應有體肝藏血為榮屬陰肺主氣為衛屬陽陰陽配偶者是夫婦匹配偶合媾精乃有子也若血少氣盛則無娠孕若血盛氣少則有孕也寸微關滑尺帶數流利往來並雀啄小兒之脈已見形數月懷耽猶未覺寸脈微關脈滑尺脈帶數及流利雀啄皆是經脈閉塞不行成胎已上之脈皆是血多氣少之脈是懷小兒之脈已見形狀也左疾為男右為女流利相通速來去兩手關脈大相應已形亦在前通語左手脈疾為懷男右手脈疾為懷女及兩脈流行滑利相通疾速來去是或兩手關脈洪大相應是其胎已有形狀也左脈帶縱兩個男縱者夫行乘妻水行乘火金行乘木即鬼賊脈也名曰縱見在左手則懷兩個男兒也右手帶橫一雙女橫者妻乘夫也是火行乘水木行乘金即所勝脈也名曰橫見於右手則懷一雙女兒也左手脈逆生三男逆者子乘母也是水行乘金火行乘木即已生脈也名曰逆見於左手則懷三個男兒也右手脈順還三女順者母乘子也是金行乘水木行乘火即生已之脈也名曰順見於右手則懷三個女兒也寸關尺部皆相應一男一女分形證寸關尺部脈大小遲疾相應者是懷一男一女形證之脈也謂關前為陽關後為陰陰陽脈相應故懷一男一女也有時子死母身存或即母亡存子命此二句之文是辨子母存亡之法往來三部通流利滑數相參皆替替陽實陰虛脈得明遍滿胸膛皆逆氣若寸關尺三部通行流利皆替替有力而滑數皆是陽實陰虛之脈主妊婦逆氣遍滿胸膛而不順也左手太陽浮大男左手寸口為太陽其脈浮大則是懷男子右手太陰沉細女右手寸口為太陰其脈沉細是懷女脈也諸陽為男諸陰女指下分明長記取諸陽脈皆為男即浮大疾數滑實之類也當懷男子諸陰脈即沉細之類是也當懷女子三部沉正等無絕尺內不止真胎婦寸關尺三部脈沉浮正直齊等舉按無絕斷及尺內舉按不止住者真的懷胎婦也夫乘妻兮縱氣霧經云縱者夫乘妻也水行乘火金行乘木即鬼賊脈也縱氣霧霧者露也又上下也謂夫之陽氣乘妻之陰氣二氣上下相逐如霧潤結子也妻乘夫兮橫氣助橫者妻乘夫也見前注謂兩傍橫氣相佐助也子乘母兮逆氣參逆者子乘母也謂子氣犯母氣相乘逆行之氣相參合也母乘子兮順氣護是母氣乘於子氣為順氣相護衛也凡胎聚縱橫逆順四氣以榮養方以成形也小兒日足胎成聚身熱脈亂無所苦婦人懷小兒五個月是以數足胎成就而結聚也必母身體壯熱當見脈息躁亂非病苦之症謂五月胎已成受火精以成氣故身熱脈亂是無病也汗出不食吐逆時精神結備其中住謂妊胎受五行精氣以成形稟二經以榮其母懷妊至五月其胎雖成其氣未備故胎氣未安上衝心胸則汗出不食吐逆名曰惡阻俗呼選飯唯思酸辛之味以調胎氣也滑疾不散三月胎妊娠三月名始胎此是未有定儀心胞脈養之故脈見滑疾流利為少氣多血不散為血氣盛則始結為胎也但疾不散五月母其脈但疾數而不散者是五個月懷胎之母也弦緊牢強滑利安沉細而微歸泉路孕婦之脈宜弦緊牢強滑利為安吉之脈若沉細而微謂脈與形不相應故云死也前文雖云太陰沉細又云諸陰為女其說似有相違謂三部脈皆不沉細及微故不同也愚按前論與脈訣所云不同觀者當自推之驗胎法第三婦人經脈不行已經三月欲驗有胎川芎生為末空心濃煎艾湯調下二錢腹內微動則有胎也胎殺避忌產前將護法第四一受孕之後切宜避忌胎殺所遊如經云刀犯者形必傷泥犯者竅必塞打擊者色青黯繫縛者相拘攣甚至母殞禍如反掌月遊胎殺立春在房床驚蟄在戶單扇清明在門雙扇立夏在灶芒種在母身小暑在灶立秋在碓按經本云在正北方子位白露在廚前寒露在門立冬在戶及廚大雪在爐及灶小寒在房母身十干日遊胎殺甲巳日佔門乙庚日佔碓磨丙辛日佔井灶丁壬日佔廚解戊癸日佔米倉十二支日遊胎殺子丑日佔中堂寅卯辰酉日佔灶巳午日佔門未申日佔籬下戌亥日佔房六甲旬遊胎殺甲子旬遊窗碓甲戌旬遊正廳甲申旬遊中庭甲午旬遊房內甲辰旬遊房中甲寅旬遊太史局日遊胎殺每遇癸巳甲午乙未丙申丁酉五日在房內北庚子辛丑壬寅三日在房內南癸卯一日在房內西甲辰乙巳丙午丁未四日在房內東六戌六巳日在房內中餘日在外無占凡遊在房內不宜於方位上安床帳及掃舍皆凶又有小兒殺及本年三殺及產母身黃定命皆不可犯凡妊娠之後將此貼於房內常照見之切不可穿鑿修掘移釘系籬壁重物展壓之類犯之重則胎死腹中母亦不利輕則子受其殃成人之後必定破形拳攣跛縮喑症犯之極驗食忌論第五一受孕之後切宜忌不可食之物非惟有感動胎氣之戒然於物理亦有厭忌者設或不能戒忌非特延月難產亦能令兒破形母損可不戒哉食雞肉糯米合食令子生寸白蟲食羊肝令子生多厄食鯉魚鱠及雞子令兒成疳多瘡食犬肉令子無聲音食兔肉令子唇缺食鱉肉令子項短及損胎食鴨子共桑椹同食令子倒生心寒食螃蟹令子橫生食雀肉合豆醬食之令子面生䵟黯黑子食豆醬合藿香食之墜胎食水漿絕產食雀肉令子不恥多淫食山羊肉令子多病食生薑令子多指生瘡食蝦蟆鱔魚令兒喑瘂食驢騾馬肉延月難產如此之類無不驗者則知聖人胎教之法矣孕婦藥忌歌第六蚖𫋑𫋑水蛭地膽蟲烏頭附子配天雄躑躅野葛螻蛄類烏喙側子及虻蟲牛黃水銀並巴豆大戟蛇蛻及蜈蚣牛膝藜蘆並薏苡金石錫粉及雌雄牙硝芒硝牡丹桂蜥蜴飛生及䗪蟲代赭蚱蟬胡粉麝芫花薇銜草三稜槐子牽牛並皂角桃仁蠐螬和茅根欓根硇砂與乾漆亭長波流菵草中瞿麥䕡茹蟹爪甲蝟皮赤箭赤頭紅馬刀石蠶衣魚等半夏南星通草同乾薑蒜雞及雞子驢肉兔肉不須供切須婦人產前忌此歌宜記在心胸
