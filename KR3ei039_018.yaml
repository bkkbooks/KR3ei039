body:
  text: 卷十八産後門産難既明須知産後疾病故以次之産後將護法第一婦人産畢飲熱童便一盞閉目少坐上床倚高立膝仰臥不時喚醒及以醋塗鼻或用醋炭及燒漆器更以手從心擀至脈下使惡露不滯如此三日以防血暈血逆酒雖行血亦不可多恐引血入四肢目光昏暈宜頻食白粥少許一月之後宜食羊肉豬蹄少許仍慎言語七情寒暑梳頭洗足以百日為度若氣血素弱者不計月日否則患手足腰腿痠痛等症名曰蓐勞最難治療初産時不可問是男女恐因言語而泄氣或以愛憎而動氣皆能致病不可獨宿恐致虛驚不可刮舌恐傷心氣不可刷齒恐致血逆須血氣平復方可治事犯時微若秋毫成病重如山嶽可不戒哉産後調理法第二産後將息如法臟腑調和庶無諸疾苦須先服黑神散四物湯四順理中丸七寶散若壯熱頭痛此乳脈將行用玉露散頭目不清是血暈用清魂散粥食不美是胃氣虛用四順理中丸愚按丹溪先生云肉汁發陰經之火易成內傷之病當歸丸當歸建中湯四順理中丸雖滋補悉犯桂附乾薑僭熱之劑臟腑無寒何處消受若夫兒之初産母腹頓寬便啖雞子火鹽不思雞子難化火鹽發熱展轉為病醫者不識妄指他病率爾用藥寧不誤人余每見産婦之無病者皆不用黑神散與雞子火鹽諸般肉食每白粥調理間以些小石首魚干淡食之至半月以後少食雖雞子亦豁開煮之方能養胃卻痰彼富貴之家嬌姿之婦率有白帶頭風氣痛膈滿痰逆口乾經事不調發脫體熱皆因失於調理所致也産後通用方第三愚按前方即産後諸症各門自有方論主治故不再録胞衣不出方論第四郭稽中曰胎衣不下者因氣力疲憊不能努出或血入衣中脹大而不能下以致心胸脹痛喘急速服奪命丹血散脹消其衣自下牛膝散亦效愚按前症若出而氣虛不能入用補中益氣湯或萆麻子仁一兩研塗母頭頂心即上若胎衣不下用萆麻子仁塗右腳心胎衣下急洗之緩則胎衣仍入益母丸亦效若胎衣未下若欲斷臍帶須先以少物系墜然後斷之附治驗一婦人胞衣不出胸腹脹痛手不敢近用滾酒下失笑散一劑惡露胎衣並下一産婦胎衣不出腹作痛手按痛稍緩此氣虛而不能送出也用無憂散而下前症常詢諸穩婆云宜服益母草丸或就以産婦頭髮入口作嘔胎衣自出其胎衣不出者必死授與前法甚效奪命丹附子半兩炮牡丹皮一兩乾漆一錢炒煙盡大黃末一兩上為末醋煎大黃成膏丸桐子大溫酒吞五七丸花蕊石散治産後敗血不盡血迷血暈腹中胎衣不下至死心頭暖者急用一服化水即出其效如神花蕊石一斤上色硫黃四兩上和勻先用紙泥封固瓦罐一個入二藥仍封固陰乾如急用以焙籠內炙乾用炭煅赤去火次日取出細研每服一錢童便熱酒下牛膝散治胎衣不出腹中脹痛急服此藥腐化而下緩則不救牛膝川芎朴硝蒲黃各三兩當歸一兩五錢桂心五錢上每服五錢薑三片生地黃一錢水煎附方補中益氣湯方見二十四卷第六論失笑散方見十六卷第五論無憂散方見十六卷第三論益母草丸方見十卷第九論又方用灶下土三四錢好醋調和納臍中續煎生甘草湯半盞或以醋湯飲之即出又方用萆麻子仁研爛塗足心下即洗去又方用紅花一兩酒煮濃汁服又方用鹿角鎊三錢為末煮蔥白湯調服又方取産母鞋底炙熱尉小腹上下二七次又方用浸苧水濃煮溫飲二碗立下又方用皂角棘燒為末每服一錢溫酒下産後血暈方論第五産後血暈乃血入肝經甚至眼花胸悶用黑神散主之下血過多用清魂散補之或以醋湯細飲或預燒稱錘以醋沃之或釅醋塗口鼻或燒漆器熏之使産母鼻吸其氣庶無此患愚按前症若惡露上行用失笑散血下過多芎歸湯若過勞所傷補中益氣湯氣血虛極用清魂散大凡産後口眼喎斜等症當大補氣血為主而兼以治痰若脾胃虛弱用六君子湯苟於七月之前服安胎飲至八九月間加大腹皮黃楊頭元氣虛弱八珍湯臨産用無憂散則無前患附治驗一婦八月胎下墜或動面黃體倦飲食少思此脾氣虛弱用補中益氣湯倍白朮加蘇梗三十餘劑而安産後眩暈胸滿咳嗽用四物加茯苓半夏桔梗而愈一妊婦因産飲酒惡露甚多患血暈口出酒氣此血得酒熱而妄行虛而作暈也以佛手散加煨甘葛二錢一劑而痊酒性慓悍入月及産後不宜飲恐致前症産室人衆氣熱喧嚷亦致此症奪命丹治血暈腹痛沒藥血竭末等分每服二錢熱童便熱酒下牡丹皮散治産後惡露悶絶牡丹皮芒硝大黃蒸各一兩冬瓜仁三七粒去皮尖上每五錢水煎服清魂散治産後氣血暴損虛火妄動血隨火上以致心神昏亂口噤眼花甚至悶絶而蘇澤蘭葉人參各一錢荊芥三錢川芎一錢上各另為末和勻每服一二錢熱湯和酒調罐之當歸芍藥湯方見十二卷第十二論一方五靈脂末半生半炒每服二錢溫酒灌入喉即愈一方荊芥為末童便調一方神麯末每服二錢熱水調一方韭菜切入瓶內注熱醋以瓶口對鼻氣入即醒一方半夏為末丸豆大入鼻中即醒亦療五絶一方赤小豆為末東流水和服錢許不瘥再服佛手散治産後去血眩暈欲絶方見十二卷第七論又方松煙墨二錢燒赤窨滅為末溫酒調半匕京墨亦可或燒漆器取煙燻之附方失笑散方見二十卷第五論補中益氣湯六君子湯四物湯三方見二十四卷第六論安胎飲方見十二卷第二論無憂散方見十六卷第二論産後顛狂方論第六産後顛狂乃敗血上衝用大聖澤蘭散加砂仁末三分煎酸棗仁湯調下或硃砂二錢研細以乳汁調和入紫項活地龍一條滾二三沸去之入酒再用重湯煮溫分三服愚按前症乃血虛神不守舍非補養元氣不可仍參後各門互用附治驗一産婦患前症或用大澤蘭湯而愈後又怔忡妄言其痰甚多用茯苓散補其心虛頓愈又用八珍散加遠志茯神養其氣血而安一産婦亦患此用化痰安神等藥病益甚神思消爍余以為心脾血氣不足用大劑參朮芎歸茯神酸棗仁四斤余而安乃以歸脾湯五十餘劑而愈附方隱居澤蘭湯方見二十卷第六論茯苓散方見十九卷第三論八珍散歸脾湯二方見二十四卷第四論産後狂言譫語方論第七産後狂言譫語乃心血虛也用硃砂末酒調下龍虎丹參丸琥珀地黃丸亦可如驚悸歌哭顛狂等症當參十九等卷治之愚按前症當固胃氣為主而佐以見症之藥為善若一於攻痰則誤矣附治驗一産婦形體甚倦時發譫語用柏子仁散稍愈又用加味歸脾湯而愈又因怒仍狂言脅痛小便下血用加味逍遙散以清肝火養肝血頓瘥又佐以加味歸脾湯而安治敗血上衝發熱狂走脈虛大者乾荷葉生地黃牡丹皮各等分上濃煎湯調生蒲黃二錢服之即止妙香散治産後語言錯亂用生地當歸煎湯調服立效方見六卷第八論附方小柴胡湯方見二十四卷第二論柏子仁散方見十九卷首論加味歸脾湯方見二十卷第四論産後不語方論第八産後不語因心氣虛而不能通於舌則舌強不能言語者宜服七珍散余法推其所因而治之可也愚按經云大腸之脈散舌下又云脾之脈是動則病舌本強不能言又云腎之別脈上入於心系舌本虛則不能言竊謂前症若心腎氣虛用八珍散腎虛風熱地黃飲大腸風熱加味逍遙散加防風白芷脾經風熱秦艽升麻湯肝經風熱柴胡清肝散加防風白芷脾氣鬱結加珠歸脾湯加升麻肝木太過小柴胡加鉤藤鉤脾受肝侮六君加升麻白芷鉤藤鉤肝脾血虛用佛手散脾氣虛用四君子氣血俱虛八珍湯如不應用獨參湯更不應急加附子補其氣而生其血若竟用血藥則誤矣附治驗一産婦不語用七珍散而愈後復不語內熱晡熱肢體倦怠飲食不進用加味歸脾湯為主佐以七珍散而愈後因怒不語口噤腰背反張手足發搐或小便見血面色或青或黃或時兼赤余曰面青肝之本色也黃者脾氣虛也赤者心血虛也用八珍湯加鉤藤佐茯苓遠志漸愈又用加味歸脾湯而痊七珍散人參石菖蒲生地黃川芎各一兩細辛一錢防風辰砂別研各半兩上為末每服一錢薄荷湯調胡氏孤鳳散治産後閉目不語用生白礬末每服一錢熱水調下治産後不語人參石蓮肉不去心石菖蒲等分上每服五錢水煎附方地黃飲方見三卷第四論加味逍遙散加味歸脾湯八珍湯三方見二十四卷第四論秦艽升麻湯方見三卷第一論清肝散方見二十四卷第四論小柴胡湯方見二十四卷第三論六君子湯四君子湯二方見二十四卷第六論佛手散方見十二卷第七論獨參湯方見三卷第十三論
