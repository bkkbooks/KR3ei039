body:
  text: 卷十五妊娠泄瀉方論第一論曰妊娠泄瀉或青或白水穀不化腹痛腸鳴謂之洞泄水穀不化喜飲嘔逆謂之協熱下利並以五苓散利小便次以黃連阿膠丸或三黃熟艾湯以安之若瀉黃有沫腸鳴腹痛脈沉緊數用戊己丸和之噯腐不食胃脈沉緊用感應丸下之後調和脾胃若風冷水穀不化如豆汁用胃風湯寒冷臍下陰冷動泄用理中湯治中湯伏暑心煩渴瀉水用四苓散傷濕泄瀉小便自利用不換金正氣散胃苓湯此四證之大略也仍參第八卷第八論主之愚按米食所傷用六君加谷糵麵食所傷用六君加麥糵肉食所傷用六君加山楂若兼寒熱作乃肝木侮脾土用六君加柴胡生薑兼嘔吐腹痛手足逆冷乃寒水侮土六君加薑桂不應用錢氏益黃散若元氣下陷發熱作渴肢體倦怠用補中益氣湯若泄瀉色黃乃脾土之真色用六君加木香肉果若作嘔不食腹痛惡寒乃脾土虛寒用六君加木香薑桂若瀉在五更侵晨飲食少思乃脾胃虛弱五更服四神丸日間服白朮散如不應或愈而復作或飲食少思急用八味丸補命門火以生脾土為善附治驗邊太常側室妊娠泄瀉自用積術黃連之類腹悶吐痰發熱惡寒飲食到口即欲作嘔強匙許即吞酸不快欲用祛痰理氣余曰此因脾胃傷而痰滯中脘若治痰氣復傷脾胃矣遂以參朮炮薑為末丸如黍粒不時含咽三五丸漸加至三日後日進六君子湯而尋愈進土王繳徵之內懷妊泄瀉惡食作嘔余曰脾氣傷也其君憂之強進米飲余謂飲亦能傷胃且不必強俟脾胃醒宿滯自化飲食自進不信別用人參養胃湯飲之吐水酸苦又欲投降火寒藥余曰若然則胃氣益傷也經云損其脾胃者調其飲食適其寒溫後不藥果愈厚朴丸乾薑炒厚朴去皮等分上水拌炒為末水糊丸梧子大每服五十丸米飲下草果散治虛寒泄瀉腹痛無度厚朴薑汁拌炒二兩肉豆蔻十個麵煨草豆蔻十個煨上每服三錢用薑水煎附方附子理中湯方見二十卷第八論理中丸五苓散二方見二十卷第十論六君子湯補中益氣湯二方見二十四卷第六論錢氏益黃散方見二十一卷第九論四神丸方見八卷第八論四神丸方見八卷第八論七味白朮丸方見二十一卷第二論八味丸方見第二十四卷第十一論妊娠下痢黃水方論第二論曰妊娠飲食生冷脾胃不能克化致令心腹疼痛若血分病則色赤氣分病則色白血氣俱病則赤白相雜若熱乘大腸血虛受病則成血痢也愚按治痢之法當參前篇其下黃水乃脾土虧損真色下陷也當補益中氣若黃而兼青乃肝木克脾土宜平肝補脾若黃而兼白乃子令母虛須補脾胃若黃而兼黑是水反侮土矣必溫補脾胃若黃而兼赤乃心母益子但補中益氣若腸胃虛弱風邪客之用胃風湯或胎氣不安急補脾胃而自安矣凡安胎之藥當臨病制宜不必拘用阿膠艾葉之類附治驗地官胡成甫之內妊娠久痢自用消導理氣之劑腹內重墜胎氣不安又用阿膠艾葉之類不應余曰腹重墜下元氣虛也胎動不安內熱盛也遂用補中益氣而安又用六君子湯全愈治妊娠利黃水厚朴薑汁炙二兩黃連二兩肉豆蔻五個連皮上用水煎徐徐服忌如前已上六方並出産寶治妊娠熱痢黃連一升黃柏一升梔子仁二十枚上用每服五錢水煎嘔加橘皮生薑治妊娠下痢腹痛小便澀滯糯米一合當歸炒黃耆各一兩上用水煎分四服治臨産下痢用梔子炒為末每服二錢白湯調甚效附方胃風湯方見二十卷第九論補中益氣湯方見二十四卷第六論妊娠大小便不通方論第三夫妊娠大小便不通由臟腑之熱所致若大腸熱則大便不通小腸熱則小便不利大小腸俱熱更推其因而藥之愚按前症若大腸燥用四物湯加條芩桃仁大腸氣滯用紫蘇飲加杏仁條芩腸胃氣虛用六君子加紫蘇杏仁肝脾蘊熱用龍膽瀉肝湯心肝虛熱用加味逍遙散加車前子附治驗亞卿李浦汀側室妊娠大小便不利或用降火理氣之劑元氣反虛肝脈弦急脾脈遲滯見其面色青黃不澤余曰此鬱怒所致也用加味歸脾湯為主佐以加味逍遙散而安主政王天成之內妊娠疾愈後二便不通其家世醫自用清熱之劑未效余診其脈浮大而澀此氣血虛也朝用八珍湯加桃仁杏仁夕用加逍遙散加車前子而瘥當歸散治妊娠因怒肚腹脹痛四肢浮腫氣急作喘大便難小便澀産門腫當歸五分赤茯苓枳殼麩炒白芍藥川芎各一錢白薑炮木香煨粉草各三分上用薑水煎氣弱枳殼減半大便祕加蜜同煎治妊娠大小便不通腹脅痞悶不思飲食大黃炒木通檳榔各一兩枳殼麩炒三分訶梨勒四枚去核半生半煨大腹子三枚上為末用童便一盞蔥白二寸煎六分調服二錢初虞世治妊娠風氣大便祕澀枳殼三兩麩炒防風二兩甘草炙一兩上為末每服一二錢空心用白滾湯調日三服小品治妊娠小便不利氣急服豬苓散不瘥用甘遂為末蜜和服豆許微利之未利再服利後仍服豬苓散豬苓散治妊娠小便澀痛及胎水豬苓去皮為末白湯調下錢許加至二錢日三夜二服又方車前子一兩大黃半兩炒為末每服三錢蜜湯調附方四物湯六君子湯二方見二十四卷第六論紫蘇湯方見二十四卷第八論龍膽瀉肝湯方見二十四卷第八論加味逍遙散加味歸脾湯八珍湯三方見二十四卷第四論妊娠小便不通方論第四夫妊娠小便不通為小腸有熱傳於脬而不通耳若兼心肺氣滯則致喘急陳無擇云妊娠胎滿逼胞多致小便不利若心腎氣虛清濁相干而為諸淋若胞系了戾小便不通名曰轉胞若胎滿尿出名曰遺尿愚按丹溪先生轉脬小便閉多因胎婦虛弱憂悶性躁食味厚古方用滑利消導藥鮮效若脬為胎所墮而不通但升舉其胎胞系疏而小便自行若臍腹作脹而小便淋閉此脾胃氣虛胎壓尿胞四物二陳參術空心服後探吐數次自安竊謂前症亦有脾肺氣虛而不能下輸膀胱者亦有氣熱鬱結膀胱津液不利者亦有金為火爍脾土濕熱甚而不利者更當詳審施治附治驗司徒李杏岡仲子室孕五月小便不利諸藥不應余曰非八味丸不能救不信別用分利之藥肚腹腫脹以致不起儒者王文遠室患此小腹腫脹幾至於殆用八味丸一服小便滴瀝再以前丸之料加車前子一劑即利肚腹頓宛而安八味丸治婦人飲食如故煩熱不得臥反倚息因脬繫了戾不得溺名轉脬但利小便則愈蓋此藥有茯苓故也緩則不救方見二十四卷第十一論古今録驗妊娠小便難飲食如故當歸貝母去心炒苦參各三兩滑石半兩上為末煉蜜丸小豆大每服二三十丸米飲下治妊娠小便不通臍下妨悶心神煩亂葵子研榆白皮切各一兩蔥白七莖上水煎分三服古今録驗妊娠不得小便杏仁去皮尖炒黃搗丸燈心湯吞七粒又方滑石末水和塗臍下又方用車前草汁調滑石末塗臍周圍四寸熱易之又方搗杏仁入滑石末飯丸小豆大每服二十丸白湯下又方用紫菀為丸井花水調下二錢葵子散治妊娠小便不利身重惡寒眩暈及水腫用葵子五兩赤茯苓五兩為末每服二錢米調飲附方四物湯方見二十四卷第六論二陳湯方見二十四卷第五論妊娠子淋方論第五妊娠小便淋者乃腎與膀胱虛熱不能制水然妊娠胞系於腎腎間虛熱而成斯症甚者心煩悶亂名曰子淋也愚按前症若頸項筋攣語澀痰甚用羚羊角散若小便澀少淋瀝用安榮散若肝經濕熱用龍膽瀉肝湯若肝經虛熱用加味逍遙散腿足轉筋而小便不利急用八味丸緩則不救若服燥劑而小便頻數或不利用生地黃茯苓牛膝黃柏知母芎歸甘草若頻數而色黃用四物加黃柏知母五味麥門玄參若肺氣虛而短少用補中益氣加山藥麥門若陰挺痿痹而頻數用地黃丸若熱結膀胱而不利用五淋散若脾肺燥不能化生宜黃芩清肺飲若膀胱陰虛陽無所生用滋腎丸若膀胱陽虛陰無所化用腎氣丸附治驗一婦人每怒發熱脅脹小便淋澀如遇經行旬余未已受胎三月因怒前症復作朝用加味逍遙散夕用安胎飲各二劑而安五月又怒復下血如經行四日未止仍用前藥而愈一妊娠飲食後因惱怒寒熱嘔吐頭痛惡寒胸腹脹痛大便不實其面青色小便頻數時或有血服安胎止血之劑益甚余曰寒熱嘔吐而腹脹此肝木克脾土而元氣傷也大便不實而面青此飲食傷脾兼肝侮土也小便頻數而有血此肝熱傳胞而兼挺痿也用六君子加枳殼紫蘇山梔二劑脾胃頓醒用加味逍遙散加枳殼紫蘇二劑小便頓清後節飲食調理而安地膚大黃湯治子淋大黃地膚草各三兩知母黃芩炒豬苓赤芍藥通草升麻枳實炒甘草各二兩上每服四五錢水煎服安榮散治子淋甚妙麥門冬去心通草滑石當歸燈心甘草人參細辛各五分上水煎服治小便淋痛心煩悶亂瞿麥穗赤茯苓桑白皮木通葵子各一錢黃芩炒芍藥枳殼車前子炒各五分上水煎服治子淋小便澀痛冬葵子滑石木通各等分上每服四五錢蔥白七寸水煎豬苓散療子淋小便澀痛方見本卷第三論附方羚羊角散方見四卷首論龍膽瀉肝湯方見二十四卷第八論加味逍遙散四物湯二方見二十四卷第七論腎氣丸即六味丸六味丸八味丸三方見二十四卷第十一論六君子湯補中益氣湯二方見二十四卷第六論五淋散滋腎丸黃芩清肺飲三方見八卷第一論安胎飲方見十三卷第二論妊娠遺尿方論第六妊娠尿出不知用白薇芍藥為末酒調下或白礬牡蠣為末酒調二錢或雞毛灰末酒服一匕或炙桑螵蛸益智子仁為末米飲下愚按前症若脬中有熱宜用加味逍遙散若脾肺氣虛宜用補中益氣湯加益智若肝腎陰虛宜用六味丸附治驗一妊娠遺尿內熱肝脈洪數按之微弱或兩太陽作痛脅肋作脹余以為肝火血虛用加味逍遙散六味地黃丸尋愈後又寒熱或發熱或恚怒前症仍作用八珍湯逍遙散兼服以清肝火養肝血而痊附方加味逍遙散八珍湯二方見二十四卷第四論補中益氣湯方見二十四卷第六論六味地黃丸方見二十四卷第十一論妊娠尿血方論第七妊娠尿血內熱乘於血分以致血熱流滲於脬名子淋用葵子一升研細水五升煮二升分三服或生艾葉一斤酒五升煮一升分三服亦治落産後下血愚按前症因怒動火者宜小柴胡加山梔因勞動火者宜補中益氣湯若因厚味積熱宜用加味清胃散若因肝經血熱宜用加味逍遙散若因脾氣下陷補中益氣湯若因脾虛血熱宜用加味逍遙散附治驗一妊婦因怒尿血內熱作渴寒熱往來胸乳間作脹飲食少思肝脈弦弱此肝經血虛而熱也用加味逍遙散六味地黃丸兼服漸愈又用八珍湯加柴胡丹皮山梔而痊續斷湯治妊娠下血及尿血當歸生地黃各一兩續斷半兩赤芍藥五錢上為末每服二錢空心用蔥白煎湯調下治妊娠尿血阿膠炒為末四兩熟地黃用生者四兩酒拌蒸熟杵膏上和丸桐子大每服七八十丸空心粥飲下五苓散去桂加阿膠炒同為粗末每四錢用車前子白茅根水煎溫服又方白茅根濃煎湯吞酒蒸黃連丸附方小柴胡湯方見二十四卷第二論補中益氣湯方見二十四卷第六論加味清胃散方見二十四卷第一論加味逍遙散加味歸脾湯二方見二十四卷第四論妊娠胎水腫滿方論第八産乳集云妊娠三月足腫至腿出水飲食不甘似水腫謂之子氣至分娩方消者此脾胃氣虛或衝任經有血風名醫録云宋少主元徽與徐文伯微行學針法文伯見一妊娠足腫脈之少主曰此女形也文伯白此鬼胎也在左而黑遂用針胎下果然亦有脾虛水氣流溢或因瀉痢臟腑虛寒或因瘧疾飲水脾虛濕漬或因水漬於胞不能分利皆致腿足肚腹腫症也愚按前症若胸滿腹脹小便不通遍身浮腫用鯉魚湯脾胃虛弱佐以四君子若面目虛浮肢體如水氣用全生白朮散如未應用六君子湯脾虛濕熱下部作腫用補中益氣加茯苓若飲食失宜嘔吐泄瀉用六君子湯若腿足發腫喘悶不安或指縫出水用天仙藤散脾胃虛弱兼四君子湯如未應用補中益氣湯若脾肺氣滯用加味歸脾湯佐以加味逍遙散附治驗一妊娠每胎至五月肢體倦怠飲食無味先兩足腫漸至遍身後及頭面此是脾肺氣虛朝用補中益氣夕用六君子加蘇梗而愈凡治妊娠毋泥月數但見某經症即用本藥為善天仙藤散治婦人有水氣而成胎以致兩腿足浮腫天仙藤洗略炒香附子炒陳皮甘草烏藥軟白者辣者良各五分上每服五錢生薑木瓜蘇葉各三片水煎日三服澤瀉散治妊娠遍身浮腫上氣喘急大便不通小便赤澀澤瀉桑白皮炒木通枳殼麩炒檳榔赤茯苓各五分上薑水煎服千金鯉魚湯治妊娠腹大胎間有水氣白朮五兩茯苓四兩當歸芍藥各三兩上先以小鯉魚一頭如食法煮取汁每汁二盞入藥五錢薑七片橘皮少許煎七分空心服腎著湯治妊娠腰腳腫茯苓白朮各八分乾薑炮甘草各一錢杏仁五分上水煎服五皮散治胎水腫滿大腹皮桑白皮炒生薑皮茯苓皮橘皮各一錢木香二分上水煎服治妊娠腳浮腫因脾衰血化成水用生料平胃散薑棗水煎服或為末用蘇葉湯調下每服二錢全生白朮散治妊娠面目浮虛四肢腫如水氣名曰胎氣又曰胎腫白朮一兩生薑皮大腹皮陳皮白茯苓各五錢上各為末每服二錢米飲下附方四君子湯六君子湯補中益氣湯三方見二十四卷第六論加味歸脾湯方見二十四卷第四論加味逍遙散方見二十四卷第四論妊娠腹內鐘鳴方論第九治孕婦腹內鳴用鼠窟中土為末入麝香酒調下三錢立愈或黃連濃煎汁母常呷之愚按産寶云小兒在腹中哭其治法亦用空房中鼠穴土或黃連濃煎飲之立愈想即是症又云臍帶上疙瘩兒含口中因妊娠登高舉臂脫出兒口以此作聲令妊婦屈腰就地如拾物仍入兒口即止然黃連性寒麝香開竅當酌量用之龔彥德孕癰方第十治孕癰用烏藥五錢水一鍾煎七分入牛皮膠一兩煎化溫服或薏苡仁煮汁飲之愚按孕癰即是腹內患癰如前法不應宜用牡丹皮散或加薏苡仁湯治驗見二十四卷妊娠不語論第十一孕婦不語不須服藥臨産月但服保生丸四物湯産下便語黃帝問曰人有重身九月而喑何也岐伯對曰胞絡繫於腎腎脈貫系舌本故不能言十月分娩後自為之言也愚按前症果內經窮理之言人有患此當調攝以需之不必驚畏而泛用藥也妊娠傷食方論第十二經曰飲食自倍腸胃乃傷又云陰之所生本在五味陰之五宮傷在五味故妊娠傷食最難調治者愚按東垣先生云脾胃之氣壯則過時而不飢多食而不傷蓋胃主司納脾主消化五臟之本也然食倍而傷者乃脾氣虛而不化也若投以峻劑則脾胃復傷而胎亦損矣當審其所因而調治之若飲食停滯或肚腹作痛用平胃散嘔吐噁心加枳殼砂仁吞酸噯腐加黃連三分吳茱萸二分腹滿泄瀉用六君子湯停滯肉食倍加山楂停滯麵食倍加麥糵停滯糯食用白酒麴末一味米食停滯倍加谷糵魚腥所傷倍加陳皮傷辛熱之物加黃連傷生冷之物加砂仁木香如不應更加肉豆蔻補骨脂再不應用四神丸若脾氣下陷用補中益氣湯凡噯覺藥氣且戒藥鉺節飲食經云損其脾者調其飲食適其寒溫大凡脾胃虛弱飲食難化以白朮陳皮為末等分陳曲糊丸常服最善枳朮丸但可暫用枳實峻厲能耗真氣治者慎之附治驗一妊娠因停食服枳朮丸胸腹不利飲食益少更服消導寬中之劑其胎下墜余謂此脾氣虛而不能承載也用補中益氣及六君子湯中氣漸健其胎漸安又用八珍湯加柴胡升麻調理而痊木香丸治妊娠脾胃虛弱飲食不消肚腹膨脹或嘔吐泄瀉木香二錢白朮炒人參白茯苓各等分上為末麵糊丸緑豆大每服三十丸熟水下白朮散治妊娠脾胃虛弱氣不調和飲食易傷白朮炒紫蘇各一兩人參白芷各三錢炒川芎訶子皮青皮各五錢甘草炒一錢上每服二錢薑水煎附方平胃散方見七卷第十八論補中益氣湯六君子湯二方見二十四卷第六論四神丸方見八卷第八論八珍湯方見二十四卷第八論妊娠臟躁悲傷方論第十三許學士云一婦無故數次悲泣是為臟躁用大棗湯而愈又程虎卿內妊娠五月慘戚悲傷亦投大棗湯而愈愚按前症或因寒水攻心或肺有風邪者治當審察附治驗一妊婦無故自悲用大棗湯二劑而愈後復患又用前湯佐以四君子加山梔而安一妊婦悲哀煩躁其夫詢之云我無故但自欲悲耳用淡竹茹湯為主佐以八珍湯而安大棗湯甘草三兩小麥三兩大棗十枚上水六鍾煎三鍾分三服亦補脾氣淡竹茹湯治妊婦心虛驚悸臟躁悲傷或作虛煩麥門冬去心小麥半夏湯泡各一錢半人參白茯苓各一錢甘草五分上薑棗並竹茹少許水煎治胎臟躁悲哭用紅棗燒存性米飲調下附方四君子湯方見二十四卷第六論八珍湯方見二十四卷第四論
