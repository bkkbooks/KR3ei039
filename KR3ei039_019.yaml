body:
  text: 卷十九産後乍見鬼神方論第一産後如見鬼神或言語譫妄皆由血氣虧損陰虛發熱或瘀血停滯以致心神煩躁而然也宜以調經散治之愚按前症若敗血停滯用調經散若血虛發熱用八珍加炮姜若心血虛損用柏子仁散大抵此證皆心脾血少所致但調補胃氣則痰清而神自安矣若果系鬼祟所附即灸鬼哭穴可愈其或不起者多因豁痰降火攻伐之過也仍參第三卷産後譫語乍見鬼神方論附治驗一産婦患前症或用調經散愈而復作仍復前散益甚痰涎上湧朝寒暮熱余朝用八珍散夕用加味歸脾湯各五十餘劑而愈調經散治血虛經閉心神煩躁渾身疼痛或時見怪沒藥琥珀並細研桂心各一錢芍藥炒當歸各一分細辛半錢麝香少許上為末每服半錢薑汁溫酒各少許調服柏子仁散治産後元氣虛弱瘀血停滯狂言亂語柏子仁遠志人參桑寄生防風琥珀別研當歸炒生地黃焙甘草炒等分上用白羊心一個水三盞煮清汁七分入藥五錢煎服附方八珍湯加味歸脾湯二方見二十四卷第四論鬼哭穴見六卷第八論産後心神驚悸方論第二産後心神驚悸恐懼或目睛不轉口不能言乃心氣虛而六淫內侵診其脈動而弱者驚悸也動則為驚弱則為悸矣愚按人之所主者心心之所主者血心血一虛神氣不守此驚悸所由作也當補血氣為主仍參三卷第十論附治驗一産婦患前症二度服琥珀地黃丸局方妙香散隨效再患服之其症益甚而脈浮大按之如無發熱惡寒此血氣俱虛余用十全大補加味歸脾二湯各百餘劑而愈後遇驚恐勞怒復作仍復前藥而安琥珀地黃丸治産後惡露未盡胸腹作痛或小便不利琥珀另研延胡索糯米同炒赤去米當歸各一兩蒲黃四兩炒香生地黃研取汁留滓生薑各二斤研取汁留滓生薑汁用銀石器內炒地黃滓以地黃汁炒生薑滓各干為末上為末煉蜜丸如彈子大每服一丸當歸煎湯化下治血虛驚悸少寐及産後敗血停留少腹作痛等證辰砂另研沒藥琥珀並研細當歸為末等分上為末每服二錢空心日午臨臥用白湯調下産後驚悸亂語精神不定用好硃砂為細末酒調服錢許附方局方妙香散方見三卷第十三論茯苓補心湯方見三卷第十論十全大補湯加味歸脾湯二方見二十四卷第四論産後中風心驚方論第三産後眼張口噤肢體強直腰背反偃言語錯亂如癇者此氣虛風邪所傷而成痙也愚按仲景先生云有汗為柔痙用桂枝湯無汗為剛痙用麻黃湯然産後得此血氣俱虛之敗症也不可與傷寒例看丹溪先生云産後當大補氣血為主可用十全大補湯以補元氣如不應急加附子更不應是藥力弗逮仍用參附湯多服余嘗治大虛之症參耆數斤附子數枚方應附治驗一産婦患此不省人事言語妄甚惡風寒喜熱飲形氣倦怠脈虛浮無力余謂血氣虛寒用十全大補湯二十餘劑不應又二十餘劑稍緩乃漸加附子至一錢服數劑諸症減一二又二十餘劑十退三四乃去附子五分數劑諸症頓退而安後又發仍服前藥加附子三五分而愈茯苓散治産後心虛忪悸言語錯亂健忘少睡或自汗盜汗人參甘草炒芍藥炒黃當歸生薑各八分茯苓各一錢桂心六分麥門冬去心五分遠志去心大棗二枚上水煎服抱膽丸治産後遇驚發狂或遇經行發狂水銀二兩黑鉛一兩五錢硃砂一兩細研乳香一兩另研上將黑鉛入銚內火熔下水銀結成砂子下硃砂乳末乘熱用柳木槌研勻丸雞頭子大每服一丸空心薄荷湯下得睡忽驚覺來即安妙香散亦善附方妙香散方見三卷第十三論十全大補湯方見二十四卷第四論參附湯方見後第六論産後中風恍惚方論第四産後恍惚因元氣俱虛心經血少或外邪所侵以致心神恍惚怔忡不寧愚按前症當大補血氣為主而佐以後方為善蓋風乃虛極之假象也固其本源諸病自退若專治風則速其危矣附治驗一産婦患前症盜汗自汗發熱晡熱面色黃白四肢畏冷此氣血俱虛用八珍湯不應更用十全大補加味歸脾二湯始應後因勞怒發厥昏憒左目牽緊兩唇抽動小便自遺余為肝火熾盛用十全大補加鉤藤山梔而安再用十全大補湯辰砂遠志丸而愈辰砂遠志丸治産後中風驚狂起臥不安或痰涎上湧石菖蒲遠志去骨蘆甘草煮人參茯神去木辰砂各三錢川芎山藥鐵粉麥門冬去心細辛天麻半夏湯泡南星白附子各一兩上為末薑汁糊丸緑豆大別以硃砂為衣每服三十丸臨臥薑湯下附方八珍湯十全大補湯加味歸脾湯三方見二十四卷第四論産後虛極生風方論第五産後生風因去血過多氣無所主以致唇青肉冷汗出目眩神昏急服濟危上丹若投以風藥則誤甚矣愚按前症若心脾氣血俱虛用十全大補湯如不應加附子鉤藤鉤若肝經血虛用逍遙散加鉤藤經云脾之榮在唇心之液為汗若心脾二臟虛極急用參附湯救之附治驗一婦人患前症或用諸補劑四肢逆冷自汗泄瀉腸鳴腹痛余以陽氣虛寒用六君子薑附各加至五錢不應以參附各一兩始應良久不服仍腸鳴腹痛後灸關元穴百餘壯及服十全大補湯方效濟危上丹乳香研五靈脂硫黃玄精石同研極細阿膠卷柏桑寄生陳皮等分上將上四味入石器內微火炒再研入余末用生地黃汁丸桐子大每服二十丸食前溫酒或當歸酒下當歸建中湯治産後腹痛拘急痛連腰背自汗少食當歸桂心各三兩白芍藥六兩炒焦黃甘草炙一兩上每服五錢薑棗水煎入飴糖一匙服如未應加之附方十全大補湯逍遙散二方見二十四卷第四論六君子湯方見二十四卷第六論獨參湯治一切失血惡寒發熱作渴煩躁或口噤痰鳴自汗盜汗或氣虛脈脫手足逆冷蓋血生於氣故血脫補氣陽生陰長之理也方見三卷第十三論産後虛汗不止方論第六産後汗不止者皆由陽氣頓虛腠理不密而津液妄泄也若遇風則變痙縱虛乏短氣則身體消瘦唇口乾燥久則經水斷絶由津液竭故也愚按前症屬血氣俱虛急用十全大補湯如不應用參附耆附等湯若汗多亡陽發痙尤當用前藥王海藏先生云頭汗出至頸而還額上偏多蓋額為六陽之所會也由虛熱熏蒸而出竊謂前症當以部位分之額左屬肝額右屬肺鼻屬脾頤屬腎額屬心治者審之仍參三卷第六論附治驗一産婦略聞音響其汗如水而昏憒諸藥到口即嘔余以為脾氣虛敗用參附末為細丸時含三五粒隨液咽下乃漸加之到錢許卻服參附湯而痊一産婦資汗不止遂致廢寐神思疲甚口乾引飲余謂血虛有熱用當歸補血湯以代茶又以當歸六黃湯內黃芩連柏炒黑倍加人參五味子二劑而愈麻黃根湯治産後虛汗不止身熱發渴驚悸不安當歸黃耆炒麻黃根牡蠣煅為粉人參甘草炒等分上每服四錢水煎一方治産後自汗盜汗胃氣虛弱服別藥則嘔吐不能入當歸黃耆各一兩麻黃根二兩上每服三錢水煎治産後氣脫汗不止小便短少四肢難以屈伸甘草炙一兩附子炮五錢桂心芍藥炒各兩半上每服三錢薑棗水煎服虛甚更加以效為度止汗散牡蠣為末半兩小麥麩八兩炒黃為細末上每服三五錢用豬肉汁調人參湯治産後諸虛不足發熱盜汗內熱晡熱等症人參當歸等分上為末以豬腰子一枚切片水二鍾糯米半合蔥白二根煮取汁八分入藥三錢煎服附方當歸六黃湯治氣血虛熱盜汗不止不應加人參白朮心血不足加酸棗仁炒當歸熟地黃自制黃耆炒各二錢生地黃黃柏炒黑黃芩炒黑黃連炒黑各一錢上水煎服參附湯治陽氣虛寒自汗惡寒或手足逆冷大便自利或臍腹疼痛吃逆不食或汗多發痙等症人參一錢附子炮五錢上作一服薑棗水煎徐徐服去人參加黃耆名耆附湯當歸補血湯治肌熱躁熱目赤面紅頻渴引飲晝夜不息脈洪大而虛重按全無者當歸三錢黃耆炙一兩上水煎服十全大補湯方見二十四卷第六論耆附湯治陽氣虛脫惡寒自汗或口噤痰湧四肢逆冷或吐瀉腹痛飲食不入及一切虛寒等症黃耆一兩附子炮五錢上作一劑薑棗水煎服如不應倍加附子方得全濟産後冒悶汗出方論第七産後忽冒悶汗出者因陰血虧損陽氣鬱暴故也急吞雞子三枚未醒飲童便或時復發宜服竹瀝五合愚按前症屬大虛宜固元氣為主其汗不止必變柔痙東垣先生云婦人分娩及半産漏下昏冒目瞑蓋因血暴亡而火上熾但補其血則神自昌若常時血下當補而升舉其氣陽得血而神安則目明矣今立一方以補手足厥陰之血兼益陽氣名曰全生活血湯全生活血湯治發熱自汗盜汗目䀮䀮四肢無力口乾頭暈行步欹側柴胡當歸各二錢生地黃炒熟地黃川芎藁本各一錢半防風羌活獨活葛根甘草炒各二錢細辛蔓荊子各五分升麻芍藥炒各三錢紅花三分上每服五錢水煎熱服産後汗多變痙方論第八産後汗多變痙因氣血虛損肉理不密風邪所乘其形口噤背強如癇或搖頭馬嘶不時舉發氣息如絶宜速灌小續命湯若汗出如雨手拭不及者不治愚按前症因去血過多元氣虧極或外邪相搏以致牙關緊急四肢痙強或陰火內動或腰背反張肢體抽搐若有汗而不惡寒者曰柔痙若無汗而惡寒者曰剛痙由亡血過多筋無所養故傷寒汗下過多潰瘍膿血大泄多患之乃敗症也急以十全大補湯治之如不應急加附子多有復蘇者亦有六淫七情所致者治法見第三卷第三論附治驗一産婦牙關緊急腰背反張四肢抽搐兩目連札此去血過多元氣虧損陰火熾盛用十全大補加炮姜一劑而蘇數劑而安余在吳江史萬湖第時將入更聞喧嚷詢云家人婦産後出直廚忽僕而死余意其勞傷血氣而發痙也急用十全大補加附子煎滾令人正其面開其口灌之久不能下令側其面而出之換以熱藥如此五次方得下咽遂蘇小續命湯治剛痙或腳氣痹弱不能轉舒行步欹側或口眼喎斜牙關緊急角弓反張麻黃桂心甘草各半兩防風三兩芍藥炒白朮炒人參川芎附子炮防己酒拌黃芩炒各等分上每服五錢水煎入薑汁少許溫服若自汗為柔痙去麻黃有熱去附子減桂一半盛冬初春去黃芩十全大補湯方見二十四卷第四論産後口噤腰背反張方論第九産後口噤由血氣虛而風邪乘於手三陽經也蓋手三陽之筋循結於頷得風冷則筋急故致口噤腰背攣急角弓反張者是風邪入於諸陽之經也愚按前症因血氣耗損腠理不密汗出過多而患之者乃虛象也宜固氣血為主佐以本方丹溪云産後當大補氣血為先雖有他症以末治之如惡寒發熱等症乃氣血虛甚之極也宜大劑參耆歸朮肉桂以培養之如不應急用炮附子再不應用人參一兩炮附子二三錢名參附湯仍猶未應乃藥力未能及也宜多用之愈風散治前症用荊芥略焙為末每服三錢豆淋酒下童便亦可其效如神牙緊灌口鼻清順散又名交解散方見第二卷第五論治婦人産後不省人事吐涎瘛瘲當歸荊芥穗等分上每服三錢水一盞酒少許煎灌下咽即蘇愚按前症如有未應者急用大補氣血為主産後中風白鮮皮一兩或共獨活三兩酒水煎服張仲文用白朮四兩以酒煎頓服小續命湯治産後口噤角弓反張見前産後中風方論第十産後中風或血氣未復風寒所感以致筋攣拘急口眼喎斜或肢體緩弱入臟則恍惚驚悸郭稽中雲産後強力下床或誤入房或憂怒內傷臟腑陳無擇曰當以脈辨而治之若努力下床月內入房憂怒著艾非中風類乃蓐勞火邪之症也愚按前症果外邪所屬形氣不足病氣有餘當補元氣為主稍佐以治病之藥若強力下床月內入房屬形氣病氣俱不足當純補元氣多有復蘇者若誤投風藥乃促其危也仍參照第三卷諸論主之治産後身背拘急妄言發熱四肢拘攣不時驚悸川芎羌活羚羊角屑酸棗仁炒芍藥炒黃各四兩桑白皮六分防風五分上水煎分三服治産後中風唇青鼻黑用小續命湯連進三服即愈産後中風煩渴用紅花子五合炒研水煎徐呷之獨活寄生湯治前症亦良仍與第三卷中風類通看方見後産後四肢筋攣方論第十一産後中風筋脈攣急乃血氣俱虛或風邪客於皮膚則頑痹羸乏若入於筋脈則四肢攣急皆由大經空虛風寒乘虛而漸入也愚按肝屬木而主筋前症若肝經風熱血燥用加味逍遙散如不應當用六味地黃丸以補腎水經云風客淫氣精乃亡邪傷肝也仍參第三卷諸論主之附治驗一産婦筋攣臂軟肌肉掣動此氣血俱虛而自熱也用十全大補湯而安一産婦手麻服愈風丹遍身皆麻神思倦怠余謂氣血虛弱用十全大補湯加炮姜數劑漸愈去姜又數劑及逍遙散而痊治産後氣血不足風邪所襲肢節攣痛背項強直防風一兩赤芍藥炒桂心半兩羚羊角川芎羌活當歸酸棗仁炒牛蒡子炒各三錢上每服四錢水酒煎愚按前方如未應當用八珍湯更不應用十全大補湯加味逍遙散十全大補楊二方見二十四卷第四論六味地黃丸方見三十四卷第十一論産後瘛瘲方論第十二新附竊謂瘛者筋脈拘急也瘲者筋脈張縱也經云肝主筋而藏血蓋肝氣為陽為火肝血為陰為水前症因産後陰血去多陽火熾盛筋無所養而然耳故癰疽膿水過多金瘡出血過甚則陽隨陰散亦多致此治法當用八珍散加丹皮鉤藤以生陰血則陽火自退諸症自愈如不應當用四君芎歸丹皮鉤藤以補脾土蓋血生於至陰至陰者脾土也故小兒吐瀉之後脾胃虧損亦多患之乃虛象也無風可遂無痰可消若屬陽氣脫陷者用補中益氣加薑桂陽氣虛敗者用十全大補加桂附亦有復生者此等症候若肢體惡寒脈微細者此為真狀若脈浮大發熱煩渴此為假象惟當固本為善若無力抽搐戴眼反折汗出如珠流者皆不治附治驗一産婦因勞兩臂不能屈服蘇合香丸肢體痿軟汗出如水余謂前藥辛香耗散真氣腠理虛而津液妄泄也先用十全大補湯加五味子補實腠理收斂真氣汗頓止又佐以四君子調補元氣漸愈用逍遙散大補湯調理而痊一産婦先胸脅乳內脹痛後因怒口噤吐痰臂不能伸小便自遺左三部脈弦余謂此肝經血虛而風火所致不能養筋先用加味逍遙散治之臂能屈伸又以補肝散六味丸諸症悉愈一婦人發瘛遺尿自汗面赤或時面青飲食如故肝脈弦緊余曰此肝經血燥風熱名瘛也肝主小便其色青入心則赤法當滋陰血清肝火遂用加味逍遙散不數劑而諸症悉安附方海藏愈風湯一名舉鄉古拜散治一切失血筋脈緊急産後搐搦荊芥為末上先以炒大豆黃卷以酒沃之去黃卷取清汁調前末三五錢和滓飲之輕者一服重者二三服中病即止其效如神氣虛者忌服一方用童便調本事方云此藥委有奇效神靈之功大抵産室無風為佳不可衣被帳褥太暖太暖即汗出汗出則腠理開易於中風便昏冒一婦人産後遮護太密更生旺火睡久及醒則昏昏如醉不省人事用此藥佐以交加散服之即睡睡中必以左手搔頭覺必醒矣良久果驗交加散治瘛瘲或顫振不省人事口吐痰涎當歸荊芥穗等分上為細末每服二錢水一盞酒少許煎至七分灌下神效增損柴胡湯治産後或經適斷致手足牽搐咬牙昏冒異症柴胡八錢黃芩炒四錢人參半夏各一錢石膏四錢知母二錢黃耆炒五錢甘草炙二錢上為粗末每服半兩姜五片棗四枚水煎溫服四君子湯補中益氣湯二方見二十四卷第六論産後腳氣方論第十三論曰産後腳氣因元氣內虛六淫外侵所致其狀發熱瞀悶搐掣驚悸心煩嘔吐氣上用小續命湯治之若以為敗血攻之則誤矣愚按前症當補氣血為主佐以小續命湯寄生湯如不應用大防風湯仍參第一卷九論主之已上十一症誠似小兒慢驚風無風可逐無痰可清但專補元氣庶保其生附治驗一産婦患前症或用獨活寄生湯而痊後復作服之其汗如水更加口噤吐痰余用十全大補湯培養血氣漸愈後飲食日少肌體日瘦吐痰如湧此命門火衰脾土虛寒用八味丸及加味歸脾湯諸症漸退肌肉漸生獨活寄生湯治風邪內攻兩脛腫痛或緩縱攣痹等症方見四卷第七論小續命湯方見前大防風湯方見二十四卷第九論十全大補湯加味歸脾湯二方見二十四卷第四論八味丸方見十五卷第十一論
