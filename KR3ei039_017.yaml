body:
  text: 卷十七産難門坐月既明須知産難故以次之産難論第一婦人以血為主惟氣順則血和胎安則産順今富貴之家過於安逸以致氣滯而胎不轉動或為交合使精血聚於胞中皆致産難若腹或痛或止名曰弄胎穩婆不悟入手試水致胞破漿干兒難轉身亦難生矣凡産直候痛極兒逼産門方可坐草時當盛暑倘或血運血溢當飲清水解之冬末春初産室用火和暖下部衣服尤當溫厚方免胎寒血結若臨月洗頭濯足亦致産難愚按丹溪先生曰余族妹苦於難産遇胎則驅之豫甚憫焉蓋其形肥而勤女工形肥則氣虛久坐則氣不運而兒在胞胎因亦不能自運耳當補其母之氣則兒健易産故後有孕至五六月遂以紫蘇飲加補氣藥與之數十貼而産甚快大要在隨母之稟性若胎胞破早血水先干或難産勞傷氣血者煎八珍湯或十全大補湯加益母草不時與服以協濟之或以黃耆數斤芎歸四五斤許大釜水煎藥氣氤氳滿室使産婦口鼻俱受其氣臍帶以油紙捻燒斷補接其陽氣穩婆須擇老練者當先施惠預說與知倘有生息不順只說是未産或是雙胎只說胎衣未下恐驚則氣散愈難生息附治驗荊婦孟冬分娩艱難勞傷元氣産子已死用油紙捻燒斷臍帶藉其氣以暖之俄頃忽作聲此兒後無傷食作瀉之症可見前法之功不誣世用刀器斷臍帶子母致危者竟不知其由矣且穩婆又喜平日常施小惠得其用心兼以安慰母懷故無虞耳一穩婆云我止有一女正分娩時適當巡街侍御行牌取我視其室分娩女因驚嚇未産而死後見侍御更以威顏分付逮視産母胎雖順而頭偏在一邊以致難産因畏其威不敢施手由是其母子俱不能救紫蘇飲方見十二卷第八論十全大補湯八珍湯二方見二十四卷第四論楊子建十産論第二凡生産先知此十證庶免子母之命折於無辜也世之救生者少有精良妙手多致傾命豫因傷痛而備言之一曰正産正産者言懷胎十月陰陽氣足忽然作陳疼痛胎至穀道漿破血下兒即正産二曰傷産傷産者言懷胎未足月有所傷動以致忽然臍腹疼痛或服催藥過早或産母努力太早逼兒錯路不能正生凡分娩須待兒身轉順頭對産門努力一送兒即正生三曰催生催生者言欲産時兒頭至産門方服藥催之或經日久産母困倦難生宜服藥以助其血氣令兒速生四曰凍産凍産者言天氣寒冷産母血氣遲滯兒不能速生故衣裳宜厚産室宜暖背心宜溫和庶兒易生五曰熱産熱産者言盛暑之月産婦當溫涼得宜熱甚産母則頭疼面赤昏暈若産室人衆熱氣蒸逼亦致前患名曰血暈若夏月風涼陰雨亦當謹避六曰橫産橫産者言兒方轉身産母用力逼之故也凡産母當令安然仰臥穩婆先推兒身順直頭對産門以中指探其肩不令臍帶羈扳方用藥催之繼以産母努力兒即生七曰倒産倒産者言兒未能轉身産母努力故也當令産母仰臥穩婆推入候兒自順著良久不生令穩婆手入産戶一邊撥兒轉順近産門卻服催藥並努力即下八曰偏産偏産者言兒回身未順生路産母努力逼兒頭偏一邊産雖露頂非也乃額角耳當令産母仰臥穩婆輕手正其頭向産門卻令産母努力子即下若兒頂後骨偏拄穀道露額令穩婆以綿衣炙暖裹手於穀道外傍輕手推正令産母努力兒即生九曰礙産礙産者言兒身已順門路已正兒頭已露因兒轉身臍帶絆其肩以致不能生令産母仰臥穩婆輕推兒向上以中指按兒肩脫臍帶仍令兒身正順産母努力兒即生十曰坐産坐産者言兒之欲生當從高處牢系手巾一條令産母以手攀之輕輕屈坐令兒生下不可坐抵兒生路十一曰盤腸産趙都運恭人每臨産則子腸先出然後産子其腸不收名曰盤腸穩婆以醋水各半盞默然噀産婦面背才收不可不知愚按前症古方以萆麻子仁四十九粒研塗産母頭頂腸收上即洗去其腸若干以磨刀水少許溫潤之再用磁石煎湯服之即收上磁石須陰陽家用有驗者若以水噀母面背恐驚則氣散治盤腸産以半夏為末搐鼻中腸自上又方大紙捻以麻油潤燈吹滅以煙燻産婦鼻中腸即上又方腸出盛以潔淨漆器濃煎黃耆湯浸之腸即上催生方論第三五行論命以年月日時支幹五行相生相值以推其貴賤其間最切要者時也得其時則終身富貴失其時則一世貧賤然則命稟於有生之初豈可催乎世之催生之說蓋為産難而設也今開歷驗數方於後催生柞木飲子治産難或胎爛腹中腹悶其效如神生柞木一尺銼甘草大者五寸銼五段上用水三鍾紙封罐口煎一鍾半候胎順産門徐徐溫服即時分娩更無諸苦切不可早於坐草及穩婆下手催逼催生如神散治逆産橫生其功甚大百草霜白芷不見火各為末等分上每服三錢至胎順産門以童便米醋和如膏加沸湯調下或童便酒煎進二服然血得黑則止此藥大能固血又免血乾甚妙如聖散用黃蜀葵花焙為末熱湯調下二錢若漏血胎胞乾澀難産並進三服即産如無花用葵子末半兩吞調溫酒服尤妙若打撲胎死紅花酒調下順生丹治症同上兔腦髓去皮膜研如膏明乳香一兩細研母丁香末一兩麝香一錢研細上以兔腦髓丸雞頭大陰乾每服一丸溫水下男左女右手握出兔腦臘月者尤佳又方通明乳香一塊如棗子大為末腰痛時用冷水醋少許調服扶立令兩手拿石燕二個念醫靈藥聖三遍行數步坐草便生更無痛楚神效愚按前法觀之似迂遠用者云甚驗治産不順蛇蛻一條全者蠶蛻紙一張無則一方上入新瓦瓶內鹽泥固濟燒存性為末煎榆白皮湯下一錢三服覺痛便生又方用伏龍肝研末每服一錢酒調下兒頭戴土而下又方吞槐子十四粒即下又方當歸為末酒調一錢服良久再服一方用魚膠一尺許新瓦上煅灰陳醋調服立下又方大硃砂於端午日曬起以百日為度研為細末用臘月兔腦髓丸緑豆大欲産時粥飲下一丸良久便生其藥男左女右手中握出曬硃砂不得著雨又方臘月兔頭煅為末蔥白煎湯調二錢立生或臘月兔血紙袋盛掛當風處陰乾為末煎乳香湯調下二錢或兔皮和毛燒為末酒調下二錢即下如胎衣未下再服神妙乳砂丹用明乳香為末以豬心血丸桐子大硃砂為衣陰乾每服二丸嚼碎冷酒下良久未生再服難産以蓮葉蒂七個水煎化服二丸良久未生再服胞漿先干胎不得下急服大料四物湯滋其血氣並濃煎蔥湯熏洗産戶更用油燭塗産戶內卻服前藥胎死不下用朴硝五錢滾湯調下或平胃散一服胞衣未下酒水服一丸橫逆不順先用如神散方見前産門不開用加味芎歸湯仍服二丸須月初上辰日修合鹽塗兒足底急強摩之即産應急方好墨新汲水濃磨服之墨水裹兒出又方清油同蜜等分入滾湯少許調服或油煎一盞服之或路傍破草鞋一隻取鼻絡小耳繩燒灰酒調服交骨不開産門不閉方論第四新附竊謂交骨不開産門不閉皆由元氣素弱胎前失於調攝以致血氣不能運達而然也交骨不開陰氣虛也用加味芎歸湯補中益氣湯産門不閉氣血虛也用十全大補湯附治驗地官李孟卿娶三十五歲女為繼室妊娠慮其難産索加味芎歸湯四劑備用果産門不開止服一劑頓然分娩上舍懷德之室産門不開兩日未生服前藥一劑即時而産懷德傳服此方用者無有不驗一婦人分娩最易至四十妊娠下血甚多産門不開與前湯一劑又以無憂散斤許煎熟時時飲之以助其血而産一産婦陰門不閉發熱惡寒用十全大補加五味子數劑而寒熱退又用補中益氣加五味子數劑陰戶斂若初産腫脹或焮痛而不閉者用加味逍遙散若腫既消而不閉者用補中益氣湯切忌寒涼之劑一婦人脾胃素弱兼有肝火産後陰門腫痛寒熱作渴嘔吐不食敷大黃等藥服驅利之劑腫及於臀虛症蜂起此真氣虛也先用六君子以固脾胃乃以補中益氣湯升舉而消一産婦失治腫潰不已形體消瘦飲食少思朝寒暮熱自汗盜汗半年矣余用補中益氣加茯苓半夏以健脾胃膿水漸少飲食漸進用歸脾湯以解脾郁共五十餘劑元氣復而瘡亦愈矣一産婦陰門不閉小便淋瀝腹內一物攻動脅下或脹或痛用加味逍遙散加車前子而愈一婦人子宮腫大二日方入損落一片殊類豬肝面黃體倦飲食無味內熱晡熱自汗盜汗用十全大補湯二十餘劑諸症悉愈仍復生育加味芎歸湯治交骨不開不能生産川芎當歸各一兩自死龜板一個酥炙婦人頭髮一握燒存性上為散每服五錢水煎服約人行五里即生如胎死亦下灼過龜板亦可附方十全大補湯方見二十四卷第四論補中益氣湯方見二十四卷第六論郭稽中産難方論第五論曰産難者因兒轉身將兒枕血塊破碎與胞中敗血壅滯兒身不能便利是以難産急服勝金散消散其血使兒自易生陳無擇云多因兒未轉身坐草太早或努力太過以致胞衣破而血水乾産路澀而兒難下宜先服催生如神散以固其血設或逆生橫産當用前法針刺勝金散麝香末一錢豆豉一兩上每服一錢用稱錘燒赤淬酒下催生如神散亦可用産難子死腹中方論第六産難子死腹中多因驚動太早或觸犯禁忌其血先下胎乾涸而然也須視産母舌若青黑其胎死矣當下之故産室坐臥須順四時方向並遵五行避忌則吉附治驗一穩婆之女勤苦負重妊娠腹中陰冷重墜口中甚穢余意其胎已死令視其舌青黑與朴硝半兩許服之化下穢水而安一婦人胎死服朴硝下穢水肢體倦怠氣息奄奄用四君子為主佐以四物薑桂調補而愈又方水銀半兩桂末一錢作一服溫酒調下粥飲亦可又方以利斧煅赤置酒中待溫飲之其子便下又方用錫粉水銀各一錢棗肉丸大豆許水吞下立出又方朴硝三錢溫童便調下貓犬牛畜用之皆驗又方平胃散五錢酒水各一盞煎至一盞投朴硝五錢再煎三五沸溫服其胎即化水而出寶慶方云凡欲斷臍帶先以系物墜下後可斷之否則胞衣上即衝心而死附方四君子湯四物湯方見二十四卷第六論産難生死訣第七欲産之婦脈離經難經云一呼三至曰離經此是陽加於陰一倍也一呼一至亦曰離經此是陰加於陽四倍也注云經者常也謂脈離常絡之處細而言之一呼脈再至一吸脈再至曰平和之脈故一呼脈行三寸一吸脈行三寸呼吸定息脈行六寸一日一夜一萬三千五百息脈行八百一十丈乃於一周復從始之經再行今一呼脈三至一吸脈三至呼吸定息脈行九寸一日一夜脈行通計一千二百一十五丈過於平脈之數不在所起之經再起故曰離經若一呼一至脈行寸半一吸一至脈行寸半呼吸定息脈行三寸一日一夜通計脈行得四百單五丈乃謂一周是不及平脈之數周而復始亦不在所起之經再起亦曰離經也沉細而滑也同名臨産之婦脈見沉細而滑者乃腎臟本脈之形然腎系胞胎見此脈者亦與離經之脈同名也夜半覺痛應分誕來日日午定知生若妊婦夜半時覺腹痛定知來日午時當分娩也聖惠方云夜半子時覺腹痛來日午時必定生産謂子午相半正半日觀數也身重體熱寒又頻舌下之脈黑復青反舌下冷子當死腹中須遣子歸冥凡妊婦身有沉重者胃氣絶也又體熱寒栗頻並者正氣衰陰氣盛也若舌卷下脈青黑色者及舌反捲上冰冷不溫者子母俱死之候面赤舌青細尋看母活子死定應難凡妊婦面色赤是榮氣流通母活之候舌上青色是妊脈絡絶胎死之候唇口俱青沫又出子母俱死總高判若妊婦唇口俱青色者榮衛氣絶也又口中吐出痰沫者是脾胃之氣俱絶此是子母俱死之候也面青舌青沫出頻母死子活是知真不信若能看應驗尋之賢哲不虛陳凡妊婦面與舌皆青色又吐痰沫者是産婦榮衛俱絶胎氣衝上之候此是子活母死之候産下子母必死也此古賢哲應驗之文不虛妄陳其說也新産之脈緩滑吉實大弦急死來侵凡婦人新産之後其脈來緩滑者為氣血通利調和是安吉之兆也若見牢大弦急之脈則凶必死之脈也若得沉重小者吉忽若堅牢命不停若産婦診得沉重微小者此是形虛脈虛相應故云吉兆之脈忽然診得堅硬牢實之脈是脈盛形衰相反性命不可停留必死也寸口澀疾不調死若産後寸口脈澀疾大小不調勻者此是血氣衰絶之脈故云死也沉細附骨不絶生若重手按之乃得其脈沉細附著於骨不斷絶有力者此生活之兆也審看此候分明記長鬚念此向心經凡為醫者宜隨時審脈證分明記於心胸也愚按前論與脈訣刊誤所云不同觀者審之
