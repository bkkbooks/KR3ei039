body:
  text: 卷二十四瘡瘍門婦人繭唇方論第一諸骨木梗等咽見口齒類要內經云脾氣開於口又云脾之榮在唇蓋燥則干熱則裂風則瞤寒則揭若腫起白皮皺裂如蠶繭名曰繭唇有腫重出如繭者有本細末大如繭如瘤者其因或胎産經行而陰血損或七情動火而榮血虧或心火傳授脾經或厚味積熱傷脾大要審本症察兼症補腎水生脾血則燥自潤火自除風自散腫自消若患者忽略治者不察內用清熱消毒之藥外用追蝕線結之法反為敗症慎哉附治驗一婦人懷抱久郁或時胃口嘈辣胸膈不利月水不調晡熱食少體倦唇腫已年餘矣此脾經鬱火傷血用歸脾湯加薑汁炒黃連山梔少佐吳茱萸嘈辣頓去飲食稍進乃去黃連加貝母遠志胸膈通利飲食如常又用加味逍遙散歸脾湯間服百餘劑月水調而唇立愈一婦人懷抱久郁患繭唇雜治消痰降火虛症悉具盜汗如雨余謂此氣血虛而有熱也用當歸六黃湯內黃芩連柏俱炒黑二劑而盜汗頓止仍用歸脾湯八珍散兼服元氣漸復更以逍遙散歸脾湯間服百餘劑而唇亦瘥一婦人唇裂內熱二年矣每作服寒涼之劑時出血水益增他症此胃火傷血而藥傷元氣也余用加味清胃散而愈後因怒唇口腫脹寒熱作嘔此屬肝木乘脾土用小柴胡加山梔茯苓桔梗諸症頓愈復以加味逍遙散調補元氣而愈一婦人因怒唇腫內熱體倦用化痰藥食少作嘔大便不實唇出血水用理氣消導胸膈痞滿頭目不清唇腫經閉用清胃行血肢體愈倦發熱煩躁涎水湧出余曰此七情傷肝脾屢用攻伐反致他症遂用濟生歸脾湯食進便實涎止用加味逍遙散腫消熱退體健後因怒寒熱耳痛胸膈脹悶唇焮腫甚此怒動肝火而傷血用四物合小柴胡加山梔頓愈又因怒胸乳作脹肚腹作痛嘔吐酸涎飲食不入小水不通此怒動肝木而克脾土也用補中益氣加川芎芍藥而愈又勞役怒氣飲食失節發熱喘渴體倦不食下血如崩唇腫熾甚此為肝經有火不能藏血脾經氣虛不能攝血用補中益氣加炒黑山梔芍藥丹皮而愈一婦人月經不調兩足發熱至年餘而身亦熱勞則足腿痠痛又年餘唇腫裂痛又半年唇裂出血形體瘦倦飲食無味月水不通唇下腫如黑棗余曰此肝脾血虛火症也彼不信用通經藥而歿一婦人忿怒而唇腫或用消毒之藥唇脹出血年餘矣余曰此肝木克脾土而血傷也須養脾胃滋化源為主彼執用前藥狀如翻花瘤而歿一婦人口苦脅脹此肝火之症也用小柴胡加山梔黃連少愈更以四君子加芍藥當歸柴胡調補脾胃而瘥一婦人每怒口苦發熱晡熱此肝火盛而血傷也以小柴胡合四物二劑以清火而生血更以四物加柴胡白朮茯苓丹皮生血健脾而愈一婦人每怒則口苦兼辣胸痛脅脹乳內或時如刺此肝肺之火也用小柴胡加山梔青皮芎歸桑皮而安後又勞怒口復苦經水頓至此屬內火動血得熱而妄行用四物加炒芩炒梔膽草一劑而血止更以加味逍遙散而元氣復一婦人因怒齒痛寒熱作嘔用清胃等藥益甚余以為此肝火傷胃寒藥復傷故也用六君子加芍藥柴胡山梔而愈一婦人胃中嘈辣甚則熱痛後患齒疼此胃中痰火也用二陳加芩連下越鞠丸而瘳一婦人發熱齒痛日晡益甚月水不調此脾經血虛用逍遙散加升麻尋愈後因怒復痛仍以前藥加川芎而痊一婦人因怒牙疼寒熱此肝火侮脾土用小柴胡加芎歸芩朮山梔而疼痛止用加味逍遙散而寒熱退一婦人每産後齒齦皆動逾日乃止此氣血虛而火動也後復懷妊臨月余付十全大補湯二劑令産後煎服其齒不動如故一婦人善怒舌痛煩熱或用降火化痰藥前症益甚兩脅作脹又服流氣飲肚腹亦脹經行不止此肝虛不能藏血脾虛不能攝血而前藥復傷也用加味歸脾湯加五味子而愈一婦人冬患腦疽腫痛熱渴脈洪數實此膀胱濕熱上壅用清熱消毒散潰而愈次年其舌腫大遍身患紫疔如葡萄手足尤多各刺出黑血此脾胃積熱毒也服奪命丹七粒出臭汗瘡熱益甚又便祕二日與大黃芩連各三錢升麻白芷山梔薄荷連翹各二錢生草一錢水煎三五沸服之大小便出臭血甚多下體疔稍退乃入犀角汁再服舌本及齒縫出臭血諸毒乃消更與犀角地黃湯而愈一婦人善怒舌本強手臂麻此肝木克脾土治以六君子湯加柴胡芍藥而愈一婦人産後喉痛服清熱等劑痛益甚此膀胱經血虛也蓋膀胱之內脈上行至喉而遠用八珍湯加牡丹皮柴胡酒炒黑黃柏二劑而愈一婦人喉間作痛旬日余突腫如赤梅狀二月後而腫遍身筋骨作痛余以為此時行楊梅瘡也先以萆薢湯數劑而平更以四物加萆薢黃耆二十餘劑諸症悉退附方藥清胃散治醇酒厚味唇齒作痛或齒齦潰爛或連頭面頸項作痛黃連炒一錢五分當歸生地黃牡丹皮各一錢升麻二錢上水煎服實熱便祕加大黃加味清胃散即前方加犀角連翹甘草涼膈散治積熱煩渴面赤內熱頭昏咽痛便溺赤澀狂言譫妄睡臥不安大黃朴硝甘草各一錢連翹二錢梔子黃芩薄荷各一錢上水煎服補黃散治脾胃虛熱口舌生瘡畏冷飲食人參白朮炒各一錢白芍藥炒黃陳皮甘草炒各五分上薑棗水煎服四順清涼飲加山梔牛蒡子名加味清涼飲治臟腑實熱祕結口舌生瘡當歸赤芍藥甘草大黃各一錢上水煎服人參安胃散治服峻劑損脾胃口舌生瘡人參一錢黃耆炒二錢生甘草炙甘草各五分白芍藥七分白茯苓一錢黃連炒五分上水煎服溫中丸一名人參理中丸治中氣虛熱口舌生瘡不喜飲冷肢體倦怠飲食少思人參甘草炒白朮炒各等分上為末薑汁糊丸桐子大每服五十丸白湯下柳華散治熱毒口瘡黃柏炒蒲黃青黛真正者人中白煅等分上為末敷之四物湯治血熱口舌生瘡或牙齦腫潰或日晡發熱煩躁不安方見本卷第六論加味四物湯即四物湯加丹皮柴胡山梔當歸補血湯治氣血俱虛口舌生瘡熱渴引飲目赤面紅其脈洪大而虛重按全無方見本卷第十一論四物二連湯治血熱口舌生瘡或夜發寒熱當歸熟地黃白芍藥川芎黃連炒胡黃連各一錢上水煎服清咽利膈湯治積熱咽喉腫痛痰涎壅盛煩躁飲冷大便祕結金銀花防風荊芥薄荷桔梗炒黃芩炒黃連山梔炒連翹各一錢玄參大黃煨朴硝牛蒡子研甘草各七分上水煎服龍麝聚聖丹治心脾客熱咽喉腫痛或成癰不消或舌本腫脹口舌生瘡或諸物骨鯁川芎一兩生地黃犀角鎊羚羊角鎊琥珀玄參連翹各五錢人參赤茯苓馬牙硝片腦麝香各二錢桔梗升麻鉛白霜各五錢硃砂牛黃各一錢南硼砂一兩金箔五十片上各另為末和勻蜜丸龍眼大金箔為衣薄荷湯化下或噙咽之拔萃桔梗湯治熱腫喉痹桔梗炒甘草連翹山梔炒薄荷黃芩各一錢上竹葉水煎服甘桔湯治咽喉腫痛甘草六錢桔梗三錢上水煎服解毒雄黃丸治纏喉風腫閉或卒倒死牙關緊急雄黃一錢鬱金一錢巴豆十四粒去油殼上為末醋糊丸緑豆大用熱茶送下七丸吐頑痰立蘇奪命丹治喉閉或疔毒或麻木或嘔吐重者昏憒若疔毒牙關緊急用三五丸為末水調灌下誠有奪命之功蟾酥乾者酒化輕粉各五分枯白礬寒水石煅銅緑乳香沒藥麝香各一錢硃砂三錢蝸牛二十個另研如無亦效上為末用蝸牛或酒糊為丸如緑豆大每服一二丸溫酒或蔥湯下換肌消毒散治時瘡不拘初起潰爛一名萆薢湯土茯苓五錢當歸白芷皂角刺炒薏苡仁各一錢半白鮮皮木瓜不犯鐵器木通金銀花各一錢甘草五分上水煎服七味白朮散一名錢氏白朮散治中氣虛熱口舌生瘡不喜飲冷或吐瀉口乾方見二十卷第二論四君子湯治脾胃虛熱唇口生瘡食少作嘔大便不實若肝木乘脾土所致加柴胡芍藥方見本卷第六論六君子湯方見本卷第六論二陳湯方見本卷第五論越鞠丸方見六卷第七論補中益氣湯方見本卷第十論清熱消毒散方見本卷第五論犀角地黃湯方見本卷第二論當歸六黃湯方見十九卷第六論逍遙散八珍湯歸脾湯十全大補湯四方見本卷第四論小柴胡湯方見本卷第二論婦人耳聄痛方論第二耳瘡屬手少陽三焦或足厥陰肝經血虛風熱或怒動肝火而致若發熱焮痛屬三焦厥陰風熱用柴胡清肝散若內熱癢痛或脹痛屬肝火傷血用梔子清肝散若寒熱作痛或作嘔吐屬肝火傷脾用益脾清肝散若口乾足熱為肝腎陰虛用益陰腎氣丸若月經先期為血熱用加味逍遙散過期為血虛用八珍湯食少體倦為鬱火用加味歸脾湯惡寒發熱肢體倦怠為氣血俱虛用十全大補湯慎不可專治其外復傷氣血也附治驗一婦人耳內外腫痛胸脅不利寒熱往來小便不調余以為肝火傷血先用龍膽瀉肝湯四劑諸症頓退又用加味逍遙散而愈又因怒復作用小柴胡湯而痊一婦人經行後因勞怒發寒熱耳作痛余以經行為血虛用八珍湯加柴胡怒氣為肝火用加味逍遙散勞役為氣傷用補中益氣湯加山梔而愈一婦人素鬱怒耳內作痛腫焮寒熱面色青黃經行則變赤余用加味歸脾湯加味逍遙散而愈一婦人懷抱素郁因怒耳作腫痛經行不止寒熱發熱面色青赤肝脈弦數余以為久郁傷脾暴怒傷肝先用加味小柴胡湯隨用加味逍遙散而痊一婦人因怒發熱每經行兩耳出膿兩太陽作痛胸脅乳房脹痛或寒熱往來或小便頻數或小腹脹悶皆屬肝火血虛先用梔子清肝散二劑又用加味逍遙散數劑諸症悉退乃以補中益氣加五味而痊一婦人耳內腫痛出水寒熱口苦焮連頸項飲食少思此肝火甚也用小柴胡湯加山梔牡丹皮稍愈用加味逍遙散漸愈用八珍湯加柴胡丹皮山梔調補肝脾而全愈一婦人耳內外腫痛胸脅不利寒熱往來小便不調此肝經濕熱也用龍膽瀉肝湯四劑諸症頓退用加味逍遙散而全愈又因怒復作用柴胡清肝散而痊一婦人耳內不時脹痛內熱口乾勞則頭暈吐痰下帶此肝脾氣虛也朝用補中益氣夕用加味逍遙散而痊一寡婦耳內外作痛不時寒熱脈上魚際此血盛之症用小柴胡加生地以抑其血而愈又項間結核如貫珠寒熱晡熱用加味歸脾湯加味逍遙散調補肝脾而愈一婦人耳內外或作痛或赤腫或寒熱月經旬日而止潮熱內熱自汗盜汗余以為肝脾氣血俱虛而有熱用歸脾湯六味丸而愈一婦人性急或耳內作痛或耳外赤腫發熱脅脹日晡益甚余以為怒氣傷肝氣血俱虛朝用加味逍遙散加黃柏桔梗夕用歸脾湯送地黃丸而愈一孀婦耳內外作痛或項側結核內熱晡熱月經不調吐痰少食胸膈不利余以為鬱怒傷肝脾朝用歸脾湯以解脾郁生脾氣夕用加味逍遙散以清肝火生肝血而愈一女子耳下腫赤寒熱口苦月經不調小便內結一塊此肝火氣滯而血凝也先用小柴胡加山梔川芎丹皮又用柴胡清肝散而痊附治驗方藥小柴胡湯治肝膽經症寒熱往來晡熱潮熱身熱默默不欲飲食或怒火口苦耳聾咳嗽發熱脅下作痛甚者轉側不便兩脅痞悶或瀉利咳嗽或吐酸食苦水皆用此藥主之柴胡二錢黃芩炒一錢人參半夏各七分甘草炙五分上姜水煎服加味小柴胡湯治肝膽經風熱耳前後腫痛或結核焮痛或寒熱晡熱或經候不調等症即小柴胡加山梔牡丹皮益脾清肝散治肝經之症寒熱體痛脾胃虛弱人參白朮炒茯苓各一錢甘草炒五分川芎當歸黃芩各一錢柴胡五分牡丹皮七分上水煎服梔子清肝散治三焦及肝膽經風熱耳內作癢或生瘡出水或脅肋胸乳作痛寒熱往來柴胡山梔炒丹皮各一錢茯苓川芎芍藥當歸牛蒡子炒各七分白朮炒甘草各五分上水煎服柴胡清肝散治肝膽三焦風熱怒火以致項胸作痛或頭目不清或耳前後腫痛或寒熱體疼柴胡黃芩炒五分人參山梔炒川芎各一錢連翹桔梗各八分甘草五分上水煎服犀角地黃湯治上焦有熱口舌生瘡發熱或血妄行或吐血或下血犀角鎊生地黃白芍藥黃芩炒牡丹皮黃連炒各一錢上水煎服若因怒而患加柴胡山梔犀角升麻湯治陽明經風熱牙疼或唇頰腫痛或手足少陽經風熱連耳作痛犀角鎊升麻防風羌活各一錢白附子五分川芎白芷黃芩炒各七分甘草五分上水煎熟入犀末服益陰腎氣丸方見六卷第三論婦人瘰癧方論第三婦人瘰癧或因憂思鬱怒或因胎産經行則肝膽脾腎受傷以致前症蓋肝傷則血燥血燥則筋攣纍纍如貫珠多生耳前後胸脅間若寒熱腫痛乃肝氣動而為病用柴胡梔子散以清肝火為主佐以逍遙散以養肝血若寒熱既止而核不消乃肝經之血亦病矣宜用加味四物湯以養肝血為主佐以柴胡梔子散以清肝火若初生如豆附著於筋白色不變內熱口乾精神倦怠久不消潰乃肝脾虧損用逍遙散歸脾湯六味丸以健脾土培肝木切不宜用散堅追毒之劑故外臺祕要云肝腎虛熱則生病矣病機云疾病本系膏粱丹石之毒因虛勞氣鬱所致補形氣調經脈其瘡當自消散若誤下之先犯病禁經禁矣若久潰不斂脈浮大邪火盛也面色㿠白金剋木也皆不治凡瘰癧赤脈貫瞳子有幾條則幾年死無則可治附治驗一婦人患前症久而不愈或以為木旺之症不宜於春預用散腫潰堅湯腫硬益甚余以為肝經虧損用六味地黃丸補中益氣湯至春而愈此症若肝經風火自病元氣無虧可用散堅瀉青之劑若肝自損虧或水不生木用地黃丸若金來剋木須補脾土生腎水若行攻伐則脾胃傷而反致木剋土矣一婦人患之少寐年餘而潰膿水淋漓月經或五六十日一至誤服通經丸輾轉無寐午前惡寒午後發熱余謂思慮傷脾用歸脾湯作丸午前以六君子送下午後以逍遙散送下兩月餘得寐半載後經行如期年餘而瘡愈一婦人潰後發熱煩躁作渴脈大而虛此血虛也以當歸補血湯六劑而寒熱退又以聖愈湯數劑而全愈更以八珍加貝母遠志而瘡斂一癧婦面黃體倦咽酸噯氣余以為中氣虛弱欲用補中益氣湯加茯苓半夏不信反降火利氣胸膈痞滿癧瘡腫痛又散堅利氣噯氣不絶大便不實四肢時冷余曰今變中氣虛寒矣用六君子湯加薑桂少用升麻柴胡漸愈更佐以補中湯尋愈一婦人患此噯氣用降火清胃食少吞酸胸痞悶用利氣消導吐痰氣促飲食日少用清熱化痰大便堅澀內熱身瘦余曰吞酸噯氣脾胃氣虛也胸痞痰喘脾肺氣虛也大便堅澀內熱日瘦脾肺血虛也遂以補中益氣加炒黑吳茱萸三分數劑佐以六味丸諸症頓退乃用歸脾湯逍遙散間服而愈一婦人患前症遍身作癢脈大而虛此氣血俱虛不能榮於腠理以十全大補湯治之而愈大凡潰後午前癢作氣虛午後癢作血虛著作風症治之必死一婦人項核腫痛察其氣血俱實先以必效散一服去之更以益氣養榮湯三十餘劑補之而消蓋此症初起而血氣虛弱者先用前湯待其氣血稍充乃用必效散以去其毒仍用補藥無不奏效若已成膿者即針而補托之氣血復而核不消者服散堅之劑倘不應而氣血如故仍以必效散養榮湯又不應灸肘尖肩髃二穴用豆豉餅琥珀膏自愈若氣血壯實不用追蝕亦能自腐用藥以腐之者使易於收斂耳若血虛而用追蝕不惟無益適以取敗凡不慎飲食七情者不治附方藥當歸川芎散治手足少陽經血虛瘡症或風熱耳內癢痛生瘡出水或頭目不清寒熱少食或經水不調胸膈不利腹脅痞痛小便不調當歸川芎柴胡白朮炒芍藥炒各一錢牡丹皮山梔炒一二分茯苓各八分蔓荊子甘草各五分上水煎服若肝氣不平寒熱往來加柴胡地骨皮肝氣實熱加柴胡黃芩肝脾氣血虛熱加參耆熟地脾虛飲食少思倍加白朮茯苓脾虛胸膈不利加人參黃耆脾虛痰滯胸膈不利加半夏肝氣不順胸膈不利加木香肝虛小腹痞滿或時作痛加熟地脾血不足小腹作疼加肉桂日晡發熱加熟地加味地黃丸治肝腎陰虛諸症或耳內癢痛出水或眼昏痰喘或熱渴便澀等症乾山藥山茱萸肉牡丹皮澤瀉白茯苓熟地黃自制生地黃柴胡五味子各另為末等分上將二地黃酒拌杵膏加蜜丸桐子大每服百丸空心白湯下如不應用加減八味丸人參養榮湯治潰瘍寒熱四肢倦怠體瘦少食面黃氣短不能收斂大瘡愈後多服之庶不變他症也白芍藥一錢五分人參陳皮黃耆炒桂心當歸白朮炒甘草炙各一錢熟地黃自制五味子炒杵茯苓各七分遠志去心炒五分上薑棗水煎服瀉青丸治肝經實火脅乳作痛或惡寒發熱大便祕結當歸龍膽草炒焦川芎山梔炒大黃炒羌活防風各等分上為末蜜丸桐子大每服三四丸白湯下若陰血不足肝火血燥用四物加山梔柴胡或逍遙散加丹皮山梔若腎水虧損不能生肝木而筋攣結核或肢節拳搐或似中風涎痰上湧用六味丸料煎服生地黃丸治師尼寡婦室女乍寒乍熱或頸間結核肝脈弦長而出魚際生地一兩酒拌杵膏秦艽黃芩硬柴胡各五錢赤芍藥一兩上為末入地黃膏加煉蜜少許丸桐子大每服三十丸烏梅煎湯下日進二服連翹飲子治肝膽經氣滯瘰癧結核或乳內結核者連翹川芎瓜蔞仁研皂角刺橘葉青皮甘草節桃仁各一錢上水煎服散腫潰堅湯治瘰癧堅硬氣血無虧者宜用升麻連翹當歸尾酒拌白芍藥炒黃柏酒炒葛根三稜酒拌微炒廣朮各三分龍膽草酒炒桔梗炒昆布知母酒炒瓜蔞根各五分柴胡四分黃芩酒炒四分半甘草炙二分上水煎服必效散治瘰癧未成者消已潰者斂須元氣無虧者可服若孕婦禁餌南硼砂二錢五分輕粉一錢斑蝥四十枚去頭翅同糯米炒熟去米麝香五錢巴豆五粒去殼心膜白檳榔一個上為末每服一錢五更用滾湯調下如小水澀滯或微痛此癧毒欲下也進益元散一服即下此方斑蝥巴豆似為峻厲然用巴豆乃解斑蝥之毒用者勿畏益元散滑石末六錢甘草末一錢每服一錢白湯調琥珀膏治頸項或腋下初結小核漸如連珠潰而膿水不絶成漏症者琥珀一兩丁香桂心硃砂木香松香白芷防風當歸木通木鱉子肉各五錢麻油二斤上先用琥珀等六味為末其餘藥入油煎焦黑濾去渣徐徐入黃丹再煎軟硬得中入前末即成膏矣針頭散治一切頑瘡內有瘀肉或癧核不化瘡口不合宜此藥腐之赤石脂五分乳香白丁香砒霜生用黃丹各一錢輕粉麝香各五錢蜈蚣一條炙乾上為末搽瘀肉上其肉自化若瘡口小用糊和作細條陰乾紝之凡瘡久不合者內有膿管必用之逍遙散歸脾湯二方見本卷第四論柴胡清肝散梔子清肝散二方見本卷第二論補中益氣湯方見本卷第十論四物湯加味四物湯六君子湯三方見本卷第六論六味丸當歸補血湯二方見本卷第十一論聖愈湯方見本卷第九論益氣養榮湯方見本卷第五論灸肩髃肘尖法方見本卷末五婦人結核方論第四婦人結核皆因鬱怒虧損肝脾或因胎産經行失於調養或因暴怒觸動膽火若結於項側耳前後或胸脅腫痛或發寒熱屬膽經風熱怒火宜用柴胡清肝散加鉤藤山梔以養血氣清肝火若結於肉裡其色不變晡熱內熱屬肝火血虛宜用加味逍遙散加龍膽草以養肝血清肝火或結於肢節或纍纍如貫珠其色不變亦肝火燥而筋攣宜用柴芍參苓散加鉤藤以養血氣佐以六味丸以生腎水若時消時作此氣滯而痰結也用歸脾六君二湯以調和脾肺之氣並佐以海藻丸若潰而核不腐或肉不生或膿水清稀肌寒肉冷自汗盜汗寒熱內熱面色萎黃食少體倦便利不調者五臟皆虛也但用補中益氣加味六君子二湯調補脾胃以滋諸臟則各症自退故經云形傷則痛氣傷則腫慎不可輕用行氣破血之劑以復傷也附治驗一婦人項結核寒熱頭痛脅脹乳痛內熱口苦小便頻數屬肝火血虛用加味四物而愈又用加味逍遙散調肝脾而安一婦人經事不調肢體結核如榛如豆不計其數隱於肉裡其色不變三年餘矣大按則痛或投以降火消毒乃不按自痛發汗作渴日晡益甚經水過期左關脈數此肝火血燥也用清肝益榮湯六十餘劑諸症已愈惟項核未消又以當歸龍薈丸數服及八珍湯加柴胡山梔三十餘劑而痊一婦人久鬱怒胸脅內股外臁各結核寒熱往來經候不調胸膈不利飲食少思大便不調左關弦洪左寸弦數右關弦緊右寸弦浮余謂左關弦洪肝經熱也左寸弦數木生火也右關弦緊肝克脾也右寸弦浮木侮金也法當生肝血遂用加味四物湯而諸症退用加味逍遙散而經候調用加味歸脾湯而全愈一婦人因怒肢體結核睡中發搐左矢弦洪余曰此為肝火血燥筋攣當清肝火養元氣遂用加味小柴胡湯加味逍遙散漸愈又用八珍湯加牡丹皮柴胡山梔鉤藤而愈一婦人肢體結核胸腹痞悶氣泄稍寬余謂此肝脾鬱滯不信服降火行氣化痰病愈甚而氣愈虛余用加味逍遙加味歸脾二藥間服半載而痊一婦人項間結核不時寒熱左目緊小頭項振掉四肢抽搐此肝火血虛風熱也用加味逍遙加鉤藤數劑諸症漸愈又用八珍湯調理而痊一婦人耳內耳後項側結核作痛寒熱口苦月經不調此肝膽經火而傷脾胃也用四君柴胡丹皮及六味地黃而愈一婦人因怒結核經行不止發熱晝安靜而夜譫語此血分有熱也用小柴胡加生地頓安其核尚大經候先期肝脈弦數此肝火血涸而筋攣也用加味逍遙加生地月經如期而核消一婦人項臂結核頭痛寒熱乳內時疼兩脅焮痛余以為肝脾鬱火而血燥先以加味逍遙散再用加味歸脾湯而愈一婦人素鬱怒患前症內熱晡熱久而不愈若面色萎黃則月經過期而少若面色赤則月經先期而多余曰面黃過期脾經虛弱也面赤先期脾虛火動也朝用補中益氣升舉脾土以益氣血夕用加味逍遙滋養肝血以息陰火復以歸脾湯解鬱結半載元氣復而痊又有患前症因脾虛下陷而發熱乃專治其瘡變瘵而歿一女子耳下結核焮痛寒熱此屬肝經風熱用梔子清肝散一劑諸症悉愈後因怒耳後並額兩角作痛寒熱此兼少陽經症仍以前藥加羌活二劑而瘥一婦人項患五核時常寒熱肝脈弦長而出寸口此血盛無耦之症也用小柴胡湯加生地烏梅治之而愈一婦人腹中結塊誤認血鱉服驅逐之藥下血甚多致肢節間結核治法見二十卷第十一論附方藥八珍湯治脾胃傷損惡寒發熱或煩躁作渴或因脾胃虧損膿水清稀久不能愈等症即四君四物二湯相合方見本卷第二論十全大補湯治瘡瘍胃氣虛弱腫痛不消或潰而不斂或自汗盜汗食少體倦或寒熱作渴頭痛眩暈或似中風又治氣血俱虛胸腹脅痛或作脹滿或骨節作痛經候不調或寒熱晡熱五心煩熱或吐血咽乾頭痛眩暈眼目昏澀或痰嗽喘促胸膈虛痞或嘔吐泄瀉手足冷熱即八珍湯加黃耆肉桂加味逍遙散治肝脾血虛有熱遍身瘙癢或口燥咽乾發熱盜汗食少嗜臥小便澀滯等症又治瘰癧流注虛熱等瘡甘草炙當歸炒芍藥酒炒茯苓白朮炒各一錢柴胡牡丹皮山梔炒五分上水煎服逍遙散即前方去丹皮山梔歸脾湯治脾經失血少寐發熱盜汗或思慮傷脾不能攝血以致妄行或健忘怔忡驚悸不寐或心脾傷痛嗜臥少食或憂思傷脾血虛發熱或肢體作痛大便不調或經候不準晡熱內熱或瘰癧流注不能消散潰斂人參白朮炒黃耆炒白茯苓龍眼肉當歸遠志酸棗仁炒各一錢木香甘草炙各五分上薑棗水煎服加味歸脾湯即前方加柴胡山梔柴術參苓湯治肝火血熱遍身瘙癢或起赤暈或筋攣結核白朮炒人參茯苓各一錢柴胡川芎山梔炒芍藥炒甘草炒各五分熟地自制當歸各八分上水煎服柴芍參苓散治肝膽經部分結核瘰癧瘤瘊等症或肝血燥熱脾氣虛弱發熱少食柴胡芍藥炒人參茯苓白朮炒山梔炒陳皮當歸各一錢牡丹皮甘草各五分上薑棗水煎服清肝益榮湯治肝膽經風熱血燥筋結核或作瘊子柴胡山梔炒各五分當歸川芎芍藥炒各一錢熟地黃自制白朮炒木瓜不犯鐵器茯苓各五分甘草三分薏苡仁五分龍膽草酒拌炒黑五分上水煎服清熱涼血飲治風熱血燥丹毒等症大便祕結當歸川芎大黃炒芍藥炒生地黃各一錢上水煎服神效開結散消癭塊甚效沉香木香各二錢橘紅四兩珍珠四十九粒入砂鍋內以鹽泥封固煅赤取出去火毒用豬靨肉子四十九枚用豚豬者生項間如棗子大上為末每服一錢臨臥酒調徐徐咽下患小者三五服大者一劑可愈切忌酸鹹油膩滯氣之物須用除日於靜室修合海藻散堅丸治肝經癭瘤海藻昆布各二兩小麥四兩醋煮曬乾柴胡二兩龍膽草酒拌炒焦一兩上為末煉蜜丸桐子大每服二三十丸臨臥白湯送下噙化咽之尤好凡患瘰癧服調治之藥未應宜佐以前二藥九味柴胡丸方見本卷第八論梔子清肝散柴胡清肝散二方見本卷第二論生地黃丸方見本卷第三論婦人流注方論第五婦人流注或因憂思鬱怒虧損肝脾或因産後勞役復傷氣血以致榮氣不從逆於肉裡腠理不密外邪客之或濕痰流注或跌撲血滯或産後惡露則氣流而注血注而凝或生於四肢關節或流於胸腹腰臀或結塊或漫腫皆屬虛損急用蔥尉及益氣養榮湯則未成者自消已成者自潰若腫起作痛起居如常飲食如故屬病氣有餘形氣未損者尚可治若漫腫微痛起居倦怠飲食少思屬形氣病氣俱不足最為難治不作膿或膿成不潰氣血虛也用八珍湯憎寒畏寒陽氣虛也十全大補湯晡熱內熱陰血虛也四物加參術作嘔欲嘔胃氣虛也六君加炮姜食少體倦脾氣虛也補中益氣加茯苓半夏四肢逆冷小便頻數命門火衰也八味丸小便頻數痰盛作渴腎水虧損也六味丸月經先期不日而止肝脾虛弱也月經過期多日不止肝脾虛熱也八珍湯加柴胡丹皮凡潰而寒凝瘡口不斂者用豆豉餅祛散之其潰而有膿管不斂者用針頭散腐化之若不補氣血不節飲食不慎起居不戒七情或用寒涼克伐者俱不治附治驗一婦人左臂患之年許不潰堅硬不痛脈弱少食月經過期日晡發熱勞怒則痛此形氣虛而逆於肉裡也與參耆歸朮川芎芍藥熟地貝母遠志香附桔梗丹皮甘草百餘貼而消一婦人因暴怒而腰腫一塊或胸膈不利或走氣作痛此榮氣鬱滯與方脈流氣飲數劑而止更以小柴胡對四物加香附貝母月餘而愈一婦人因怒脅下腫痛胸膈不利脈息沉滯此榮氣鬱遏而為腫用方脈流氣飲數劑少愈以小柴胡對二陳加青皮桔梗貝母數劑頓退更以小柴胡對四物二十餘劑而痊一婦人因閃肭肩腫遍身作痛用黑丸子二服而痛止又用方脈流氣飲二劑而腫消更以二陳對四物加香附枳殼桔梗而愈一婦人患此過勞必痛衆手按之痛乃止屬氣血俱虛用十全大補湯六味丸逍遙散而痊一婦人先肢體作痛後患流注發熱惡寒食少脅脹月經不調痰盛喘嗽五心煩熱健忘驚悸盜汗無寐悉屬肝脾虧損氣血不足用十全大補加味歸脾兼服諸症悉痊一婦人素頭暈患流注月經遲少此屬中氣虛弱用補中益氣湯而愈後因勞仆地月經如湧此勞傷火動用前湯加五味子一劑而愈一婦人患前症用行氣化痰等藥胸膈不利飲食少思用疏利之藥大便作泄中滿不食余以為脾胃復傷用補中益氣湯加煨姜脾胃健飲食進又用六君加芎歸百餘劑而愈一婦人素鬱結肩臂各腫如覆杯余以為肝脾虧損用加味逍遙散百餘劑元氣復而腫消後因勞役怒氣經行不止服涼血之劑其血如崩余以為此因脾氣復傷下陷而血從之朝用補中益氣湯夕用加味歸脾湯而愈一婦人懷抱鬱結不時心腹作痛寒熱倦怠服行氣化痰等劑遍身結核大小不一二十餘枚諸藥不應余用加味歸脾湯而愈一婦人腿患筋攣骨痛諸藥不應脈遲緊此肝脾氣血虛弱而寒氣之變也用大防風湯二劑頓退又二劑而安又一婦患之亦然先用前藥二劑更服黑丸子而痊此二患若不早治以致內潰必成敗症矣一婦人患前症潰後發熱余以為氣血俱虛彼不言乃服敗毒表散之藥果發大熱竟至不救夫潰瘍雖有表症發熱宜以托裡為主而佐以表散之劑況於瘰癧流注乎附方藥仙方活命飲治一切瘡瘍未成者即散已成者即潰又止痛消毒之良劑也白芷貝母防風赤芍藥當歸尾甘草節皂角刺炒穿山甲炙天花粉乳香沒藥各一錢金銀花陳皮各三錢上用酒一大碗煎五七沸服托裡消毒散治瘡疽元氣虛弱或行攻伐不能潰散服之未成即消已成即潰腐肉即去新肉即生人參黃耆鹽水拌炒當歸川芎芍藥炒白朮茯苓各一錢金銀花白芷各七分甘草五分上水煎服托裡散治瘡瘍因氣血俱虛不能起發或腐潰不能收斂及惡寒發熱者人參氣虛多用之黃耆炒各一錢白朮炒陳皮當歸熟地黃自制茯苓芍藥酒炒各一錢上水煎服益氣養榮湯治懷抱抑鬱瘰癧流注或四肢患腫肉色不變或日晡發熱或潰而不斂人參茯苓陳皮貝母香附當歸酒拌川芎黃耆鹽水拌炒熟地黃酒拌芍藥炒各一錢甘草炙桔梗炒各五分白朮炒二錢上姜水煎服木香餅治氣滯結腫閃肭風寒所傷作痛木香五錢生地黃一兩上木香為末地黃杵膏和勻量患處大小作餅置患處以熱尉之腫痛悉退二陳湯治中脘停痰飲食少思嘔逆等症陳皮去白茯苓半夏各一錢甘草炙五分水上煎服方脈流氣飲治惱怒胸膈脹滿或肢體作痛或結壅腫血氣無虧方見第三卷第七論等症隔蒜灸法治一切瘡毒大痛或不痛或麻木如痛者灸至不痛不痛者灸至痛其毒隨火而散用大蒜頭去皮切三分厚安瘡頭上用艾壯於蒜上灸之三壯換蒜復灸未成者即消已成者亦殺其大勢不能為害如瘡大用蒜搗爛攤患處將艾鋪上燒之蒜敗再換仍服托裡之劑如不痛或不作膿不起發者不治此氣血虛極也神效蔥尉法治虛怯人肢體患腫塊或不痛或作痛或風襲於經絡肢體疼痛或四肢筋攣骨痛又治流注跌撲傷損腫痛用蔥頭細切杵爛炒熱敷患處冷易之再尉腫痛即愈其效如神此外補陽氣而運散壅滯之法也豆豉餅治瘡瘍腫硬不潰或潰不斂並一切頑瘡惡瘡用江西豆豉為末唾津和作餅大如錢厚如三文置患處加艾壯於上灸之干則易之若背瘡大者用漱口水和餅覆患處鋪艾於上灸之如未成者則消已成者能殺其毒有不效者乃氣血虛也為不治大防風湯方見本卷第九論八珍湯方見本卷第三論十全大補湯方見本卷第四論六君子湯四物湯二方見本卷第六論補中益氣湯方見本卷第十論八味丸六味丸二方見本卷第十一論針頭散方見本卷第三論小柴胡湯方見本卷第二論黑丸子一名和血定補丸方見本卷第九論婦人血風瘡論第六婦人血風瘡因肝脾肺經風熱或鬱火血燥所致其外症或身發疙瘩瘙癢或如丹毒癢痛或搔破膿水淋漓其內症月經失常小便不調夜熱內熱自汗盜汗惡寒憎寒肢體倦怠飲食不甘寒熱往來若發熱作痛屬肝經風熱用當歸飲加柴胡山梔若寒熱作痛屑肝脾鬱火用小柴胡加山梔黃連若疙瘩瘙癢屬肺經風熱用清熱消風散若經候失常內熱晡熱屬肝脾血虛用加味逍遙散若肢體倦怠寒熱往來屬肝脾氣虛用加味四君子加柴胡丹皮若夜熱作渴或兼譫語乃血分有熱用小柴胡加生地黃血虛用四物合小柴胡若無寐盜汗內熱晡熱乃脾經血虛用歸脾湯兼寒熱加山梔若愈後身起白屑搔則肌膚如帛所隔此氣血虛不能榮於腠理用十全大補湯若用風藥以治其外則陰血復傷反致他症矣附治驗一婦人素清苦四肢患之誤服敗毒寒涼晡熱內熱自汗盜汗月經不行口乾咽燥余謂四肢者脾之所主當調養脾血其病自愈遂用歸脾湯數劑而愈一婦人性躁患之寒熱口苦脅痛耳鳴腹脹溺澀年餘矣此屬肝火傷脾用四君子加柴胡炒山梔炒龍膽數劑更與逍遙散兼服而瘡愈又與六味丸及逍遙散七十餘劑而愈一婦人日晡身癢月餘口乾又月餘成瘡服祛風治瘡之劑膿水淋漓午前畏寒午後發熱殊類風症余謂此肝火傷脾外邪所搏先用補中益氣加山梔鉤藤又以逍遙散加川芎貝母而愈一婦人瘙癢發熱日晡益甚皮膚赤暈月經過期此血虛而有熱也以逍遙散加熟地熱止癢退更以四物加柴胡參耆炙草茯苓調理遂愈一婦人懷抱久郁患前症膿水淋漓服連翹消毒散食少胸痞服清氣化痰湯作嘔吐痰服清熱化痰丸煩熱畏寒四肢焮熱面目赤色脈大而無力余以為脾胃虧損而虛寒隔陽氣於外遂用六君子湯加炮姜治之諸症稍愈飲食頓進又佐以四物湯諸症漸愈又以四君子每味各一錢四物湯每味各五分諸症全愈後因勞晡熱體倦懶食小腹痞墜小便澀滯自用四物黃柏知母晡熱尤甚更煩渴眩暈余以為脾氣下陷用補中益氣湯漸愈乃佐以逍遙散而安後月經至如崩前症復作此脾氣傷而不能統血血虛而陰火動也仍用補中益氣而痊一女子十二歲善怒遍身作癢用柴胡川芎山梔芍藥以清肝火以生地當歸黃芩以涼肝血以白朮茯苓甘草以健脾土而愈半年後遍身起赤痕眩暈此肝火熾甚血得熱妄行是夜果經至附方藥當歸飲治血熱癮疹癢痛膿水淋漓發熱等症當歸白芍藥川芎生地黃白蒺藜炒黃耆各一錢防風荊芥何首烏不見鐵器甘草各五分上水煎服四君子湯治胃氣虛弱或因克伐以致腫不消散潰不收斂者宜用此藥調補脾胃諸症自愈若誤用攻毒七惡隨至若飲食少思或食難化或欲作嘔或大便不實瘡口出血吐血便血尤宜用之凡氣血俱虛之症宜用前湯但加當歸則脾胃健飲食進陰血生若用四物沉陰則脾胃復傷反致他症若命門火衰而脾土虛寒者必用八味丸以補土母人參白朮茯苓各二錢甘草炙一錢上薑棗水煎服加味四君子湯即前方四君子加川芎當歸六君子湯治症同前即四君子湯加陳皮半夏各一錢若中氣虛寒假熱誤服寒涼克伐以致四肢發熱口乾舌燥嘔吐此因寒氣隔陽於外須更加薑桂不應急加附子四物湯治血虛或因失血或因克伐或因潰後以致晡熱內熱煩躁不安若脾虛不能生血者宜四君加當歸並酒炒白朮以補脾土其血自生若血虛發熱誤服寒涼克伐之劑以致發熱作渴目紅面赤脈洪大而虛此血脫煩躁急用當歸補血湯當歸酒拌一錢熟地黃三錢自制芍藥炒一錢川芎二錢上水煎服加味四湯即四物加柴胡牡丹皮山梔神效當歸膏治一切瘡瘍瘙癢疼痛去腐肉生新肉其效如神如洗拭換膏必須預備即貼之新肉畏風故也如用白蠟尤好此藥生肌止痛補血續筋故與新肉相宜當歸生地黃黃蠟各一兩麻油六兩上先將當歸地黃入油煎黑去渣入蠟熔化候冷攪勻即成膏矣如用白蠟減半滋陰腎氣丸方見六卷第三論小柴胡湯方見本卷第二論歸脾湯逍遙散二方見本卷第四論六味丸方見本卷第十一論補中益氣湯方見本卷第十論婦人赤白遊風方論第七婦人赤白遊風屬肝經怒火血燥生風或脾經鬱結血虛生熱或腠理不密風邪外襲其症或疙瘩瘙癢或膿水淋漓白屬氣而赤屬血因得風而遊行也若肝經血燥用柴胡清肝散肝經怒火用梔子清肝散肝經血熱用加味四物湯肝火血虛用六味地黃丸脾經鬱熱用加味歸脾湯肝脾血虛風熱用加味逍遙散若因風邪鬱熱所致用荊防敗毒散或專用祛風之劑肝血愈燥則血隨火化反為敗症矣附治驗一婦人素清苦因鬱怒患前症晡熱內熱自汗盜汗月經不行口乾咽燥余謂此鬱氣傷脾乃以歸脾湯數劑諸症稍退後兼逍遙散五十餘劑而愈一婦人患此性躁寒熱口苦脅痛耳鳴腹脹溺澀乃肝脾血虛火旺也用六君加柴胡山梔龍膽數劑更與逍遙散兼服漸愈又與六味丸逍遙散七十餘劑諸症悉退一婦人患前症誤服大麻風藥破而出水煩渴頭暈誠類風症六脈洪數心肝脾為甚余曰風自火出此因怒火脾胃受邪血燥而作非真風症也與逍遙散六味丸以清肝火滋脾土生腎水而愈一婦人患前症久不愈食少體倦此肝脾虧損陰虛發熱也先用補中益氣加川芎炒梔元氣漸復更以逍遙散而瘡漸愈一婦人身如丹毒搔破膿水淋漓熱渴頭暈日晡益甚用加味逍遙而愈一婦人患赤遊風晡熱癢甚余用清肝養血之劑不信乃服大麻風藥臂痛筋攣又服化痰順氣之劑四肢痿弱又一婦患前症數用風藥煎湯泡洗以致腹脹並歿一女子赤暈如霞作癢發熱用加味小柴胡加生地連翹丹皮而愈大凡女子天癸未至婦人月經不調受驚著惱多有此症附方藥消風散治風寒癮疹癢痛或膿水淋漓頭皮腫癢荊芥穗甘草炙陳皮人參茯苓白姜蠶炒防風芎藭藿香羌活蟬蛻各一錢厚朴薑製五分上水煎服大連翹飲治風熱熱毒或赤白遊風表裡皆受患者連翹瞿麥荊芥木香赤芍藥蟬蛻甘草防風柴胡滑石山梔炒黃芩炒當歸各一錢上水煎服當歸飲治風熱赤白遊風作癢或搔破膿水淋漓等症四物湯治赤白遊風血虛發熱或晡熱頭目不清或煩躁不寐或胸脅作痛等症六君子湯治脾氣虧損皮膚瘙癢或癮疹不消三方見本卷第六論加味小柴胡湯治肝膽經風熱怒火赤白遊風或寒熱往來晡熱潮熱身熱或口苦耳聾等症方見本卷第二論加味逍遙散治血虛有熱遍身瘙癢赤白遊風發熱晡熱等症逍遙散即前方去丹皮山梔歸脾湯治脾經血虛瘙癢發熱少寐盜汗等症三方見本卷第四論荊防敗毒散方見本卷第十論婦人𤵄痃方論第八一名便癰一名便毒俗名㾦子婦人𤵄痃或肝經濕熱下注或鬱怒傷損脾肝其外症或兩拗小腹腫痛或玉門焮腫作痛或寒熱往來憎寒壯熱其內症或小便澀滯或腹內急痛或小腹痞悶或上攻兩脅或晡熱重墜若兩拗小腹腫痛肝經濕熱壅滯也用龍膽瀉肝湯玉門腫脹肝火血虛也用加味逍遙散及龍膽瀉肝湯加木香若概投散血攻毒之劑則誤甚矣附治驗一婦人拗中赤腫脹痛此膿內作用托裡消毒散加柴胡數劑潰而膿清寒熱乃氣血復虛用托裡散而寒止用十全大補百餘劑而斂一婦人腹拗腫痛寒熱口苦或時帶下此肝經濕熱不利也用龍膽瀉肝湯而腫痛消用加味逍遙散而寒熱退一婦人腹拗腫痛小水不利或時胸乳作痛脅腹作脹此肝火氣滯用四物柴胡青皮玄胡索木香而愈一婦人拗中作痛小腹痞悶小便不利內熱體倦飲食少思此肝火內動脾胃受傷也用加歸味歸脾湯柴胡清肝散而安一婦人拗中腫脹小腹作痛服下血之劑其痛益甚更吐瀉少食余以為肝脾復傷用六君子湯加升麻柴胡而愈一婦人兩拗腫痛腹內一塊不時上攻月經不調小便不利余以為肝脾氣滯而血傷以四君加芎歸柴胡山梔而愈後因鬱怒前症復作兼胸滿腹脹盜汗此肝木甚而傷脾土也用加味歸脾湯下蘆薈丸而痊一婦人小腹內或作痛或痞悶兩拗腫痛內熱寒熱胸膈不利飲食不甘形體日瘦此肝氣滯而脾氣傷也朝用補中益氣湯夕用蘆薈丸漸愈更用六味地黃丸全愈一婦人兩拗腫痛小腹痞脹白帶時下寒熱往來小水淋瀝余作肝氣滯而血病用龍膽瀉肝湯漸愈又用加味逍遙散六味地黃丸全愈一婦人患前症胸脅脹悶或小水利或時腹痛此肝火氣病先用龍膽瀉肝湯以清肝熱又用加味逍遙散以生肝血六味地黃丸以滋腎水而愈一婦人患前症余以為肝脾鬱怒不信另服化痰利氣之劑胸腹愈脹又服峻利疏導之劑變脾虛發腫而歿一婦人患前症內熱作渴飲食不甘肢體倦怠陰中作梗小便赤澀此脾經鬱結肝經濕熱用加味歸脾湯而愈後因怒復作小腹脹痛用小柴胡加山梔芎歸痛止又用加味逍遙散而愈一婦人兩拗作痛寒熱內熱小便赤澀胸脅不利此肝火動而脾氣傷也用補中益氣湯加茯苓數劑少愈又與加味歸脾湯諸症悉退再用加味逍遙散而愈一婦人小腹痞悶溺澀內熱體倦懶食此肝火動而脾血傷也用八珍加柴胡山梔膽草而安一婦人陰中如梗兩拗腫痛寒熱不食小便頻數小腹重墜余以為肝脾鬱怒所致先以補中益氣加茯苓山梔車前子青皮以清肝火升脾氣更以加味歸脾湯調理脾鬱而愈附方藥龍膽瀉肝湯治肝經濕熱兩拗腫痛或腹中疼痛或小便澀滯等症龍膽草酒拌炒黃澤瀉各一錢車前子炒木通生地黃酒拌當歸酒拌山梔炒黃芩炒甘草各五分上水煎服九味柴胡湯治肝經濕熱下注便毒腫痛或小腹脅肋結核凡肝膽經部分一切瘡瘍或風熱結核瘰癧柴胡黃芩炒各一錢人參山梔炒半夏龍膽草炒焦當歸芍藥炒甘草各五分上水煎服蘆薈丸治肝氣不和克侮脾胃而患諸症或三焦肝膽經風熱目生雲翳或疳熱瘰癧耳內生瘡寒熱作痛肌體消瘦發熱作渴飲食少思肚腹不調或牙齦蝕落頰腮腐爛下部生瘡等症蘆薈五錢胡黃連當歸芍藥炒龍膽草酒浸炒焦川芎蕪荑各一兩木香甘草炒各二錢上為末用米糊丸麻子大每服五十丸滾湯下加味小柴胡湯小柴胡湯治肝經下部腫脹小便不利或寒熱往來或晡熱潮熱或胸脅作痛二方見本卷第三論加味逍遙散治肝脾血虛濕熱流注下部諸症發熱晡熱寒熱加味歸脾湯治脾肝鬱怒下部諸症寒熱晡熱少食無寐或經候不調二方見本卷第四論補中益氣湯治元氣下陷下部重墜或晡熱寒熱少食體倦或因過服寒涼之藥所致方見本卷第十論加味四物湯方見本卷第六論八珍湯治氣虛寒熱晡熱或寒熱往來下部諸症方見本卷第三論婦人鶴膝風方論第九婦人鶴膝風症因胎産經行失調或鬱怒虧損脾肝而為外邪所傷或先腿腳牽痛或先肢體筋攣既而膝漸大腿漸細如鶴之膝故名之也若腫高赤痛者易治漫腫不赤痛者難治二三月潰而膿稠者易治半載後潰而膿清者難治設用攻伐已損元氣尤為難治也大要當固元氣為主而佐以大防風湯若食少體倦者六君子湯為主晡熱內熱者逍遙散為主寒熱往來者八珍湯為主發熱惡寒者十全大補湯為主少寐驚悸者歸脾湯為主月經過期者補中益氣為主月經先期者加味逍遙散為主凡潰後當大補脾胃若膿出反痛或寒熱煩渴等症皆屬氣血虧損一於培補庶保終吉附治驗一婦人久鬱怒胸脅不利內熱寒熱經候不調遍身痠痛余謂胃氣虧損先用補中益氣加半夏茯苓二十餘劑胃氣漸醒又用大防風湯與歸脾湯膝腫漸消用加味逍遙散大防風湯而全消又用八珍湯加牡丹皮調理氣血而安一婦人患前症腫痛寒熱先用大防風湯一劑又用加味逍遙散四劑月餘腫痛漸退惑於速效另服祛風敗毒虛症蜂起仍大防風為主佐以十全大補而消又服大補湯兩月餘而痊一婦人患前症兩拗中腿股筋牽作痛內熱寒熱此肝火氣滯之症先用加味小柴胡湯四劑後以加味逍遙散為主佐以大防風湯而消又患痢後兩膝腫痛寒熱往來用十全大補湯為主佐以大防風湯而仍消一婦人患之雖潰而腫不消朝寒暮熱飲食不思經水三四月一至此屬肝脾氣血俱虛也用補中益氣加味歸脾二湯各三十餘劑腫漸消而寒熱止又佐以大防風月餘而能步履再月餘經行如期又服六味丸八珍湯三月而愈附方藥大防風湯治陰虛邪襲腿膝腫痛等症防風附子炮牛膝酒浸白朮炒羌活人參各一錢川芎各一錢五分肉桂一錢黃耆炒一錢芍藥炒杜仲去皮薑汁拌炒甘草炙各五分熟地黃自制一錢五分上水煎服黑丸子一名和血定痛丸治跌撲墜墮筋骨疼痛或瘀血壅促或外感風寒肢體作痛若流注膝風初結服之自消若潰而膿清與補氣血藥自斂孕婦勿服百草霜白芍藥各一錢南星川烏各炮三錢白蘞赤小豆各一兩六錢白及當歸骨碎補焙各八錢牛膝焙六錢上為末酒糊丸桐子大每服三十丸鹽湯溫酒任下聖愈湯治血虛心煩睡臥不寧或五心煩熱地黃酒拌蒸半日生地黃酒拌黃耆炙人參川芎當歸各一錢上水煎服六味丸方見本卷第十論逍遙散加味逍遙散八珍湯十全大補湯歸脾湯五方見本卷第四論補中益氣湯方見本卷第十論四物湯六君子湯二方見本卷第六論婦人下注臁瘡方論第十婦人兩臁生瘡或因胎産飲食失宜傷損脾胃或因憂思鬱怒虧損肝脾以致濕熱下注外邪所搏外臁屬足三陽可治內臁屬足三陰難治若初起發腫赤痛屬濕熱所乘用人參敗毒散或檳蘇敗毒散若漫腫作痛或不腫不痛屬脾虛濕熱下注補中益氣湯氣血俱虛八珍湯若膿水淋漓體倦少食內熱口乾屬脾氣虛弱補中益氣加茯苓酒炒芍藥若午後頭目不清屬脾虛陰火用前湯加熟地芍藥若午後發熱倦怠屬氣虛血弱用前湯加川芎熟地若懷抱鬱怒屬脾氣不舒用歸脾湯加川芎山梔若內熱體倦痰涎口瘡屬脾腎虛熱用六味丸若肢體畏寒飲食少思屬脾腎虛寒用八味丸大抵色赤屬濕熱易治色黯屬虛寒難治設誤用攻伐復傷胃氣多變瘵症附治驗一婦人兩臁生瘡漸至遍身發熱吐痰口燥咽乾盜汗心煩足熱小便赤澀日晡益甚此腎足三陰虛火也用加味逍遙散六味丸而愈一婦人患前症四畔微赤作痛重墜膿水淋漓胸膈不利飲食少思內熱口苦夜間少寐此鬱結傷脾血也用歸脾湯解鬱結生脾血用補中益氣加茯苓半夏補脾氣除濕熱尋愈一婦人久不愈色赤微熱日晡焮腫形體虛弱飲食少思勞則喘渴惡寒發熱此為脾虛下陷用補中益氣湯而愈一婦人患已三年色黯腫硬惡寒發熱飲食少思形體消瘦作渴飲湯飲食稍多或腹脹或泄瀉或作嘔或作酸此脾氣虛寒也用補中益氣加乾薑五分五十餘劑而愈一婦人患此因步履勞復惡寒發熱倦怠懶食而瘡出血此元氣虛而不能攝血歸經也用補中益氣湯而愈一婦人患之因怒寒熱頭眩或耳項腦脅脹痛或小腹陰道悶墜或小便頻數下血此屬肝火血熱先用小柴胡加炒黑山梔芎歸車前二劑諸症悉退又用加味逍遙而愈後因飲食勞倦前症復作瘡口出血用補中益氣湯而安一婦人患將兩月焮腫赤痛小便頻數飲食如常此濕毒甚而氣血虛先用活命飲二劑去其濕毒又用八珍湯調補氣血而愈一婦人患此焮痛惡寒發熱此濕熱乘於足三陽經分用檳蘇敗毒散而寒熱退用仙方活命飲而焮痛止再用補中益氣湯而形氣健附方藥人參敗毒散治瘡瘍焮痛寒熱或拘急頭痛人參羌活獨活前胡柴胡桔梗枳殼麩炒茯苓川芎甘草各一錢水上煎服檳蘇敗毒散即人參敗毒散加檳榔紫蘇補中益氣湯治元氣虛損或因克伐惡寒發熱倦怠少食或不能消散生肌或兼飲食勞倦煩熱作渴黃耆炒人參白朮炒甘草炙當歸各一錢陳皮五分柴胡升麻各三分上薑棗煎空心午前服烏沉湯生氣血補心腎上損者服之其效勝大建中湯人參當歸白朮炒各二兩烏藥肉桂去皮半兩沉香各半兩附子炮去皮尖各一兩上為末每服三錢薑棗水煎空心服金鎖正元丹治真氣不足四肢怠惰腳膝痠疼目暗耳鳴自汗盜汗一切虛損之症五倍子一兩紫巴戟去心四兩補骨脂酒浸炒二兩半硃砂七錢另研肉蓯蓉焙四兩胡蘆巴炒四兩茯苓去皮二兩龍骨一兩煅上為末酒糊丸桐子大每服二十丸空心溫酒或鹽湯下平補鎮心丹治心血不足時或心忡驚悸夢如高墜常服安心腎益榮衛硃砂細研半兩為衣人參五錢龍齒一兩五錢白茯苓五味子炒車前子炒茯神麥門冬去心杵膏肉桂各一兩二錢半遠志去心甘草制天門冬去心杵膏山藥制各一兩五錢酸棗仁去皮尖二錢半熟地黃酒蒸五錢杵膏上為末蜜丸桐子大每服三十丸空心溫酒下威喜丸治小便白濁黃蠟四兩白茯苓四兩一塊同豬苓一兩於磁器內煮二十沸取出曬乾不用豬苓上以茯苓為末熔蠟丸彈子大每服一丸空心細嚼津液咽下小便清利為度忌食米醋小柴胡湯方見本卷第八論加味逍遙散八珍湯歸脾湯三方見本卷第四論仙方活命散方見本卷第五論六味丸八味丸二方見本卷第十一論婦人足跟瘡腫方論第十一婦人足跟足指腫痛足心發熱者皆因胎産經行失於調攝虧損足三陰虛熱所致若腫痛或出膿用六味丸為主佐以八珍湯胃虛懶食佐以六君子湯寒熱內熱佐以逍遙散晡熱益甚頭目不清佐以補中益氣湯痰盛作渴或口舌生瘡亦用前二藥以滋化源大凡發熱晡熱內熱自汗盜汗等症皆陰虛假熱也故丹溪謂火起九泉陰虛之極也蓋足跟乃督脈發源之所腎經所過之地若不求其屬而泛用寒涼則誤甚矣然俗謂為兔齧瘡者蓋獵人被兔咬足跟久而不斂氣血瀝盡其人必死男子酒色過度者多患此症附治驗一婦人素血虛因大勞兩足發熱哺熱月經過期或用四物芩連飲食少思胸痞吐痰用二陳枳實黃連大便不實吐痰無度足跟作痛余曰足熱晡熱月經過期肝脾血虛也胸痞吐痰飲食少思脾胃氣虛也蓋胃為五臟之根本胃氣一虛諸病悉至先用補中益氣加茯苓半夏脾胃漸健乃佐以六味丸補脾腎不兩月而痊一婦人經候不調發熱晡熱胸膈不利飲食少思服清熱寬中消導之劑前症益甚更兼肢體痠痛服除濕化痰等藥經候兩三月一至服通經降火之劑足跟足指作痛其熱如炙余以為足三陰虧損用補中益氣六味地黃兩月諸症漸退又用前湯並八珍湯兩月而康一婦人足跟患腫兩腿痠軟或赤或白或痛或癢後或如無皮或如皺裂日晡至夜脹痛焮熱此屬足三陰虛損用加減八味丸及逍遙散加熟地川芎百餘劑而愈一婦人勞則足跟熱痛余作陰血虛用八珍而痊後遍身瘙癢服風藥發熱抽搐肝脈洪數此肝家血虛火盛而生風以天竺膽星為丸用四物麥門五味芩連炙草山梔柴胡煎送而愈一婦人兩足發熱足跟作痛日晡熱甚余謂腎肝血虛用逍遙散八味丸五十餘劑諸症悉愈附方藥當歸補血湯治脾胃損傷或因服峻劑致血氣俱虛發渴引飲目赤面紅晝夜不息其脈大而虛重按全無若誤服白虎湯必死黃耆炙一兩當歸二錢酒製上水煎服六味丸一名六味地黃丸此壯水制火之劑夫人之生以腎為主人之病多由腎虛而致者此方乃天一生水之劑無不可用若腎虛發熱作渴小便淋祕痰壅失喑咳嗽吐血頭目眩暈眼花耳聾咽喉燥痛口舌瘡裂齒不堅固腰腿痿軟五臟虧損自汗盜汗便血諸血凡肝經不足之症尤當用之蓋水能生木故也此水泛為痰之聖藥血虛發熱之神劑又治肝腎精血不足虛熱不能起床即八味丸去附子肉桂八味丸治命門火衰不能生土以致脾胃虛寒而患流注鶴膝等症不能消潰收斂或飲食少思或食而不化或臍腹疼痛夜多漩溺經云益火之源以消陰翳即此方也熟地黃自制八兩山茱萸肉山藥各四兩茯苓牡丹皮澤瀉各三兩肉桂用三分厚者去皮取肉分許方能補腎引虛火歸源附子用一兩五錢重者切四塊用童便浸數日火煨切看無白星為度上為末蜜丸桐子大每服七八十丸滾湯下六君子湯方見本卷第六論補中益氣湯方見本卷第十論八珍湯逍遙散二方見本卷第四論婦人肺癰方論第十二仍參外科樞要婦人肺癰因外邪內蘊或七情鬱火誤行汗下重亡津液以致肺氣受傷而惡風咳嗽鼻塞項強胸脅脹滿呼吸不利吐痰臭濁膿血腥穢若咳嗽喘急寒邪在表也小青龍湯咳嗽胸脹寒邪內壅也葶藶大棗瀉肺湯脅脹咳唾腥臭膿已成也桔梗湯咳喘短氣或小便短少肺氣虛也佐以參耆補肺湯體倦少食或喘嗽短氣脾肺虛也佐以參朮補脾湯作渴飲冷午前嗽甚胃火盛也竹葉石膏湯作渴內熱午後嗽甚陰血虛也六味丸四物湯口乾飲湯體倦少食胃氣虛也補中益氣湯加五味麥門口乾內熱咳唾痰涎腎水虛也六味丸益氣湯黃昏熱或嗽甚陰火熾也六味丸四物湯加五味麥門五更嗽或痰甚脾肺虛也六君子湯嗽而不得眠及兩脅痛肝火血虛也六味丸益氣湯大凡前症因外淫所侵當祛邪而實土因心火太過當伐木而補金若肺氣虛弱當補脾土而生肺金若陰火上炎當補脾肺以滋腎水然而發熱喘嗽咳唾膿血飲食不入皆脾土不能生肺金肺金不能生腎水之敗症苟能純補脾土而生諸臟多有復生者若用寒涼脾胃復傷則肺金失養腎水益涸虛火上炎熏蒸於肺吾未見其能生之者其唾膿血脈浮大面色赤者俱難治若陰火妄動或勞嗽吐膿血者尤難治若膿自止脈浮短澀及始萌者易治附治驗一婦人素血虛發熱咳嗽服痰火之劑後吐膿血面赤脈數其勢甚危此膿成而氣血虛也余用八珍湯補元氣桔梗湯治肺癰而愈一婦人感冒風寒或用發表之劑反咳嗽喘急飲食少思胸膈不利大便不通右寸關脈浮數欲用疏通之劑余曰此因脾土虧損不能生肺金若更利之復耗津液必患肺癰矣不信仍利之虛症悉至後果吐膿余朝用益氣湯夕用桔梗湯各數劑吐膿漸止又朝仍用前湯夕用十全大補湯各五十劑喜其善調理獲愈一婦人咳嗽吐痰胸膈作痛右寸關浮滑項下牽強此脾胃積熱之痰非癰患也以二陳山梔白朮桔梗治之而痊一婦人素血虛內熱時咳甲辰孟冬兩尺浮洪以脾胃不健請治余曰當防患肺症丙午孟春果咳嗽左右寸脈洪數肺癰也膿已成左寸脈仍洪數乃心火克肺金夏令可憂余用壯水健脾之劑稍愈彼遽自忽不事調攝果歿於夏令附方藥青龍湯治肺經受風寒咳嗽喘急半夏湯泡乾薑細辛麻黃去節肉桂芍藥甘草炙各一錢五味子五分附子炮五分上水煎服葶藶大棗瀉肺湯治肺癰胸膈脹滿上氣喘急或身面浮腫鼻塞聲重用葶藶炒黃研末每服三錢先用棗十枚水煎去棗入藥再煎食後服桔梗湯治肺癰咳而胸膈隱痛兩胠腫滿咽乾口燥煩悶作渴濁唾腥臭桔梗炒貝母去心當歸酒拌瓜蔞仁枳殼麩炒薏苡仁微炒桑白皮炒甘草節防己去皮各一錢黃耆鹽水拌炒百合蒸各一錢半五味子杵炒甜葶藶炒地骨皮知母炒杏仁各五發上姜水煎服人參補肺湯治肺癰腎水不足虛火上炎咳唾膿血發熱作渴小便不調人參黃耆炒白朮茯苓陳皮當歸各一錢山茱萸去核山藥各二錢五味子杵麥門冬甘草炙各七分熟地黃自制一錢五分牡丹皮一錢上姜水煎服參耆補脾湯治肺症因脾氣虛弱咳唾膿涎中滿不食宜兼服此藥以補脾土生肺金人參白朮各二錢黃耆炙二錢五分茯苓當歸陳皮各一錢升麻三分五味子四分杵炙甘草五分上姜水煎服人參平肺散治心火克肺金患肺痿咳嗽喘嘔痰涎壅盛胸膈痞滿咽嗌不利人參青皮茯苓天門冬陳皮地骨皮各一錢甘草炙五分知母五味子十粒杵桑白皮炒一錢上姜水煎服竹葉石膏湯治胃火盛而作渴者淡竹葉石膏煅桔梗炒木通薄荷甘草各一錢上姜水煎服竹葉黃耆湯治癰疽氣血虛胃火盛而作渴淡竹葉二錢黃耆炒麥門冬去心當歸川芎甘草炒芍藥炒人參半夏石膏煅生地黃各一錢上水煎服二陳湯方見本卷第五論六味丸方見本卷第十一論補中益氣湯方見本卷第十論四物湯六君子湯二方見本卷第六論十全大補湯八珍湯二方見本卷第四論婦人腸癰方論第十三婦人腸癰因經行産後瘀血或七情飲食所致其症小便如淋發熱惡風身皮甲錯腹皮腫急按之軟如腫狀或腹脹大轉側有水聲或繞臍生瘡或大便出膿其脈遲緊者膿未成用活命飲以解其毒脈滑數者膿已成用雲母膏以下其膿若二年間遍身微腫大腸與臍出膿此息積之症也多致不救內經云腸癰為病不可驚驚則腸斷而死其坐臥轉側宜徐緩時嘗少飲薄粥靜養調理庶可保生附治驗一婦人小腹腫痛小便如淋此毒結於內用神效瓜蔞散二劑少愈又薏苡仁湯二劑乃痊一婦人小腹痛而有塊脈芤而澀此瘀血為患以四物加玄胡索紅花桃仁牛膝木香二劑血下而愈一婦人小腹脹痛大便祕澀轉側有水聲脈洪數以梅仁湯一劑頓下諸血諸症頓退以薏苡仁湯二劑而瘥一婦人小腹脹痛小便不利脈滑數此膿已成也服太乙膏五錢膿下甚多脹痛頓退以瓜蔞散蠟礬丸托裡藥而安一婦人因經水多服藥止之致腹作痛以失笑散二服而廖又用加味逍遙散數劑而經調一産婦惡露停滯小腹作痛服瓜仁湯下瘀血而痊凡瘀血停滯急宜行之緩則腐化為膿最為難治若流注關節則患骨疽多為敗症附方藥瓜子仁湯治産後惡露未盡經行瘀血停滯小腹作痛或成癰患薏苡仁四兩牡丹皮桃仁去皮尖瓜蔞仁各一兩上每服五七錢水煎敗醬散治脈數身無熱腹無積聚按之軟濡此為腸癰久積陰冷所成薏苡仁二兩半附子炮半兩敗醬草一兩三錢五分上每服四錢水煎以小便利度牡丹湯治腸癰腹軟而痛時下膿血牡丹皮人參天麻白茯苓黃耆炒薏苡仁桃仁去皮尖白芷當歸酒炒川芎各一錢官桂甘草炙各五分木香三分上水煎服大黃湯治腸癰小腹堅腫按之則痛肉色如故或焮赤微腫小便頻數汗出憎寒脈遲緊未成膿者宜服之大黃炒朴硝各一錢牡丹皮瓜蔞仁炒桃仁去皮尖各二錢上水煎報梅仁湯治腸癰壅痛大便祕結梅仁九個去皮尖大黃炒牡丹皮芒硝各一錢冬瓜仁研三錢犀角鎊末一錢上水煎入犀角末服神仙太乙膏治一切癰疽不問膿之成否並宜貼之更作丸服玄參白芷當歸肉桂大黃赤芍藥生地黃各一兩淨黃丹十二兩上用麻油二斤入銅鍋內煎黑濾去渣入黃丹十二兩再煎滴水中捻軟硬得中即成膏矣如軟更加丹雲母膏固故卒難修合太乙膏亦可神效黃礬丸最解毒止痛白礬末一兩明亮者黃蠟半兩黃色者熔開一方用七錢上衆手丸桐子大每服三十丸滾湯下如服金石發疽更用白礬末一兩作三五服以溫酒調下若遍身生瘡如蛇頭服之尤效此藥能解毒氣內攻也須多服方驗亦治蛇咬溶化乘熱滴傷處毒即出痛即止仍服兩許失笑散治産後心腹絞痛或血迷心竅不知人事及尋常腹內瘀血積血作痛五靈脂去砂土炒蒲黃炒各等分上為末每服一二錢溫酒調下活命飲方見本卷第五論神效瓜蔞散方見本卷第十四論四物湯方見本卷第六論加味逍遙散方見本卷第四論婦人乳癰乳岩方論第十四經云乳頭屬足厥陰肝經乳房屬足陽明胃經若乳房忽壅腫痛結核色赤數日之外焮痛脹潰稠膿湧出膿盡而愈此屬肝胃熱毒氣血壅滯名曰乳癰為易治若初起內結小核或如鱉棋子不赤不痛積之歲月漸大巉巖崩破如熟榴或內潰深洞血水滴瀝此屬肝脾鬱怒氣血虧損名曰乳岩為難療治法焮痛寒熱宜發表散邪腫焮痛甚宜疏肝清胃或不作膿膿成不潰宜用托裡或肌肉不生膿水清稀宜補脾胃或膿出反痛惡寒發熱宜補氣血或腫焮作痛晡熱內熱宜補陰血或飲食少思時作嘔吐宜補胃氣或飲食難化泄瀉腹痛宜補脾氣或勞碌腫痛宜補氣血怒氣痛腫宜養肝血慎不可用克伐之劑復傷脾胃也乳岩初患用益氣養榮湯加味逍遙加味歸脾可以內消若用行氣破血之劑則速其亡附治驗一婦人內熱脅脹兩乳不時作痛口內不時辛辣若臥而起急則臍下牽痛此帶脈為患也用小柴胡加青皮黃連山梔二劑而瘥一婦人因怒兩乳腫兼頭痛寒熱此肝經氣症也用人參敗毒散二劑表症已退用小柴胡加芎歸枳殼桔梗四劑而愈一婦人久郁右乳內腫硬此肝經血症也用八珍加遠志貝母柴胡青皮及隔蒜灸兼神效瓜蔞散兩月餘而痊一婦人先熱渴至夜尤甚後兩乳忽腫肝脈洪數乃熱入血分用加味小柴胡湯而愈一婦人因怒左乳作痛發熱因表散太過腫熱殊甚用益氣養榮湯數劑熱止膿成因不即針益腫脹熱渴針之膿大泄仍服前湯月餘而愈一婦人因怒左乳作痛胸膈不利此屬肝脾氣滯以方脈流氣飲加木香青皮四劑而安一婦人膿清腫硬面黃少食內熱晡熱自汗盜汗月經不行此肝脾氣血俱虛也用十全大補加遠志貝母及補中益氣各三十餘劑外用蔥尉法而消一婦人膿成脹痛余欲針之不從至數日針出敗膿三四碗許虛症蜂起幾至危殆用大補之劑兩月餘始愈一婦人素弱多郁患時疫後脾胃愈虛飲食愈少因怒右乳脅紅腫應內作痛或用炒麩皮尉之內痛益甚服加減四物湯腫勢愈大胸脅背心相引而痛余謂病後脾弱怒復傷肝用八珍加陳皮黃耆柴胡山梔白芷八劑稍愈去白芷加青皮木香桔梗又六劑而安一婦人左乳內腫如桃不痛不赤發熱漸瘦此肝脾鬱怒也用八珍加香附遠志青皮柴胡百餘劑又兼神效瓜蔞散三十餘劑膿潰而愈一婦人久郁左乳內結核如杏三月不消心脈澀脾脈大按之無力此肝脾氣血虧損以八珍加貝母遠志香附柴胡青皮桔梗五十餘劑而消一婦人稟實性躁懷抱久郁左乳內結一核按之微痛此皆氣血鬱滯以連翹飲十餘劑少退更以八珍加青皮香附桔梗貝母二十餘劑而消已上皆乳癰一婦人右乳內結三核年餘不消朝寒暮熱飲食不甘此肝脾氣血虧損內服益氣養榮湯外以木香餅尉之年餘血氣復而消一婦人乳內結核年餘晡熱少食余謂此血氣不足欲用益氣養榮湯彼反服行氣之劑潰出清膿而歿又一婦乳內結核如栗亦服前藥大如覆碗堅硬如石出血水而歿已上皆乳岩附方藥神效瓜蔞散治乳癰及一切癰疽初起腫痛即消膿成即清膿出即愈瓜蔞一個爛研生粉草當歸酒洗各半兩乳香沒藥各一錢上用酒煎服良久再服若肝經血虛結核久而不消佐以四物柴胡升麻白朮茯苓甘草若肝脾氣血虛弱佐以四君芎歸柴胡升麻若憂鬱傷脾氣血虧損佐以歸脾湯玉露散治産後乳脈不行或身體壯熱頭目昏痛大便澀滯等症人參白茯苓桔梗炒川芎白芷當歸芍藥各一錢甘草五分上水煎服即肩髃肘髎此穴治瘰癧之祕法蓋瘰癧屬肝膽二經故患耳前後項腋之間男子多因恚怒虧損肝經之血陰火內作或不慎起居耗損筋脈不能生肝血婦人多因恚怒傷肝火動血燥或鬱結傷脾火動血耗或患於胸乳間亦屬於前經此症若因恚怒傷肝氣血壅遏不愈者宜灸此穴疏通經絡若因久於鬱怒元氣虧損而不愈當審其所屬而調補化源如取其穴當以指甲掐兩肘兩肩四所患處覺痠麻方是其穴男子治驗見外科樞要婦人見校注婦人良方小兒見保嬰撮要
