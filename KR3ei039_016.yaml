body:
  text: 卷十六坐月門妊娠疾病既明須知坐月避忌故以次之産寶方周頲序第一頲聞至靈者人最重者命人皆知命之重而不知養命之方以至年未衰邁疾病攻奪倉卒尋醫多致有誤況婦人病惟産難為急子母命懸片時故産二三胎者臟腑未衰血氣未減疾病易治若産育過多復自乳子血氣已傷尤難治若産後血氣未復胃氣益傷諸症蜂起此古人所以專治産乳方論余故編採産寶等方兼拾咱氏之遺作為論説粹為一編刊行於世以救危急云時丁巳歲秋八月吉日周頲謹序將護孕婦論第二凡妊娠至臨月當安神定慮時常步履不可多睡飽食過飲酒醴雜藥宜先貼産圖依位密鋪床帳預請老練穩婆備辨湯藥器物逮産時不可多人喧鬨愴惶但用老婦二人扶行及憑物站立若見漿水腰腹痛甚是胎離其經令産母仰臥令兒轉身頭向産門用藥催生坐草若心煩用水調服白蜜一匙覺飢吃糜粥少許勿令飢渴恐乏其力不可強服催藥早於坐草慎之愚按前論當慎守之此先哲好生之德防患於未萌者也仁哉滑胎例第三凡妊娠十月宜用滑胎湯滑胎枳殼散令胎瘦産易湖陽公主每産纍日不下南山道人進此方商州枳殼麩炒二兩粉草炒一兩上為末每服二錢空心沸湯調日三服凡孕六七月宜服之溫隱居加當歸廣木香各等分易産兼治諸疾下氣寬膈枳殼麩炒五兩甘草一兩半香附子三兩炒去毛上為末每服二錢用白湯調服內補丸治妊娠婦衝任脈虛補血安胎熟地黃二兩用生地酒拌蒸熟杵膏當歸一兩炒為末上為末和丸桐子大每服三四十丸溫酒或滾湯下許學士云大率妊娠唯在抑陽助陰然胎前藥唯惡群隊陰陽錯雜別生他病唯枳殼散所以抑陽四物湯所以助陰爾然枳殼散其味多寒若單服恐致胎寒腹痛更以內補丸佐之則陽不致強陰不致弱陰陽調和有益胎嗣此前人未嘗論及也易産滑胎車前子為末或酒或飲服寸匙詩云芣苡能令婦人樂有子矣陸機注云治婦人産難愚詳孔子序詩云樂然而生易於生育即此謂也神寢丸臨月服之神效蘄州施少卿方蘄州徐大丞傳枳殼麩炒一兩通明乳香半兩另研上為末煉蜜丸梧子大每服三十丸空心溫酒下榆白皮散治妊娠滑胎易生榆白皮甘草各二兩葵子一兩上為末每服五錢水煎孕及九月將産豬肚一具煮爛徐徐自食盡易生保氣散治寬氣進食瘦胎易産或居處失宜頓僕胎動若胎痛胎漏兼服佛手散見通用方香附四兩山藥二兩砂仁一兩木香四兩粉草一兩益智紫蘇葉各半兩上為末每服二錢白湯調下神寢丸枳殼散見前此三藥入月宜常服保産無憂散治妊婦身居安逸口厭甘肥憂樂不常食物不節致胞胎肥厚根蒂堅牢入月服之則易生矣當歸川芎白芍藥枳殼麩炒乳香各三錢木香甘草血餘即發灰以獖豬心血和之各一錢半上為末每三錢水煎日二服神效月空方位例第四出太平聖惠方外臺祕要同正月三月五月七月九月十一月在丙壬二月四月六月八月十月十二月在甲庚逐月安産藏衣忌向方位第五凡安産藏衣方位並於臥閣內分布太平聖惠方云凡妊婦初入月便寫産圖一本以朱書某月某日空貼在某位如正月在丙壬可於壬位安産婦床帳丙位藏衣之類貼産房北壁若值閏月只看節氣用之又云每月産圖有雷公招搖運鬼力士天狗軒轅大時咸池豐隆吳時白虎大夫天候狂虎凡此十三神並從月建易其位所謂月空者按內經云月廓空無寫王冰注云論月輪中空日也即非十三神之數今太平聖惠方以六陽月在丙壬以六陰月在甲庚正如外臺所言正月在丙壬至十二月在甲庚之類其理一也但外臺言之詳聖惠言之簡今人多從其簡或云凡逐月安産藏衣並向月德月空方位所有十三神殺並從節氣更換若交次月節便作次月用書産圖者非也假如正月十四日立春若妊婦十三日乳臥豈可作去年十二月用必依月分用之乃是若依節氣更換則天德月德所在差矣然月空與任謂之中天空頗相類議者以為天空者非十三神之數蓋課中有天乙貴人其位無可與對者故此空是謂天空值此神百事不宜止宜安産床帳藏衣之類耳集聖歷云天德正月在丁二月在坤三月在壬四月在辛五月在乾六月在甲七月在癸八月在良九月在丙十月在乙十一月在巽十二月在庚又堪輿歷有遊年白虎殺神在太歲後一辰如太歲卯則白虎在寅余仿此推之若産及藏衣犯之則子母皆不利王子亨云難産逆生論稱犯一切神殺固有是理然亦有自然難産兒自然逆生者及有産腸俱下者産已則復如故此非疾病所致氣血所主天下之理蓋有不可窮詰者亦宜知之推婦人行年法第六生氣方産婦宜向之坐臥及産帳向之開門大吉反支方遇此日即鋪灰土用牛皮或馬驢皮訖鋪草勿令惡血汙地吉禍害月不得於其上産又不得向之二便避之大吉絶命方不得於其上産又不得向之大小便避之吉懸尸日遇此日産不得攀繩宜懸馬轡攀之大吉閉肚方臨月至滿月並不得向之大小便及棄不淨之水謹之吉八莊方産帳不得向之開門忌之大吉生反禍絶懸閉八産宜宜氣支害命尸肚莊母臥喚方方月方日方方十三歲行年在庚申坤正七月離巽辰戌日在正西偏北辛在正東偏北甲黃色衣西南首西南方黃衣師看産十四歲行年在己未離二八月坤兌卯酉日在正北偏西壬在正北偏東癸赤色衣正南首正南方赤衣師看産十五歲行年在戊午坎三九月乾艮寅申日在正北偏東癸在正北偏西壬黑色衣正北首正北方黑衣師看産十六歲行年在丁巳震四十月艮乾丑未日在正東偏北甲在正西偏北辛青色衣正東首正東方青衣師看産十七歲行年在丙辰艮五十一月震艮子午日在正東偏南己在正西偏南庚黃色衣東北首東北方黃