損已上諸方皆為緊要之藥必不可缺其斷臍帶先用線近臍扎緊帛裹咬斷如天氣風寒或難産母子勞傷元氣者先扎臍帶以油紙捻燒斷此又為回生起死之要法也故治者當審其宜不可概信而用之催生靈符第十一靈符宜以水飛硃砂書之貼於房內北壁上至坐蓐之時將符以針扎就盞內化之溫水調服治難産及橫生逆産胞衣不下靈符見後出聖惠方局方同不安穩朱書貼産婦處北壁上覺不安穩書貼枕上橫生硃砂書書此符以順水吞下此四符入月一日墨書鞋底上密安産婦席蓐下勿令人知此三符遇産難以墨書吞之此四符遇胞衣不出以朱書吞之謹按前所著方論圖向符訣一帙自夫人泛視之以為迂遠然艱於得子者互相質問則惟此書為要屢試有明驗也余每觀其護孕之方極為曲當易産之藥悉有根據至於圖向之趨避吉凶所關符訣之玄微神妙顯用其誠有得於諸先哲者乎不然王太僕諸公深於奧理者也豈謬論耶則是書也誠妊娠良方家戶之所當珍藏考究者使舍此而施治於妊婦鮮不有誤矣觀者勿以為迂遠云
